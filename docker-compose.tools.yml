# AUTO-EVO-AI V0.1 — 外部工具 Docker 服务
# docker compose -f docker-compose.tools.yml up -d

services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    volumes:
      - ./_data/meili:/meili_data
    environment:
      MEILI_MASTER_KEY: evo-master-key-2026
      MEILI_NO_ANALYTICS: "true"

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    ports:
      - "8081:8080"
    volumes:
      - ./_data/stirling:/usr/share/tessdata

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    ports:
      - "3001:3001"
    volumes:
      - ./_data/uptime:/app/data

  nextchat:
    image: yidadaa/chatgpt-next-web:latest
    ports:
      - "3099:3000"
    environment:
      OPENAI_API_KEY: ""
      BASE_URL: ""

  filebrowser:
    image: filebrowser/filebrowser:latest
    ports:
      - "8083:80"
    volumes:
      - ./:/srv
      - ./_data/filebrowser:/database
    user: "${UID:-0}:${GID:-0}"

  openclaw:
    image: openclaw/openclaw:latest
    ports:
      - "3002:3002"
    volumes:
      - ./_data/openclaw:/app/data
    environment:
      NODE_ENV: production

  superset:
    image: apache/superset:latest
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: evo-superset-secret-2026
    command: >
      sh -c "superset db upgrade &&
             superset init &&
             superset run -p 8088 --with-threads --reload"

  activepieces:
    image: ghcr.io/activepieces/activepieces:latest
    ports:
      - "8080:80"
    depends_on:
      - activepieces-redis
    environment:
      AP_REDIS_URL: redis://activepieces-redis:6379
      AP_ENGINE_EXECUTABLE_PATH: "dist/packages/engine/main.js"
      AP_SIGN_UP_ENABLED: "false"

  activepieces-redis:
    image: redis:7-alpine
    expose:
      - "6379"

  hoppscotch:
    image: hoppscotch/hoppscotch:latest
    ports:
      - "3010:3000"
    environment:
      HOPSCOTCH_SELF_HOSTED: "true"

  tabby:
    image: tabbyml/tabby:latest
    ports:
      - "8089:8080"
    volumes:
      - ./_data/tabby:/data
    command: serve --model StarCoder-1B --device cpu

  firecrawl:
    image: firecrawl/firecrawl:latest
    ports:
      - "3002:3002"
    environment:
      FIRECRAWL_API_KEY: evo-firecrawl-key-2026
      REDIS_URL: redis://firecrawl-redis:6379
    depends_on:
      - firecrawl-redis

  firecrawl-redis:
    image: redis:7-alpine
    expose:
      - "6379"

  mcphub:
    image: mcphub/mcphub:latest
    ports:
      - "3011:3000"
    volumes:
      - ./_data/mcphub:/app/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./_data/minio:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./_data/portainer:/data
    command: -H unix:///var/run/docker.sock --http-enabled

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3050:3000"
    volumes:
      - ./_data/grafana:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel

  outline:
    image: outlinewiki/outline:latest
    ports:
      - "3100:3000"
    depends_on:
      - outline-postgres
      - outline-redis
    environment:
      PGSSLMODE: disable
      SECRET_KEY: evo-outline-secret-2026
      DATABASE_URL: postgres://outline:outline@outline-postgres:5432/outline
      REDIS_URL: redis://outline-redis:6379
      URL: http://127.0.0.1:3100

  outline-postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: outline
      POSTGRES_DB: outline
    volumes:
      - ./_data/outline-db:/var/lib/postgresql/data

  outline-redis:
    image: redis:7-alpine
    expose:
      - "6379"

  appsmith:
    image: appsmith/appsmith-ce:latest
    ports:
      - "8080:80"
    volumes:
      - ./_data/appsmith:/appsmith-stacks
