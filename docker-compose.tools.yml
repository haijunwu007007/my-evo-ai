# AUTO-EVO-AI V0.1 — 外部工具 Docker 服务
# docker compose -f docker-compose.tools.yml up -d

services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    volumes:
      - ./_data/meili:/meili_data
    environment:
      MEILI_MASTER_KEY: evo-master-key-2026
      MEILI_NO_ANALYTICS: "true"

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    ports:
      - "8081:8080"
    volumes:
      - ./_data/stirling:/usr/share/tessdata

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    ports:
      - "3001:3001"
    volumes:
      - ./_data/uptime:/app/data

  nextchat:
    image: yidadaa/chatgpt-next-web:latest
    ports:
      - "3099:3000"
    environment:
      OPENAI_API_KEY: ""
      BASE_URL: ""

  filebrowser:
    image: filebrowser/filebrowser:latest
    ports:
      - "8083:80"
    volumes:
      - ./:/srv
      - ./_data/filebrowser:/database
    user: "${UID:-0}:${GID:-0}"

  openclaw:
    image: openclaw/openclaw:latest
    ports:
      - "3002:3002"
    volumes:
      - ./_data/openclaw:/app/data
    environment:
      NODE_ENV: production

  superset:
    image: apache/superset:latest
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: evo-superset-secret-2026
    command: >
      sh -c "superset db upgrade &&
             superset init &&
             superset run -p 8088 --with-threads --reload"

  activepieces:
    image: ghcr.io/activepieces/activepieces:latest
    ports:
      - "8080:80"
    depends_on:
      - activepieces-redis
    environment:
      AP_REDIS_URL: redis://activepieces-redis:6379
      AP_ENGINE_EXECUTABLE_PATH: "dist/packages/engine/main.js"
      AP_SIGN_UP_ENABLED: "false"

  activepieces-redis:
    image: redis:7-alpine
    expose:
      - "6379"

  hoppscotch:
    image: hoppscotch/hoppscotch:latest
    ports:
      - "3010:3000"
    environment:
      HOPSCOTCH_SELF_HOSTED: "true"

  tabby:
    image: tabbyml/tabby:latest
    ports:
      - "8089:8080"
    volumes:
      - ./_data/tabby:/data
    command: serve --model StarCoder-1B --device cpu

  firecrawl:
    image: firecrawl/firecrawl:latest
    ports:
      - "3002:3002"
    environment:
      FIRECRAWL_API_KEY: evo-firecrawl-key-2026
      REDIS_URL: redis://firecrawl-redis:6379
    depends_on:
      - firecrawl-redis

  firecrawl-redis:
    image: redis:7-alpine
    expose:
      - "6379"

  mcphub:
    image: mcphub/mcphub:latest
    ports:
      - "3011:3000"
    volumes:
      - ./_data/mcphub:/app/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./_data/minio:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./_data/portainer:/data
    command: -H unix:///var/run/docker.sock --http-enabled

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3050:3000"
    volumes:
      - ./_data/grafana:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel

  outline:
    image: outlinewiki/outline:latest
    ports:
      - "3100:3000"
    depends_on:
      - outline-postgres
      - outline-redis
    environment:
      PGSSLMODE: disable
      SECRET_KEY: evo-outline-secret-2026
      DATABASE_URL: postgres://outline:outline@outline-postgres:5432/outline
      REDIS_URL: redis://outline-redis:6379
      URL: http://127.0.0.1:3100

  outline-postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: outline
      POSTGRES_DB: outline
    volumes:
      - ./_data/outline-db:/var/lib/postgresql/data

  outline-redis:
    image: redis:7-alpine
    expose:
      - "6379"

  appsmith:
    image: appsmith/appsmith-ce:latest
    ports:
      - "8080:80"
    volumes:
      - ./_data/appsmith:/appsmith-stacks

  code-server:
    image: codercom/code-server:latest
    ports:
      - "8443:8080"
    volumes:
      - ./:/home/coder/project
      - ./_data/code-server:/home/coder/.config
    environment:
      PASSWORD: evo-code
    user: "1000:1000"

  dashy:
    image: lissy93/dashy:latest
    ports:
      - "4000:80"
    volumes:
      - ./dashy-conf.yml:/app/public/conf.yml
    environment:
      NODE_ENV: production

  ntfy:
    image: binwiederhier/ntfy:latest
    ports:
      - "8086:80"
    volumes:
      - ./_data/ntfy:/etc/ntfy
    command: serve

  nocodb:
    image: nocodb/nocodb:latest
    ports:
      - "8088:8080"
    volumes:
      - ./_data/nocodb:/usr/app/data

  changedetection:
    image: dgtlmoon/changedetection.io:latest
    ports:
      - "5000:5000"
    volumes:
      - ./_data/changedetection:/datastore
    environment:
      PLAYWRIGHT_DRIVER_URL: ws://playwright-chrome:3000?token=evo-cd-token

  playwright-chrome:
    image: browserless/chrome:latest
    expose:
      - "3000"
    environment:
      CONNECTION_TIMEOUT: 60000
      MAX_CONCURRENT_SESSIONS: 10
      TOKEN: evo-cd-token

  gitea:
    image: gitea/gitea:latest
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - ./_data/gitea:/data
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__server__DOMAIN: localhost
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__ROOT_URL: http://localhost:3000
      GITEA__server__DISABLE_SSH: "false"
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__server__SSH_PORT: 22

  nextcloud:
    image: nextcloud:latest
    ports:
      - "8090:80"
    volumes:
      - ./_data/nextcloud:/var/www/html
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: evo-nextcloud-2026
      SQLITE_DATABASE: nextcloud.db

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3030:3000"
    volumes:
      - ./_data/metabase:/metabase.db
    environment:
      MB_DB_FILE: /metabase.db/metabase.db

  plane:
    image: makeplane/plane:latest
    ports:
      - "3780:80"
    volumes:
      - ./_data/plane:/data

  vaultwarden:
    image: vaultwarden/server:latest
    ports:
      - "8180:80"
    volumes:
      - ./_data/vaultwarden:/data
    environment:
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: evo-vw-admin-2026

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:latest
    ports:
      - "8123:8123"
    volumes:
      - ./_data/homeassistant:/config
    environment:
      TZ: Asia/Shanghai

  # ── 新增 6 个工具 ─────────────────────────────────

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    ports:
      - "2283:3001"
    volumes:
      - ./_data/immich:/usr/src/app/upload
    environment:
      DB_HOSTNAME: immich-postgres
      DB_USERNAME: immich
      DB_PASSWORD: evo-immich-2026
      DB_DATABASE_NAME: immich
      REDIS_HOST: immich-redis
    depends_on:
      - immich-postgres
      - immich-redis

  immich-postgres:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    environment:
      POSTGRES_USER: immich
      POSTGRES_PASSWORD: evo-immich-2026
      POSTGRES_DB: immich
    volumes:
      - ./_data/immich-pg:/var/lib/postgresql/data

  immich-redis:
    image: redis:7-alpine

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - ./_data/immich-ml:/cache
    environment:
      TRANSFORMERS_CACHE: /cache

  excalidraw:
    image: excalidraw/excalidraw:latest
    ports:
      - "3080:80"

  miniflux:
    image: miniflux/miniflux:latest
    ports:
      - "3060:8080"
    depends_on:
      - miniflux-db
    environment:
      DATABASE_URL: postgres://miniflux:evo-mf-2026@miniflux-db/miniflux?sslmode=disable
      RUN_MIGRATIONS: "1"
      CREATE_ADMIN: "1"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: evo-admin-2026

  miniflux-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: miniflux
      POSTGRES_PASSWORD: evo-mf-2026
      POSTGRES_DB: miniflux
    volumes:
      - ./_data/miniflux-pg:/var/lib/postgresql/data

  hoarder:
    image: ghcr.io/hoarder-app/hoarder:latest
    ports:
      - "3070:3000"
    depends_on:
      - hoarder-db
      - hoarder-chrome
    environment:
      DATABASE_URL: postgres://hoarder:evo-hd-2026@hoarder-db/hoarder?sslmode=disable
      MEILI_HTTP_ADDR: http://hoarder-meili:7700
      MEILI_MASTER_KEY: evo-hd-meili-key
      BROWSER_WEB_WS_URL: ws://hoarder-chrome:3000
      NEXTAUTH_SECRET: evo-hoarder-secret-2026
      NEXTAUTH_URL: http://localhost:3070

  hoarder-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hoarder
      POSTGRES_PASSWORD: evo-hd-2026
      POSTGRES_DB: hoarder
    volumes:
      - ./_data/hoarder-pg:/var/lib/postgresql/data

  hoarder-chrome:
    image: browserless/chrome:latest
    environment:
      CONNECTION_TIMEOUT: 60000
      MAX_CONCURRENT_SESSIONS: 10

  hoarder-meili:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: evo-hd-meili-key
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ./_data/hoarder-meili:/meili_data

  documenso:
    image: documenso/documenso:latest
    ports:
      - "3090:3000"
    depends_on:
      - documenso-db
    environment:
      NEXTAUTH_SECRET: evo-documenso-secret
      NEXTAUTH_URL: http://localhost:3090
      DATABASE_URL: postgres://documenso:evo-dc-2026@documenso-db/documenso?sslmode=disable

  documenso-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: documenso
      POSTGRES_PASSWORD: evo-dc-2026
      POSTGRES_DB: documenso
    volumes:
      - ./_data/documenso-pg:/var/lib/postgresql/data

  docmost:
    image: docmost/docmost:latest
    ports:
      - "3085:3000"
    depends_on:
      - docmost-db
      - docmost-redis
    environment:
      APP_URL: http://localhost:3085
      APP_SECRET: evo-docmost-secret
      DATABASE_URL: postgres://docmost:evo-dm-2026@docmost-db/docmost?sslmode=disable
      REDIS_URL: redis://docmost-redis:6379

  docmost-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: evo-dm-2026
      POSTGRES_DB: docmost
    volumes:
      - ./_data/docmost-pg:/var/lib/postgresql/data

  docmost-redis:
    image: redis:7-alpine
