# AUTO-EVO-AI V0.1 上市公司级生产部署
# 用法: docker compose -f docker-compose.prod.yml up -d
# 只需要在 .env 中填写:
#   OPENAI_API_KEY=sk-xxx
#   FEISHU_WEBHOOK_URL=https://open.feishu.cn/...

version: '3.8'

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart
  restart: unless-stopped
  logging: *logging

services:
  # ═══════════════════════════════════════════════════
  # 主 API 服务（上市公司级配置）
  # ═══════════════════════════════════════════════════
  api:
    <<: *restart
    image: ghcr.io/auto-evo-ai/v0.1:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - evo_data:/app/evo_data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      EVO_PORT: "8765"
      EVO_HOST: "0.0.0.0"
      EVO_API_KEY_ENABLED: "true"
      EVO_AUTH_ENABLED: "true"
      # ═══════ LLM API Keys ═══════
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      ZHIPU_API_KEY: "${ZHIPU_API_KEY:-}"
      # ═══════ 通知 Webhook ═══════
      FEISHU_WEBHOOK_URL: "${FEISHU_WEBHOOK_URL:-}"
      DINGTALK_WEBHOOK_URL: "${DINGTALK_WEBHOOK_URL:-}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      # ═══════ 部署元数据 ═══════
      EVO_DEPLOY_ENV: "production"
      EVO_VERSION: "0.1.0"
      EVO_HOSTNAME: "${EVO_HOSTNAME:-unknown}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, json; r=json.loads(urllib.request.urlopen('http://localhost:8765/').read()); assert r['status']=='running'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "app=auto-evo-ai"
      - "version=0.1.0"
      - "managed-by=docker-compose"
      - "traefik.enable=true"
      - "traefik.http.routers.evo.rule=Host(`${EVO_HOSTNAME:-localhost}`)"
      - "traefik.http.services.evo.loadbalancer.server.port=8765"

  # ═══════════════════════════════════════════════════
  # 可选: Prometheus 指标采集
  # ═══════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    <<: *restart
    volumes:
      - prom_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # ═══════════════════════════════════════════════════
  # 可选: Grafana 可视化面板
  # ═══════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    <<: *restart
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin123}"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  evo_data:
  prom_data:
  grafana_data:
