# AUTO-EVO-AI V0.1 — 默认配置
# 优先级: env vars (EVO_*) > environments/{env}.yaml > defaults.yaml
server:
  host: "127.0.0.1"
  port: 8765
  reload: false

logging:
  level: "INFO"
  json_format: false

security:
  auth_enabled: false
  api_key_enabled: false
  rate_limit:
    max_requests: 100
    window_seconds: 60

llm:
  default_model: "zhipu:glm-4-flash"
  providers: []

notification:
  channels: ["console"]

database:
  path: "data/evo.db"
  pool_size: 5

monitoring:
  interval_seconds: 30
