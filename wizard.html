<!DOCTYPE html>
<!-- AUTO-EVO-AI V0.1 Wizard (535模块) -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="/frontend/i18n-loader.js"></script>
<script>if(localStorage.getItem('evo_theme')==='light'){document.documentElement.setAttribute('data-theme','light')}</script>
<style>.skeleton{background:linear-gradient(90deg,#1a1a2e 25%,#2d3561 50%,#1a1a2e 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AUTO-EVO-AI — 设置向导</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0f172a;color:#f1f5f9;min-height:100vh}
.header{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:24px 16px;text-align:center}
.header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.header p{font-size:12px;opacity:.8}
.steps{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid #334155}
.step{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:11px;background:#1e293b;cursor:pointer;border:1px solid transparent;min-width:120px;text-align:center}
.step.active{background:#6366f1;border-color:#818cf8;font-weight:600}
.step.done{background:#065f46;border-color:#10b981}
.body{max-width:600px;margin:0 auto;padding:16px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px}
.card h3{font-size:14px;margin-bottom:8px}
.card p{font-size:12px;color:#94a3b8;margin-bottom:12px}
input,select{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#f1f5f9;font-size:13px;margin-bottom:8px}
input:focus,select:focus{outline:none;border-color:#6366f1}
.btn{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;width:100%}
.btn:hover{background:#4f46e5}
.btn:disabled{opacity:.4;cursor:default}
.btn-success{background:#10b981}
.btn-warn{background:#f59e0b;color:#000}
.btn-outline{background:transparent;border:1px solid #334155;color:#94a3b8}
.status{font-size:11px;padding:6px 10px;border-radius:6px;margin:6px 0}
.status.ok{background:#065f46;color:#6ee7b7}
.status.warn{background:#78350f;color:#fcd34d}
.status.err{background:#7f1d1d;color:#fca5a5}
.hidden{display:none}
label{font-size:12px;color:#94a3b8;display:block;margin-bottom:4px}
.check{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;margin-bottom:4px;font-size:12px}
.check.ok{background:#065f46;color:#6ee7b7}
.check.wait{background:#1e293b;color:#94a3b8}
.check.fail{background:#7f1d1d;color:#fca5a5}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
<h1>AUTO-EVO-AI V0.1</h1>
<p>3 步完成配置，开启上市公司级 AI 自动化平台</p>
</div>
<div class="steps">
<div class="step active" id="s1">1. LLM 配置</div>
<div class="step" id="s2">2. 通知通道</div>
<div class="step" id="s3">3. 系统就绪</div>
</div>
<div class="body" id="body">

<!-- Step 1: LLM -->
<div id="page1">
<div class="card">
<h3>选择 AI 模型厂商</h3>
<select id="provider">
<option value="zhipu">智谱 AI (GLM-4-Flash)</option>
<option value="openai">OpenAI (GPT-4o-mini)</option>
<option value="deepseek">DeepSeek</option>
</select>
<h3 style="margin-top:12px">API Key</h3>
<p>从智谱开放平台获取：<a href="https://open.bigmodel.cn/usercenter/apikeys" target="_blank" style="color:#818cf8">open.bigmodel.cn</a></p>
<input id="apiKey" placeholder="输入 API Key" />
<h3 style="margin-top:12px">接口地址（可选）</h3>
<input id="baseUrl" placeholder="https://open.bigmodel.cn/api/paas/v4" />
<div id="llmStatus"></div>
<button class="btn" onclick="testLLM()">保存并测试</button>
</div>
</div>

<!-- Step 2: Notify -->
<div id="page2" class="hidden">
<div class="card">
<h3>配置通知通道</h3>
<p>至少配置一个通道，系统会自动推送告警和趋势报告</p>
<select id="channelType">
<option value="dingtalk">钉钉 Webhook</option>
<option value="wechat_work">企业微信 Webhook</option>
<option value="feishu">飞书 Webhook</option>
<option value="slack">Slack Webhook</option>
</select>
<input id="webhookUrl" placeholder="Webhook URL" />
<div id="notifyStatus"></div>
<button class="btn" onclick="testNotify()">保存并测试通知</button>
</div>
</div>

<!-- Step 3: Ready -->
<div id="page3" class="hidden">
<div class="card">
<h3>🎉 配置完成！</h3>
<div id="summary"></div>
<div id="readyChecks"></div>
<div id="testResult" class="hidden" style="margin-top:12px;padding:12px;border-radius:8px;background:#065f46;color:#6ee7b7;font-size:12px;text-align:center">
✅ 测试通知已发送到钉钉，请查看手机确认
</div>
<button class="btn btn-warn" id="sendTestBtn" onclick="sendTestNotify()">
📱 发送测试通知到钉钉
</button>
<div style="display:flex;gap:8px;margin-top:8px">
<a href="/dashboard" class="btn btn-success" style="display:block;text-align:center;text-decoration:none;flex:1">进入 Dashboard →</a>
<a href="/ops" class="btn btn-outline" style="display:block;text-align:center;text-decoration:none;flex:1">运营中心</a>
</div>
</div>
</div>

</div>
<script>
const BASE = window.location.origin;
async function api(path, data) {
  const h = {'Content-Type':'application/json'};
  const k = localStorage.getItem('ak');
  if(k) h['X-API-Key'] = k;
  const r = await fetch(BASE + path, {method:'POST', headers:h, body:JSON.stringify(data)});
  return r.json();
}
async function get(path) {
  const h = {};
  const k = localStorage.getItem('ak');
  if(k) h['X-API-Key'] = k;
  const r = await fetch(BASE + path, {headers:h});
  return r.json();
}

function next(id) {
  document.querySelectorAll('#page1,#page2,#page3').forEach(e => e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  if(id==='page1') document.getElementById('s1').classList.add('active');
  if(id==='page2') { document.getElementById('s2').classList.add('active'); loadSummary(); }
  if(id==='page3') { document.getElementById('s3').classList.add('active'); checkReady(); }
}

async function testLLM() {
  const pv = document.getElementById('provider').value;
  const key = document.getElementById('apiKey').value;
  const url = document.getElementById('baseUrl').value || '';
  const st = document.getElementById('llmStatus');
  st.className = 'status warn';
  st.textContent = '⏳ 测试中...';
  st.classList.remove('hidden');
  try {
    const r = await api('/api/setup/llm/quick-start', {provider:pv, api_key:key, base_url:url, model:pv==='zhipu'?'glm-4-flash':'gpt-4o-mini'});
    if(r.success) {
      st.className = 'status ok';
      st.textContent = '✅ LLM 配置成功！';
      document.getElementById('s1').classList.add('done');
      next('page2');
    } else {
      st.className = 'status err';
      st.textContent = '❌ ' + (r.error || '配置失败');
    }
  } catch(e) {
    st.className = 'status err';
    st.textContent = '❌ 请求失败: ' + e.message;
  }
}

async function testNotify() {
  const ch = document.getElementById('channelType').value;
  const url = document.getElementById('webhookUrl').value;
  const st = document.getElementById('notifyStatus');
  st.className = 'status warn';
  st.textContent = '⏳ 发送测试通知...';
  st.classList.remove('hidden');
  try {
    const r = await api('/api/notify/test', {channel:ch, webhook_url:url, content:'✅ AUTO-EVO-AI 通知通道测试成功！系统已就绪。', title:'配置测试'});
    if(r.success) {
      st.className = 'status ok';
      st.textContent = '✅ 通知通道配置成功！';
      localStorage.setItem('notify_channel', ch);
      localStorage.setItem('notify_url', url);
      document.getElementById('s2').classList.add('done');
      next('page3');
    } else {
      st.className = 'status err';
      st.textContent = '❌ ' + (r.error || '发送失败');
    }
  } catch(e) {
    st.className = 'status err';
    st.textContent = '❌ 请求失败: ' + e.message;
  }
}

async function loadSummary() {
  try {
    const r = await get('/api/status');
    document.getElementById('summary').innerHTML = '<div style="font-size:12px;color:#94a3b8">系统状态: ' + r.status + ' | 模块: ' + r.modules_total + '</div>';
  } catch(e) {}
}

async function checkReady() {
  const ck = document.getElementById('readyChecks');
  ck.innerHTML = '<div class="check wait"><span class="spin">⟳</span> 检查系统状态...</div>';
  const checks = [
    {label:'系统服务运行中', check: async() => { const r=await get('/api/status'); return r.status==='running'; }},
    {label:'LLM 已配置', check: async() => { const r=await get('/api/llm/providers'); return r.providers?.some(p=>p.has_key); }},
    {label:'调度器已启动', check: async() => { const r=await get('/api/scheduler/status'); return r.running; }},
    {label:'通知通道已配置', check: async() => { const n=await get('/api/notify/channels'); return n.channels?.some(c=>c.configured); }},
  ];
  let allOk = true;
  for(const c of checks) {
    ck.innerHTML += '<div class="check wait"><span class="spin">⟳</span> ' + c.label + '...</div>';
    try {
      const ok = await c.check();
      ck.innerHTML = ck.innerHTML.replace('<div class="check wait"><span class="spin">⟳</span> ' + c.label + '...</div>', '<div class="check ok">✅ ' + c.label + '</div>');
      if(!ok) allOk = false;
    } catch(e) {
      ck.innerHTML = ck.innerHTML.replace('<div class="check wait"><span class="spin">⟳</span> ' + c.label + '...</div>', '<div class="check fail">❌ ' + c.label + '</div>');
      allOk = false;
    }
  }
  if(allOk) {
    ck.innerHTML += '<div style="margin-top:8px;padding:10px;background:#065f46;color:#6ee7b7;border-radius:8px;font-size:13px;text-align:center">🎉 系统一切正常，明天 9:00 将自动推送 AI 趋势报告到钉钉！</div>';
  }
}

async function sendTestNotify() {
  const btn = document.getElementById('sendTestBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 发送中...';
  try {
    const ch = localStorage.getItem('notify_channel') || 'dingtalk';
    const url = localStorage.getItem('notify_url') || '';
    const r = await api('/api/notify/test', {
      channel: ch,
      webhook_url: url,
      content: '🎉 AUTO-EVO-AI 系统已就绪！\n\n✅ LLM: 智谱 GLM-4-Flash\n✅ 调度器: 15 任务自动运行\n✅ 语言: 8 种语言支持\n✅ 部署: Docker 就绪\n\n明天 9:00 将自动推送 AI 趋势报告。',
      title: 'AUTO-EVO-AI 就绪通知'
    });
    document.getElementById('testResult').classList.remove('hidden');
    if(r.success) {
      document.getElementById('testResult').textContent = '✅ 测试通知已发送到钉钉！请查看手机确认。';
      document.getElementById('testResult').style.background = '#065f46';
      document.getElementById('testResult').style.color = '#6ee7b7';
    } else {
      document.getElementById('testResult').textContent = '⚠️ 发送结果: ' + (r.error || '请检查 Webhook URL');
      document.getElementById('testResult').style.background = '#78350f';
      document.getElementById('testResult').style.color = '#fcd34d';
    }
  } catch(e) {
    document.getElementById('testResult').classList.remove('hidden');
    document.getElementById('testResult').textContent = '❌ 发送失败: ' + e.message;
    document.getElementById('testResult').style.background = '#7f1d1d';
    document.getElementById('testResult').style.color = '#fca5a5';
  }
  btn.disabled = false;
  btn.textContent = '📱 重新发送测试通知';
}

loadSummary();
</script>
</body>
</html>
