version: '3.8'

services:
  evo-api:
    build: .
    container_name: evo-api
    ports:
      - "8765:8765"
    volumes:
      - ./evo-data:/app/data
      - ./evo-config:/app/config
    environment:
      - TZ=Asia/Shanghai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/v1/status', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
