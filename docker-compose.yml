# AUTO-EVO-AI V0.1 — 一键部署
# 运行: docker compose up -d
# 访问: http://localhost:8765/app/login

services:
  # ========== 核心系统 ==========
  evo-core:
    build: .
    image: auto-evo-ai:v0.1
    container_name: evo-core
    ports:
      - "8765:8765"
    volumes:
      - ./_data:/app/_data
      - ./core:/app/core
    environment:
      EVO_ADMIN_KEY: ""
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - evo-net

  # ========== 外部工具 ==========
  tools:
    profiles: ["tools"]
    extends:
      file: docker-compose.tools.yml
      service: placeholder
    # 启动所有工具: docker compose --profile tools up -d
    # 启动单个工具: docker compose -f docker-compose.tools.yml up -d <name>

networks:
  evo-net:
    driver: bridge
