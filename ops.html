<!DOCTYPE html>
<!-- AUTO-EVO-AI V0.1 Ops Panel (535模块) -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTO-EVO-AI V0.1 - 运营中心</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;--primary:#6366f1;--success:#10b981;--warning:#f59e0b;--danger:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:13px;transition:all .2s}
.tab:hover{background:var(--primary);color:#fff}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.panel{display:none}
.panel.active{display:block}
.section{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.section h3{font-size:14px;color:var(--warning);margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.stat .val{font-size:20px;font-weight:700;color:var(--primary)}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.row:last-child{border-bottom:none}
.row .key{color:var(--muted)}
.row .val{color:var(--text)}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block}
.badge.on{background:rgba(16,185,129,.2);color:var(--success)}
.badge.off{background:rgba(239,68,68,.2);color:var(--danger)}
.badge.warn{background:rgba(245,158,11,.2);color:var(--warning)}
button{background:var(--primary);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;transition:all .2s}
button:hover{filter:brightness(1.15)}
button.sm{padding:4px 10px;font-size:11px}
button.success{background:var(--success)}
button.warn{background:var(--warning);color:#000}
button.danger{background:var(--danger)}
.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
pre{background:#020617;padding:12px;border-radius:8px;overflow:auto;font-size:12px;line-height:1.5;max-height:300px;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.green{background:var(--success)}
.status-dot.red{background:var(--danger)}
.status-dot.yellow{background:var(--warning)}
.status-dot.gray{background:var(--muted)}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9999}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;min-width:320px;max-width:600px}
.modal h3{margin-bottom:12px;color:var(--warning)}
.modal input,.modal select{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);margin-bottom:8px;font-size:13px}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.loading{text-align:center;padding:40px;color:var(--muted)}
.error{color:var(--danger);padding:12px;text-align:center}
@media(max-width:600px){.grid{grid-template-columns:1fr}.tabs{font-size:12px}.tab{padding:6px 10px}}
</style>
</head>
<body>
<div class="tabs" id="tabs">
<div class="tab active" onclick="switchTab('overview')">🏠 总览</div>
<div class="tab" onclick="switchTab('setup')">⚙️ 配置向导</div>
<div class="tab" onclick="switchTab('tasks')">⏰ 任务管理</div>
<div class="tab" onclick="switchTab('notify')">📢 通知通道</div>
<div class="tab" onclick="switchTab('templates')">📋 模板</div>
<div class="tab" onclick="switchTab('system')">🔧 系统</div>
</div>

<div id="panel-overview" class="panel active"><div class="loading">加载中...</div></div>
<div id="panel-setup" class="panel"><div class="loading">加载中...</div></div>
<div id="panel-tasks" class="panel"><div class="loading">加载中...</div></div>
<div id="panel-notify" class="panel"><div class="loading">加载中...</div></div>
<div id="panel-templates" class="panel"><div class="loading">加载中...</div></div>
<div id="panel-system" class="panel"><div class="loading">加载中...</div></div>

<script>
const BASE = window.BASE_URL || '';
function $(id) { return document.getElementById(id); }
async function api(path, opts={}) {
  const r = await fetch(BASE + path, { headers:{'Content-Type':'application/json'}, ...opts });
  return r.json();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  $(`panel-${name}`).classList.add('active');
  loadTab(name);
}

window.switchTab = switchTab;

function loadTab(name) {
  const fns = { overview:loadOverview, setup:loadSetup, tasks:loadTasks, notify:loadNotify, templates:loadTemplates, system:loadSystem };
  if (fns[name]) fns[name]();
}

async function loadOverview() {
  const el = $('panel-overview');
  try {
    const [status, health, scheduler, auto] = await Promise.all([
      api('/api/status').catch(()=>({})),
      api('/api/health').catch(()=>({})),
      api('/api/scheduler/status').catch(()=>({})),
      api('/api/autonomous/status').catch(()=>({})),
    ]);
    const mLoaded = status.modules_loaded||0, mTotal = status.modules_total||0;
    const healthy = health.modules_ok||0, errors = health.modules_error||0;
    const schedRunning = scheduler.running?'是':'否', schedTasks = scheduler.active_tasks||0;
    const autoRunning = auto.running?'是':'否', autoCycle = auto.cycle_count||0;
    el.innerHTML = `
      <div class="grid">
        <div class="stat"><div class="val">${mLoaded}/${mTotal}</div><div class="lbl">模块已加载</div></div>
        <div class="stat"><div class="val">${healthy}</div><div class="lbl">健康模块</div></div>
        <div class="stat"><div class="val">${errors}</div><div class="lbl">异常模块</div></div>
        <div class="stat"><div class="val">${schedTasks}</div><div class="lbl">活跃调度任务</div></div>
      </div>
      <div class="section">
        <h3>🔋 系统状态</h3>
        <div class="row"><span class="key">状态</span><span class="val">${status.status||'unknown'} <span class="badge ${status.status==='running'?'on':'off'}">${status.status||'?'}</span></span></div>
        <div class="row"><span class="key">调度器</span><span class="val">${schedRunning} <span class="badge ${scheduler.running?'on':'off'}">${scheduler.running?'运行中':'已停止'}</span></span></div>
        <div class="row"><span class="key">自主智能体</span><span class="val">${autoRunning} <span class="badge ${auto.running?'on':'off'}">${auto.running?'运行中':'已停止'}</span></span></div>
        <div class="row"><span class="key">今日执行</span><span class="val">${scheduler.today_executions||0} 次</span></div>
        <div class="row"><span class="key">今日失败</span><span class="val">${scheduler.today_failures||0} 次</span></div>
      </div>
      <div class="actions">
        <button onclick="window.open('/dashboard','_blank')">📊 完整 Dashboard</button>
        <button onclick="loadOverview()">🔄 刷新</button>
      </div>`;
  } catch(e) { el.innerHTML = `<div class="error">加载错误: ${e.message}</div>`; }
}

async function loadSetup() {
  const el = $('panel-setup');
  try {
    const report = await api('/api/setup/report');
    const items = report.items||[];
    const passed = items.filter(i=>i.passed).length;
    const total = items.length;
    el.innerHTML = `
      <div class="section">
        <h3>📋 配置检测 (${passed}/${total})</h3>
        ${items.map(i=>`
          <div class="row">
            <span class="key">${i.label}</span>
            <span class="val">${i.passed?`<span class="badge on">已配置</span>`:`<span class="badge off">未配置</span>`} ${i.detail?`<span style="color:var(--muted);font-size:11px">${i.detail}</span>`:''}</span>
          </div>
        `).join('')}
      </div>
      <div style="color:var(--muted);font-size:12px;margin-top:8px;padding:8px;background:var(--card);border-radius:8px;">
        ${report.production_ready ? '✅ <strong>系统已满足生产运行条件</strong>' : '⚠️ 部分配置未完成，建议按需配置'}
      </div>
      ${!report.production_ready ? `
      <div class="actions" style="margin-top:12px">
        <button class="success" onclick="runSetup()">🚀 自动配置缺失项</button>
      </div>` : ''}
    `;
  } catch(e) { el.innerHTML = `<div class="error">加载失败: ${e.message}</div>`; }
}

window.runSetup = async function() {
  const btn = event.currentTarget; btn.disabled = true; btn.textContent = '⏳ 配置中...';
  try {
    const r = await api('/api/setup/first-run', {method:'POST'});
    alert(r.message || '配置完成');
    loadSetup();
  } catch(e) { alert('配置失败: '+e.message); }
  btn.disabled = false; btn.textContent = '🚀 自动配置缺失项';
};

async function loadTasks() {
  const el = $('panel-tasks');
  try {
    const [status, tasks] = await Promise.all([
      api('/api/scheduler/status').catch(()=>({})),
      api('/api/scheduler/tasks').catch(()=>({tasks:[]})),
    ]);
    const list = tasks.tasks||[];
    el.innerHTML = `
      <div class="section"><h3>⏰ 调度器</h3>
        <div class="grid">
          <div class="stat"><div class="val">${list.length}</div><div class="lbl">总任务</div></div>
          <div class="stat"><div class="val">${status.today_executions||0}</div><div class="lbl">今日执行</div></div>
        </div>
        <table>${['名称','类型','调度','状态','下次执行'].map(h=>`<th>${h}</th>`).join('')}
          ${list.map(t=>{
            const st = t.status || t.enabled ? 'active' : 'paused';
            return `<tr><td>${t.name||'?'}</td><td>${t.target_type||'?'}</td><td>${t.cron_expr||t.schedule_type||'?'}</td><td><span class="badge ${st==='active'?'on':'off'}">${st}</span></td><td style="font-size:11px">${t.next_run_at||'-'}</td></tr>`;
          }).join('')}
        </table>
      </div>`;
  } catch(e) { el.innerHTML = `<div class="error">加载失败: ${e.message}</div>`; }
}

async function loadNotify() {
  const el = $('panel-notify');
  try {
    const channels = await api('/api/notify/channels');
    const list = channels.channels||[];
    el.innerHTML = `
      <div class="section"><h3>📢 通知通道 (${list.length} 个)</h3>
        <table>${['通道','名称','状态'].map(h=>`<th>${h}</th>`).join('')}
          ${list.map(c=>`<tr><td>${c.id}</td><td>${c.name}</td><td><span class="badge ${c.configured?'on':'off'}">${c.configured?'就绪':'待配置'}</span></td></tr>`).join('')}
        </table>
        <div style="margin-top:8px;font-size:12px;color:var(--muted)">提示：飞书/钉钉/企微需配置 Webhook URL；Slack/Telegram/Discord/Google Chat/Teams 也支持</div>
      </div>
      <div class="section"><h3>🔗 快速配置通知</h3>
        <select id="notify-channel" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);margin-bottom:6px;">
          ${list.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
        </select>
        <input id="notify-url" placeholder="Webhook URL / Token" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);margin-bottom:6px;">
        <button onclick="testNotify()" class="success">📤 测试发送</button>
        <div id="notify-result" style="margin-top:8px;font-size:12px"></div>
      </div>`;
  } catch(e) { el.innerHTML = `<div class="error">加载失败: ${e.message}</div>`; }
}

window.testNotify = async function() {
  const ch = document.getElementById('notify-channel').value;
  const url = document.getElementById('notify-url').value.trim();
  if (!url) { document.getElementById('notify-result').textContent = '⚠️ 请输入 Webhook URL'; return; }
  document.getElementById('notify-result').textContent = '⏳ 测试中...';
  try {
    const r = await api('/api/notify/send', {method:'POST', body:JSON.stringify({channel:ch, to:url, subject:'AUTO-EVO-AI 测试', content:'✅ 通知通道测试成功！系统已就绪。'})});
    document.getElementById('notify-result').innerHTML = r.success ? '✅ 测试成功！' : '❌ 失败: '+(r.error||'未知');
  } catch(e) { document.getElementById('notify-result').textContent = '❌ 错误: '+e.message; }
};

async function loadTemplates() {
  const el = $('panel-templates');
  try {
    const tpl = await api('/api/setup/templates');
    const list = tpl.templates||[];
    el.innerHTML = `
      <div class="section"><h3>📋 自动化模板 (${list.length} 个)</h3></div>
      ${list.map(t=>`
        <div class="section" style="cursor:pointer">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span><strong>${t.icon||'📄'} ${t.name}</strong></span>
            <span class="badge ${t.enabled?'on':'off'}">${t.enabled?'已启用':'已禁用'}</span>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">${t.description||''}</div>
          <div class="actions" style="margin-top:6px">
            ${!t.enabled ? `<button class="success sm" onclick="enableTpl('${t.id}')">启用</button>` : `<button class="danger sm" onclick="disableTpl('${t.id}')">停用</button>`}
            <button class="sm" onclick="execTpl('${t.id}')">▶️ 立即执行</button>
          </div>
        </div>
      `).join('')}`;
  } catch(e) { el.innerHTML = `<div class="error">加载失败: ${e.message}</div>`; }
}

window.enableTpl = async function(id) {
  try { await api(`/api/setup/templates/${id}/enable`, {method:'POST'}); loadTemplates(); } catch(e) { alert('失败: '+e.message); }
};
window.disableTpl = async function(id) {
  try { await api(`/api/setup/templates/${id}/disable`, {method:'POST'}); loadTemplates(); } catch(e) { alert('失败: '+e.message); }
};
window.execTpl = async function(id) {
  try {
    const r = await api(`/api/setup/templates/${id}/execute`, {method:'POST'});
    alert(r.message || '执行完成');
  } catch(e) { alert('执行失败: '+e.message); }
};

async function loadSystem() {
  const el = $('panel-system');
  try {
    const [diagnosis, config] = await Promise.all([
      api('/api/system/diagnosis').catch(()=>({})),
      api('/api/config').catch(()=>({}))
    ]);
    const issues = diagnosis.issues||[], warns = diagnosis.warnings||[];
    el.innerHTML = `
      <div class="section"><h3>🔧 系统诊断</h3>
        <div class="row"><span class="key">健康</span><span class="val"><span class="badge ${diagnosis.healthy?'on':'off'}">${diagnosis.healthy?'健康':'异常'}</span></span></div>
        <div class="row"><span class="key">运行时间</span><span class="val">${diagnosis.uptime_human||'?'}</span></div>
        <div class="row"><span class="key">模块总数</span><span class="val">${diagnosis.modules_total||0}</span></div>
        ${issues.length ? `<div style="color:var(--danger);margin-top:8px"><strong>问题 (${issues.length}):</strong>${issues.map(i=>`<div>• ${i}</div>`).join('')}</div>` : ''}
        ${warns.length ? `<div style="color:var(--warning);margin-top:8px"><strong>警告 (${warns.length}):</strong>${warns.map(w=>`<div>• ${w}</div>`).join('')}</div>` : ''}
      </div>
      <div class="actions">
        <button onclick="api('/api/system/heal',{method:'POST'}).then(r=>alert(r.success?'自愈完成':'失败: '+JSON.stringify(r)));loadSystem()">🩺 自愈</button>
        <button onclick="loadSystem()">🔄 刷新</button>
      </div>`;
  } catch(e) { el.innerHTML = `<div class="error">加载失败: ${e.message}</div>`; }
}

// Init
loadOverview();
</script>
</body>
</html>
