# AUTO-EVO-AI 行业配置模板
# 
# 使用: deploy-industry.bat <行业代号>
# 如:  deploy-industry.bat manufacturing

[manufacturing]
name=制造业
compose_services=erpnext-db,erpnext
compose_file=docker-compose.tools.yml
port=8765
description=进销存+生产管理
note=启动后打开 http://localhost:8765/app → 设置公司信息 → 创建物料清单

[retail]
name=零售业
compose_services=medusa-db,medusa,metabase
compose_file=docker-compose.tools.yml
port=8765
description=电商+POS+会员管理
note=启动后打开 http://localhost:3030 (Metabase) 做数据分析

[finance]
name=金融业
compose_services=metabase,miniflux-db,miniflux
compose_file=docker-compose.tools.yml
port=8765
description=BI报表+资讯监控
note=启动后打开 http://localhost:3030 连接数据库做分析

[healthcare]
name=医疗业
compose_services=openemr-db,openemr
compose_file=docker-compose.tools.yml
port=8765
description=电子病历+诊所管理
note=启动后打开 http://localhost:8080 配置诊所信息

[education]
name=教育业
compose_services=edx-db,edx-redis,edx
compose_file=docker-compose.tools.yml
port=8765
description=LMS在线学习平台
note=启动后打开 http://localhost:8000 创建课程

[hr]
name=人力资源
compose_services=hr-db,hr-redis,frappe-hr
compose_file=docker-compose.tools.yml
port=8765
description=招聘+考勤+工资管理
note=启动后打开 http://localhost:8000 配置公司组织架构

[enterprise]
name=企业服务
compose_services=twenty-crm,chatwoot-db,chatwoot-redis,chatwoot,osticket-db,osticket
compose_file=docker-compose.tools.yml
port=8765
description=CRM+客服+工单
note=启动后 CRM:3100 / 客服:3120 / 工单:3180

[it]
name=IT科技
compose_services=gitea,grafana,prometheus,snipe-it-db,snipe-it
compose_file=docker-compose.tools.yml
port=8765
description=代码托管+监控+IT资产
note=启动后 Gitea:3000 / Grafana:3100 / Snipe-IT:3200

[legal]
name=法务
