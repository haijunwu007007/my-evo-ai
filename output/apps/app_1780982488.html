<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitHub AI热门项目总结</title>
</head>
<body>
    <h1>GitHub AI热门项目</h1>
    <ul>
        {% for project in ai_projects %}
            <li>
                <h2>{{ project.name }}</h2>
                <p>{{ project.description }}</p>
            </li>
        {% endfor %}
    </ul>
    <h1>项目总结</h1>
    <ul>
        {% for summary in ai_summaries %}
            <li>{{ summary }}</li>
        {% endfor %}
    </ul>
</body>
</html>
