# AUTO-EVO-AI V0.1 — CD Pipeline (Docker 部署)
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master, main]
    types:
      - completed

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to K8s via SSH
        if: ${{ secrets.DEPLOY_SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            PREVIOUS_IMAGE="ghcr.io/${{ github.repository }}:previous"
            NEW_IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"

            # Save previous image tag for rollback
            docker tag evo-api "$PREVIOUS_IMAGE" 2>/dev/null || true

            echo "Pulling: $NEW_IMAGE"
            docker pull "$NEW_IMAGE"

            echo "Stopping old container..."
            docker stop evo-api 2>/dev/null || true
            docker rm evo-api 2>/dev/null || true

            echo "Starting new container..."
            docker run -d --name evo-api --restart always -p 8765:8765 \
              -v evo-data:/app/data \
              -e ZHIPU_API_KEY="${{ secrets.ZHIPU_API_KEY }}" \
              "$NEW_IMAGE"

            # Health check — wait up to 30s for container to be ready
            echo "Health check: waiting for service..."
            HEALTH_OK=false
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8765/api/status >/dev/null 2>&1; then
                HEALTH_OK=true
                echo "Service is healthy!"
                break
              fi
              sleep 1
            done

            if [ "$HEALTH_OK" != "true" ]; then
              echo "Health check FAILED! Rolling back..."
              docker stop evo-api 2>/dev/null || true
              docker rm evo-api 2>/dev/null || true
              if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "$PREVIOUS_IMAGE"; then
                docker run -d --name evo-api --restart always -p 8765:8765 \
                  -v evo-data:/app/data \
                  -e ZHIPU_API_KEY="${{ secrets.ZHIPU_API_KEY }}" \
                  "$PREVIOUS_IMAGE"
                echo "Rollback complete: restored previous version"
              else
                echo "No previous image to rollback to!"
                exit 1
              fi
            fi

            docker image prune -f
            echo "Deploy complete: $NEW_IMAGE"
