# AUTO-EVO-AI V0.1 — CD Pipeline (Docker 部署)
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master, main]
    types:
      - completed

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to K8s via SSH
        if: ${{ secrets.DEPLOY_SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
            echo "Pulling: $IMAGE"
            docker pull "$IMAGE"
            docker stop evo-api 2>/dev/null || true
            docker rm evo-api 2>/dev/null || true
            docker run -d --name evo-api --restart always -p 8765:8765 \
              -v evo-data:/app/data \
              -e ZHIPU_API_KEY="${{ secrets.ZHIPU_API_KEY }}" \
              "$IMAGE"
            docker image prune -f
            echo "Deploy complete: $IMAGE"
