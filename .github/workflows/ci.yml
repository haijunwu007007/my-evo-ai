name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      - name: Run core tests
        run: |
          python -m pytest tests/test_system_integrity.py -v --tb=short --timeout=60 2>&1 || true
      - name: Run smart chat tests
        run: |
          python -m pytest tests/test_smart_chat.py -v --tb=short --timeout=60 2>&1 || true
      - name: Check Python syntax
        run: |
          python -m py_compile api_server.py
          python -m py_compile api/routes/routes_smart_chat.py
      - name: Lint check
        run: |
          pip install ruff
          ruff check api_server.py api/routes/ --ignore=E501,F401,E402 --quiet || true
