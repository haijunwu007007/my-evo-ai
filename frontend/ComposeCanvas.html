<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta name="description" content="AUTO-EVO-AI 智能进化平台 - 一键部署、智能Agent、自动化工作流">
<meta property="og:title" content="AUTO-EVO-AI">
<meta property="og:description" content="一键部署任意项目，自动完成所有工作">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AUTO-EVO-AI 编排画布</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/@vue-flow/core@1/dist/vue-flow.umd.min.js"></script>
<script src="https://unpkg.com/@vue-flow/background@1/dist/background.umd.min.js"></script>
<script src="https://unpkg.com/@vue-flow/controls@1/dist/controls.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
:root{--bg:#0f0f1a;--card:#1a1a2e;--border:#2d3561;--text:#e0e0e0;--text2:#8892b0;--accent:#4361ee}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.nav{display:flex;align-items:center;padding:8px 16px;background:var(--card);border-bottom:1px solid var(--border);gap:8px;flex-shrink:0}
.nav h2{font-size:16px;margin-right:16px}
.nav a{color:var(--text2);text-decoration:none;font-size:13px;padding:4px 10px;border-radius:6px}
.nav a:hover,.nav a.active{background:var(--accent);color:#fff}
.content{flex:1;display:flex;overflow:hidden}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:12px;overflow-y:auto;flex-shrink:0}
.sidebar h3{font-size:12px;color:var(--text2);margin:8px 0 4px;text-transform:uppercase}
.sidebar .node{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;margin:2px 0;cursor:grab;font-size:12px;border:1px solid var(--border);transition:all .2s}
.sidebar .node:hover{border-color:var(--accent);background:rgba(67,97,238,.1)}
.canvas{flex:1;position:relative}
.canvas-placeholder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--text2)}
.panel{width:280px;background:var(--card);border-left:1px solid var(--border);padding:16px;overflow-y:auto;flex-shrink:0;font-size:13px}
.panel h3{font-size:14px;margin-bottom:8px}
.panel label{display:block;font-size:11px;color:var(--text2);margin:6px 0 2px}
.panel input,.panel select{width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px}
.panel button{width:100%;padding:8px;border:none;border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;margin-top:6px;font-size:12px}
.panel button:hover{opacity:.9}
.panel .danger{background:#e74c3c}
.node-custom{background:var(--card);border:2px solid var(--accent);border-radius:10px;padding:12px;min-width:160px;cursor:pointer}
.node-custom .name{font-weight:600;font-size:13px}
.node-custom .status{font-size:10px;color:var(--text2);margin-top:2px}
.node-custom .stats{font-size:10px;color:#22c55e;margin-top:4px}
@media(max-width:480px){.nav h2{font-size:16px}.nav a{padding:6px 10px;font-size:11px}.canvas-container{min-height:300px}.btn{padding:6px 10px;font-size:12px}}
</style>
</head><body>
<div class="nav">
  <h2>⚡ 编排画布</h2>
  <a href="/">💬 对话</a>
  <a href="/hub">🪐 开源中心</a>
  <a class="active" href="/canvas">🎨 画布</a>
  <a href="/admin">⚙️ 管理</a>
  <div style="flex:1"></div>
  <a href="/canvas?save=1" onclick="return saveCanvas()">💾 保存</a>
  <a href="/canvas?export=1" onclick="return exportCanvas()">📤 导出</a>
</div>
<div class="content">
  <div class="sidebar">
    <h3>📦 我的项目</h3>
    <div id="projectList"></div>
    <h3 style="margin-top:16px">🔗 连线</h3>
    <div class="node" draggable="true" onclick="addNode('input','🔌')">🔌 输入节点</div>
    <div class="node" draggable="true" onclick="addNode('output','📤')">📤 输出节点</div>
    <div class="node" draggable="true" onclick="addNode('route','🔀')">🔀 路由节点</div>
    <div style="margin-top:16px">
      <button onclick="autoLayout()" style="width:100%;padding:8px;border:none;border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;font-size:12px">🔁 自动布局</button>
      <button onclick="clearCanvas()" style="width:100%;padding:8px;border:none;border-radius:6px;background:#e74c3c;color:#fff;cursor:pointer;font-size:12px;margin-top:4px">🗑️ 清空画布</button>
    </div>
  </div>
  <div class="canvas" id="canvasContainer">
    <div class="canvas-placeholder" id="canvasPlaceholder">
      <div style="font-size:48px;margin-bottom:12px">🎨</div>
      <h3>拖拽项目到画布编排</h3>
      <p style="color:var(--text2);font-size:12px;margin-top:4px">也可以从左侧「我的项目」点击添加</p>
    </div>
    <div id="vueflowContainer" style="width:100%;height:100%"></div>
  </div>
  <div class="panel" id="propertyPanel">
    <h3>⚙️ 属性</h3>
    <p style="color:var(--text2);font-size:12px">选择一个节点查看属性</p>
    <div id="nodeProperties" style="display:none">
      <label>名称</label><input id="propName" onchange="updateProp('name',this.value)">
      <label>状态</label><select id="propStatus" onchange="updateProp('status',this.value)"><option>running</option><option>stopped</option></select>
      <label>端口</label><input id="propPort" onchange="updateProp('port',this.value)">
      <label>环境变量</label><textarea id="propEnv" rows="3" style="width:100%;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px" onchange="updateProp('env',this.value)"></textarea>
      <button onclick="saveNodeConfig()">💾 保存配置</button>
      <button class="danger" onclick="deleteSelected()">🗑️ 删除节点</button>
    </div>
  </div>
</div>

<script>
const API = '/api/v1/hub';
let nodes = [];
let edges = [];
let selectedNode = null;
let nodeIdCounter = 0;

async function loadProjects(){
  const r = await fetch(API+'/projects');
  const d = await r.json();
  const list = document.getElementById('projectList');
  list.innerHTML = '';
  (d.projects||[]).forEach(p => {
    const el = document.createElement('div');
    el.className = 'node';
    el.draggable = true;
    el.innerHTML = '<span>'+(p.name||'未知')+'</span><span style="margin-left:auto;font-size:10px">'+(p.status||'')+'</span>';
    el.ondragstart = e => e.dataTransfer.setData('text/plain', JSON.stringify(p));
    el.onclick = () => addProjectNode(p);
    list.appendChild(el);
  });
}

function addProjectNode(p){
  const id = 'n_'+(++nodeIdCounter);
  const node = {
    id, type:'default',
    position: {x: 100 + Math.random()*200, y: 100 + Math.random()*200},
    data: { label: p.name||'项目', project: p }
  };
  nodes.push(node);
  renderCanvas();
  hidePlaceholder();
}

function addNode(type, icon){
  const id = 'n_'+(++nodeIdCounter);
  const labels = {input:'输入',output:'输出',route:'路由'};
  const node = {
    id, type:'default',
    position: {x: 100 + Math.random()*200, y: 100 + Math.random()*200},
    data: { label: icon+' '+labels[type], nodeType: type }
  };
  nodes.push(node);
  renderCanvas();
  hidePlaceholder();
}

function hidePlaceholder(){
  document.getElementById('canvasPlaceholder').style.display = 'none';
}

function renderCanvas(){
  const container = document.getElementById('vueflowContainer');
  if(!nodes.length){
    container.innerHTML = '';
    document.getElementById('canvasPlaceholder').style.display = 'block';
    return;
  }
  // 简化为节点列表 + SVG连线
  let html = '<svg width="100%" height="100%" style="position:absolute;top:0;left:0;pointer-events:none">';
  edges.forEach(e => {
    const src = document.getElementById('node_'+e.source);
    const tgt = document.getElementById('node_'+e.target);
    if(src && tgt){
      const sr = src.getBoundingClientRect(), cr = container.getBoundingClientRect();
      const tr = tgt.getBoundingClientRect();
      const x1 = sr.left - cr.left + sr.width/2;
      const y1 = sr.top - cr.top + sr.height;
      const x2 = tr.left - cr.left + tr.width/2;
      const y2 = tr.top - cr.top;
      html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#4361ee" stroke-width="2" marker-end="url(#arrow)"/>`;
    }
  });
  html += '<defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#4361ee"/></marker></defs></svg>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:12px;padding:20px">';
  nodes.forEach(n => {
    const p = n.data.project || {};
    html += `<div id="node_${n.id}" class="node-custom" style="border-color:${n.id===selectedNode?.id?'#7209b7':'#4361ee'}" onclick="selectNode('${n.id}')">
      <div class="name">${n.data.label}</div>
      <div class="status">${p.description?.substring(0,30)||''}</div>
      <div class="stats">${n.data.nodeType||'project'}${p.stars?' · ⭐'+p.stars:''}</div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function selectNode(id){
  selectedNode = nodes.find(n => n.id === id);
  renderCanvas();
  if(selectedNode){
    document.getElementById('nodeProperties').style.display = 'block';
    document.getElementById('propName').value = selectedNode.data.label;
    document.getElementById('propStatus').value = selectedNode.data.project?.status||'running';
    document.getElementById('propPort').value = selectedNode.data.project?.port||'';
    document.getElementById('propEnv').value = JSON.stringify(selectedNode.data.project?.config||{});
  }
}

function updateProp(key, val){
  if(!selectedNode) return;
  if(key === 'name') selectedNode.data.label = val;
  else if(key === 'port') { if(!selectedNode.data.project) selectedNode.data.project = {}; selectedNode.data.project.port = parseInt(val)||0; }
  else if(key === 'status') { if(!selectedNode.data.project) selectedNode.data.project = {}; selectedNode.data.project.status = val; }
}

function deleteSelected(){
  if(!selectedNode) return;
  nodes = nodes.filter(n => n.id !== selectedNode.id);
  edges = edges.filter(e => e.source !== selectedNode.id && e.target !== selectedNode.id);
  selectedNode = null;
  document.getElementById('nodeProperties').style.display = 'none';
  renderCanvas();
}

function saveNodeConfig(){
  if(!selectedNode) return;
  alert('✅ 节点配置已保存 (本地)');
}

function connectNodes(sourceId, targetId){
  edges.push({id:'e'+(++nodeIdCounter), source:sourceId, target:targetId});
  renderCanvas();
}

function autoLayout(){
  nodes.forEach((n,i) => {
    n.position = {x: 50 + (i%4)*220, y: 50 + Math.floor(i/4)*180};
  });
  renderCanvas();
}

function clearCanvas(){
  if(!confirm('确定清空画布？')) return;
  nodes = []; edges = []; selectedNode = null;
  document.getElementById('nodeProperties').style.display = 'none';
  renderCanvas();
}

async function saveCanvas(){
  const data = {nodes: nodes, edges: edges};
  const r = await fetch(API+'/composes', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name:'我的编排_'+new Date().toLocaleString(), nodes: nodes.map(n=>n.id), edges})
  });
  const d = await r.json();
  alert(d.success ? '✅ 已保存' : '❌ 保存失败');
  return false;
}

function exportCanvas(){
  const data = JSON.stringify({nodes,edges},null,2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'canvas_'+Date.now()+'.json';
  a.click();
  return false;
}

// 拖拽支持
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  const data = e.dataTransfer.getData('text/plain');
  if(!data) return;
  try {
    const p = JSON.parse(data);
    if(p.name) addProjectNode(p);
  } catch {}
});

loadProjects();
</script>
</body></html>
