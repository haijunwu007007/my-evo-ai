<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>AUTO-EVO-AI - 接金币</title><style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:manipulation}
body{background:var(--bg);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;overflow:hidden}
.game-wrap{position:relative;width:100%;max-width:400px;height:100vh;max-height:700px;background:linear-gradient(180deg,#0f3460,#1a1a2e);border-radius:0;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.5)}
canvas{display:block;width:100%;height:100%;touch-action:none}
.hud{position:absolute;top:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 16px;z-index:10;pointer-events:none;color:#e2e8f0;font-size:16px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.hud span{background:rgba(0,0,0,.4);padding:6px 14px;border-radius:8px;backdrop-filter:blur(4px)}.hud .score span{color:#fbbf24}
.start-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(26,26,46,.92);backdrop-filter:blur(8px);transition:opacity .3s}
.start-screen.hide{opacity:0;pointer-events:none}
.start-screen h1{font-size:32px;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.start-screen p{color:#94a3b8;font-size:14px;margin-bottom:24px}
.start-screen .btn{padding:14px 48px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,.4)}
.start-screen .btn:active{transform:scale(.95)}
</style>  <link rel="stylesheet" href="/frontend/share.css">
</head><body>
<div class="game-wrap">
  <div class="hud"><span>🏆 <span id="scoreDisplay">0</span></span><span class="score"><span id="highScoreDisplay">0</span></span></div>
  <canvas id="gameCanvas"></canvas>
  <div class="start-screen" id="startScreen">
    <h1>🪙 接金币</h1>
    <p>手指滑动控制篮子接住金币</p>
    <button class="btn" id="startBtn">开始游戏</button>
  </div>
</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d')
const W=canvas.width=canvas.clientWidth*2,H=canvas.height=canvas.clientHeight*2
canvas.width=W;canvas.height=H
let score=0,highScore=parseInt(localStorage.getItem('evo_game_high')||'0'),gameOver=false,running=false
document.getElementById('scoreDisplay').textContent=score
document.getElementById('highScoreDisplay').textContent=highScore
const basket={x:W/2-60,w:120,h:24,y:H-70,speed:8}
let coins=[],particles=[],coinTimer=0,frameCount=0
function addParticles(x,y,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:-Math.random()*4-2,life:1,color:['#fbbf24','#f59e0b','#ef4444','#10b981'][Math.floor(Math.random()*4)]})}
function reset(){score=0;coins=[];particles=[];gameOver=false;document.getElementById('scoreDisplay').textContent=0;document.getElementById('startScreen').classList.remove('hide')}
function spawnCoin(){coins.push({x:Math.random()*(W-30)+15,y:-20,r:14+Math.random()*8,speed:1.5+Math.random()*2.5,rot:0,vRot:Math.random()*6-3})}
function drawBasket(){
  ctx.save()
  // glow
  const grad=ctx.createLinearGradient(basket.x,basket.y,basket.x+basket.w,basket.y)
  grad.addColorStop(0,'#6366f1');grad.addColorStop(.5,'#818cf8');grad.addColorStop(1,'#6366f1')
  ctx.shadowColor='rgba(99,102,241,.5)';ctx.shadowBlur=20
  ctx.fillStyle=grad
  const r=8
  ctx.beginPath();ctx.moveTo(basket.x+r,basket.y);ctx.lineTo(basket.x+basket.w-r,basket.y);ctx.quadraticCurveTo(basket.x+basket.w,basket.y,basket.x+basket.w,basket.y+r)
  ctx.lineTo(basket.x+basket.w,basket.y+basket.h-r);ctx.quadraticCurveTo(basket.x+basket.w,basket.y+basket.h,basket.x+basket.w-r,basket.y+basket.h)
  ctx.lineTo(basket.x+r,basket.y+basket.h);ctx.quadraticCurveTo(basket.x,basket.y+basket.h,basket.x,basket.y+basket.h-r)
  ctx.lineTo(basket.x,basket.y+r);ctx.quadraticCurveTo(basket.x,basket.y,basket.x+r,basket.y)
  ctx.fill()
  ctx.restore()
}
function drawCoin(c){ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);ctx.font='24px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🪙',0,0);ctx.restore()}
function drawParticles(){for(let p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H)
  ctx.fillStyle='#fbbf24';ctx.font='bold 48px sans-serif';ctx.textAlign='center';ctx.fillText('💥',W/2,H/2-60)
  ctx.fillStyle='#e2e8f0';ctx.font='bold 28px sans-serif';ctx.fillText('游戏结束',W/2,H/2-10)
  ctx.fillStyle='#94a3b8';ctx.font='18px sans-serif';ctx.fillText('得分: '+score,W/2,H/2+35)
  ctx.fillStyle='#fbbf24';ctx.font='16px sans-serif';ctx.fillText('点击重新开始',W/2,H/2+80)
}
function update(){
  if(!running||gameOver)return
  frameCount++
  // spawn
  coinTimer++
  const spawnRate=Math.max(20,60-Math.floor(score/5)*3)
  if(coinTimer>=spawnRate){spawnCoin();coinTimer=0}
  // update coins
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];c.y+=c.speed;c.rot+=c.vRot*.01
    // basket catch
    if(c.y+c.r>basket.y&&c.y-c.r<basket.y+basket.h&&c.x>basket.x&&c.x<basket.x+basket.w){
      coins.splice(i,1);score++;document.getElementById('scoreDisplay').textContent=score
      addParticles(c.x,c.y,10)
      if(score>highScore){highScore=score;localStorage.setItem('evo_game_high',String(highScore));document.getElementById('highScoreDisplay').textContent=highScore}
      continue
    }
    if(c.y>H+20){coins.splice(i,1);gameOver=true;running=false}
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=.02;if(p.life<=0)particles.splice(i,1)}
}
function draw(){
  ctx.clearRect(0,0,W,H)
  // bg stars
  ctx.fillStyle='rgba(255,255,255,'+(.1+Math.sin(frameCount*.01)*.05)+')'
  for(let i=0;i<50;i++){ctx.fillRect((i*137+frameCount*.3)%W,(i*251+frameCount*.2)%H,2,2)}
  for(let c of coins)drawCoin(c)
  drawBasket();drawParticles()
  if(gameOver)drawGameOver()
  requestAnimationFrame(gameLoop)
}
function gameLoop(){update();draw()}

// touch/mouse control
let touching=false
canvas.addEventListener('touchstart',e=>{e.preventDefault();touching=true;const t=e.touches[0];moveBasket(t.clientX)})
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(touching){const t=e.touches[0];moveBasket(t.clientX)}})
canvas.addEventListener('touchend',e=>{e.preventDefault();touching=false})
canvas.addEventListener('mousemove',e=>{if(!gameOver&&running)moveBasket(e.clientX)})
function moveBasket(clientX){const rect=canvas.getBoundingClientRect();const x=((clientX-rect.left)/rect.width)*W-basket.w/2;basket.x=Math.max(0,Math.min(W-basket.w,x))}

// click to restart on game over
canvas.addEventListener('click',()=>{if(gameOver){reset();document.getElementById('startScreen').classList.remove('hide')}})
// start
document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('startScreen').classList.add('hide')
  running=true;reset();gameOver=false;score=0;coins=[]
})
</script></body></html>
