<!DOCTYPE html>

<html lang="zh-CN">

<head>
<meta name="description" content="AUTO-EVO-AI 智能进化平台 - 一键部署、智能Agent、自动化工作流">
<meta property="og:title" content="AUTO-EVO-AI">
<meta property="og:description" content="一键部署任意项目，自动完成所有工作">

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AUTO-EVO-AI V0.1 COORDINATED - 智能协调版</title>

    <style>

        :root {

            --primary: #6366f1;

            --primary-dark: #4f46e5;

            --accent: #8b5cf6;

            --success: #10b981;

            --warning: #f59e0b;

            --danger: #ef4444;

            --bg: #0f172a;

            --card: #1e293b;

            --text: #f1f5f9;

            --text-muted: #94a3b8;

            --border: #334155;

        }

        [data-theme="light"] {

            --bg: #f8fafc;

            --card: #ffffff;

            --text: #1e293b;

            --text-muted: #64748b;

            --border: #e2e8f0;

        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        .app { display: flex; height: 100vh; overflow: hidden; }

        

        /* 侧边栏 */

        .sidebar {

            width: 280px;

            background: var(--card);

            border-right: 1px solid var(--border);

            display: flex;

            flex-direction: column;

            height: 100vh;

            overflow-y: auto;

            transition: width 0.3s ease, transform 0.3s ease;

            flex-shrink: 0;

        }

        .sidebar.collapsed {

            width: 0;

            border-right: none;

            overflow: hidden;

        }

        .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }

        .logo { width: 34px; height: 34px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 13px; }

        .brand { font-weight: 700; font-size: 13px; }

        .sidebar-toggle { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; margin-left: auto; border-radius: 6px; transition: all 0.2s; }

        .sidebar-toggle:hover { background: var(--bg); color: var(--text); }

        

        /* 搜索 */

        .search-box { padding: 10px 12px; }

        .search-input { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }

        .search-input:focus { border-color: var(--primary); }

        

        /* 导航 */

        .nav-groups { flex: 1; overflow: visible; padding: 4px 8px 8px; }

        .nav-group { margin-bottom: 4px; }

        .nav-group-header { display: flex; align-items: center; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }

        .nav-group-header:hover { background: var(--bg); }

        .nav-group-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }

        .nav-group-count { font-size: 10px; background: var(--bg); color: var(--text-muted); padding: 2px 6px; border-radius: 10px; }

        .nav-group-arrow { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }

        .nav-group.collapsed .nav-group-arrow { transform: rotate(-90deg); }

        .nav-group.collapsed .nav-group-items { display: none; }

        .nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 12px; }

        .nav-item:hover { background: var(--primary); color: white; }

        .nav-item.active { background: var(--primary); color: white; }

        .nav-item .icon { width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; }

        .nav-item .label { flex: 1; }

        .nav-item .count { font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 10px; }

        

        /* 快捷键提示 */

        .sidebar-footer { padding: 8px 16px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); text-align: center; }

        

        /* 主内容 */

        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }

        

        /* 顶栏 */

        .topbar { height: 56px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; }

        .topbar-title { font-size: 18px; font-weight: 600; }

        .topbar-badge { background: linear-gradient(135deg, var(--success), var(--primary)); color: white; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; }

        

        /* 内容区 */

        .content { flex: 1; overflow-y: auto; padding: 24px; }

        

        /* 版本横幅 */

        .version-banner { background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }

        .version-banner h2 { color: white; font-size: 20px; margin-bottom: 4px; }

        .version-banner p { color: rgba(255,255,255,0.8); font-size: 13px; }

        .version-banner .stats { display: flex; gap: 24px; }

        .version-banner .stat-value { font-size: 24px; font-weight: 700; color: white; }

        .version-banner .stat-label { font-size: 11px; color: rgba(255,255,255,0.7); }

        

        /* 统计卡片 */

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }

        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }

        .stat-card .value { font-size: 28px; font-weight: 700; color: var(--primary); }

        .stat-card .label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        

        /* 分组标题 */

        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .section-title .count { font-size: 12px; background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; }

        

        /* 模块卡片 */

        .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }

        /* 模块浏览器 Phase 3 */
        .explorer-search { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .explorer-search input[type="text"] { flex: 1; min-width: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
        .explorer-search input[type="text"]:focus { border-color: var(--primary); }
        .explorer-search select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; cursor: pointer; outline: none; }
        .explorer-search .badge { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .explorer-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .explorer-table th { text-align: left; padding: 10px 12px; background: var(--bg-tertiary); color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
        .explorer-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
        .explorer-table tr:hover td { background: rgba(99,102,241,0.05); }
        .explorer-table .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .explorer-log { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
        .explorer-log .log-ok { color: #10b981; }
        .explorer-log .log-fail { color: #ef4444; }
        .explorer-log .log-error { color: #f97316; }
        .tab-bar { display: flex; gap: 2px; background: var(--bg); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
        .tab-bar button { flex: 1; padding: 8px 16px; border: none; border-radius: 8px; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .tab-bar button.active { background: var(--primary); color: #fff; }
        .tab-bar button:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.05); }
        .explorer-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .check-col { width: 36px; text-align: center; }
        .check-col input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }

        .module-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; }

        
        .module-card.planned { opacity: 0.7; border-style: dashed; }
        .module-card.planned:hover { opacity: 1; }

.module-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }

        .module-card .header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

        .module-card .icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .module-card .info { flex: 1; }

        .module-card .name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }

        .module-card .source { font-size: 11px; color: var(--text-muted); }

        .module-card .desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 12px; }

        .module-card .tags { display: flex; flex-wrap: wrap; gap: 6px; }

        .module-card .tag { font-size: 11px; background: var(--bg); padding: 4px 8px; border-radius: 6px; color: var(--text-muted); }

        

        /* 详情页 */

        .detail-page { max-width: 800px; margin: 0 auto; }

        .detail-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 24px; }

        .detail-icon { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; }

        .detail-info { flex: 1; }

        .detail-name { font-size: 24px; font-weight: 700; margin-bottom: 4px; }

        .detail-source { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }

        .detail-desc { font-size: 14px; color: var(--text); line-height: 1.6; }

        .detail-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }

        .detail-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; }

        .detail-tag { font-size: 12px; background: var(--bg); padding: 6px 12px; border-radius: 8px; }

        .detail-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

        .detail-meta-item { background: var(--bg); padding: 12px; border-radius: 8px; }

        .detail-meta-item .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }

        .detail-meta-item .value { font-size: 14px; font-weight: 600; }

        

        .detail-actions { display: flex; gap: 16px; padding: 20px 0; justify-content: center; }

        .detail-actions .btn { padding: 14px 32px; font-size: 15px; border-radius: 12px; }

        .btn { padding: 10px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; display: inline-flex; align-items: center; gap: 8px; }

        .btn-edit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }

        .btn-edit:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5); }

        .btn-delete { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4); }

        .btn-delete:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 25px rgba(245, 87, 108, 0.5); }

        

        :root { --danger: #f5576c; }

        

        /* 返回按钮 */

        .back-btn {

            background: var(--primary);

            color: white;

            border: none;

            border-radius: 8px;

            padding: 10px 16px;

            font-size: 13px;

            cursor: pointer;

            display: flex;

            align-items: center;

            gap: 6px;

            transition: all 0.2s;

        }

        .back-btn:hover { background: var(--primary-dark); }

        

        /* 悬浮返回按钮 */

        .float-back-btn {

            position: fixed;

            bottom: 24px;

            left: 24px;

            z-index: 1000;

            background: var(--primary);

            color: white;

            border: none;

            border-radius: 24px;

            padding: 12px 20px;

            font-size: 14px;

            font-weight: 500;

            cursor: pointer;

            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);

            display: none;

        }

        .float-back-btn.show { display: block; }

        

        /* 主题切换 */

        .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; }

        

        /* 顶部栏操作按钮 */

        .topbar-actions { display: flex; gap: 8px; margin-left: auto; }

        .topbar-btn { background: rgba(255,255,255,0.1); border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.2s; }

        .topbar-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        

        /* 搜索模态框 */

        .search-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; justify-content: center; padding-top: 100px; }

        .search-modal.show { display: flex; }

        .search-modal-content { background: var(--card); border-radius: 16px; width: 600px; max-height: 500px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }

        .search-modal-input { width: 100%; padding: 20px 24px; font-size: 18px; border: none; background: transparent; color: var(--text); outline: none; border-bottom: 1px solid var(--border); }

        .search-results { max-height: 400px; overflow-y: auto; }

        .search-item { padding: 16px 24px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: background 0.2s; }

        .search-item:hover, .search-item.active { background: var(--bg); }

        .search-item-icon { font-size: 24px; }

        .search-item-info h4 { margin: 0; font-size: 16px; }

        .search-item-info p { margin: 4px 0 0; font-size: 13px; color: var(--text-muted); }

        .search-hint { padding: 12px 24px; font-size: 12px; color: var(--text-muted); text-align: center; border-top: 1px solid var(--border); }

        .search-hint kbd { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        

        /* 模态框 */

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; justify-content: center; align-items: center; }

        .modal.show { display: flex; }

        .modal-content { background: var(--card); border-radius: 16px; width: 90%; max-width: 900px; max-height: 80vh; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }

        .modal-header h2 { margin: 0; font-size: 20px; }

        .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-muted); line-height: 1; }

        .modal-close:hover { color: var(--text); }

        .modal-body { padding: 24px; max-height: calc(80vh - 80px); overflow-y: auto; }

        /* 可调整大小的弹窗 */
        .resizable-modal { transition: width 0.25s ease, height 0.25s ease, top 0.25s ease, left 0.25s ease, border-radius 0.25s ease; }
        .resizable-modal.maximized { width: 100vw !important; height: 100vh !important; max-width: 100vw !important; max-height: 100vh !important; top: 0 !important; left: 0 !important; margin: 0 !important; border-radius: 0; position: fixed !important; z-index: 100000; }
        /* 深色主题 */
        .v3-dark { --v3-bg: #1a1a2e; --v3-bg2: #0f172a; --v3-text: #fff; --v3-text2: #d1d5db; --v3-muted: #9ca3af; --v3-border: rgba(59,130,246,0.3); --v3-accent: #3b82f6; --v3-input-bg: #0f172a; --v3-input-border: #334; --v3-header-bg: rgba(15,23,42,0.8); --v3-card-shadow: rgba(0,0,0,0.3); }
        /* 浅色主题 */
        .v3-light { --v3-bg: #f8fafc; --v3-bg2: #ffffff; --v3-text: #1e293b; --v3-text2: #475569; --v3-muted: #94a3b8; --v3-border: #cbd5e1; --v3-accent: #2563eb; --v3-input-bg: #ffffff; --v3-input-border: #d1d5db; --v3-header-bg: rgba(248,250,252,0.9); --v3-card-shadow: rgba(0,0,0,0.08); }
        /* 最小化条 */
        .v3-minimized { width: 360px !important; height: 44px !important; min-height: 44px !important; max-height: 44px !important; max-width: 360px !important; overflow: hidden !important; border-radius: 12px !important; cursor: pointer; transition: width 0.3s cubic-bezier(0.16,1,0.3,1), height 0.3s cubic-bezier(0.16,1,0.3,1); }
        .v3-minimized .v3-tabs-bar, .v3-minimized #v3-modal-content, .v3-minimized .resize-handle, .v3-minimized .v3-bottom-bar { display: none !important; }
        .v3-minimized .modal-header { border-bottom: none !important; padding: 10px 16px !important; cursor: pointer !important; }
        .v3-minimized .modal-win-btn.maximize-btn { display: none !important; }
        /* Tab导航 */
        .v3-tabs-bar { display: flex; gap: 2px; padding: 0 24px; background: var(--v3-bg2); border-bottom: 1px solid var(--v3-border); flex-shrink: 0; }
        .v3-tab { padding: 10px 18px; font-size: 13px; color: var(--v3-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
        .v3-tab:hover { color: var(--v3-text); }
        .v3-tab.active { color: var(--v3-accent); border-bottom-color: var(--v3-accent); font-weight: 600; }
        .v3-tab-panel { display: none; }
        .v3-tab-panel.active { display: block; }
        /* 底部状态栏 */
        .v3-bottom-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 24px; border-top: 1px solid var(--v3-border); background: var(--v3-bg2); font-size: 11px; color: var(--v3-muted); flex-shrink: 0; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
        .status-dot.online { background: #10b981; box-shadow: 0 0 6px #10b981; }
        .status-dot.offline { background: #ef4444; }
        .v3-card { background: var(--v3-bg2); border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px var(--v3-card-shadow); }
        .v3-input { flex:1; padding:10px 14px; border:1px solid var(--v3-input-border); border-radius:8px; background:var(--v3-input-bg); color:var(--v3-text); font-size:13px; outline: none; font-family: inherit; }
        .v3-input:focus { border-color: var(--v3-accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
        .v3-btn { padding:8px 16px; border:none; border-radius:8px; cursor:pointer; font-size:12px; color:#fff; font-family: inherit; transition: filter 0.15s, transform 0.1s; }
        .v3-btn:hover { filter: brightness(1.1); }
        .v3-btn:active { transform: scale(0.97); }
        /* 自动刷新指示 */
        @keyframes spin { to { transform: rotate(360deg); } }
        .auto-refresh-spin { animation: spin 2s linear infinite; display: inline-block; }

        .modal-header { cursor: move; user-select: none; }
        .resize-handle { position: absolute; bottom: 0; right: 0; width: 18px; height: 18px; cursor: nwse-resize; opacity: 0.4; transition: opacity 0.2s; }
        .resize-handle:hover { opacity: 0.8; }
        .resize-handle::after { content: ''; position: absolute; bottom: 4px; right: 4px; width: 10px; height: 10px; border-right: 2px solid var(--text-muted); border-bottom: 2px solid var(--text-muted); }
        .modal-win-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text-muted); padding: 2px 6px; border-radius: 4px; transition: background 0.15s, color 0.15s; line-height: 1; }
        .modal-win-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
        .modal-win-btn.maximize-btn:hover { background: rgba(59,130,246,0.2); color: #60a5fa; }

        

        /* 模块管理器 */

        .module-manager-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }

        .module-manager-actions .btn { padding: 10px 16px; font-size: 13px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; border: 2px solid transparent; }

        .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }

        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }

        .btn-outline { background: transparent; color: var(--text); border: 2px solid var(--border); }

        // ═══════════════════════════════════════════════════════════════
    // EvoAPI V0.1 - 后端API桥接层
    // 自动连接 FastAPI 后端 localhost:8765
    // ═══════════════════════════════════════════════════════════════
    const EvoAPI = (function() {
        // file://协议下hostname为空，也需要指向后端
        const _port = window.location.port || '8765';
        const BASE = (!window.location.hostname || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? `http://localhost:${_port}` : '';
        let _connected = false;
        let _statusData = null;
        let _modulesData = null;
        let _batchesData = null;
        let _eventSource = null;
        const _listeners = {};

        function on(evt, fn) { (_listeners[evt] = _listeners[evt] || []).push(fn); }
        function emit(evt, data) { (_listeners[evt] || []).forEach(fn => fn(data)); }
        function isConnected() { return _connected; }

        async function _fetch(path, options) {
            try {
                const r = await fetch(BASE + path, options);
                if (!r.ok) throw new Error(r.status);
                return await r.json();
            } catch (e) {
                _connected = false;
                emit('disconnected');
                throw e;
            }
        }

        async function health() {
            try {
                _statusData = await _fetch('/api/status');
                _connected = true;
                emit('connected', _statusData);
                return _statusData;
            } catch { _connected = false; return null; }
        }

                                <div class="label">模块ID</div>

                                <div class="value">${module.id}</div>

                            </div>

                            <div class="detail-meta-item">

                                <div class="label">所属分组</div>

                                <div class="value">${module.group}</div>

                            </div>

                            ${module.stars ? `

                            <div class="detail-meta-item">

                                <div class="label">Star数</div>

                                <div class="value">${module.stars}</div>

                            </div>

                            ` : ''}

                            ${module.priority ? `

                            <div class="detail-meta-item">

                                <div class="label">优先级</div>

                                <div class="value">${module.priority}</div>

                            </div>

                            <button class="btn btn-edit" onclick="doModuleExecute('${module.id}')">▶️ 执行模块</button>
                            <button class="btn btn-edit" onclick="doModuleCode('${module.id}')">📄 查看代码</button>
                            <button class="btn btn-edit" onclick="doModuleActions('${module.id}')">📋 可用Action</button>

            currentModule = null;

            renderDashboard();

        }

            const module = [...modules, ...customModules].find(m => m.id === id);

            if (!module) { showToast('⚠️ 模块未找到', 'error'); return; }

            // 复用现有的 addModuleModal 表单

            document.getElementById('editModuleId').value = id;

            document.getElementById('newModuleId').value = id;

            document.getElementById('newModuleName').value = module.name;

            document.getElementById('newModuleGroup').value = module.group || '';

            document.getElementById('newModuleIcon').value = module.icon || '🔧';

            document.getElementById('newModuleDesc').value = module.desc || '';

            document.getElementById('newModuleSource').value = module.source || '';

            document.getElementById('newModuleTags').value = (module.tags || []).join(',');

            document.getElementById('newModuleColor').value = module.color || '#3B82F6';

            document.getElementById('addModuleModal').classList.add('show');

        }



        function deleteItem(id) {

            const module = [...modules, ...customModules].find(m => m.id === id);

            if (!module) { showToast('⚠️ 模块未找到', 'error'); return; }

            // 复用现有的 confirmModal 确认框

            pendingAction = { type: 'delete', id };

            document.getElementById('confirmMessage').textContent = `确定要删除模块「${module.name}」（${id}）吗？`;

            document.getElementById('confirmModal').classList.add('show');

        }



        function saveModules() {

            localStorage.setItem('modules', JSON.stringify(modules));

        }



        function saveCustomModules() {

            localStorage.setItem('customModules', JSON.stringify(customModules));

        }



        document.addEventListener('keydown', (e) => {

            if (e.key === 'Escape') backToOverview();

            if (e.key === 'k' && e.ctrlKey) {

                e.preventDefault();

                document.getElementById('searchInput').focus();

            }

        });

        

        init();

        

        // ==================== 模块管理器 ====================

        let pendingAction = null;

        

        function openModuleManager() {

            document.getElementById('moduleManager').classList.add('show');

            renderModuleList();

        }

        

        function closeModuleManager() {

            document.getElementById('moduleManager').classList.remove('show');

        }

        

        function renderModuleList() {

            const container = document.getElementById('moduleList');

            container.innerHTML = customModules.map(m => `

                <div class="module-list-item">

                    <input type="checkbox" class="module-checkbox" data-id="${m.id}" onchange="updateBatchDeleteBtn()" style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">

                    <span class="module-list-icon">${m.icon}</span>

                    <div class="module-list-info">

                        <h4>${m.name} <span style="font-size:10px;background:var(--primary);color:white;padding:2px 6px;border-radius:4px;">${m.group}</span></h4>

                        <p>${m.desc}</p>

                    </div>

                    <div class="module-list-actions">

                        <button class="edit-btn" onclick="editModule('${m.id}')">✏️</button>

                        <button class="delete-btn" onclick="confirmDelete('${m.id}')">🗑️</button>

                    </div>

                </div>

            `).join('');

            if (customModules.length === 0) {

                container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px 20px;">暂无自定义模块<br><span style="font-size:12px;margin-top:8px;display:block;">点击上方「添加模块」开始创建</span></p>';

            }

            updateBatchDeleteBtn();

        }

        

        function showAddModule() {

            document.getElementById('addModuleModal').classList.add('show');

            document.getElementById('editModuleId').value = '';

            document.getElementById('newModuleId').value = '';

            document.getElementById('newModuleName').value = '';

            document.getElementById('newModuleGroup').value = '';

            document.getElementById('newModuleIcon').value = '🔧';

            document.getElementById('newModuleDesc').value = '';

            document.getElementById('newModuleSource').value = '';

            document.getElementById('newModuleTags').value = '';

            document.getElementById('newModuleColor').value = '#3B82F6';

        }

        

        function closeAddModule() {

            document.getElementById('addModuleModal').classList.remove('show');

        }

        

        function editModule(id) {

            const m = customModules.find(x => x.id === id);

            if (!m) return;

            document.getElementById('addModuleModal').classList.add('show');

            document.getElementById('editModuleId').value = m.id;

            document.getElementById('newModuleId').value = m.id;

            document.getElementById('newModuleName').value = m.name;

            document.getElementById('newModuleGroup').value = m.group;

            document.getElementById('newModuleIcon').value = m.icon;

            document.getElementById('newModuleDesc').value = m.desc;

            document.getElementById('newModuleSource').value = m.source || '';

            document.getElementById('newModuleTags').value = (m.tags || []).join(',');

            document.getElementById('newModuleColor').value = m.color;

        }

        

        function saveModule() {

            const editId = document.getElementById('editModuleId').value;

            const id = document.getElementById('newModuleId').value.trim();

            const name = document.getElementById('newModuleName').value.trim();

            const group = document.getElementById('newModuleGroup').value.trim();

            const icon = document.getElementById('newModuleIcon').value;

            const desc = document.getElementById('newModuleDesc').value.trim();

            const source = document.getElementById('newModuleSource').value.trim();

            const tags = document.getElementById('newModuleTags').value.split(',').map(t => t.trim()).filter(Boolean);

            const color = document.getElementById('newModuleColor').value;

            

            if (!id || !name || !group) { alert('请填写必填项'); return; }

            

            const moduleData = { id, name, group, icon, desc, source, tags, color };

            

            if (editId) {

                // 编辑模式：先查 customModules，再查 modules

                const customIdx = customModules.findIndex(x => x.id === editId);

                if (customIdx !== -1) {

                    customModules[customIdx] = { ...customModules[customIdx], ...moduleData };

                    saveCustomModules();

                } else {

                    const builtinIdx = modules.findIndex(x => x.id === editId);

                    if (builtinIdx !== -1) {

                        modules[builtinIdx] = { ...modules[builtinIdx], ...moduleData };

                        saveModules();

                    }

                }

            } else {

                // 新增模式

                customModules.push(moduleData);

                saveCustomModules();

            }

            

            closeAddModule();

            renderModuleList();

            renderNav();

            showToast('✅ 模块已保存', 'success');

            if (currentModule && currentModule.id === id) showPage(id);

        }

        

        function confirmDelete(id) {

            pendingAction = { type: 'delete', id };

            document.getElementById('confirmMessage').textContent = `确定要删除模块 "${id}" 吗？`;

            document.getElementById('confirmModal').classList.add('show');

        }

        

        function closeConfirmModal() {

            document.getElementById('confirmModal').classList.remove('show');

            pendingAction = null;

        }

        

        function confirmAction() {

            if (!pendingAction) return;

            if (pendingAction.type === 'delete') {

                const id = pendingAction.id;

                const wasInModules = modules.some(m => m.id === id);

                const wasInCustom = customModules.some(m => m.id === id);

                if (wasInModules) {

                    modules = modules.filter(m => m.id !== id);

                    saveModules();

                }

                if (wasInCustom) {

                    customModules = customModules.filter(m => m.id !== id);

                    saveCustomModules();

                }

                closeConfirmModal();

                renderNav();

                renderModuleList();

                showToast('✅ 模块已删除', 'success');

                backToOverview();

            } else if (pendingAction.type === 'reset') {

                customModules = [];

                starredModules = [];

                localStorage.removeItem('customModules');

                localStorage.removeItem('starredModules');

                renderModuleList();

                renderNav();

                showToast('✅ 自定义模块已清空', 'success');

            } else if (pendingAction.type === 'batchDelete') {

                customModules = customModules.filter(x => !pendingAction.ids.includes(x.id));

                saveCustomModules();

                renderModuleList();

                renderNav();

                showToast('✅ 已删除 ' + pendingAction.ids.length + ' 个模块', 'success');

            }

            closeConfirmModal();

        }

        

        // ==================== 批量选择管理 ====================

        function toggleSelectAll() {

            const checkboxes = document.querySelectorAll('.module-checkbox');

            const allChecked = [...checkboxes].every(cb => cb.checked);

            checkboxes.forEach(cb => cb.checked = !allChecked);

            updateBatchDeleteBtn();

        }

        

        function updateBatchDeleteBtn() {

            const checked = document.querySelectorAll('.module-checkbox:checked');

            const btn = document.getElementById('batchDeleteBtn');

            const count = document.getElementById('selectedCount');

            if (btn) {

                btn.style.display = checked.length > 0 ? 'inline-flex' : 'none';

                btn.textContent = `🗑️ 批量删除 (${checked.length})`;

            }

            if (count) count.textContent = `已选 ${checked.length} 个`;

        }

        

        function batchDeleteModules() {

            const checked = document.querySelectorAll('.module-checkbox:checked');

            const ids = [...checked].map(cb => cb.dataset.id);

            if (ids.length === 0) return;

            pendingAction = { type: 'batchDelete', ids };

            document.getElementById('confirmMessage').textContent = `确定要删除选中的 ${ids.length} 个模块吗？此操作不可撤销！`;

            document.getElementById('confirmModal').classList.add('show');

        }

        

        function exportModules() {

            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');

            const data = JSON.stringify(customModules, null, 2);

            const blob = new Blob([data], { type: 'application/json' });

            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');

            a.href = url;

            a.download = `modules-config-${date}.json`;

            a.click();

            URL.revokeObjectURL(url);

        }

        

        function importModules() {

            const input = document.createElement('input');

            input.type = 'file';

            input.accept = '.json';

            input.onchange = (e) => {

                const file = e.target.files[0];

                if (!file) return;

                const reader = new FileReader();

                reader.onload = (evt) => {

                    try {

                        const data = JSON.parse(evt.target.result);

                        if (!Array.isArray(data)) throw new Error('格式错误');

                        const mode = confirm(`导入 ${data.length} 个模块：\n\n「确定」= 合并（追加，不覆盖已有）\n「取消」= 覆盖（清空后导入）`) ? 'merge' : 'replace';

                        if (mode === 'merge') {

                            const existingIds = new Set(customModules.map(m => m.id));

                            let added = 0;

                            data.forEach(m => {

                                if (!existingIds.has(m.id)) {

                                    customModules.push(m);

                                    added++;

                                }

                            });

                            alert(`合并完成：新增 ${added} 个模块`);

                        } else {

                            customModules = data;

                            alert(`覆盖完成：共 ${data.length} 个模块`);

                        }

                        saveCustomModules();

                        renderModuleList();

                        renderNav();

                    } catch (err) {

                        alert('导入失败：' + err.message);

                    }

                };

                reader.readAsText(file);

            };

            input.click();

        }

        

        function resetToDefault() {

            pendingAction = { type: 'reset' };

            document.getElementById('confirmMessage').textContent = '确定要重置所有模块到默认状态吗？';

            document.getElementById('confirmModal').classList.add('show');

        }

    </script>

<script>
// 系统状态监控面板集成
(function() {
    // 异步加载后端模块详细信息
    async function loadBackendModuleInfo(moduleId) {
        const area = document.getElementById('backend-info-area');
        if (!area || !EvoAPI.isConnected()) return;
        // 前端用kebab-case，后端用snake_case
        const backendName = moduleId.replace(/-/g, '_');
        try {
            const [info, codeInfo] = await Promise.all([
                EvoAPI.getModule(backendName).catch(() => null),
                EvoAPI.getModuleCode(backendName).catch(() => null)
            ]);
            if (!info && !codeInfo) return;
            const name = info?.module_name || info?.name || moduleId;
            const version = info?.version || '-';
            const level = info?.module_level || '-';
            const fileSize = info?.file_size ? (info.file_size / 1024).toFixed(1) + ' KB' : '-';
            const totalLines = codeInfo?.total_lines || '-';
            const docPreview = codeInfo?.docstring_preview || '';
            area.innerHTML = `
                <div class="detail-section">
                    <h3>后端信息 <span style="font-size:11px;background:#10b981;color:white;padding:2px 8px;border-radius:10px;margin-left:8px;">已连接</span></h3>
                    <div class="detail-meta">
                        <div class="detail-meta-item">
                            <div class="label">模块名称</div>
                            <div class="value">${name}</div>
                        </div>
                        <div class="detail-meta-item">
                            <div class="label">版本</div>
                            <div class="value">${version}</div>
                        </div>
                        <div class="detail-meta-item">
                            <div class="label">级别</div>
                            <div class="value">${level}</div>
                        </div>
                        <div class="detail-meta-item">
                            <div class="label">文件大小</div>
                            <div class="value">${fileSize}</div>
                        </div>
                        <div class="detail-meta-item">
                            <div class="label">代码行数</div>
                            <div class="value">${totalLines}</div>
                        </div>
                        <div class="detail-meta-item">
                            <div class="label">状态</div>
                            <div class="value" style="color:#10b981">已加载</div>
                        </div>
                    </div>
                    ${docPreview ? `<div style="margin-top:12px;padding:12px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--text-muted);line-height:1.6;"><b>模块描述:</b> ${docPreview}</div>` : ''}
                </div>
            `;
        } catch {
            // 模块未在后端加载
            area.innerHTML = `
                <div class="detail-section">
                    <h3>后端信息 <span style="font-size:11px;background:#64748b;color:white;padding:2px 8px;border-radius:10px;margin-left:8px;">未加载</span></h3>
                    <div style="padding:12px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;font-size:13px;color:#f59e0b;">
                        此模块尚未被后端加载，可能处于规划中或存在编译错误。
                    </div>
                </div>
            `;
        }
    }

    function _getBackendName(frontendId) {
        return frontendId.replace(/-/g, '_');
    }

    function _resultArea() {
        return document.getElementById('module-result-area');
    }

    async function doModuleHealth(frontendId) {
        const area = _resultArea();
        const name = _getBackendName(frontendId);
        area.innerHTML = '<div style="padding:12px;color:var(--text-muted);">⏳ 正在检查 ' + name + ' ...</div>';
        try {
            const data = await EvoAPI.moduleHealth(name);
            const healthy = data.healthy || data.status === 'ok' || data.status === 'healthy';
            const checks = data.checks || [];
            let checksHtml = checks.map(c =>
                '<span style="margin-right:12px;font-size:12px;">' + (c.healthy ? '✅' : '❌') + ' ' + c.name + '</span>'
            ).join('');
            area.innerHTML = `
                <div style="padding:12px;background:${healthy ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'};border:1px solid ${healthy ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'};border-radius:8px;">
                    <div style="font-size:14px;font-weight:bold;color:${healthy ? '#10b981' : '#ef4444'};">${healthy ? '✅ 模块健康' : '❌ 模块异常'}</div>
                    <div style="margin-top:8px;">${checksHtml}</div>
                    <pre style="margin-top:8px;font-size:11px;color:var(--text-muted);max-height:200px;overflow:auto;">${JSON.stringify(data, null, 2)}</pre>
                </div>`;
        } catch (e) {
            area.innerHTML = '<div style="padding:12px;background:rgba(239,68,68,0.1);border-radius:8px;color:#ef4444;">❌ 请求失败: ' + e.message + '</div>';
        }
    }

    async function doModuleExecute(frontendId) {
        const area = _resultArea();
        const name = _getBackendName(frontendId);
        area.innerHTML = `
            <div style="padding:12px;">
                <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <input id="exec-action" type="text" placeholder="Action (如: health_check)" style="flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;" value="health_check">
                    <input id="exec-params" type="text" placeholder='Params (JSON, 如: {"key":"val"})' style="flex:2;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;">
                    <button class="btn btn-edit" onclick="runModuleExecute('${frontendId}')">▶️ 执行</button>
                </div>
                <div id="exec-output" style="margin-top:12px;"></div>
            </div>`;
    }

    async function runModuleExecute(frontendId) {
        const name = _getBackendName(frontendId);
        const action = document.getElementById('exec-action').value.trim();
        const paramsStr = document.getElementById('exec-params').value.trim();
        const output = document.getElementById('exec-output');
        let params = {};
        if (paramsStr) {
            try { params = JSON.parse(paramsStr); }
            catch (e) { output.innerHTML = '<div style="color:#ef4444;">JSON格式错误: ' + e.message + '</div>'; return; }
        }
        output.innerHTML = '<div style="color:var(--text-muted);">⏳ 执行 ' + name + '.' + (action || 'execute') + ' ...</div>';
        const t0 = performance.now();
        try {
            const data = await EvoAPI.executeModule(name, action, params);
            const elapsed = (performance.now() - t0).toFixed(0);
            const success = data.success !== false;
            output.innerHTML = `
                <div style="padding:12px;background:${success ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'};border:1px solid ${success ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'};border-radius:8px;">
                    <div style="display:flex;justify-content:space-between;">
                        <span style="font-weight:bold;color:${success ? '#10b981' : '#ef4444'};">${success ? '✅ 执行成功' : '❌ 执行失败'}</span>
                        <span style="font-size:11px;color:var(--text-muted);">${elapsed}ms</span>
                    </div>
                    <pre style="margin-top:8px;font-size:11px;color:var(--text-muted);max-height:300px;overflow:auto;white-space:pre-wrap;">${JSON.stringify(data, null, 2)}</pre>
                </div>`;
        } catch (e) {
            output.innerHTML = '<div style="padding:12px;background:rgba(239,68,68,0.1);border-radius:8px;color:#ef4444;">❌ 请求失败: ' + e.message + '</div>';
        }
    }

    async function doModuleCode(frontendId) {
        const area = _resultArea();
        const name = _getBackendName(frontendId);
        area.innerHTML = '<div style="padding:12px;color:var(--text-muted);">⏳ 加载 ' + name + ' 源码...</div>';
        try {
            const data = await EvoAPI.getModuleCode(name);
            const code = data.source_code || data.code || '(无源码)';
            const lines = code.split('\n').length;
            area.innerHTML = `
                <div style="padding:12px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-size:13px;color:var(--text-muted);">${name}.py — ${lines} 行</span>
                        <button class="btn btn-edit" style="font-size:11px;padding:4px 10px;" onclick="navigator.clipboard.writeText(document.getElementById('code-viewer').textContent);this.textContent='✅ 已复制'">📋 复制</button>
                    </div>
                    <pre id="code-viewer" style="margin-top:8px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--text);max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-all;">${code}</pre>
                </div>`;
        } catch (e) {
            area.innerHTML = '<div style="padding:12px;background:rgba(239,68,68,0.1);border-radius:8px;color:#ef4444;">❌ 加载失败: ' + e.message + '</div>';
        }
    }

    async function doModuleActions(frontendId) {
        const area = _resultArea();
        const name = _getBackendName(frontendId);
        area.innerHTML = '<div style="padding:12px;color:var(--text-muted);">⏳ 扫描 ' + name + ' 可用方法...</div>';
        try {
            const data = await EvoAPI.getModule(name);
            const methods = [];
            if (data && data.methods) methods.push(...data.methods);
            if (data && data.actions) methods.push(...data.actions);
            if (methods.length === 0) {
                area.innerHTML = `<div style="padding:12px;background:rgba(100,116,139,0.1);border-radius:8px;color:var(--text-muted);">ℹ️ ${name} 无已注册的方法列表。可尝试 execute 使用 action 如: health_check, initialize, get_stats, shutdown</div>`;
            } else {
                const btns = methods.map(m =>
                    '<button class="btn btn-edit" style="font-size:11px;padding:4px 10px;margin:3px;" onclick="quickExec(\'' + frontendId + '\',\'' + m + '\')">' + m + '</button>'
                ).join('');
                area.innerHTML = `
                    <div style="padding:12px;">
                        <div style="font-size:13px;margin-bottom:8px;color:var(--text-muted);">可用方法 (${methods.length}):</div>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;">${btns}</div>
                    </div>`;
            }
        } catch (e) {
            area.innerHTML = '<div style="padding:12px;background:rgba(239,68,68,0.1);border-radius:8px;color:#ef4444;">❌ 加载失败: ' + e.message + '</div>';
        }
    }

    async function quickExec(frontendId, action) {
        const area = _resultArea();
        const name = _getBackendName(frontendId);

    function initSystemIntegration() {
        if (!window.EvoAPI) {
            setTimeout(initSystemIntegration, 500);
            return;
        }
        console.log('[EVO-Dashboard] 系统集成初始化');
        EvoAPI.on('connected', function() {
            console.log('[EVO-Dashboard] 后端已连接');
            updateSystemStatus('online');
            loadModuleStatus();
        });
        EvoAPI.on('disconnected', function() {
            console.log('[EVO-Dashboard] 后端已断开');
            updateSystemStatus('offline');
        });
        EvoAPI.on('health_updated', function(data) {
            updateModuleHealth(data);
        });
        setInterval(function() {
            if (EvoAPI.isConnected()) {
                EvoAPI.health().then(function(h) {
                    updateSystemStatus((h.status === 'healthy' || h.status === 'running') ? 'online' : 'warning');
                });
            }
        }, 10000);
    }
    window.updateSystemStatus = function(status) {
        let indicator = document.getElementById('evo-system-status');
        if (!indicator) {
            indicator = document.createElement('div');
            indicator.id = 'evo-system-status';
            indicator.style.cssText = 'position:fixed;top:10px;right:10px;z-index:9999;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:bold;transition:all 0.3s;';
            document.body.appendChild(indicator);
        }
        const colors = {
            online: {bg: '#10b981', text: '#fff', label: '🟢 系统在线'},
            offline: {bg: '#ef4444', text: '#fff', label: '🔴 离线'},
            warning: {bg: '#f59e0b', text: '#fff', label: '🟡 降级运行'}
        };
        const c = colors[status] || colors.offline;
        indicator.style.background = c.bg;
        indicator.style.color = c.text;
        indicator.textContent = c.label;
    }
    function updateModuleHealth(healthData) {
        document.querySelectorAll('.module-card').forEach(function(card) {
            const onclick = card.getAttribute('onclick');
            const match = onclick && onclick.match(/showPage\('([^']+)'\)/);
            const moduleId = match ? match[1] : null;
            if (!moduleId) return;
            const health = healthData[moduleId.replace(/-/g, '_')];
            if (health) {
                let dot = card.querySelector('.module-status');
                if (!dot) {
                    dot = document.createElement('span');
                    dot.className = 'module-status';
                    dot.style.cssText = 'position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;';
                    card.style.position = 'relative';
                    card.appendChild(dot);
                }
                dot.style.background = health.status === 'ok' ? '#10b981' : (health.status === 'error' ? '#ef4444' : '#f59e0b');
            }
        });
    }
    async function loadModuleStatus() {
        try {
            const data = await EvoAPI.listModules();
            const count = data.count || data.total || (data.modules && data.modules.length) || 0;
            console.log('[EVO-Dashboard] 已加载', count, '个模块');
            updateModuleHealth(data.details || {});
        } catch (e) {
            console.error('[EVO-Dashboard] 加载模块失败:', e);
        }
    }

    function _startMonitorPoll() {

    async function _pollMonitor() {
        try {
            const r = await fetch('/api/monitor/realtime');
            if (!r.ok) return;
            const d = await r.json();
            document.getElementById('monitor-status-dot').style.background = '#10b981';
            document.getElementById('monitor-status-text').textContent = '实时更新中';

            // 概览
            const s = d.system;
            document.getElementById('mon-modules-total').textContent = s.modules_total;
            document.getElementById('mon-modules-ok').textContent = s.modules_ok + ' / ' + s.modules_total;
            const upSec = s.uptime_seconds;
            const upStr = upSec < 60 ? upSec + 's' : upSec < 3600 ? Math.floor(upSec/60) + 'm' : Math.floor(upSec/3600) + 'h' + Math.floor((upSec%3600)/60) + 'm';
            document.getElementById('mon-uptime').textContent = upStr;
            document.getElementById('mon-score').textContent = s.automation_score + '%';

            // 资源
            const res = d.resources;
            document.getElementById('mon-cpu-val').textContent = res.cpu_percent.toFixed(1) + '%';
            document.getElementById('mon-cpu-fill').style.width = res.cpu_percent + '%';
            document.getElementById('mon-mem-val').textContent = res.memory_used_mb + ' / ' + res.memory_total_mb + ' MB (' + res.memory_percent.toFixed(1) + '%)';
            document.getElementById('mon-mem-fill').style.width = res.memory_percent + '%';
            document.getElementById('mon-disk-val').textContent = res.disk_percent.toFixed(1) + '% · ' + res.disk_free_gb + 'GB 可用';
            document.getElementById('mon-disk-fill').style.width = res.disk_percent + '%';
            document.getElementById('mon-proc-mem').textContent = res.process_memory_mb;
            document.getElementById('mon-threads').textContent = res.process_threads;

            // API端点
            const ep = d.endpoints;
            let epHtml = '<table style="width:100%;border-collapse:collapse;">';
            epHtml += '<tr style="border-bottom:1px solid var(--border-color);"><th style="text-align:left;padding:4px 0;font-size:11px;color:var(--text-muted);">端点</th><th style="text-align:right;padding:4px 0;font-size:11px;color:var(--text-muted);">请求次数</th><th style="text-align:right;padding:4px 0;font-size:11px;color:var(--text-muted);">平均延迟</th></tr>';
            for (const e of (ep.top_by_requests || []).slice(0, 8)) {
                const lat = ep.avg_latency_ms[e.path] || '—';
                const latColor = typeof lat === 'number' && lat > 1000 ? '#ef4444' : typeof lat === 'number' && lat > 200 ? '#f59e0b' : '#10b981';
                epHtml += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);"><td style="padding:6px 0;font-family:monospace;font-size:11px;">${e.path}</td><td style="text-align:right;padding:6px 0;font-size:11px;font-weight:600;">${e.count}</td><td style="text-align:right;padding:6px 0;font-size:11px;color:${latColor};">${typeof lat === 'number' ? lat.toFixed(0) : lat}ms</td></tr>`;
            }
            epHtml += '</table>';
            document.getElementById('mon-endpoints-list').innerHTML = epHtml;
            document.getElementById('mon-ws').textContent = s.ws_connections;
            document.getElementById('mon-errors').textContent = ep.total_errors;

            // 延迟图表
            const latencies = Object.entries(ep.avg_latency_ms || {}).map(([p, v]) => ({ path: p.split('/').pop() || p, ms: v })).sort((a, b) => b.ms - a.ms).slice(0, 10);
            if (latencies.length) {
                const maxMs = Math.max(...latencies.map(l => l.ms), 1);
                let chartHtml = '';
                for (const l of latencies) {
                    const h = Math.max(4, (l.ms / maxMs) * 100);
                    const c = l.ms > 1000 ? '#ef4444' : l.ms > 200 ? '#f59e0b' : '#10b981';
                    chartHtml += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                        <span style="font-size:10px;color:${c};font-weight:600;">${l.ms.toFixed(0)}</span>
                        <div style="width:100%;height:${h}%;background:${c};border-radius:4px 4px 0 0;min-height:4px;transition:height 0.5s;"></div>
                        <span style="font-size:9px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;">${l.path}</span>
                    </div>`;
                }
                document.getElementById('mon-latency-chart').innerHTML = chartHtml;
            }

            // 错误模块
            const errs = d.modules.errors || [];
            if (errs.length === 0) {
                document.getElementById('mon-error-modules').innerHTML = '<div style="color:#10b981;text-align:center;padding:20px;">✅ 全部模块正常运行</div>';
            } else {
                let errHtml = '';
                for (const e of errs) {
                    errHtml += `<div style="padding:8px;margin-bottom:4px;background:rgba(239,68,68,0.1);border-radius:6px;border-left:3px solid #ef4444;">
                        <span style="font-weight:600;">${e.name}</span> <span style="color:#ef4444;font-size:11px;">[${e.status}]</span>
                        <div style="color:var(--text-muted);font-size:11px;margin-top:2px;">${e.error || '无详情'}</div>
                    </div>`;
                }
                document.getElementById('mon-error-modules').innerHTML = errHtml;
            }
        } catch (e) {
            document.getElementById('monitor-status-dot').style.background = '#ef4444';
            document.getElementById('monitor-status-text').textContent = '连接失败';
        }
    }

    function toggleV3Maximize() {

    function initV3DragResize() {
        const dialog = document.getElementById('v3-coord-dialog');
        const header = document.getElementById('v3-coord-header');
        const handle = document.getElementById('v3-resize-handle');
        if (!dialog || !header) return;

        // 拖拽移动
        let dragging = false, dx = 0, dy = 0;
        header.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
            if (_v3Maximized) return;
            dragging = true;
            dx = e.clientX - dialog.offsetLeft;
            dy = e.clientY - dialog.offsetTop;
            dialog.style.transition = 'none';
            e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            let nx = e.clientX - dx, ny = e.clientY - dy;
            nx = Math.max(0, Math.min(nx, window.innerWidth - 100));
            ny = Math.max(0, Math.min(ny, window.innerHeight - 50));
            dialog.style.left = nx + 'px';
            dialog.style.top = ny + 'px';
            dialog.style.margin = '0';
        });
        document.addEventListener('mouseup', () => { if (dragging) { dragging = false; dialog.style.transition = ''; } });

        // 调整大小
        if (handle) {
            let resizing = false, startW = 0, startH = 0, sx = 0, sy = 0;
            handle.addEventListener('mousedown', (e) => {
                if (_v3Maximized) return;
                resizing = true;
                startW = dialog.offsetWidth;
                startH = dialog.offsetHeight;
                sx = e.clientX; sy = e.clientY;
                dialog.style.transition = 'none';
                e.preventDefault(); e.stopPropagation();
            });
            document.addEventListener('mousemove', (e) => {
                if (!resizing) return;
                dialog.style.width = Math.max(600, startW + (e.clientX - sx)) + 'px';
                dialog.style.height = Math.max(400, startH + (e.clientY - sy)) + 'px';
            });
            document.addEventListener('mouseup', () => { if (resizing) { resizing = false; dialog.style.transition = ''; } });
        }

        // 双击标题栏最大化/还原
        header.addEventListener('dblclick', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
            toggleV3Maximize();
        });

        // 单击标题栏：最小化状态时恢复
        header.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
            if (_v3Minimized) {
                toggleV3Minimize();
            }
        });

        // ESC关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('v3-coord-modal')?.style.display !== 'none') {
                document.getElementById('v3-coord-modal').style.display = 'none';
            }
        });
    }

                return;
            }
            let html = '<div style="display:flex;flex-direction:column;gap:4px;">';

                const tags = (m.tags || []).map(t => `<span style="background:#3b82f6;border-radius:8px;padding:1px 6px;font-size:10px;">${t}</span>`).join('');

                    <div>
                        <b style="color:#fff;">${m.module}</b>

                    </div>

    async function v3ExecuteTask() {
        const input = document.getElementById('v3-task-input');
        const chainEl = document.getElementById('v3-exec-chain');
        const resultEl = document.getElementById('v3-exec-result');
        if (!input || !chainEl || !resultEl) return;
        const task = input.value.trim();
        if (!task) { resultEl.innerHTML = '<span style="color:#f59e0b;">请输入任务</span>'; return; }

        chainEl.innerHTML = '<span style="color:#9ca3af;">⚡ 正在调度执行链...</span>';
        resultEl.innerHTML = '<span style="color:#9ca3af;">等待结果...</span>';

        try {
            const r = await EvoAPI.execute(task);
            const success = r.success;

            // 从后端返回的step_results构建执行链展示
            const steps = r.step_results || [];
            if (steps.length > 0) {
                const chainHtml = steps.map((s, i) => {
                    const ok = s.result && s.result.success !== false;
                    return `<span style="display:inline-flex;align-items:center;gap:4px;">
                        <span style="background:${ok ? '#3b82f6' : '#6b7280'};border-radius:6px;padding:2px 8px;font-size:11px;color:#fff;">${s.module}</span>
                        <span style="color:${ok ? '#10b981' : '#ef4444'};font-size:10px;">${ok ? '✓' : '✗'}</span>
                        ${i < steps.length - 1 ? '<span style="color:#3b82f6;margin:0 2px;">→</span>' : ''}
                    </span>`;
                }).join('');
                chainEl.innerHTML = `<div style="background:#0f0f1a;border-radius:8px;padding:10px 12px;">
                    <span style="color:#6b7280;font-size:11px;margin-right:8px;">执行链:</span>${chainHtml}
                </div>`;
            } else if (r.chain && r.chain.length > 0) {
                const chainArr = Array.isArray(r.chain) ? r.chain : [];
                chainEl.innerHTML = `<div style="background:#0f0f1a;border-radius:8px;padding:10px 12px;">
                    <span style="color:#6b7280;font-size:11px;margin-right:8px;">执行链:</span>
                    ${chainArr.map(c => `<span style="background:#3b82f6;border-radius:6px;padding:2px 8px;font-size:11px;color:#fff;margin-right:4px;">${c}</span>`).join('<span style="color:#3b82f6;margin:0 2px;">→</span>')}
                </div>`;
            } else {
                chainEl.innerHTML = '<span style="color:#6b7280;font-size:11px;">暂无链路信息</span>';
            }

            // 结果展示 - 优化JSON格式化
            let resultText = '';
            const payload = r.result || {};
            if (payload.repos && payload.repos.length > 0) {
                resultText = payload.repos.map(repo =>
                    `⭐ ${repo.stars || 0}  ${repo.name}\n   ${(repo.description || '').substring(0, 80)}\n   ${repo.url || ''}`
                ).join('\n\n');
            } else if (typeof payload === 'object') {
                const rj = JSON.stringify(payload, null, 2);
                resultText = rj.length > 600 ? rj.slice(0, 600) + '\n...' : rj;
            } else {
                resultText = String(payload);
            }
            if (!resultText && r.error) resultText = r.error;

            // suggestion提示（当任务超出系统领域时）
            const suggestHtml = (!success && r.suggestion)
                ? `<div style="margin-top:8px;padding:8px 12px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);border-radius:8px;color:#93c5fd;font-size:12px;">💡 ${r.suggestion}</div>`
                : '';

            resultEl.innerHTML = `<div style="background:#0f172a;border-radius:8px;padding:12px;margin-top:6px;">
                <b style="color:${success ? '#10b981' : '#ef4444'};font-size:13px;">${success ? '✅ 执行成功' : '❌ 执行失败'}</b>
                <pre style="color:#d1d5db;margin-top:8px;overflow:auto;max-height:240px;font-size:11px;line-height:1.6;white-space:pre-wrap;">${resultText || '(无返回内容)'}</pre>
                ${suggestHtml}
            </div>`;
        } catch (e) {
            chainEl.innerHTML = '<span style="color:#ef4444;">调度失败</span>';
            resultEl.innerHTML = `<span style="color:#ef4444;">执行失败: ${e.message}</span>`;
        }
    }

    function pipelineLoadTemplate() {
        const templates = {
            '数据采集→分析→通知': [
                {"id":"s1","name":"数据采集","type":"module","module":"data_scraping","action":"scrape","params":{"url":""},"output_alias":"raw_data"},
                {"id":"s2","name":"数据分析","type":"module","module":"data_analysis","action":"analyze","input_mapping":{"data":"steps.s1.output.raw_data"},"output_alias":"analysis_result"},
                {"id":"s3","name":"生成报告","type":"module","module":"doc_generator","action":"generate","input_mapping":{"content":"steps.s2.output.analysis_result"},"output_alias":"report"},
                {"id":"s4","name":"发送通知","type":"notify","channel":"","message_template":"数据处理完成，报告已生成: {{report}}"}
            ],
            '安全扫描→审计→告警': [
                {"id":"s1","name":"安全扫描","type":"module","module":"vuln_scanner","action":"scan","output_alias":"scan_result"},
                {"id":"s2","name":"条件判断","type":"condition","condition_expr":"steps.s1.output.scan_result.critical_count > 0","then_steps":["s3"],"else_steps":["s4"]},
                {"id":"s3","name":"安全告警","type":"notify","channel":"email","message_template":"发现严重安全漏洞! 关键问题数: {{scan_result.critical_count}}"},
                {"id":"s4","name":"记录日志","type":"module","module":"audit_log","action":"log","input_mapping":{"data":"steps.s1.output.scan_result"}}
            ]
        };
        const names = Object.keys(templates);
        const sel = prompt('选择模板:\n' + names.map((n,i)=>`${i+1}. ${n}`).join('\n') + '\n\n输入序号:');
        if (!sel) return;
        const idx = parseInt(sel) - 1;
        if (idx >= 0 && idx < names.length) {
            document.getElementById('pl-steps').value = JSON.stringify(templates[names[idx]], null, 2);
        }
    }

    async function pipelineCreateSubmit() {
        const name = document.getElementById('pl-name').value.trim();
        const stepsStr = document.getElementById('pl-steps').value.trim();
        if (!name) { alert('请输入管线名称'); return; }
        let steps;
        try { steps = JSON.parse(stepsStr); } catch(e) { alert('步骤JSON格式错误: ' + e.message); return; }
        if (!Array.isArray(steps) || steps.length === 0) { alert('步骤必须是非空数组'); return; }
        const tags = document.getElementById('pl-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
        try {
            const r = await fetch('/api/pipelines', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ name, steps, description:document.getElementById('pl-desc').value.trim(), tags, variables:{} })
            });
            const d = await r.json();
            if (d.success) { await pipelineRefresh(); }
            else { alert('创建失败: ' + (d.error||'')); }
        } catch(e) { alert('网络错误: ' + e.message); }
    }

    async function queueRefresh() {
        try {
            const [r1, r2] = await Promise.all([fetch('/api/queue/stats'), fetch('/api/queue/tasks?limit=30')]);
            const [stats, data] = await Promise.all([r1.json(), r2.json()]);
            const tasks = data.tasks || [];
            const body = document.getElementById('queue-body');
            const statusColors = {pending:'var(--text-muted)',running:'var(--primary)',success:'var(--success)',failed:'var(--danger)',retrying:'var(--warning)',timeout:'var(--warning)',cancelled:'var(--text-muted)',dead:'#ef4444'};
            const statusLabels = {pending:'等待中',running:'执行中',success:'成功',failed:'失败',retrying:'重试中',timeout:'超时',cancelled:'已取消',dead:'死信'};
            body.innerHTML = `
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;">
                <div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--text-muted);">${stats.backlog||0}</div><div style="font-size:11px;">积压</div></div>
                <div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--primary);">${stats.running||0}</div><div style="font-size:11px;">运行中</div></div>
                <div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--success);">${stats.success||0}</div><div style="font-size:11px;">成功</div></div>
                <div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--danger);">${stats.dead||0}</div><div style="font-size:11px;">死信</div></div>
                <div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--info);">${stats.workers_active||0}/${stats.max_workers||4}</div><div style="font-size:11px;">Workers</div></div>
            </div>
            <div style="display:grid;gap:8px;">
                ${tasks.map(t => `
                    <div style="background:var(--bg);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;border-left:3px solid ${statusColors[t.status]||'#666'};">
                        <span style="font-size:12px;font-weight:600;min-width:60px;color:${statusColors[t.status]};">${statusLabels[t.status]||t.status}</span>
                        <span style="flex:1;font-size:12px;">${t.name||t.id} <span style="color:var(--text-muted);">(${t.target_type}:${t.target_id})</span></span>
                        <span style="font-size:10px;color:var(--text-muted);">${t.priority||'normal'}</span>
                        ${t.status==='pending'||t.status==='retrying'?`<button onclick="queueCancel('${t.id}')" style="padding:4px 8px;background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid var(--danger);border-radius:6px;cursor:pointer;font-size:10px;">取消</button>`:''}
                        ${t.status==='failed'||t.status==='dead'?`<button onclick="queueRetry('${t.id}')" style="padding:4px 8px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:10px;">重试</button>`:''}
                    </div>
                `).join('')||'<div style="text-align:center;padding:40px;color:var(--text-muted);">队列为空</div>'}
            </div>`;
        } catch(e) { console.error(e); }
    }

    function wsConnect() {
        if (_wsConn) _wsConn.close();
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        _wsConn = new WebSocket(`${protocol}//${location.host}/ws?rooms=system,events,tasks,logs,alerts`);
        const body = document.getElementById('ws-body');
        const statusEl = document.getElementById('ws-status');
        _wsConn.onopen = () => { statusEl.textContent = '🟢 已连接'; statusEl.style.color = 'var(--success)'; body.innerHTML += '<div style="color:var(--success);margin-top:10px;">[已连接]</div>'; };
        _wsConn.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                const colors = {log:'#94a3b8',event:'#6366f1',progress:'#f59e0b',status:'#10b981',alert:'#ef4444',notification:'#3b82f6'};
                const color = colors[msg.type] || 'var(--text)';
                body.innerHTML += `<div style="color:${color};border-bottom:1px solid rgba(255,255,255,0.05);padding:4px 0;">[${(msg.timestamp||'').split('T')[1]||''}] <b>${msg.type}</b> <span style="color:var(--text-muted);">${msg.channel||''}</span> ${JSON.stringify(msg.data||{}).slice(0,120)}</div>`;
                body.scrollTop = body.scrollHeight;
            } catch(err) { body.innerHTML += `<div style="color:var(--text-muted);">${e.data}</div>`; }
        };
        _wsConn.onclose = () => { statusEl.textContent = '🔴 已断开'; statusEl.style.color = 'var(--danger)'; };
        _wsConn.onerror = () => { statusEl.textContent = '❌ 错误'; statusEl.style.color = 'var(--danger)'; };
    }

    async function startTunnel(backend) {
        const btn = document.getElementById('tunnel-btn');
        btn.textContent = '⏳'; btn.style.color = '#f59e0b';
        // Close dialog
        const overlay = document.querySelector('div[style*="z-index:999999"]');
        if (overlay) overlay.remove();
        let token = '';
        if (backend === 'pyngrok') {
            const inp = document.getElementById('ngrok-token-input');
            token = inp ? inp.value.trim() : '';
            if (!token) { btn.textContent='🌐'; btn.style.color='#06b6d4'; showToast('请输入ngrok auth token','error'); return; }
        }
        showToast('正在启动隧道，请稍候...', 'info');
        try {
            const r = await fetch('/api/tunnel/start?backend='+backend+'&auth_token='+encodeURIComponent(token), {method:'POST'});
            const d = await r.json();
            if (d.success) {
                _tunnelActive = true;
                btn.textContent = '🌐'; btn.style.color = '#10b981';
                showToast('隧道已启动！手机打开: ' + d.url, 'success', 10000);
                try { navigator.clipboard.writeText(d.url + '/dashboard'); } catch(e) {}
            } else {
                btn.textContent = '🌐'; btn.style.color = '#ef4444';
                showToast('启动失败: ' + (d.hint || d.error), 'error', 8000);
            }
        } catch(e) {
            btn.textContent = '🌐'; btn.style.color = '#06b6d4';
            showToast('请求失败: ' + e.message, 'error');
        }
    }

                await fetch('/api/tunnel/stop', {method:'POST'});
                _tunnelActive = false;

                showToast('隧道已关闭', 'info');
            } catch(e) { btn.textContent='🌐'; btn.style.color='#10b981'; }
        } else {
            showTunnelDialog();
        }
    }
