<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="stylesheet" href="enterprise.css">
<meta name="description" content="企业级功能与管理面板，公司/部门/员工/项目管理">
<meta property="og:title" content="AUTO-EVO-AI">
<meta property="og:description" content="企业级功能与管理面板，公司/部门/员工/项目管理">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业版 - AUTO-EVO-AI V0.1</title>
    <!-- PWA Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
    <!-- Toast 容器 -->
    <div class="toast-container" id="evoToastContainer"></div>
    <!-- Alert Modal -->
    <div class="evo-prompt-overlay" id="evoAlertOverlay">
        <div class="evo-alert-box" onclick="event.stopPropagation()">
            <div class="evo-alert-icon" id="evoAlertIcon"></div>
            <div class="evo-alert-body" id="evoAlertBody"></div>
            <div class="evo-alert-actions">
                <button class="evo-prompt-btn confirm" onclick="evoAlertClose()" style="min-width:100px;">确定</button>
            </div>
        </div>
    </div>
    <!-- Prompt Modal -->
    <div class="evo-prompt-overlay" id="evoPromptOverlay">
        <div class="evo-prompt-box" onclick="event.stopPropagation()">
            <div class="evo-prompt-title" id="evoPromptTitle">输入</div>
            <div class="evo-prompt-desc" id="evoPromptDesc"></div>
            <input type="text" class="evo-prompt-input" id="evoPromptInput" />
            <div class="evo-prompt-actions">
                <button class="evo-prompt-btn cancel" onclick="evoPromptCancel()">取消</button>
                <button class="evo-prompt-btn confirm" onclick="evoPromptOk()">确定</button>
            </div>
        </div>
    </div>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">AI</div>
                <div class="brand">AUTO-EVO-AI</div>
                <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索模块..." id="searchInput" oninput="filterModules()">
            </div>
            <nav class="nav-groups" id="navGroups"></nav>
            <div class="sidebar-footer">
                <button onclick="try{openV3Panel();console.log('openV3Panel OK')}catch(e){console.error('openV3Panel FAIL:',e)}" style="background:#3b82f6;color:#fff;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:10px;width:100%;margin-bottom:4px;">测试协调中心</button>
                Ctrl+K 搜索 | ESC 返回
            </div>
        </aside>
        <main class="main">
            <header class="topbar">
                <div class="topbar-title">AUTO-EVO-AI</div>
                <span class="topbar-badge">V0.1</span>
                <div class="topbar-actions">
                    <button class="topbar-btn" onclick="openV3Panel()" title="全模块协调中心" style="color:#f59e0b;font-weight:bold;">🧠</button>
                    <button class="topbar-btn" onclick="openMonitorPanel()" title="系统实时监控" style="color:#10b981;font-weight:bold;">📊</button>
                    <button class="topbar-btn" onclick="openModuleExplorer()" title="模块浏览器（搜索/批量执行/日志）" style="color:#6366f1;font-weight:bold;">📦</button>
                    <button class="topbar-btn" onclick="window.open('/docs','_blank')" title="Swagger API文档" style="color:#ec4899;font-weight:bold;">📖</button>
                    <button class="topbar-btn" id="tunnel-btn" onclick="toggleTunnel()" title="内网穿透（手机远程访问）" style="color:#06b6d4;font-weight:bold;">🌐</button>
                    <button class="topbar-btn" onclick="window.open('/api/deploy-guide','_blank')" title="云部署指南（手机无电脑也能用）" style="color:#f59e0b;font-weight:bold;">☁️</button>
                    <button class="topbar-btn" onclick="toggleSidebar()" title="折叠侧边栏 (Ctrl+B)">◀</button>
                    <button class="topbar-btn" onclick="toggleTheme()" title="切换主题">🌓</button>
                    <button class="topbar-btn" onclick="openModuleManager()" title="模块管理器">⚙️</button>
                </div>
            </header>
            <div class="content" id="content"></div>
        </main>
    </div>
    <!-- 搜索模态框 -->
    <div class="search-modal" id="searchModal">
        <div class="search-modal-content">
            <input type="text" class="search-modal-input" placeholder="搜索模块..." id="searchInput" oninput="searchModules()">
            <div class="search-results" id="searchResults"></div>
            <div class="search-hint">按 <kbd>Esc</kbd> 关闭 · <kbd>↑↓</kbd> 选择 · <kbd>Enter</kbd> 打开</div>
        </div>
    </div>
    <!-- 模块管理模态框 -->
    <div class="modal" id="moduleManager">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 模块管理器</h2>
                <button class="modal-close" onclick="closeModuleManager()">×</button>
            </div>
            <div class="modal-body">
                <div class="module-manager-actions">
                    <button class="btn btn-primary" onclick="showAddModule()">➕ 添加模块</button>
                    <button class="btn btn-outline" onclick="exportModules()">📤 导出</button>
                    <button class="btn btn-outline" onclick="importModules()">📥 导入</button>
                    <button class="btn btn-outline" onclick="resetToDefault()">🔄 重置</button>
                    <button class="btn btn-danger" id="batchDeleteBtn" onclick="batchDeleteModules()" style="display:none;">🗑️ 批量删除 (0)</button>
                </div>
                <div id="moduleListHeader" style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 4px;font-size:12px;color:var(--text-muted);">
                    <input type="checkbox" id="selectAllChk" onchange="toggleSelectAll()" style="width:16px;height:16px;cursor:pointer;">
                    <label for="selectAllChk" style="cursor:pointer;flex:1;">全选</label>
                    <span id="selectedCount">已选 0 个</span>
                </div>
                <div id="moduleList"></div>
            </div>
        </div>
    </div>
    <!-- 添加/编辑模块模态框 -->
    <div class="modal" id="addModuleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ 添加/编辑模块</h2>
                <button class="modal-close" onclick="closeAddModule()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editModuleId">
                <div class="form-group">
                    <label>模块ID</label>
                    <input type="text" id="newModuleId" placeholder="例如: my-module">
                </div>
                <div class="form-group">
                    <label>模块名称</label>
                    <input type="text" id="newModuleName" placeholder="例如: 我的模块">
                </div>
                <div class="form-group">
                    <label>所属分组</label>
                    <input type="text" id="newModuleGroup" placeholder="例如: 我的分组">
                </div>
                <div class="form-group">
                    <label>模块图标</label>
                    <input type="text" id="newModuleIcon" placeholder="例如: 🔧" value="🔧">
                </div>
                <div class="form-group">
                    <label>模块描述</label>
                    <textarea id="newModuleDesc" placeholder="模块功能描述..."></textarea>
                </div>
                <div class="form-group">
                    <label>来源</label>
                    <input type="text" id="newModuleSource" placeholder="来源">
                </div>
                <div class="form-group">
                    <label>标签（逗号分隔）</label>
                    <input type="text" id="newModuleTags" placeholder="例如: 工具,自动化">
                </div>
                <div class="form-group">
                    <label>颜色</label>
                    <input type="color" id="newModuleColor" value="#3B82F6">
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="saveModule()">💾 保存</button>
                    <button class="btn btn-outline" onclick="closeAddModule()">取消</button>
                </div>
            </div>
        </div>
    </div>
    <!-- 工程恢复确认模态框 -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚠️ 确认操作</h2>
                <button class="modal-close" onclick="closeConfirmModal()">×</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
                <div class="form-actions">
                    <button class="btn btn-danger" id="confirmBtn" onclick="confirmAction()">确认</button>
                    <button class="btn btn-outline" onclick="closeConfirmModal()">取消</button>
                </div>
            </div>
        </div>
    </div>
    <button class="float-back-btn" id="floatBackBtn" onclick="backToOverview()">🏠 返回概览</button>
<!-- AUTO-EVO-AI V0.1 API Bridge -->
<!-- evo-api-bridge.js 已内联 -->
    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav" id="mobile-nav">
        <div class="mobile-nav-item active" onclick="mobileNavTo('home')">
            <span class="mobile-nav-icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="mobile-nav-item" onclick="mobileNavTo('modules')">
            <span class="mobile-nav-icon">📦</span>
            <span>模块</span>
        </div>
        <div class="mobile-nav-item" onclick="mobileNavTo('coord')">
            <span class="mobile-nav-icon">🧠</span>
            <span>协调</span>
        </div>
        <div class="mobile-nav-item" onclick="mobileNavTo('monitor')">
            <span class="mobile-nav-icon">📊</span>
            <span>监控</span>
        </div>
        <div class="mobile-nav-item" onclick="mobileNavTo('docs')">
            <span class="mobile-nav-icon">📖</span>
            <span>文档</span>
        </div>
    </nav>
<!-- ═══════════════════════════════════════════════════════════════
     SETUP WIZARD — 首次配置向导
     用户输入API Key/Token等凭证后自动保存到后端config_center
     ═══════════════════════════════════════════════════════════════ -->
<div id="setup-wizard-overlay" style="display:none">
  <div id="setup-wizard">
    <div class="sw-header">
      <div class="sw-logo">⚡</div>
      <h2 class="sw-title">系统配置向导</h2>
      <p class="sw-subtitle">配置您的服务凭证，激活AI能力与自动化推送</p>
      <div class="sw-progress-bar"><div class="sw-progress-fill" id="swProgressFill"></div></div>
    </div>
    <div class="sw-body" id="swBody"></div>
    <div class="sw-footer">
      <button id="swBtnSkip" onclick="swSkip()">跳过此步骤</button>
      <button id="swBtnBack" onclick="swBack()" style="display:none">← 上一步</button>
      <button id="swBtnNext" onclick="swNext()">下一步 →</button>
      <button id="swBtnFinish" onclick="swFinish()" style="display:none">✓ 完成配置</button>
    </div>
  </div>
</div>
<script src="enterprise.js"></script>
</body>
<!-- ═══════════════════════════════════════════════════════ -->

</html>
