<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" id="themeColorMeta" content="var(--bg)">
<title>Agent连接 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
body{height:100vh;display:flex;flex-direction:column;margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
.tabs{display:flex;gap:0;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--card)}
.tab{padding:8px 18px;cursor:pointer;font-size:14px;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-content{display:none;flex:1;min-height:0}.tab-content.active{display:flex;flex-direction:column}
.back{flex-shrink:0;padding:8px 16px;color:var(--accent);text-decoration:none;font-size:14px;border-bottom:1px solid var(--border)}
.back:hover{text-decoration:underline}
h1{font-size:22px;font-weight:700;padding:12px 16px 4px;flex-shrink:0}.sub{color:var(--text3);font-size:13px;padding:0 16px 8px;flex-shrink:0}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin:8px 12px}
.card h3{font-size:14px;font-weight:600;margin-bottom:6px;color:var(--accent)}
.card p{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;margin-bottom:8px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.btn{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}
.btn-g{background:#10b981;color:#fff}.btn-g:hover{opacity:.9}
table{width:100%;border-collapse:collapse;margin-top:6px;font-size:13px}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
th{color:var(--text3);font-weight:600}td{color:var(--text2)}
.token-box{background:var(--bg);border-radius:6px;padding:10px;font-family:monospace;font-size:12px;margin:6px 0;word-break:break-all;border:1px solid var(--border);color:var(--text2)}
.status{display:none;padding:8px 12px;border-radius:6px;margin-bottom:8px;font-size:13px}
.status.ok{display:block;background:rgba(16,185,129,.1);border:1px solid #10b981;color:#10b981}
.status.err{display:block;background:rgba(239,68,68,.1);border:1px solid #ef4444;color:#ef4444}
</style></head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab(this,'r_remote')">📱 远程执行</div>
  <div class="tab" onclick="switchTab(this,'r_claw')">🕸️ Claw</div>
  <div class="tab" onclick="switchTab(this,'r_agent')">🔌 本地代理</div>
</div>

<div id="r_remote" class="tab-content active">
<h1>📡 远程执行</h1>
<p class="sub">手机发指令 → 服务器自动执行 → 结果通知</p>
<div class="status" id="status"></div>
<div class="card">
  <h3>🔑 你的远程执行 Token</h3>
  <p>在其他设备上使用此 Token 发送指令到本系统。</p>
  <div class="token-box" id="tokenDisplay">请先生成 Token</div>
  <button class="btn btn-p" onclick="generateToken()">🔄 生成新的 Token</button>
  <button class="btn btn-g" onclick="copyToken()" id="copyBtn">📋 复制远程链接</button>
</div>
<div class="card">
  <h3>✉️ 远程发送指令</h3>
  <input type="text" id="remoteCmd" placeholder="如：系统怎么样、创建用户 张三" onkeydown="if(event.key==='Enter')sendRemote()">
  <button class="btn btn-p" onclick="sendRemote()">📨 发送远程指令</button>
</div>
<div class="card">
  <h3>📋 执行记录</h3>
  <table><thead><tr><th>时间</th><th>指令</th><th>状态</th></tr></thead>
  <tbody id="logList"><tr><td colspan="3" style="text-align:center;color:var(--text3)">暂无记录</td></tr></tbody></table>
</div>
</div>
<div id="r_claw" class="tab-content"><iframe src="/claw?embed=1" style="width:100%;height:100%;border:none"></iframe></div>
<div id="r_agent" class="tab-content"><iframe src="/agent" style="width:100%;height:100%;border:none"></iframe></div>
<script>
// _EVO_LT 加载超时保护 20260713
(function(){var t=setTimeout(function(){var e=document.querySelectorAll('[id*=loading],[class*=loading],.spinner,.loader');e.forEach(function(el){var txt=el.textContent||el.innerText||'';if(txt.indexOf('加载中')>=0){el.textContent=txt.replace('加载中','超时');el.style.color='#ef4444'}})},8000);window.__evolt=t})();
function switchTab(el,id){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')})
  el.classList.add('active')
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')})
  document.getElementById(id).classList.add('active')}
var _token=localStorage.getItem('evo_remote_token')||''
function showStatus(msg,ok){var s=document.getElementById('status');s.textContent=msg;s.className='status '+(ok?'ok':'err');s.style.display='block';setTimeout(function(){s.style.display='none'},4000)}
function generateToken(){_token='evoremote_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);localStorage.setItem('evo_remote_token',_token);displayToken();showStatus('✅ 新 Token 已生成',true)}
function displayToken(){document.getElementById('tokenDisplay').textContent=window.location.origin+'/remote-exec.html?token='+_token}
function copyToken(){var link=window.location.origin+'/remote-exec.html?token='+_token;navigator.clipboard.writeText(link).then(function(){document.getElementById('copyBtn').textContent='✅ 已复制';setTimeout(function(){document.getElementById('copyBtn').textContent='📋 复制远程链接'},2000)}).catch(function(){showStatus('复制失败',false)})}
async function sendRemote(){var cmd=document.getElementById('remoteCmd').value.trim();if(!cmd){showStatus('请输入指令',false);return}
  try{var r=await fetch('/api/v1/smart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:cmd})});var d=await r.json();var result=d.result||d.detail||'(空)';addLog(cmd,result);showStatus('✅ 成功: '+result.slice(0,60),true)}
  catch(e){showStatus('❌ 失败: '+e.message,false)};document.getElementById('remoteCmd').value=''}
var _logs=JSON.parse(localStorage.getItem('evo_remote_logs')||'[]')
function addLog(cmd,result){_logs.unshift({cmd:cmd,result:result.slice(0,60),time:new Date().toLocaleString()});if(_logs.length>30)_logs.length=30;localStorage.setItem('evo_remote_logs',JSON.stringify(_logs));renderLogs()}
function renderLogs(){var el=document.getElementById('logList');if(!_logs.length){el.innerHTML='<tr><td colspan="3" style="text-align:center;color:var(--text3)">暂无记录</td></tr>';return}
  el.innerHTML=_logs.map(function(l){return '<tr><td style="color:var(--text3)">'+l.time+'</td><td>'+l.cmd.slice(0,30)+'</td><td style="color:#10b981">✅ 完成</td></tr>'}).join('')}
if(_token)displayToken();renderLogs()
</script>
</body></html>
