<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>智能循环引擎 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
.content{flex:1;overflow-y:auto;padding:16px 20px;max-width:960px;margin:0 auto;width:100%}
.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.loop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.loop-card{padding:16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s}
.loop-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px var(--glow)}
.loop-card .l-icon{font-size:24px;margin-bottom:6px}
.loop-card .l-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.loop-card .l-desc{font-size:11px;color:var(--text3);line-height:1.4;margin-bottom:8px}
.loop-card .l-meta{display:flex;gap:6px;flex-wrap:wrap}
.loop-card .l-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--glass);color:var(--text2)}
.exec-panel{padding:16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);margin-bottom:16px}
.exec-panel .input-row{display:flex;gap:8px}
.exec-panel input{flex:1;padding:9px 14px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;background:var(--bg);color:var(--text)}
.exec-panel input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.exec-panel .exec-btn{padding:9px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.exec-panel .exec-btn:hover{background:var(--accent-hover)}
.controls{display:flex;gap:8px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.controls button{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.controls .pause:hover{border-color:#f59e0b;color:#f59e0b}
.controls .stop:hover{border-color:#ef4444;color:#ef4444}
.controls .mode-select select{padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:11px;background:var(--bg);color:var(--text)}
.output-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;font-family:monospace;color:var(--text2);margin-top:10px;min-height:80px;max-height:300px;overflow-y:auto;white-space:pre-wrap;display:none}
.output-box.show{display:block}
.output-box .line{padding:2px 0;display:flex;gap:6px;animation:fadeLog .2s ease}
.output-box .line .iter{color:var(--accent);font-weight:600;flex-shrink:0}
.output-box .line .msg{color:var(--text)}
.output-box .line .msg.success{color:#10b981}
.output-box .line .msg.error{color:#ef4444}
@keyframes fadeLog{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.stat-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-item{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);flex:1;min-width:100px;text-align:center}
.stat-item .num{font-size:20px;font-weight:700;color:var(--accent)}
.stat-item .label{font-size:10px;color:var(--text3);margin-top:2px}
@media(max-width:768px){.content{padding:12px 10px}.loop-grid{grid-template-columns:repeat(2,1fr)}.controls{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      
      <h1>🔄 智能循环引擎</h1>
    </div>
    <div class="topbar-right">
      
    </div>
  </div>
  <div class="content">
    <div class="stat-bar">
      <div class="stat-item"><div class="num">0</div><div class="label">当前迭代</div></div>
      <div class="stat-item"><div class="num">0</div><div class="label">完成次数</div></div>
      <div class="stat-item"><div class="num">-</div><div class="label">运行状态</div></div>
    </div>
    <div class="section-title">📋 循环模式</div>
    <div class="loop-grid">
      <div class="loop-card" onclick="selectMode('auto_expand')" id="mode-auto_expand">
        <div class="l-icon">🌱</div><div class="l-name">自动扩展</div><div class="l-desc">自动分析上次结果，扩展深度和广度，直到达到目标或用户终止</div>
        <div class="l-meta"><span class="l-tag">⏱ 不限次数</span><span class="l-tag">⚡ 自动</span></div>
      </div>
      <div class="loop-card" onclick="selectMode('refine')" id="mode-refine">
        <div class="l-icon">🔧</div><div class="l-name">精炼优化</div><div class="l-desc">基于反馈循环优化输出质量，每次迭代都在前一次基础上改进</div>
        <div class="l-meta"><span class="l-tag">⏱ 5次默认</span><span class="l-tag">🎯 质量优先</span></div>
      </div>
      <div class="loop-card" onclick="selectMode('research')" id="mode-research">
        <div class="l-icon">🔬</div><div class="l-name">深度研究</div><div class="l-desc">多轮搜索+分析，每次迭代深入一层，适合复杂调研任务</div>
        <div class="l-meta"><span class="l-tag">⏱ 可变</span><span class="l-tag">📚 研究</span></div>
      </div>
      <div class="loop-card" onclick="selectMode('debate')" id="mode-debate">
        <div class="l-icon">⚖️</div><div class="l-name">多方辩论</div><div class="l-desc">多个Agent围绕主题辩论，每次迭代生成新的论点，最后综合</div>
        <div class="l-meta"><span class="l-tag">⏱ 3轮</span><span class="l-tag">🤖 多Agent</span></div>
      </div>
    </div>
    <div class="section-title">🎮 执行控制</div>
    <div class="exec-panel">
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">当前模式: <strong id="currentMode">自动扩展</strong></div>
      <div class="input-row">
        <input id="loopInput" placeholder="输入循环任务..." onkeydown="if(event.key==='Enter')startLoop()">
        <button class="exec-btn" onclick="startLoop()">▶ 开始</button>
      </div>
      <div class="controls">
        <span style="font-size:11px;color:var(--text3)">最大迭代:</span>
        <select id="maxIter" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:11px;background:var(--bg);color:var(--text)">
          <option value="3">3次</option><option value="5" selected>5次</option><option value="10">10次</option><option value="0">不限</option>
        </select>
        <button class="pause" onclick="pauseLoop()">⏸ 暂停</button>
        <button class="stop" onclick="stopLoop()">⏹ 停止</button>
      </div>
      <div class="mode-select" style="margin-top:8px;display:flex;gap:8px;align-items:center">
        <span style="font-size:11px;color:var(--text3)">控制模式:</span>
        <select onchange="setControlMode(this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:11px;background:var(--bg);color:var(--text)">
          <option value="auto">全自动</option>
          <option value="semi">半自动(失败时询问)</option>
          <option value="manual">手动(每步确认)</option>
        </select>
      </div>
      <div class="output-box" id="loopOutput"></div>
    </div>
  </div>
</div>
<script>
var _currentMode='auto_expand',_running=false,_paused=false,_iteration=0;
var modeLabels={auto_expand:'自动扩展',refine:'精炼优化',research:'深度研究',debate:'多方辩论'};
var modePrompts={auto_expand:'你正在使用自动扩展循环模式。每次迭代分析上次输出，自动扩展深度和广度，直到目标达成或用户终止。请输出完整、有深度的内容。',refine:'你正在使用精炼优化循环模式。每次迭代基于前一次输出进行改进和优化，聚焦于质量提升。请输出每次迭代的改进点。',research:'你正在使用深度研究循环模式。每次迭代深入一层，需要搜索和分析新信息。请输出你的研究发现。',debate:'你正在使用多方辩论循环模式。需要从多个角度分析问题，生成对立观点，最后综合结论。'};
function selectMode(mode){
  _currentMode=mode;document.querySelectorAll('.loop-card').forEach(function(c){c.classList.remove('active')});
  var card=document.getElementById('mode-'+mode);if(card)card.classList.add('active');
  document.getElementById('currentMode').textContent=modeLabels[mode]||mode;
}
function addLine(iter,msg,cls){
  var out=document.getElementById('loopOutput');out.classList.add('show');
  var line=document.createElement('div');line.className='line';
  line.innerHTML='<span class="iter">['+iter+']</span><span class="msg '+(cls||'')+'">'+msg+'</span>';
  out.appendChild(line);out.scrollTop=out.scrollHeight;
}
async function startLoop(){
  var input=document.getElementById('loopInput'),text=input.value.trim();if(!text)return;
  var maxIter=parseInt(document.getElementById('maxIter').value,10)||999;
  _running=true;_paused=false;_iteration=0;
  var out=document.getElementById('loopOutput');out.innerHTML='';out.classList.add('show');
  addLine('INIT','🚀 开始循环模式: '+modeLabels[_currentMode]+(maxIter<999?' (最多'+maxIter+'次)':''),'success');
  addLine('INIT','📋 任务: '+text,'');
  var lastResult=text;
  while(_running&&_iteration<maxIter){
    if(_paused){await new Promise(function(r){setTimeout(r,500)});continue}
    _iteration++;
    try{
      var sys=modePrompts[_currentMode];
      sys+='\n当前迭代: 第'+_iteration+'次 (共'+(maxIter<999?maxIter:'不限')+'次)';
      if(_iteration>1)sys+='\n上次迭代结果: '+lastResult.slice(0,500);
      addLine(_iteration,'🤖 执行中...','');
      var r=await fetch('/api/v1/smart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,lang:'zh-CN',context:[{role:'system',content:sys}],task_id:'loop_'+Date.now()+'_'+_iteration})});
      var d=await r.json();
      if(d&&d.success){lastResult=d.result||lastResult;addLine(_iteration,'✅ 完成 ('+(d.result||'').slice(0,100)+')','success')}
      else{addLine(_iteration,'❌ 失败: '+(d&&d.detail||r.status),'error');if(maxIter===999)break}
    }catch(e){addLine(_iteration,'❌ 异常: '+e.message,'error');break}
    if(_iteration>=maxIter){addLine('DONE','✅ 循环完成，共'+_iteration+'次迭代','success');break}
    await new Promise(function(r){setTimeout(r,500)})
  }
  _running=false;
}
function pauseLoop(){_paused=!_paused;addLine('CTRL',_paused?'⏸ 已暂停':'▶ 已恢复','')}
function stopLoop(){_running=false;addLine('CTRL','⏹ 已停止','error')}
function setControlMode(mode){addLine('CTRL','🔧 控制模式: {auto:\'全自动\',semi:\'半自动\',manual:\'手动\'}[mode]||mode,'')}
function toggleTheme(){document.body.classList.toggle('dark');try{localStorage.setItem('evo_theme',document.body.classList.contains('dark')?'dark':'light')}catch(e){}}
(function(){try{if(localStorage.getItem('evo_theme')==='dark')document.body.classList.add('dark')}catch(e){};selectMode('auto_expand')})();
</script>
</body>
</html>
