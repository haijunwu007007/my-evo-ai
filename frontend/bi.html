<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BI 仪表盘 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1200px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px}
.row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;flex:1;min-width:200px}
.card h3{font-size:12px;color:var(--text2);margin-bottom:8px}
.card .big{font-size:28px;font-weight:700;color:var(--accent)}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.chart-card h3{font-size:13px;margin-bottom:8px}
.chart-placeholder{height:200px;display:flex;align-items:center;justify-content:center;background:#f8f9fc;border-radius:6px;color:var(--text3);font-size:12px}
.loading{padding:60px;text-align:center;color:var(--text3)}
@media(max-width:768px){body{padding:10px}.card{min-width:100%}}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>📊 BI 仪表盘</h1>
<div class="row" id="summaryRow"><div class="loading">加载中...</div></div>
<div id="chartArea"></div>
<script>
function loadBI(){
  Promise.all([
    fetch('/api/v1/modules').then(function(r){return r.json()}).catch(function(){return{}}),
    fetch('/api/v1/coordinator/status').then(function(r){return r.json()}).catch(function(){return{}})
  ]).then(function(results){
    var modules = results[0].modules||results[0].data||[];
    var status = results[1];
    var moduleCount = modules.length || results[0].total || 0;
    var apiCount = results[0].api_count||0;
    var agentCount = status.active_agents||0;
    
    document.getElementById('summaryRow').innerHTML =
      '<div class="card"><div class="big">'+moduleCount+'</div><div style="font-size:11px;color:var(--text2)">模块总数</div></div>' +
      '<div class="card"><div class="big">'+apiCount+'</div><div style="font-size:11px;color:var(--text2)">API端点</div></div>' +
      '<div class="card"><div class="big">'+agentCount+'</div><div style="font-size:11px;color:var(--text2)">活跃Agent</div></div>' +
      '<div class="card"><div class="big">'+(moduleCount>0?Math.round(moduleCount/10):0)+'</div><div style="font-size:11px;color:var(--text2)">分类数</div></div>';
    
    // 类别分布
    var cats = {};
    modules.forEach(function(m){
      var c = m.category||m.group||'其他';
      cats[c] = (cats[c]||0)+1;
    });
    var catHtml = '<div class="chart-card"><h3>📊 模块类别分布</h3><div class="chart-placeholder">';
    var entries = Object.entries(cats).sort(function(a,b){return b[1]-a[1]});
    var maxVal = entries.length ? entries[0][1] : 1;
    catHtml += '<div style="width:100%;text-align:left">';
    entries.forEach(function(e){
      var pct = (e[1]/maxVal*100).toFixed(0);
      catHtml += '<div style="margin:6px 0;font-size:11px">'+e[0]+' <b>'+e[1]+'</b>';
      catHtml += '<div style="background:#eef0f8;border-radius:4px;height:14px;margin-top:2px"><div style="background:var(--accent);border-radius:4px;height:14px;width:'+pct+'%"></div></div></div>';
    });
    catHtml += '</div></div></div>';
    document.getElementById('chartArea').innerHTML = catHtml;
  }).catch(function(){
    document.getElementById('summaryRow').innerHTML = '<div class="card"><div style="color:#e74c3c">❌ 数据加载失败</div></div>';
  });
}
loadBI();
</script></body></html>
