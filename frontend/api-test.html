<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>API测试 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:var(--bg);--card:#fff;--text:var(--bg);--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--success:#22c55e;--border:var(--border)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1000px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar select,.toolbar input{padding:6px 10px;border-radius:6px;border:1px solid var(--border);font-size:13px}
.toolbar button{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px}
.panel{display:flex;gap:12px;flex-wrap:wrap}
.url-box{flex:1;min-width:300px}
.url-box label{font-size:12px;color:var(--text2);display:block;margin-bottom:3px}
.url-box input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);font-size:13px;font-family:monospace}
textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-family:monospace;resize:vertical;min-height:60px}
.result{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:12px;white-space:pre-wrap;font-size:12px;font-family:monospace;max-height:400px;overflow:auto}
.presets{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.presets button{padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--card);font-size:10px;cursor:pointer}
.presets button:hover{background:var(--accent);color:#fff}
@media(max-width:768px){body{padding:10px}}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>API 测试台</h1>
<div class="presets" id="presets"></div>
<div class="toolbar">
  <select id="method"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select>
  <input id="apiUrl" value="/api/v1/status" style="flex:1;min-width:200px" placeholder="API路径">
  <button onclick="sendReq()">发送</button>
</div>
<div class="panel">
  <div class="url-box"><label>Headers (JSON)</label><textarea id="headers" rows="2">{"Content-Type":"application/json","Accept":"application/json"}</textarea></div>
  <div class="url-box" id="bodyBox"><label>Body (JSON)</label><textarea id="body" rows="2" placeholder='{"key":"value"}'></textarea></div>
</div>
<div class="result" id="result">点击发送查看结果</div>
<script>
// _EVO_LT 加载超时保护 20260713
(function(){var t=setTimeout(function(){var e=document.querySelectorAll('[id*=loading],[class*=loading],.spinner,.loader');e.forEach(function(el){var txt=el.textContent||el.innerText||'';if(txt.indexOf('加载中')>=0){el.textContent=txt.replace('加载中','超时');el.style.color='#ef4444'}})},8000);window.__evolt=t})();
var presets=[['状态','/api/v1/status','GET'],['模块','/api/v1/modules?limit=5','GET'],['技能','/api/v1/skills?limit=5','GET'],
  ['版本','/api/v1/version','GET'],['审计','/api/v1/security/audit?limit=5','GET'],['健康','/api/health','GET']];
presets.forEach(function(p){var b=document.createElement('button');b.textContent=p[0];b.onclick=function(){document.getElementById('apiUrl').value=p[1];document.getElementById('method').value=p[2];sendReq()};document.getElementById('presets').appendChild(b)});

function sendReq(){
  var method=document.getElementById('method').value;
  var url=document.getElementById('apiUrl').value;
  var headers=document.getElementById('headers').value;
  var body=document.getElementById('body').value;
  var result=document.getElementById('result');
  result.textContent='请求中...';
  try{headers=JSON.parse(headers)}catch(e){result.textContent='Headers JSON格式错误';return}
  var opt={method:method,headers:headers};
  if((method==='POST'||method==='PUT')&&body){opt.body=body}
  fetch(url,opt).then(function(r){
    var ct=r.headers.get('content-type')||'';
    result.textContent='状态: '+r.status+' '+r.statusText+'

';
    return ct.includes('json')?r.json().then(function(j){result.textContent+=JSON.stringify(j,null,2)}):r.text().then(function(t){result.textContent+=t.slice(0,5000)});
  }).catch(function(e){result.textContent='请求失败: '+e.message});
}
</script></body></html>
