<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI自媒体运营 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--card)}
.topbar h1{font-size:18px;font-weight:700}
.topbar .back{color:var(--accent);text-decoration:none;font-size:14px}
.container{flex:1;max-width:1000px;margin:0 auto;padding:20px;width:100%}
.step-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.step-grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:var(--text)}
.card p{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6}
label{font-size:13px;font-weight:600;display:block;margin-bottom:4px;color:var(--text2)}
input,select,textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:12px;font-family:inherit}
textarea{min-height:120px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px rgba(67,97,238,.15)}
.platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.platform{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:var(--bg)}
.platform:hover{border-color:var(--accent)}
.platform.selected{border-color:var(--accent);background:rgba(67,97,238,.08)}
.platform input{width:16px;height:16px;margin:0;cursor:pointer}
.platform .ico{font-size:20px}
.platform .nm{font-size:13px}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}
.btn-g{background:#10b981;color:#fff}.btn-g:hover{opacity:.9}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.result-box{display:none;margin-top:16px}
.result-box.show{display:block}
.preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;min-height:200px;white-space:pre-wrap;font-size:14px;line-height:1.8}
.preview img{max-width:100%;border-radius:6px;margin:8px 0}
.status{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;display:none}
.status.ok{display:block;background:rgba(16,185,129,.1);border:1px solid #10b981;color:#10b981}
.status.err{display:block;background:rgba(239,68,68,.1);border:1px solid #ef4444;color:#ef4444}
.status.loading{display:block;background:rgba(67,97,238,.1);border:1px solid var(--accent);color:var(--accent)}
.history-list{margin-top:16px}
.history-item{padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-size:13px}
.history-item .t{color:var(--text3);font-size:11px}
.history-item .ti{font-weight:600;margin:4px 0}
</style></head><body>
<div class="topbar">
  <a href="/" class="back">← 返回</a>
  <h1>✍️ AI自媒体运营</h1>
</div>
<div class="container">
  <div class="step-grid">
    <div class="card">
      <h3>📝 1. 输入主题</h3>
      <p>告诉我你想写什么，AI会生成完整的文章内容和配图建议</p>
      <label>文章主题</label>
      <input id="topic" placeholder="例如：AI Agent 在2026年的发展趋势" value="AI Agent 在2026年的发展趋势">
      <label>风格选择</label>
      <select id="style">
        <option value="专业深度">专业深度（科技媒体风格）</option>
        <option value="通俗易懂">通俗易懂（大众阅读）</option>
        <option value="故事叙述">故事叙述（引人入胜）</option>
        <option value="干货教程">干货教程（实操指南）</option>
      </select>
      <label>字数范围</label>
      <select id="wordCount">
        <option value="短篇">短篇（800-1200字）</option>
        <option value="中篇" selected>中篇（1500-2500字）</option>
        <option value="长篇">长篇（3000-5000字）</option>
      </select>
    </div>
    <div class="card">
      <h3>📤 2. 选择发布平台</h3>
      <p>选择你要发布的平台，AI会适配各平台格式和风格</p>
      <div class="platform-grid" id="platforms">
        <label class="platform selected"><input type="checkbox" value="公众号" checked><span class="ico">💚</span><span class="nm">公众号</span></label>
        <label class="platform"><input type="checkbox" value="知乎"><span class="ico">🔵</span><span class="nm">知乎</span></label>
        <label class="platform"><input type="checkbox" value="小红书"><span class="ico">❤️</span><span class="nm">小红书</span></label>
        <label class="platform"><input type="checkbox" value="CSDN"><span class="ico">🟢</span><span class="nm">CSDN</span></label>
        <label class="platform"><input type="checkbox" value="掘金"><span class="ico">🟠</span><span class="nm">掘金</span></label>
        <label class="platform"><input type="checkbox" value="微博"><span class="ico">📱</span><span class="nm">微博</span></label>
      </div>
      <div class="btn-row">
        <button class="btn btn-p" onclick="generateArticle()">🚀 生成文章</button>
      </div>
    </div>
  </div>

  <div id="status"></div>
  <div class="result-box" id="resultBox">
    <div class="card">
      <h3>📄 生成结果</h3>
      <div class="preview" id="preview">点击「生成文章」开始创作...</div>
      <div class="btn-row">
        <button class="btn btn-g" onclick="publishAll()">📤 发布到所选平台</button>
        <button class="btn btn-o" onclick="copyContent()">📋 复制内容</button>
        <button class="btn btn-o" onclick="regenerate()">🔄 重新生成</button>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h3>📋 发布历史</h3>
    <div class="history-list" id="historyList">
      <p style="color:var(--text3);font-size:13px">暂无发布记录</p>
    </div>
  </div>
</div>

<script>
var _lastArticle = '';

function generateArticle(){
  var topic = document.getElementById('topic').value.trim();
  if(!topic){showStatus('请输入文章主题','err');return}
  showStatus('🤖 AI 正在生成文章...','loading');
  var style = document.getElementById('style').value;
  var wc = document.getElementById('wordCount').value;
  var platforms = Array.from(document.querySelectorAll('#platforms input:checked')).map(function(el){return el.value});
  fetch('/api/v1/social/generate',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({topic:topic,style:style,word_count:wc,platforms:platforms})})
  .then(function(r){return r.json()}).then(function(d){
    if(d.success){
      _lastArticle = d.article;
      document.getElementById('preview').textContent = _lastArticle;
      document.getElementById('resultBox').classList.add('show');
      showStatus('✅ 文章生成完成，共' + (d.word_count||'约') + '字','ok');
    } else {
      showStatus('❌ ' + (d.error||'生成失败'),'err');
    }
  }).catch(function(e){
    showStatus('❌ 网络错误: '+e.message,'err');
  });
}

function publishAll(){
  if(!_lastArticle){showStatus('请先生成文章','err');return}
  var platforms = Array.from(document.querySelectorAll('#platforms input:checked')).map(function(el){return el.value});
  if(!platforms.length){showStatus('请选择至少一个平台','err');return}
  showStatus('📤 正在发布到 ' + platforms.join(', ') + '...','loading');
  fetch('/api/v1/social/publish',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({article:_lastArticle,platforms:platforms,topic:document.getElementById('topic').value})})
  .then(function(r){return r.json()}).then(function(d){
    if(d.success){
      var results = d.results || [];
      var ok = results.filter(function(r){return r.success}).length;
      showStatus('✅ ' + ok + '/' + results.length + ' 平台发布成功','ok');
      loadHistory();
    } else {
      showStatus('❌ ' + (d.error||'发布失败'),'err');
    }
  }).catch(function(e){
    showStatus('❌ 网络错误: '+e.message,'err');
  });
}

function copyContent(){
  if(!_lastArticle)return;
  navigator.clipboard.writeText(_lastArticle).then(function(){
    showStatus('✅ 已复制到剪贴板','ok');
  });
}

function regenerate(){generateArticle()}

function showStatus(msg,type){
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

function loadHistory(){
  fetch('/api/v1/social/history').then(function(r){return r.json()}).then(function(d){
    if(!d.success||!d.history||!d.history.length){
      document.getElementById('historyList').innerHTML = '<p style="color:var(--text3);font-size:13px">暂无发布记录</p>';
      return
    }
    var h = '';
    d.history.slice(0,10).forEach(function(item){
      h += '<div class="history-item"><div class="ti">📄 ' + (item.topic||'') + '</div>';
      h += '<div class="t">📤 ' + (item.platforms||[]).join(', ') + ' | ' + new Date(item.time*1000).toLocaleString() + '</div>';
      h += '<div class="t">' + (item.word_count||'') + '字' + '</div></div>';
    });
    document.getElementById('historyList').innerHTML = h;
  }).catch(function(){});
}
loadHistory();

// Platform checkbox visual
document.querySelectorAll('.platform input').forEach(function(el){
  el.addEventListener('change', function(){
    this.closest('.platform').classList.toggle('selected', this.checked);
  });
});
</script></body></html>
