<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>老婆跳井</title><style>*{margin:0;padding:0;box-sizing:border-box;user-select:none}body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,sans-serif;padding:16px}.wrap{width:100%;max-width:400px;background:#16213e;border-radius:20px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,0.4)}.hd{text-align:center;color:#e2e8f0;font-size:20px;font-weight:700;margin-bottom:2px}.sd{text-align:center;color:#8892b0;font-size:12px;margin-bottom:12px}.row{display:flex;justify-content:space-between;margin-bottom:8px;color:#e2e8f0;font-size:13px}.brd{position:relative;width:100%;aspect-ratio:1;background:#0f3460;border-radius:16px;touch-action:none;cursor:pointer}.brd canvas{width:100%;height:100%;border-radius:16px;touch-action:none}.st{text-align:center;color:#f59e0b;font-size:13px;margin-top:8px;min-height:18px}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.btn{text-align:center;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#4361ee;color:#fff}.btn2{background:#ef4444;color:#fff}a{color:#4361ee;text-decoration:none;font-size:12px;display:block;text-align:center;margin-top:8px}</style></head><body><div class="wrap"><div class="hd">👩 老婆跳井</div><div class="sd">点己方棋子→点空位移动·堵死对方获胜</div><div class="row"><span id="t">🔴 红方走</span><span id="sc">0:0</span></div><div class="brd"><canvas id="c"></canvas></div><div class="st" id="st">红方走</div><div class="btns"><div class="btn" onclick="re()">🔄 重开</div><div class="btn2" onclick="window.location.href='/'">← 返回</div></div></div><script>var ca=document.getElementById('c'),ctx=ca.getContext('2d');var W=400,H=400;ca.width=W;ca.height=H;var R=16,rW=0,rB=0;
// 十字棋盘 5x5 with gaps
var N=4,cell=80,margin=50;
var lines=[[1,0,3,0],[0,1,0,3],[1,4,3,4],[4,1,4,3],[2,0,2,1],[2,3,2,4],[0,2,1,2],[3,2,4,2]];
// Board positions (14 positions)
var pos=[[1,0],[2,0],[3,0],[0,1],[1,1],[2,1],[3,1],[4,1],[1,2],[3,2],[0,3],[1,3],[2,3],[3,3],[4,3],[1,4],[2,4],[3,4]];
var well={x:2,y:2};
var cells=[];
for(var i=0;i<18;i++)cells.push({x:pos[i][0],y:pos[i][1],v:0});
// Init: red at top, blue at bottom
var turn=1,sel=null,over=false;
function init(){
  cells.forEach(c=>{c.v=0});
  cells[0].v=1;cells[1].v=1;cells[2].v=1;cells[7].v=1;cells[8].v=1;
  cells[9].v=2;cells[10].v=2;cells[15].v=2;cells[16].v=2;cells[17].v=2;
  cells[4].v=3; // well
  turn=1;sel=null;over=false;
  document.getElementById('t').textContent='🔴 红方走';document.getElementById('st').textContent='红方走';draw()
}
function getNeighbors(idx){
  var c=cells[idx];var n=[];
  for(var i=0;i<cells.length;i++){
    if(i===idx)continue;
    var o=cells[i];var dx=Math.abs(c.x-o.x),dy=Math.abs(c.y-o.y);
    if((dx===1&&dy===0)||(dx===0&&dy===1))n.push(i)
  }
  return n
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // Lines
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=2;
  lines.forEach(l=>{ctx.beginPath();ctx.moveTo(l[0]*cell+margin,l[1]*cell+margin);ctx.lineTo(l[2]*cell+margin,l[3]*cell+margin);ctx.stroke()});
  // Cells
  cells.forEach((c,i)=>{
    var px=c.x*cell+margin,py=c.y*cell+margin;
    // Well
    if(c.v===3){
      ctx.fillStyle='#4361ee';ctx.beginPath();ctx.arc(px,py,26,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⛰️',px,py+1);return
    }
    // Empty
    ctx.fillStyle='#1e2a4a';ctx.beginPath();ctx.arc(px,py,R,0,Math.PI*2);ctx.fill();
    // Red
    if(c.v===1){ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(px,py,R-2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔴',px,py+1)}
    // Blue
    if(c.v===2){ctx.fillStyle='#4361ee';ctx.beginPath();ctx.arc(px,py,R-2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔵',px,py+1)}
    // Selected
    if(sel===i&&(c.v===1||c.v===2)){ctx.strokeStyle='#f59e0b';ctx.lineWidth=3;ctx.beginPath();ctx.arc(px,py,R+5,0,Math.PI*2);ctx.stroke()}
  })
}
function click(e){
  if(over)return;
  var rect=ca.getBoundingClientRect();var sx=(e.clientX||(e.touches?e.touches[0].clientX:0))-rect.left;
  var sy=(e.clientY||(e.touches?e.touches[0].clientY:0))-rect.top;
  if(sx<0||sy<0)return;
  var scaleX=W/rect.width,scaleY=H/rect.height;sx*=scaleX;sy*=scaleY;
  var hit=-1,minD=40;
  cells.forEach((c,i)=>{var d=Math.hypot(sx-(c.x*cell+margin),sy-(c.y*cell+margin));if(d<minD){minD=d;hit=i}});
  if(hit<0||hit===4)return; // well not clickable
  var cv=cells[hit].v;
  // Select own piece
  if(cv===turn){sel=hit;draw();return}
  // Move selected
  if(sel>=0&&cv===0){
    var valid=false,nbrs=getNeighbors(sel);
    for(var i=0;i<nbrs.length;i++){if(nbrs[i]===hit){valid=true;break}}
    if(valid){
      cells[hit].v=turn;cells[sel].v=0;
      // Check if opponent can move
      var opp=turn===1?2:1;var canMove=false;
      cells.forEach((c,i)=>{if(c.v===opp){var nn=getNeighbors(i);for(var j=0;j<nn.length;j++){if(cells[nn[j]].v===0){canMove=true;break}}}});
      if(!canMove){
        over=true;
        if(turn===1){rW++;document.getElementById('st').textContent='🎉 红方胜！'}else{rB++;document.getElementById('st').textContent='🎉 蓝方胜！'}
        document.getElementById('sc').textContent=rW+':'+rB;document.getElementById('t').textContent='🏁 结束'
      }else{turn=opp}
      document.getElementById('t').textContent=(turn===1?'🔴 红方走':'🔵 蓝方走');
      if(!over)document.getElementById('st').textContent=(turn===1?'红方走':'蓝方走');
      sel=null;draw()
    }
  }
}
ca.addEventListener('click',click);ca.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];click({clientX:t.clientX,clientY:t.clientY})},{passive:false});
function re(){init();document.getElementById('sc').textContent=rW+':'+rB}
init()</script></body></html>
