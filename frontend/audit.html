<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>审计日志 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--border:#e8eaed;--glass:rgba(255,255,255,.7)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1000px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:6px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;background:var(--card);color:var(--text)}
.filter-bar button{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:12px}
th{background:#f0f0f4;color:var(--text2);font-weight:600}
tr:hover{background:#f8f9fc}
.badge{padding:2px 6px;border-radius:4px;font-size:10px}
.badge.ok{background:#dcfce7;color:#166534}
.badge.warn{background:#fef9c3;color:#854d0e}
.badge.err{background:#fee2e2;color:#991b1b}
.loading{padding:40px;text-align:center;color:var(--text3)}
.pagination{display:flex;gap:8px;margin-top:12px;justify-content:center}
.pagination button{padding:4px 12px;border-radius:5px;border:1px solid var(--border);background:var(--card);cursor:pointer}
.pagination button:hover{background:var(--accent);color:#fff}
@media(max-width:768px){
  body{padding:10px}
  h1{font-size:18px}
  th,td{padding:6px 8px;font-size:11px}
  table{display:block;overflow-x:auto}
}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>📋 审计日志</h1>
<div class="filter-bar">
  <select id="sevFilter"><option value="">全部级别</option><option value="info">信息</option><option value="warning">警告</option><option value="error">错误</option></select>
  <input id="searchInput" placeholder="搜索操作/用户..." onkeydown="if(event.key==='Enter')loadAudit()">
  <button onclick="loadAudit()">🔍 搜索</button>
  <button onclick="loadAudit()" style="background:transparent;color:var(--text2);border:1px solid var(--border)">🔄 刷新</button>
</div>
<div id="auditContent"><div class="loading">加载中...</div></div>
<div class="pagination" id="pagination"></div>
<script>
var _page=0,_limit=50;
function loadAudit(){
  var sev=document.getElementById('sevFilter').value;
  var q=document.getElementById('searchInput').value;
  var url='/api/v1/security/audit?limit='+_limit;
  if(sev)url+='&severity='+sev;
  if(q)url+='&search='+encodeURIComponent(q);
  document.getElementById('auditContent').innerHTML='<div class="loading">加载中...</div>';
  fetch(url).then(function(r){return r.json()}).then(function(j){
    var logs=j.audit_log||j.logs||j.data||[];
    var h='<table><tr><th>时间</th><th>级别</th><th>操作</th><th>用户</th><th>详情</th></tr>';
    for(var i=0;i<logs.length;i++){
      var l=logs[i];
      var t=l.time||l.timestamp||l.created_at||'-';
      var s=l.level||l.severity||'info';
      var cls=s==='error'?'err':s==='warning'?'warn':'ok';
      var a=l.action||l.operation||l.event||'-';
      var u=l.user||l.username||l.actor||'-';
      var d=l.detail||l.message||l.description||JSON.stringify(l).slice(0,100);
      h+='<tr><td>'+t+'</td><td><span class="badge '+cls+'">'+s+'</span></td><td>'+a+'</td><td>'+u+'</td><td>'+d+'</td></tr>';
    }
    h+='</table>';
    if(!logs.length)h='<div style="padding:40px;text-align:center;color:var(--text3)">暂无审计日志</div>';
    document.getElementById('auditContent').innerHTML=h;
    document.getElementById('pagination').innerHTML='';
  }).catch(function(){
    document.getElementById('auditContent').innerHTML='<div class="loading" style="color:#e74c3c">加载失败，API不可用</div>';
  });
}
loadAudit();
</script></body></html>
