<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>对话创建技能 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
.topbar h1{font-size:18px;display:flex;align-items:center;gap:8px}
.topbar .sub{font-size:12px;color:var(--text2)}
.back{color:var(--accent);text-decoration:none;font-size:14px;padding:4px 10px;border-radius:6px}
.back:hover{background:var(--glass)}
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;max-width:800px;margin:0 auto;width:100%}
.msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.bot .step{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px;background:var(--glass);color:var(--text2)}
.msg.bot .step.done{background:rgba(16,185,129,.15);color:#10b981}
.msg.bot .step.active{background:rgba(67,97,238,.15);color:var(--accent)}
.preview{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:8px;font-size:13px}
.preview h4{font-size:13px;color:var(--accent);margin-bottom:6px}
.preview pre{background:var(--bg);border-radius:6px;padding:10px;font-size:12px;overflow-x:auto;margin-top:6px}
.preview .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--glass);color:var(--text2);margin:2px}
.input-area{flex-shrink:0;padding:12px 20px 16px;border-top:1px solid var(--border);background:var(--card)}
.input-row{display:flex;gap:8px;max-width:800px;margin:0 auto}
.input-row input{flex:1;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none}
.input-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.input-row button{padding:12px 24px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer;font-weight:600;white-space:nowrap}
.input-row button:hover{opacity:.9}
.input-row button:disabled{opacity:.5;cursor:not-allowed}
.tips{display:flex;gap:8px;flex-wrap:wrap;padding:8px 0 0;max-width:800px;margin:0 auto}
.tip{padding:4px 12px;border-radius:16px;font-size:12px;color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.tip:hover{border-color:var(--accent);color:var(--accent)}
.spacer{flex:1}
.loading{display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid var(--text3);border-top-color:var(--accent);animation:spin .8s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.chat-area{padding:10px 12px}.msg{font-size:15px;max-width:92%}.input-area{padding:8px 12px 12px}}
</style></head><body>
<div class="topbar">
  <div><h1>💬 对话创建技能 <span class="sub">说句话，AI帮你生成可执行技能</span></h1></div>
  <a href="/skills" class="back-btn">← 返回技能</a>
</div>
<div class="chat-area" id="chatArea">
  <div class="msg bot">👋 你好！描述你想创建的技能，AI会自动生成。</div>
  <div class="msg bot">比如：<br>• <em>"创建一个能搜索GitHub热门项目的技能"</em><br>• <em>"帮我做一个自动总结网页内容的工具"</em><br>• <em>"创建一个翻译助手，输入中文输出英文"</em></div>
</div>
<div class="input-area">
  <div class="input-row">
    <input id="input" placeholder="描述你想要创建的技能..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){send();event.preventDefault()}">
    <button id="sendBtn" onclick="send()">✨ 创建</button>
  </div>
  <div class="tips">
    <span class="tip" onclick="quick('创建一个GitHub Trending搜索技能')">🌐 GitHub搜索</span>
    <span class="tip" onclick="quick('创建一个网页内容摘要提取工具')">📝 网页摘要</span>
    <span class="tip" onclick="quick('创建一个中英文翻译助手')">🌍 翻译助手</span>
    <span class="tip" onclick="quick('创建一个PDF转Markdown转换器')">📄 PDF转MD</span>
    <span class="tip" onclick="quick('创建一个每日新闻简报生成工具')">📰 新闻简报</span>
  </div>
</div>
<script>
var _creating = false;

function quick(text){
  document.getElementById('input').value = text;
  send();
}

async function send(){
  if(_creating) return;
  var input = document.getElementById('input');
  var text = input.value.trim();
  if(!text) return;
  input.value = '';
  _creating = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('sendBtn').textContent = '⏳ 生成中...';

  var chat = document.getElementById('chatArea');
  chat.innerHTML += '<div class="msg user">' + escHtml(text) + '</div>';
  chat.innerHTML += '<div class="msg bot" id="statusMsg"><span class="loading"></span> AI 正在分析你的需求...</div>';
  chat.scrollTop = chat.scrollHeight;

  try{
    var r = await fetch('/api/v1/skills/create-from-chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({description:text})
    });
    var d = await r.json();
    var statusEl = document.getElementById('statusMsg');

    if(d.success){
      var html = '✅ <strong>技能创建成功！</strong><br><br>';
      html += '<div class="preview">';
      html += '<h4>🛠️ ' + escHtml(d.skill.name) + '</h4>';
      html += '<p style="color:var(--text2);font-size:13px;margin-bottom:8px">' + escHtml(d.skill.description) + '</p>';
      if(d.skill.tags && d.skill.tags.length){
        html += '<div>' + d.skill.tags.map(function(t){return '<span class="tag">#'+escHtml(t)+'</span>'}).join('') + '</div>';
      }
      html += '<h4 style="margin-top:10px">📋 执行步骤</h4>';
      html += '<pre>' + escHtml(d.skill.steps_text) + '</pre>';
      html += '</div>';
      html += '<br><button onclick="window.location.href=\'/skills\'" style="padding:8px 20px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px">📂 在技能管理中查看</button>';
      statusEl.innerHTML = html;
    } else {
      statusEl.innerHTML = '❌ 创建失败：' + escHtml(d.error || '未知错误');
    }
  } catch(e){
    document.getElementById('statusMsg').innerHTML = '❌ 网络错误：' + escHtml(e.message);
  }

  _creating = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').textContent = '✨ 创建';
  chat.scrollTop = chat.scrollHeight;
}

function escHtml(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script></body></html>
