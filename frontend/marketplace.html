<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>插件市场 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1200px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stats{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;flex:1;min-width:100px}
.stat-box .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat-box .label{font-size:11px;color:var(--text2)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input{flex:1;padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;min-width:200px}
.filter-bar select{padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;transition:all .2s}
.card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(67,97,238,.1)}
.card h3{font-size:13px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .desc{font-size:11px;color:var(--text2);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:10px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap}
.card .tag{display:inline-block;padding:1px 5px;border-radius:3px;background:#eef0f8;color:var(--text2);font-size:9px}
.loading{padding:60px;text-align:center;color:var(--text3)}
.empty{text-align:center;padding:60px;color:var(--text3)}
@media(max-width:768px){
  body{padding:10px};h1{font-size:18px}
  .grid{grid-template-columns:1fr}
  .filter-bar input{min-width:auto}
}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>🧩 模块市场 <span style="font-size:14px;color:var(--text3)" id="totalCount">加载中...</span></h1>
<div class="stats" id="stats"></div>
<div class="filter-bar">
  <input id="search" placeholder="搜索模块名称..." oninput="filterModules()">
  <select id="catFilter" onchange="filterModules()"><option value="">全部类别</option></select>
</div>
<div class="grid" id="grid"><div class="loading">正在扫描 583 个模块...</div></div>
<script>
var _allModules = [];

function loadModules(){
  fetch('/api/v1/modules').then(function(r){return r.json()}).then(function(j){
    var modules = j.modules || j.data || [];
    if(!modules.length && j.total) modules = j; // 扁平
    if(modules.length){
      _allModules = modules;
      renderAll();
    }else{
      // 尝试按类别加载
      var cats = ['AI & Agent','企业 & 自动化','数据 & 分析','开发 & 部署','BGOS','系统核心','其他'];
      var promises = cats.map(function(c){return fetch('/api/v1/modules?category='+encodeURIComponent(c)).then(function(r){return r.json()})});
      Promise.all(promises).then(function(results){
        _allModules = [];
        for(var i=0;i<results.length;i++){
          var ms = results[i].modules||results[i].data||[];
          ms.forEach(function(m){_allModules.push(m)});
        }
        renderAll();
      });
    }
  }).catch(function(){
    document.getElementById('grid').innerHTML='<div class="empty">❌ 加载失败</div>';
  });
}

function renderAll(){
  // 统计类别
  var catCount = {};
  _allModules.forEach(function(m){
    var c = m.category||m.group||'其他';
    catCount[c] = (catCount[c]||0)+1;
  });
  
  var statsHtml = '<div class="stat-box"><div class="num">'+_allModules.length+'</div><div class="label">模块总数</div></div>';
  var topCats = Object.entries(catCount).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  topCats.forEach(function(c){
    statsHtml += '<div class="stat-box"><div class="num">'+c[1]+'</div><div class="label">'+c[0]+'</div></div>';
  });
  document.getElementById('stats').innerHTML = statsHtml;
  document.getElementById('totalCount').textContent = '共 ' + _allModules.length + ' 个模块';
  
  // 填充类别筛选
  var sel = document.getElementById('catFilter');
  Object.keys(catCount).sort().forEach(function(c){
    var opt = document.createElement('option');
    opt.value = c; opt.textContent = c + ' (' + catCount[c] + ')';
    sel.appendChild(opt);
  });
  
  filterModules();
}

function filterModules(){
  var q = document.getElementById('search').value.toLowerCase();
  var cat = document.getElementById('catFilter').value;
  var filtered = _allModules.filter(function(m){
    var n = (m.name||m.module||'').toLowerCase();
    var d = (m.description||'').toLowerCase();
    var matchName = n.indexOf(q) >= 0 || d.indexOf(q) >= 0;
    var matchCat = !cat || (m.category||m.group) === cat;
    return matchName && matchCat;
  });
  
  if(!filtered.length){
    document.getElementById('grid').innerHTML = '<div class="empty">没有匹配的模块</div>';
    return;
  }
  
  var h = '';
  filtered.forEach(function(m){
    var name = m.name||m.module||'未知';
    var desc = m.description||'';
    var cat = m.category||m.group||'其他';
    var grade = m.grade||m.level||'B';
    var size = m.size||m.filesize||'';
    h += '<div class="card"><h3>'+name+'</h3>';
    h += '<div class="desc">'+desc.slice(0,120)+'</div>';
    h += '<div class="meta"><span class="tag">'+cat+'</span><span class="tag">Grade '+grade+'</span>';
    if(size) h += '<span>'+size+'</span>';
    h += '</div></div>';
  });
  document.getElementById('grid').innerHTML = h;
}

loadModules();
</script></body></html>
