<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>房贷计算器 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;min-height:100vh}
h1{font-size:22px;margin-bottom:6px}.sub{color:var(--text2);font-size:14px;margin-bottom:20px}
.back{display:inline-block;margin-bottom:16px;color:var(--accent);text-decoration:none;font-size:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:500px;margin-bottom:16px}
.card h3{font-size:15px;margin-bottom:12px}
.row{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.row label{font-size:13px;color:var(--text2);min-width:60px}
.row input{flex:1;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px}
.row select{flex:1;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:500px}
.result-card .item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.result-card .item:last-child{border:none}
.result-card .val{font-weight:700;color:var(--accent);font-size:16px}
</style></head><body>
<a href="/" class="back">← 返回</a>
<h1>🏠 房贷计算器</h1>
<p class="sub">输入房价和贷款信息，自动计算月供和总利息</p>
<div class="card">
  <div class="row"><label>🏠 房价</label><input id="total" type="number" placeholder="2000000" value="2000000"><span style="font-size:12px;color:var(--text3)">元</span></div>
  <div class="row"><label>💰 首付</label><input id="down" type="number" placeholder="600000" value="600000"><span style="font-size:12px;color:var(--text3)">元</span></div>
  <div class="row"><label>📅 年限</label><select id="years"><option value="10">10年</option><option value="20">20年</option><option value="30" selected>30年</option></select></div>
  <div class="row"><label>📊 利率</label><input id="rate" type="number" step="0.05" placeholder="3.85" value="3.85"><span style="font-size:12px;color:var(--text3)">%</span></div>
  <button class="btn btn-p" onclick="calc()">计算</button>
</div>
<div id="result" style="display:none" class="result-card"></div>
<script>
function calc(){
  var total=parseFloat(document.getElementById('total').value)||0;
  var down=parseFloat(document.getElementById('down').value)||0;
  var years=parseInt(document.getElementById('years').value)||30;
  var rate=parseFloat(document.getElementById('rate').value)||3.85;
  var loan=total-down;
  if(loan<=0){alert('贷款金额必须大于0');return}
  var mr=rate/100/12;var n=years*12;
  var mp=loan*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);
  var totalInt=mp*n-loan;
  var totalPay=mp*n;
  document.getElementById('result').style.display='block';
  document.getElementById('result').innerHTML='<div class="item"><span>🏠 房屋总价</span><span class="val">¥'+total.toLocaleString()+'</span></div><div class="item"><span>💰 贷款金额</span><span class="val">¥'+loan.toLocaleString()+'</span></div><div class="item"><span>📅 贷款年限</span><span class="val">'+years+'年</span></div><div class="item"><span>📊 年利率</span><span class="val">'+rate+'%</span></div><div class="item"><span>📆 月供</span><span class="val" style="color:#10b981;font-size:20px">¥'+mp.toFixed(2)+'</span></div><div class="item"><span>💸 总利息</span><span class="val" style="color:#ef4444">¥'+totalInt.toFixed(2)+'</span></div><div class="item"><span>📋 总还款额</span><span class="val">¥'+totalPay.toFixed(2)+'</span></div>';
}
calc();
</script></body></html>
