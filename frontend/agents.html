<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent集群 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--success:#22c55e;--warn:#f59e0b;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1200px;margin:0 auto}
h1{font-size:22px;margin-bottom:6px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stats .s{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;flex:1;min-width:80px}
.stats .s .n{font-size:22px;font-weight:700;color:var(--accent)}
.stats .s .l{font-size:11px;color:var(--text2)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input{flex:1;padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;min-width:200px}
.filter-bar select{padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .2s}
.card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(67,97,238,.1)}
.card h3{font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.card .desc{font-size:11px;color:var(--text2);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:10px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.badge{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.badge.on{background:#dcfce7;color:#166534}
.badge.off{background:#f3f4f6;color:#6b7280}
.badge.err{background:#fee2e2;color:#991b1b}
.tag{background:#eef0f8;padding:1px 5px;border-radius:3px;font-size:9px}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.actions button{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);font-size:11px;cursor:pointer;transition:all .1s}
.actions button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.actions .d{background:var(--card)}.actions .d:hover{background:#e74c3c;border-color:#e74c3c}
.loading{padding:60px;text-align:center;color:var(--text3)}
.empty{text-align:center;padding:60px;color:var(--text3)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-card{background:var(--card);border-radius:10px;padding:20px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.modal-card h2{font-size:16px;margin-bottom:10px}
.modal-card pre{background:#f3f4f6;padding:10px;border-radius:6px;font-size:12px;overflow-x:auto;white-space:pre-wrap;margin-top:8px}
@media(max-width:768px){body{padding:10px;}.grid{grid-template-columns:1fr}}
</style></head><body>
<h1>🤖 Agent 集群 <span style="font-size:14px;color:var(--text3)" id="totalCount">加载中...</span></h1>
<div class="sub">管理全部 Agent 模块，查看状态、执行任务、监控日志</div>
<div class="stats" id="stats"></div>
<div class="filter-bar">
  <input id="search" placeholder="搜索Agent名称..." oninput="filterAgents()">
  <select id="statusFilter" onchange="filterAgents()"><option value="">全部状态</option><option value="ok">正常</option><option value="error">异常</option></select>
  <button onclick="loadAgents()" style="padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer">🔄 刷新</button>
</div>
<div class="grid" id="grid"><div class="loading">正在加载 Agent 列表...</div></div>
<div class="modal" id="modal"><div class="modal-card" id="modalContent"></div></div>
<script>
var _agents = [];

function loadAgents(){
  document.getElementById('grid').innerHTML = '<div class="loading">正在加载...</div>';
  
  // Try registry first, fallback to modules
  Promise.all([
    fetch('/api/v1/agents/registry').then(function(r){return r.json().catch(function(){return {}})}),
    fetch('/api/v1/modules').then(function(r){return r.json().catch(function(){return {}})})
  ]).then(function(results){
    var agentList = results[0].agents || results[0].data || [];
    var modules = results[1].modules || results[1].data || [];
    
    // Merge: show modules as agents if no registry data
    if(agentList.length === 0){
      modules.forEach(function(m){
        if(m.name && m.name.toLowerCase().indexOf('agent') >= 0){
          agentList.push({name: m.name, version: m.version||'', status: 'ok', description: m.description||''});
        }
      });
    }
    
    // If still empty, show all agent_* module files
    if(agentList.length === 0){
      var agentNames = ['agent_apollo','agent_athena','agent_boreas','agent_cronus','agent_demeter','agent_eros','agent_hecate','agent_hephaestus','agent_hera','agent_hermes','agent_iris','agent_market','agent_marketplace','agent_mas','agent_minerva','agent_nemesis','agent_orchestrator','agent_phoebus','agent_planner','agent_poseidon','agent_resource_control','agent_s_bridge','agent_themis'];
      agentNames.forEach(function(n){
        agentList.push({name: n, status: 'ok', description: n.replace('agent_','').toUpperCase() + ' Agent'});
      });
    }
    
    _agents = agentList;
    renderAgents();
  }).catch(function(){
    document.getElementById('grid').innerHTML = '<div class="empty">Failed to load agents</div>';
  });
}

function renderAgents(){
  var statsHtml = '<div class="s"><div class="n">'+_agents.length+'</div><div class="l">Agent总数</div></div>';
  var okCount = _agents.filter(function(a){return (a.status||'ok')==='ok'||(a.status||'ok')==='running'}).length;
  statsHtml += '<div class="s"><div class="n">'+okCount+'</div><div class="l">正常</div></div>';
  statsHtml += '<div class="s"><div class="n">'+(_agents.length-okCount)+'</div><div class="l">异常/离线</div></div>';
  document.getElementById('stats').innerHTML = statsHtml;
  document.getElementById('totalCount').textContent = _agents.length + ' 个 Agent';
  filterAgents();
}

function filterAgents(){
  var q = document.getElementById('search').value.toLowerCase();
  var st = document.getElementById('statusFilter').value;
  var filtered = _agents;
  if(q) filtered = filtered.filter(function(a){return (a.name||'').toLowerCase().indexOf(q)>=0||(a.description||'').toLowerCase().indexOf(q)>=0});
  if(st) filtered = filtered.filter(function(a){return (a.status||'ok')===st});
  
  if(!filtered.length){document.getElementById('grid').innerHTML='<div class="empty">无匹配Agent</div>';return}
  
  var h = '';
  filtered.forEach(function(a){
    var name = a.name||'unknown';
    var desc = a.description||a.summary||'';
    var status = a.status||'ok';
    var version = a.version||'';
    var cls = status==='ok'||status==='running'?'on':status==='error'?'err':'off';
    var label = status==='ok'||status==='running'?'运行中':status==='error'?'异常':'离线';
    h += '<div class="card"><h3>'+name+' <span class="badge '+cls+'">'+label+'</span></h3>';
    h += '<div class="desc">'+desc.slice(0,120)+'</div>';
    h += '<div class="meta">';
    if(version) h += '<span class="tag">v'+version+'</span>';
    h += '</div><div class="actions">';
    h += '<button onclick="execAgent(\''+name+'\')">▶ 执行</button>';
    h += '<button onclick="healthAgent(\''+name+'\')">❤️ 健康</button>';
    h += '<button onclick="viewCode(\''+name+'\')">📄 代码</button>';
    h += '</div></div>';
  });
  document.getElementById('grid').innerHTML = h;
}

function execAgent(name){
  showModal('<h2>执行 Agent: '+name+'</h2><p>输入参数</p><textarea id="execArgs" style="width:100%;height:80px;border:1px solid var(--border);border-radius:6px;padding:8px;font-size:13px" placeholder=\'{}\'></textarea><div style="display:flex;gap:8px;margin-top:8px"><button onclick="doExec(\''+name+'\')" style="padding:8px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer">发送</button><button onclick="closeModal()" style="padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer">取消</button></div><pre id="execResult" style="display:none;background:#f3f4f6;padding:10px;border-radius:6px;margin-top:8px"></pre>');
}

function doExec(name){
  var args = document.getElementById('execArgs').value;
  try{args=JSON.parse(args)}catch(e){}
  document.getElementById('execResult').style.display='block';
  document.getElementById('execResult').textContent='执行中...';
  fetch('/api/v1/modules/'+name+'/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({args:args})}).then(function(r){return r.text()}).then(function(t){document.getElementById('execResult').textContent=t});
}

function healthAgent(name){
  fetch('/api/v1/modules/'+name+'/health').then(function(r){return r.json()}).then(function(j){
    showModal('<h2>❤️ '+name+' 健康检查</h2><pre>'+JSON.stringify(j,null,2)+'</pre><button onclick="closeModal()" style="margin-top:8px;padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer">关闭</button>');
  });
}

function viewCode(name){
  fetch('/api/v1/modules/'+name+'/code').then(function(r){return r.text()}).then(function(t){
    showModal('<h2>📄 '+name+' 源码</h2><pre style="max-height:500px;overflow-y:auto">'+t.slice(0,3000)+'...</pre><button onclick="closeModal()" style="margin-top:8px;padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer">关闭</button>');
  });
}

function showModal(html){
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').onclick=function(e){if(e.target===this)closeModal()};

loadAgents();
</script></body></html>
