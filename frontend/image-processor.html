<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI图片处理 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;min-height:100vh}
.top{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--card)}
.top h1{font-size:18px}.top a{color:var(--accent);text-decoration:none;font-size:14px}
.c{max-width:900px;margin:0 auto;padding:20px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}
.btn-s{background:#10b981;color:#fff}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;text-align:center}
.card h3{font-size:14px;margin-bottom:8px;color:var(--accent)}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.upload-zone:hover{border-color:var(--accent);background:var(--glass)}
.upload-zone .ico{font-size:40px;margin-bottom:8px}
.preview{max-width:100%;max-height:300px;border-radius:8px;margin:8px 0}
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.action-btn{padding:16px 8px;border-radius:10px;border:1px solid var(--border);background:var(--card);text-align:center;cursor:pointer;transition:all .2s;font-size:13px}
.action-btn:hover{border-color:var(--accent);transform:translateY(-1px)}
.action-btn .ico{font-size:24px;margin-bottom:4px}
.hidden{display:none}
select{padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
</style></head><body>
<div class="top"><a href="/">←</a><h1>📸 AI图片处理</h1></div>
<div class="c">
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="ico">🖼️</div>
    <div style="font-size:14px;font-weight:600">点击上传图片</div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">支持 JPG/PNG/WebP</div>
    <input id="fileInput" type="file" accept="image/*" class="hidden" onchange="loadFile(this)">
  </div>
  <div id="previewArea" class="hidden">
    <div class="card"><img id="preview" class="preview"><div id="fileInfo" style="font-size:12px;color:var(--text3);margin-top:4px"></div></div>
    <div class="action-grid">
      <div class="action-btn" onclick="process('remove-bg')"><div class="ico">🎨</div>去背景</div>
      <div class="action-btn" onclick="process('compress')"><div class="ico">📦</div>压缩</div>
      <div class="action-btn" onclick="process('resize')"><div class="ico">📐</div>调整尺寸</div>
      <div class="action-btn" onclick="process('watermark')"><div class="ico">💧</div>加水印</div>
      <div class="action-btn" onclick="process('grayscale')"><div class="ico">⚫</div>黑白</div>
      <div class="action-btn" onclick="process('enhance')"><div class="ico">✨</div>增强</div>
    </div>
    <div id="resultArea" class="hidden"></div>
  </div>
</div>
<script>
var _currentFile=null;
function loadFile(el){
  if(!el.files||!el.files[0])return;
  _currentFile=el.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    document.getElementById('preview').src=e.target.result;
    document.getElementById('fileInfo').textContent=_currentFile.name+' | '+( _currentFile.size/1024).toFixed(1)+'KB';
    document.getElementById('previewArea').classList.remove('hidden');
    document.getElementById('resultArea').classList.add('hidden');
  };
  reader.readAsDataURL(_currentFile);
}
function process(action){
  if(!_currentFile){alert('请先上传图片');return}
  var el=document.getElementById('resultArea');el.classList.remove('hidden');
  el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text2)">⏳ 处理中...</div>';
  var fd=new FormData();fd.append('file',_currentFile);fd.append('action',action);
  fetch('/api/v1/image/process',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){
    if(d.success){
      el.innerHTML='<div class="card"><h3>✅ 处理完成</h3><p style="font-size:13px;color:var(--text2)">'+d.message+'</p>'
        +(d.data_url?'<img src="'+d.data_url+'" class="preview" style="margin-top:8px">':'')
        +(d.download_url?'<br><a href="'+d.download_url+'" class="btn btn-s" style="display:inline-block;margin-top:8px;text-decoration:none">⬇ 下载</a>':'')
        +'</div>';
    }else{el.innerHTML='<div style="color:#ef4444">❌ '+d.error+'</div>'}
  }).catch(function(){el.innerHTML='<div style="color:#ef4444">❌ 处理失败</div>'});
}
</script></body></html>
