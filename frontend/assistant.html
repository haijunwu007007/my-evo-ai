<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI个人秘书 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--card)}
.topbar h1{font-size:18px;font-weight:700}
.topbar .back{color:var(--accent);text-decoration:none;font-size:14px}
.container{max-width:900px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card .val{font-size:28px;font-weight:700;color:var(--accent)}
.card .sub{font-size:12px;color:var(--text2);margin-top:4px}
.card p{font-size:13px;color:var(--text2);line-height:1.6}
input,select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:10px}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}
.btn-g{background:#10b981;color:#fff}.btn-g:hover{opacity:.9}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border)}
.msg-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;min-height:100px;margin-bottom:12px;overflow-y:auto;max-height:200px;font-size:14px;line-height:1.6}
.reminder-list{list-style:none}
.reminder-list li{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.reminder-list .time{color:var(--text3);font-size:11px}
.reminder-list .del{cursor:pointer;color:#ef4444;font-size:12px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
</style></head><body>
<div class="topbar">
  <a href="/" class="back">← 返回</a>
  <h1>🤖 AI个人秘书</h1>
</div>
<div class="container">
  <!-- 快捷卡片 -->
  <div class="grid">
    <div class="card"><h3>🌤️ 天气</h3><div class="val" id="weatherVal">--°C</div><div class="sub" id="weatherSub">获取中...</div></div>
    <div class="card"><h3>⏰ 当前时间</h3><div class="val" id="timeVal">--:--</div><div class="sub" id="timeSub">--</div></div>
    <div class="card"><h3>📅 日程</h3><div class="val" id="tasksVal">0</div><div class="sub">今日待办</div></div>
    <div class="card"><h3>🔔 提醒</h3><div class="val" id="remindVal">0</div><div class="sub">待处理提醒</div></div>
  </div>

  <!-- 语音/对话 -->
  <div class="card" style="margin-bottom:12px">
    <h3>🎤 AI对话</h3>
    <p>输入你的需求，AI会帮你完成（设置提醒、查天气、管理日程等）</p>
    <div class="msg-box" id="chatBox">你好！我是你的AI秘书，有什么可以帮你的？</div>
    <div class="row">
      <input id="chatInput" placeholder="例如：明天上午9点提醒我开会" style="flex:1;margin:0" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="btn btn-p" onclick="sendMsg()">发送</button>
      <button class="btn btn-o" id="voiceBtn" onclick="startVoice()">🎤</button>
    </div>
  </div>

  <!-- 提醒列表 -->
  <div class="card">
    <h3>📋 提醒列表</h3>
    <div class="row" style="margin-bottom:10px">
      <input id="remindText" placeholder="提醒内容" style="flex:1;margin:0">
      <input id="remindTime" type="datetime-local" style="width:auto;flex-shrink:0">
      <button class="btn btn-g" onclick="addReminder()">添加</button>
    </div>
    <ul class="reminder-list" id="reminderList"><li style="color:var(--text3);font-size:12px">暂无提醒</li></ul>
  </div>
</div>

<script>
// 时间更新
function updTime(){
  var n=new Date();
  document.getElementById('timeVal').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  document.getElementById('timeSub').textContent=n.toLocaleDateString('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
setInterval(updTime,1000);updTime();

// 天气
fetch('/api/v1/assistant/weather').then(function(r){return r.json()}).then(function(d){
  if(d.success){document.getElementById('weatherVal').textContent=d.temperature+'°C';document.getElementById('weatherSub').textContent=d.weather+' | '+d.city}
}).catch(function(){});

// 对话
function sendMsg(){
  var input=document.getElementById('chatInput'),msg=input.value.trim();
  if(!msg)return;
  var box=document.getElementById('chatBox');
  box.innerHTML+='<div style="color:var(--accent);margin-top:6px"><b>👤 你:</b> '+msg+'</div>';
  input.value='';
  box.innerHTML+='<div style="color:var(--text2);margin-top:4px"><b>🤖 秘书:</b> 思考中...</div>';
  box.scrollTop=box.scrollHeight;
  fetch('/api/v1/assistant/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})})
  .then(function(r){return r.json()}).then(function(d){
    box.innerHTML=box.innerHTML.replace('思考中...',d.reply||'好的，已记录');
    // 自动检查提醒
    if(d.reminder){loadReminders()}
    if(d.task_update){loadTasks()}
    box.scrollTop=box.scrollHeight;
  }).catch(function(){});
}

// 提醒
function loadReminders(){
  fetch('/api/v1/assistant/reminders').then(function(r){return r.json()}).then(function(d){
    if(!d.success||!d.reminders||!d.reminders.length){
      document.getElementById('reminderList').innerHTML='<li style="color:var(--text3);font-size:12px">暂无提醒</li>';
      document.getElementById('remindVal').textContent='0';return
    }
    var h='';var now=Date.now()/1000;var pend=0;
    d.reminders.forEach(function(r,i){
      if(r.time>now&&r.time<now+86400)pend++;
      h+='<li><span>'+r.text+' <span class="time">'+new Date(r.time*1000).toLocaleString()+'</span></span><span class="del" onclick="delReminder('+i+')">✕</span></li>';
    });
    document.getElementById('reminderList').innerHTML=h;
    document.getElementById('remindVal').textContent=pend;
  }).catch(function(){});
}
function addReminder(){
  var text=document.getElementById('remindText').value.trim();
  var time=document.getElementById('remindTime').value;
  if(!text||!time)return;
  fetch('/api/v1/assistant/reminder/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,time:new Date(time).getTime()/1000})})
  .then(function(r){return r.json()}).then(function(d){
    if(d.success){document.getElementById('remindText').value='';loadReminders()}
  }).catch(function(){});
}
function delReminder(i){
  fetch('/api/v1/assistant/reminder/del',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({index:i})})
  .then(function(r){return r.json()}).then(function(d){if(d.success)loadReminders()}).catch(function(){});
}
loadReminders();

// 语音
function startVoice(){
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){alert('浏览器不支持语音输入，请使用Chrome');return}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var rec=new SR();rec.lang='zh-CN';rec.start();
  rec.onresult=function(e){document.getElementById('chatInput').value=e.results[0][0].transcript;sendMsg()};
  rec.onerror=function(){alert('语音识别失败')};
}

// 任务
function loadTasks(){
  fetch('/api/v1/assistant/tasks').then(function(r){return r.json()}).then(function(d){
    document.getElementById('tasksVal').textContent=d.tasks?d.tasks.length:0;
  }).catch(function(){});
}
loadTasks();
</script></body></html>
