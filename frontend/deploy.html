<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;min-height:100vh}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;height:46px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(12px)}
.hdr .l{font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--accent),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .n{display:flex;gap:2px;flex-wrap:wrap}.hdr .n a{padding:4px 10px;border-radius:6px;font-size:12px;color:var(--text2);text-decoration:none}
.hdr .n a:hover,.hdr .n a.a{color:var(--text);background:var(--glass)}
.c{max-width:900px;margin:0 auto;padding:20px}
h2{font-size:18px;margin-bottom:12px;background:linear-gradient(135deg,var(--text),var(--text3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.inp{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.inp input{flex:1;min-width:200px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none}
.inp input:focus{border-color:var(--accent)}
.inp input.s{width:100px;flex:none}
.inp button{padding:10px 24px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;cursor:pointer;font-weight:600}
.inp button:hover{transform:translateY(-1px)}
.inp button:disabled{opacity:.5;cursor:not-allowed}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;transition:all .2s}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:12px 0}
.g-item{background:var(--bg);border-radius:8px;padding:12px;text-align:center}
.g-item .v{font-size:18px;font-weight:700;color:var(--text)}
.g-item .l{font-size:11px;color:var(--text3);margin-top:2px}
.progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:8px 0}
.progress .bar{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}
.log{font-family:monospace;font-size:11px;color:var(--text2);background:var(--card);padding:10px;border-radius:8px;max-height:150px;overflow:auto;white-space:pre-wrap;margin-top:8px}
.topo{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;padding:16px 0}
.topo .node{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 20px;text-align:center;font-size:12px;min-width:80px}
.topo .node .ico{font-size:20px;margin-bottom:4px}
.topo .node .nm{color:var(--text);font-weight:500}
.topo .node .st{font-size:10px;color:#10b981}
.topo .arrow{color:var(--accent);font-size:20px}
.deploy-list{display:grid;gap:8px}
.dl-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.dl-item .nm{color:var(--text);font-weight:500;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dl-item .st{font-size:10px;padding:2px 10px;border-radius:10px;background:var(--glass);color:var(--accent)}
.dl-item .st.done{background:rgba(16,185,129,.12);color:#10b981}
.dl-item .st.fail{background:rgba(239,68,68,.12);color:#ef4444}
@media(max-width:600px){.inp{flex-direction:column}.inp input.s{width:100%}}
</style>

<script>
(function(){var t=localStorage.getItem('evo_theme');if(t==='dark')document.body.classList.add('dark')})();function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('evo_theme',document.body.classList.contains('dark')?'dark':'light')}
</script>
<div class="topbar" style="display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;height:44px">
  <div class="topbar-left" style="display:flex;align-items:center;gap:8px">
    
    <h1 style="font-size:14px;font-weight:700;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent"></h1>
    <div class="topbar-right">
      
    </div>
  </div>
</div>
<div class="hdr"><div class="l"></div><div class="n"><a href="/">对话</a><a href="/dashboard">仪表盘</a><a href="/deploy" class="a">部署</a><a href="/canvas">编排</a><a href="/video">视频</a></div></div>
<div class="c">
  <h2>🔍 搜索开源项目</h2>
  <div class="card">
    <div class="inp">
      <input id="searchQ" placeholder="搜索关键词，如 blockchain、LLM、Markdown..." onkeydown="if(event.key==='Enter')searchProjects()">
      <select id="searchSource" style="padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none;cursor:pointer">
        <option value="all">🌐 全部</option>
        <option value="github" selected>🐙 GitHub</option>
        <option value="github-mirror">🐙 GitHub国内镜像</option>
        <option value="huggingface">🤗 HuggingFace</option>
        <option value="hf-mirror">🤗 HF国内镜像</option>
        <option value="trending">🔥 热门</option>
      </select>
      <select id="searchSort" style="padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;outline:none;cursor:pointer">
        <option value="stars">⭐ 最多星</option>
        <option value="trending">📈 趋势</option>
        <option value="relevance">🎯 相关度</option>
      </select>
      <button onclick="searchProjects()">🔍 搜索</button>
    </div>
    <div id="categoryTags" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px"></div>
    <div id="searchResults" style="display:none;margin-top:12px"></div>
  </div>

  <h2>🚀 一键部署</h2>
  <div class="card">
    <p style="font-size:12px;color:#636e70;margin-bottom:12px">输入 GitHub 仓库地址，系统自动克隆、分析、构建并生成可访问的部署</p>
    <div class="inp">
      <input id="repoUrl" placeholder="GitHub URL，例如 https://github.com/user/project" value="https://github.com/haijunwu007007/my-evo-ai">
      <input class="s" id="branch" placeholder="分支" value="">
      <button id="deployBtn" onclick="startDeploy()">🚀 一键部署</button>
    </div>
  </div>

  <!-- Active build -->
  <div id="activeBuild" style="display:none">
    <h2>⏳ 部署进度</h2>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span id="deployUrl" style="font-size:12px;color:#8892b0"></span>
        <span id="deployStatus" style="font-size:11px;padding:2px 10px;border-radius:10px;background:rgba(67,97,238,.15);color:#4361ee">构建中</span>
      </div>
      <div class="progress"><div class="bar" id="progressBar" style="width:10%"></div></div>
      <div id="deployProgress" style="font-size:11px;color:#8892b0;margin-bottom:8px"></div>
      <div class="log" id="deployLog"></div>
    </div>
  </div>

  <!-- Topology -->
  <h2>🌐 部署拓扑</h2>
  <div class="card">
    <div class="topo" id="topology">
      <div class="node"><div class="ico">🌍</div><div class="nm">GitHub</div><div class="st">源</div></div>
      <div class="arrow">→</div>
      <div class="node" id="typeNode"><div class="ico">📦</div><div class="nm">分析中</div><div class="st">等待</div></div>
      <div class="arrow">→</div>
      <div class="node" id="buildNode"><div class="ico">🔨</div><div class="nm">构建</div><div class="st">等待</div></div>
      <div class="arrow">→</div>
      <div class="node" id="runNode"><div class="ico">🚀</div><div class="nm">运行</div><div class="st">等待</div></div>
      <div class="arrow">→</div>
      <div class="node" id="accessNode"><div class="ico">🔗</div><div class="nm">访问</div><div class="st">等待</div></div>
    </div>
  </div>

  <!-- Info -->
  <div id="deployInfo" style="display:none">
    <h2>📋 项目信息</h2>
    <div class="card">
      <div class="g" id="infoGrid"></div>
      <div style="margin-top:8px">
        <h3 style="font-size:12px;color:#8892b0;margin-bottom:6px">📄 生成的 Dockerfile</h3>
        <div class="log" id="dfPreview"></div>
      </div>
    </div>
  </div>

  <!-- History -->
  <h2>📜 部署历史</h2>
  <div class="card">
    <div class="deploy-list" id="deployList"><p style="color:#636e70;text-align:center;padding:8px">暂无部署记录</p></div>
  </div>
</div>
<script>
var _currentDeploy = null

async function startDeploy(){
  var url=document.getElementById('repoUrl').value.trim()
  var branch=document.getElementById('branch').value.trim()
  if(!url){alert('请输入GitHub URL');return}
  document.getElementById('deployBtn').disabled=true;document.getElementById('deployBtn').textContent='部署中...'
  document.getElementById('activeBuild').style.display='block'
  document.getElementById('deployUrl').textContent=url

  try{
    var r=await fetch('/api/v1/deploy/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url,branch:branch})})
    var d=await r.json()
    if(!d.success){alert(d.error);return}
    _currentDeploy=d.id
    pollDeploy(d.id)
  }catch(e){alert('启动失败: '+e.message)}
}

async function pollDeploy(id){
  var intv=setInterval(async function(){
    try{
      var r=await fetch('/api/v1/deploy/status/'+id);var d=await r.json()
      if(!d.success){clearInterval(intv);return}
      var p=d.progress||'',s=d.status||'building'
      document.getElementById('deployProgress').textContent=p
      document.getElementById('deployUrl').textContent=d.url||''

      // Update topology
      if(d.type){
        document.getElementById('typeNode').querySelector('.nm').textContent=d.type.toUpperCase()
        document.getElementById('typeNode').querySelector('.st').textContent='✅ 已识别'
      }
      if(s==='ready'){
        document.getElementById('buildNode').querySelector('.st').textContent='✅ 完成'
        document.getElementById('runNode').querySelector('.st').textContent='✅ 就绪'
        document.getElementById('accessNode').querySelector('.st').textContent='🔗 可访问'
        document.getElementById('deployStatus').textContent='✅ 部署完成'
        document.getElementById('deployStatus').style.background='rgba(16,185,129,.12)'
        document.getElementById('deployStatus').style.color='#10b981'
        document.getElementById('progressBar').style.width='100%'
        document.getElementById('deployBtn').disabled=false;document.getElementById('deployBtn').textContent='🚀 一键部署'
        clearInterval(intv)
        // Show info
        if(d.info){showInfo(d.info)}
        if(d.dockerfile){document.getElementById('dfPreview').textContent=d.dockerfile}
        document.getElementById('deployInfo').style.display='block'
      }else if(s==='failed'){
        document.getElementById('deployStatus').textContent='❌ 部署失败'
        document.getElementById('deployStatus').style.background='rgba(239,68,68,.12)'
        document.getElementById('deployStatus').style.color='#ef4444'
        document.getElementById('progressBar').style.width='100%'
        document.getElementById('progressBar').style.background='#ef4444'
        document.getElementById('deployBtn').disabled=false;document.getElementById('deployBtn').textContent='🚀 一键部署'
        clearInterval(intv)
      }
      // Progress bar simulation
      var pw={'排队中':10,'克隆':30,'分析':50,'构建':70,'完成':100,'失败':100}
      for(var k in pw){if(p.includes(k)){document.getElementById('progressBar').style.width=pw[k]+'%';break}}
      if(d.logs){document.getElementById('deployLog').textContent=d.logs.slice(0,2000)}
    }catch(e){}
  },1500)
}

function showInfo(info){
  var rows=[['📛 项目名',info.name||'-'],['📦 类型',info.type||'-'],['🔌 端口',(info.ports||[]).join(',')||'-'],['⚡ 运行',info.run_cmd||'-']]
  var h=''
  for(var r of rows){h+='<div class="g-item"><div class="v">'+r[1]+'</div><div class="l">'+r[0]+'</div></div>'}
  document.getElementById('infoGrid').innerHTML=h
  document.getElementById('deployInfo').style.display='block'
}

async function loadHistory(){
  try{
    var r=await fetch('/api/v1/deploy/list');var d=await r.json()
    if(!d.deploys||d.deploys.length===0)return
    var h=''
    for(var dep of d.deploys.slice(0,10)){
      var st=dep.status==='ready'?'done':dep.status==='failed'?'fail':''
      h+='<div class="dl-item"><span class="nm">'+(dep.url||'').slice(0,40)+'</span><span class="st '+st+'">'+(dep.status||'')+'</span></div>'
    }
    document.getElementById('deployList').innerHTML=h
  }catch(e){}
}
loadHistory()

// ===== 开源项目搜索 =====
var _CATS = []
async function searchProjects(){
  var q=document.getElementById('searchQ').value.trim()
  var src=document.getElementById('searchSource').value
  var sort=document.getElementById('searchSort').value
  if(!q&&src!='trending'){alert('请输入关键词');return}
  var url=src=='trending'?'/api/v1/search/trending':'/api/v1/search/projects?q='+encodeURIComponent(q||'')+'&source='+src+'&sort='+sort+'&page=1'
  var r=await fetch(url);var d=await r.json()
  var box=document.getElementById('searchResults');box.style.display='block'
  var results=[]
  if(d.sources){for(var s of d.sources)if(s.results)results=results.concat(s.results)}
  if(d.results)results=d.results
  if(!results||!results.length){box.innerHTML='<p style="color:#636e70;text-align:center;padding:20px">未找到结果</p>';return}
  var h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px">'
  for(var r of results.slice(0,30)){
    var srcLabel=r.url&&r.url.includes('huggingface')?'🤗':r.url&&r.url.includes('hf-mirror')?'🤗':'🐙'
    var cloneUrl=r.clone_url||r.url
    h+='<div class="card" style="cursor:pointer;padding:12px" onclick="fillDeploy(\''+r.url+'\')">'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<b style="font-size:13px;color:#e8e8ef">'+srcLabel+' '+(r.name||'')+'</b>'
      +'<span style="font-size:11px;color:#f59e0b">⭐ '+r.stars+'</span>'
      +'</div>'
      +'<p style="font-size:11px;color:#8892b0;margin:6px 0">'+(r.description||'')+'</p>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;font-size:10px">'
      +(r.language?'<span style="padding:2px 8px;border-radius:4px;background:rgba(67,97,238,.15);color:#4361ee">'+r.language+'</span>':'')
      +(r.mirror_note?'<span style="padding:2px 8px;border-radius:4px;background:rgba(234,179,8,.15);color:#eab308">'+r.mirror_note+'</span>':'')
      +'<span style="padding:2px 8px;border-radius:4px;background:rgba(16,185,129,.12);color:#10b981">点击部署→</span>'
      +'</div>'
      +(cloneUrl!=r.url?'<div style="font-size:9px;color:#636e70;margin-top:4px">镜像: '+cloneUrl+'</div>':'')
      +'</div>'
  }
  h+='</div>'
  box.innerHTML=h
}
function fillDeploy(url){
  document.getElementById('repoUrl').value=url
  document.getElementById('searchResults').style.display='none'
  document.getElementById('repoUrl').scrollIntoView({behavior:'smooth'})
}
async function loadCategories(){
  var h=''
  var cats=[["ai-ml","AI"],["web-framework","Web"],["python","Python"],["javascript","JS"],["go","Go"],["rust","Rust"],["database","DB"],["devops","DevOps"],["mobile","移动"],["security","安全"]]
  for(var c of cats)h+='<span onclick="searchCat(\\''+c[0]+'\\')" style="padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;background:rgba(45,53,97,.3);color:#8892b0;border:1px solid rgba(45,53,97,.2)">'+c[1]+'</span>'
  document.getElementById('categoryTags').innerHTML=h
}
function searchCat(cat){
  document.getElementById('searchQ').value=cat
  document.getElementById('searchSource').value='github'
  searchProjects()
}
loadCategories()
</script>
