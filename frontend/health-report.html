<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>体检报告解读 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;min-height:100vh}
h1{font-size:22px;margin-bottom:6px}.sub{color:var(--text2);font-size:14px;margin-bottom:20px}
.back{display:inline-block;margin-bottom:16px;color:var(--accent);text-decoration:none;font-size:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:700px;margin-bottom:16px}
.card h3{font-size:15px;margin-bottom:8px}
textarea{width:100%;min-height:200px;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;resize:vertical;font-family:inherit;margin-bottom:12px}
textarea:focus{border-color:var(--accent);outline:none}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}
.result-area{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;min-height:100px;font-size:14px;line-height:1.7;white-space:pre-wrap}
.result-area .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px}
.tag-warn{background:rgba(239,68,68,.15);color:#ef4444}
.tag-ok{background:rgba(16,185,129,.15);color:#10b981}
.tag-info{background:rgba(67,97,238,.15);color:var(--accent)}
</style></head><body>
<a href="/" class="back">← 返回</a>
<h1>🩺 体检报告解读</h1>
<p class="sub">粘贴体检报告中的异常指标，AI给你通俗易懂的解读和建议</p>
<div class="card">
  <h3>📋 粘贴异常指标</h3>
  <p style="font-size:12px;color:var(--text2);margin-bottom:8px">示例：总胆固醇 6.8mmol/L ↑、谷丙转氨酶 68U/L ↑、血压 145/95mmHg</p>
  <textarea id="reportInput" placeholder="请粘贴体检报告中的异常指标..."></textarea>
  <button class="btn btn-p" onclick="analyze()">🔍 AI分析解读</button>
  <div id="resultArea" style="margin-top:12px;display:none" class="result-area"></div>
</div>
<script>
function analyze(){
  var text=document.getElementById('reportInput').value.trim();
  if(!text){alert('请输入体检指标');return}
  document.getElementById('resultArea').style.display='block';
  document.getElementById('resultArea').textContent='🤖 AI正在分析...';
  fetch('/api/v1/health-report/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})})
  .then(function(r){return r.json()}).then(function(d){
    var h='';
    if(d.issues&&d.issues.length){
      d.issues.forEach(function(i){
        var tag=i.severity==='critical'?'tag-warn':'tag-info';
        h+='<span class="tag '+tag+'">'+i.name+'</span> ';
      });
      h+='<br><br>';
    }
    h+=d.analysis||d.advice||'分析完成';
    document.getElementById('resultArea').innerHTML=h;
  }).catch(function(e){
    // 离线降级
    var items=text.split(/[、，,\n]/).filter(function(s){return s.trim()});
    var h='<div style="margin-bottom:10px;font-size:12px;color:var(--text3)">检测到 '+items.length+' 项指标</div>';
    items.forEach(function(item){
      var hasUp=item.indexOf('↑')>=0;
      var hasDown=item.indexOf('↓')>=0;
      var tag=hasUp?'tag-warn':(hasDown?'tag-warn':'tag-info');
      h+='<span class="tag '+tag+'">'+item.trim()+'</span> ';
    });
    h+='<br><br>⚠️ 以上指标中偏高/偏低项建议咨询医生。注意休息、合理饮食、定期复查。';
    document.getElementById('resultArea').innerHTML=h;
  });
}
</script></body></html>
