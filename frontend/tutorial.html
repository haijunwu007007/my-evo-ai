<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
body{background:#0f0f1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1a1a2e;border:1px solid #2d3561;border-radius:20px;padding:36px;max-width:520px;width:90%;text-align:center}
.card h1{font-size:22px;margin-bottom:8px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card p{color:#8892b0;font-size:14px;margin-bottom:24px;line-height:1.6}
.steps{text-align:left;margin-bottom:24px}
.step{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#16213e;border-radius:10px;margin-bottom:8px;border:1px solid #2d3561;cursor:pointer;transition:all.2s}
.step:hover{border-color:#4361ee;transform:translateX(4px)}
.step .num{width:28px;height:28px;border-radius:50%;background:#4361ee;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step .text{flex:1}
.step .text b{display:block;font-size:14px;margin-bottom:2px}
.step .text small{color:#64748b;font-size:12px}
.btn{display:inline-block;padding:12px 32px;border-radius:10px;background:#4361ee;color:#fff;border:none;font-size:14px;cursor:pointer;font-weight:600}
.btn:hover{opacity:.9}
.skip{display:block;margin-top:12px;color:#64748b;font-size:12px;cursor:pointer;text-decoration:none}
.skip:hover{color:#8892b0}
</style><style>
/* ===== AUTO-EVO-AI 共享样式 ===== */
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg,#0b0b16);color:var(--text,#e8e8ef);min-height:100vh}
body.light{--bg:#eef0f6;--bg2:#f8f9fc;--card:#fff;--text:#1a1a2e;--text2:#6c757d;--border:#d0d5e0}
