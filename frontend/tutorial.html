<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>教程 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:800px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px}
.step{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.step .num{display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;text-align:center;line-height:28px;font-size:13px;font-weight:700;margin-right:8px}
.step h3{font-size:15px;display:inline;vertical-align:middle}
.step p{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6}
.step .code{background:#f0f0f4;padding:6px 10px;border-radius:5px;font-family:monospace;font-size:12px;margin-top:6px;display:inline-block}
.btn{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer;margin-top:8px;display:inline-block;text-decoration:none}
.btn:hover{opacity:.9}
@media(max-width:768px){body{padding:10px}h1{font-size:18px}}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>📖 快速入门</h1>
<div class="step">
  <span class="num">1</span><h3>开始对话</h3>
  <p>在输入框输入你想做的事。试试：<br>
  「写一份项目计划书」「分析这份数据」「生成流程图」「翻译成英文」</p>
  <a href="/chat.html" class="btn">💬 去对话</a>
</div>
<div class="step">
  <span class="num">2</span><h3>使用工具</h3>
  <p>点击聊天框上方的快捷卡片快速使用：写文档、做表格、画流程图、审代码。</p>
</div>
<div class="step">
  <span class="num">3</span><h3>管理模块</h3>
  <p>左侧边栏浏览 583+ 模块，按类别分组。点击「模块总览」查看全部。</p>
  <a href="/enterprise.html" class="btn">📊 浏览模块</a>
</div>
<div class="step">
  <span class="num">4</span><h3>团队协作</h3>
  <p>在「用户管理」邀请团队成员，分配角色权限。</p>
  <a href="/users" class="btn">👥 管理团队</a>
</div>
<div class="step">
  <span class="num">5</span><h3>API 开发</h3>
  <p>在 API Key 管理创建密钥，参考 API 文档集成到你的应用。</p>
  <a href="/api-keys" class="btn">🔑 创建 Key</a>
  <a href="/docs" class="btn" style="margin-left:6px">📖 API 文档</a>
</div>
</body></html>
