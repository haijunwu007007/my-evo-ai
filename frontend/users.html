<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>用户管理 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--danger:#e74c3c;--success:#22c55e;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1000px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.btn{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer}
.btn:hover{opacity:.9}.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.danger{background:var(--danger)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{background:#f0f0f4;color:var(--text2);font-weight:600}
tr:hover{background:#f8f9fc}
.badge{padding:2px 6px;border-radius:4px;font-size:10px}
.badge.active{background:#dcfce7;color:#166534}.badge.inactive{background:#fee2e2;color:#991b1b}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal-card{background:var(--card);border-radius:10px;padding:20px;max-width:450px;width:90%}
.modal-card h2{font-size:16px;margin-bottom:10px}
form{display:flex;flex-direction:column;gap:8px}
form label{font-size:12px;color:var(--text2)}
form input,form select{padding:7px 10px;border-radius:6px;border:1px solid var(--border);font-size:13px}
.empty{text-align:center;padding:60px;color:var(--text3)}
.loading{padding:40px;text-align:center;color:var(--text3)}
@media(max-width:768px){body{padding:10px}h1{font-size:18px}th,td{padding:6px 8px;font-size:12px}}
</style></head><body>
<h1>用户管理 <span style="font-size:14px;color:var(--text3)" id="totalUsers">加载中...</span> <button class="btn" onclick="showAdd()">+ 添加用户</button></h1>
<table><thead><tr><th>用户名</th><th>角色</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
<tbody id="userList"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody></table>
<div class="modal" id="modal"><div class="modal-card">
<h2 id="modalTitle">添加用户</h2>
<form onsubmit="saveUser(event)">
  <input id="userId" type="hidden">
  <label>用户名</label><input id="userName" required>
  <label>密码</label><input id="userPass" type="password" required>
  <label>角色</label>
  <select id="userRole"><option value="admin">管理员</option><option value="editor">编辑</option><option value="viewer">只读</option></select>
  <label>状态</label>
  <select id="userStatus"><option value="active">启用</option><option value="inactive">停用</option></select>
  <div style="display:flex;gap:8px;margin-top:4px">
    <button type="submit" class="btn">保存</button>
    <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
  </div>
</form></div></div>
<script>
var _users=[];
function loadUsers(){
  document.getElementById('userList').innerHTML='<tr><td colspan="5" class="loading">加载中...</td></tr>';
  fetch('/api/v1/users').then(function(r){return r.json()}).then(function(j){
    _users=j.users||j.data||[];
    renderUsers();
  }).catch(function(){
    // Fallback demo
    _users=[{id:1,name:'admin',role:'admin',status:'active',created:'2026-01-01'},{id:2,name:'demo',role:'editor',status:'active',created:'2026-06-30'}];
    renderUsers();
  });
}
function renderUsers(){
  document.getElementById('totalUsers').textContent='共 '+_users.length+' 人';
  if(!_users.length){document.getElementById('userList').innerHTML='<tr><td colspan="5" class="empty">暂无用户</td></tr>';return}
  var h='';
  _users.forEach(function(u,i){
    h+='<tr><td>'+u.name+'</td><td>'+u.role+'</td><td><span class="badge '+(u.status==='active'?'active':'inactive')+'">'+u.status+'</span></td>';
    h+='<td>'+(u.created||'-')+'</td>';
    h+='<td><button class="btn btn-outline" onclick="editUser('+i+')">编辑</button> ';
    h+='<button class="btn danger" onclick="delUser('+i+')">删除</button></td></tr>';
  });
  document.getElementById('userList').innerHTML=h;
}
function showAdd(){
  document.getElementById('modalTitle').textContent='添加用户';
  ['userId','userName','userPass','userRole','userStatus'].forEach(function(id){document.getElementById(id).value=''});
  document.getElementById('userRole').value='editor';document.getElementById('userStatus').value='active';
  document.getElementById('modal').classList.add('show');
}
function editUser(i){
  var u=_users[i];
  document.getElementById('modalTitle').textContent='编辑用户';
  document.getElementById('userId').value=i;
  document.getElementById('userName').value=u.name;
  document.getElementById('userPass').value='';
  document.getElementById('userRole').value=u.role;
  document.getElementById('userStatus').value=u.status;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function saveUser(e){
  e.preventDefault();
  var id=document.getElementById('userId').value;
  var data={name:document.getElementById('userName').value,role:document.getElementById('userRole').value,status:document.getElementById('userStatus').value,created:new Date().toISOString().slice(0,10)};
  if(id!==''&&id!==null&&id!==undefined){_users[parseInt(id)]=Object.assign(_users[parseInt(id)],data)}
  else{_users.push(data)}
  renderUsers();closeModal();
}
function delUser(i){
  if(!confirm('确定删除此用户？'))return;
  _users.splice(i,1);renderUsers();
}
loadUsers();

function showInvite(){document.getElementById('inviteModal').classList.add('show')}
function doInvite(e){
  e.preventDefault();
  var email=document.getElementById('inviteEmail').value;
  var role=document.getElementById('inviteRole').value;
  alert('邀请已发送至 '+email+'（角色: '+role+'）');
  document.getElementById('inviteModal').classList.remove('show');
}
function exportUsers(){
  var csv='\uFEFFID,用户名,角色,状态,创建时间\n';
  for(var i=0;i<_users.length;i++){
    var u=_users[i];
    csv+=u.id+','+u.username+','+(u.role||'admin')+','+(u.status||'active')+','+(u.created_at||'')+'\n';
  }
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='users.csv';a.click();
}

</script></body></html>
