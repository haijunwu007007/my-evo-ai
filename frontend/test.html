<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg:#eef0f6;--bg2:#f8f9fc;--text:var(--bg)}
html[data-theme="dark"]{--bg:#0b0b16;--bg2:#12122a;--text:#e8e8ef}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:sans-serif}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:20px;background:var(--bg);border-bottom:2px solid #999}
.box{flex:1;display:flex;flex-wrap:wrap;gap:10px;padding:20px;background:var(--bg)}
.card{width:100px;height:100px;background:var(--bg);border:1px solid #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center}
.preview{position:fixed;bottom:20px;right:20px;background:var(--bg);border:2px solid red;padding:10px;font-size:12px}
</style>
  <link rel="stylesheet" href="/frontend/share.css">
</head><body style="display:flex;flex-direction:column;height:100vh">
<div class="hdr"><strong></strong><button onclick="toggleTheme()" style="background:var(--bg);border:1px solid var(--text);color:var(--text);padding:4px 12px;border-radius:6px;cursor:pointer">&#127769; / &#127774;</button></div>
<div class="box"><div class="card">工具1</div><div class="card">工具2</div><div class="card">工具3</div><div class="card">工具4</div><div class="card">工具5</div><div class="card">工具6</div></div>
<div class="preview">header bg: <span class="hdrv">var(--bg)</span> &nbsp; box bg: var(--bg)</div>
<script>
function toggleTheme(){
  var d=document.documentElement
  d.getAttribute('data-theme')==='dark'?d.removeAttribute('data-theme'):d.setAttribute('data-theme','dark')
}
</script>
</body></html>
