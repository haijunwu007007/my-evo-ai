<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>团队工作台 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--success:#22c55e;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1000px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;flex:1;min-width:120px;text-align:center}
.stat-box .num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-box .label{font-size:11px;color:var(--text2)}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.card .avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.card .info{flex:1}
.card .info .name{font-size:13px;font-weight:600}
.card .info .role{font-size:11px;color:var(--text2)}
.card .info .status{font-size:11px;color:var(--success)}
.card .info .last{font-size:10px;color:var(--text3)}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px}
.tag.admin{background:#dcfce7;color:#166534}
.tag.editor{background:#eef2ff;color:#4338ca}
.tag.viewer{background:#f5f5f5;color:#6b7280}
.empty{padding:60px;text-align:center;color:var(--text3)}
.loading{padding:40px;text-align:center;color:var(--text3)}
@media(max-width:768px){body{padding:10px}h1{font-size:18px}}
</style></head><body>
<h1>👥 团队工作台</h1>
<div class="stats" id="stats"></div>
<div id="list"><div class="loading">加载中...</div></div>
<script>
function loadTeam(){
  var saved=localStorage.getItem('evo_users');
  var users=saved?JSON.parse(saved):[];
  if(!users.length) users=[{name:'管理员',role:'admin',email:'admin@evo.ai',status:'online',last:'刚刚'}];
  
  var online=users.filter(function(u){return u.status==='online'}).length;
  document.getElementById('stats').innerHTML=
    '<div class="stat-box"><div class="num">'+users.length+'</div><div class="label">成员</div></div>'+
    '<div class="stat-box"><div class="num">'+online+'</div><div class="label">在线</div></div>'+
    '<div class="stat-box"><div class="num">'+users.filter(function(u){return u.role==='admin'}).length+'</div><div class="label">管理员</div></div>';
  
  if(!users.length){
    document.getElementById('list').innerHTML='<div class="empty">暂无团队成员</div>';
    return;
  }
  var h='';
  for(var i=0;i<users.length;i++){
    var u=users[i];
    var init=(u.name||'?')[0];
    h+='<div class="card"><div class="avatar">'+init+'</div><div class="info">';
    h+='<div class="name">'+u.name+'</div>';
    h+='<div class="role">'+u.email+'</div>';
    h+='<div class="status">● '+(u.status||'离线')+'</div>';
    h+='<div class="last">上次活跃: '+(u.last||'-')+'</div></div>';
    h+='<span class="tag '+(u.role||'viewer')+'">'+(u.role||'viewer')+'</span>';
    h+='</div>';
  }
  document.getElementById('list').innerHTML=h;
}
loadTeam();
</script></body></html>
