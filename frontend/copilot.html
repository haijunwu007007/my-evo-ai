<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Copilot — AUTO-EVO-AI</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0b0b16;color:#e8e8ef;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;min-height:100vh}.hdr{background:rgba(20,20,35,.92);border-bottom:1px solid rgba(45,53,97,.4);padding:0 16px;height:46px;display:flex;align-items:center;gap:12px}.l{font-size:15px;font-weight:800;background:linear-gradient(135deg,#4361ee,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hdr a{color:#8892b0;text-decoration:none;font-size:12px;padding:4px 8px}.c{max-width:800px;margin:20px auto;padding:0 16px}.card{background:rgba(26,26,46,.5);border:1px solid rgba(45,53,97,.3);border-radius:12px;padding:16px;margin-bottom:14px}.chat-box{height:500px;overflow-y:auto;padding:12px;background:rgba(10,10,20,.5);border-radius:8px;margin-bottom:10px;font-size:14px;line-height:1.6}.msg{padding:10px 14px;border-radius:10px;margin-bottom:8px;max-width:85%}.user{background:linear-gradient(135deg,#4361ee,#a855f7);color:#fff;margin-left:auto;border-bottom-right-radius:4px}.bot{background:rgba(45,53,97,.4);color:#e8e8ef;border-bottom-left-radius:4px}.inp{display:flex;gap:8px}.inp input{flex:1;padding:12px 16px;border-radius:10px;border:1px solid rgba(45,53,97,.4);background:rgba(22,33,62,.6);color:#e8e8ef;font-size:14px;outline:none}.inp input:focus{border-color:#4361ee}.inp button{padding:10px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#4361ee,#a855f7);color:#fff;font-size:14px;cursor:pointer;font-weight:600}.thinking{color:#8892b0;font-style:italic;padding:10px 14px}.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:rgba(67,97,238,.15);color:#4361ee;margin:2px}.tools{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}.tool-btn{padding:6px 12px;border:1px solid rgba(67,97,238,.3);border-radius:6px;background:rgba(22,33,62,.5);color:#8892b0;font-size:11px;cursor:pointer}.tool-btn:hover{border-color:#4361ee;color:#4361ee}</style></head><body>
<div class=hdr><div class=l>AUTO-EVO-AI</div><a href=/>回到主页</a><a href=/copilot>Copilot</a></div>
<div class=c>
<h2 style=font-size:18px;margin-bottom:12px>🤖 Copilot — AI 助手</h2>

<div class=card>
<div class=tools>
<button class=tool-btn onclick=sendMsg('/help')>帮助</button>
<button class=tool-btn onclick=sendMsg('列出系统功能')>功能</button>
<button class=tool-btn onclick=sendMsg('帮我部署一个项目')>部署</button>
<button class=tool-btn onclick=sendMsg('查看系统状态')>状态</button>
<button class=tool-btn onclick=sendMsg('创建虚拟公司')>公司</button>
</div>
<div class=chat-box id=chatbox>
<div class="msg bot">你好！我是 AUTO-EVO-AI 的 AI 助手。问我任何问题，或者让我帮你部署项目、管理公司、运行任务。</div>
</div>
<div class=inp><input id=inp placeholder="问我点什么..." onkeydown=if(event.key=='Enter')sendMsg()><button onclick=sendMsg()>发送</button></div>
</div>
</div>
<script>const api='https://autoevoai.com/api/v1'
async function sendMsg(pre){const inp=document.getElementById('inp');const msg=pre||inp.value.trim();if(!msg)return;if(!pre)inp.value=''
const box=document.getElementById('chatbox')
box.innerHTML+=`<div class="msg user">${msg}</div>`
box.innerHTML+=`<div class="thinking" id=thinking>⏳ 思考中...</div>`;box.scrollTop=box.scrollHeight
try{const r=await fetch(api+'/smart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});const d=await r.json()
document.getElementById('thinking')?.remove()
const reply=d.result||d.error||'无响应'
box.innerHTML+=`<div class="msg bot">${reply}</div>`;box.scrollTop=box.scrollHeight
}catch(e){document.getElementById('thinking')?.remove();box.innerHTML+=`<div class="msg bot">❌ 连接失败: ${e.message}</div>`;box.scrollTop=box.scrollHeight}}
</script></body></html>
