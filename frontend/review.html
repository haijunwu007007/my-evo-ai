<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>审阅工作流 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px;min-height:100vh}
h1{font-size:24px;margin-bottom:6px}.sub{color:#8892b0;font-size:14px;margin-bottom:24px}
.back{display:inline-block;margin-bottom:20px;color:#4361ee;text-decoration:none;font-size:14px}
.back:hover{text-decoration:underline}
.review-area{display:flex;gap:20px;max-width:1200px;flex-wrap:wrap}
.panel{flex:1;min-width:300px;background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid #2d3561}
.panel h3{font-size:15px;margin-bottom:12px;color:#4361ee}
.content-area{background:#16213e;border-radius:8px;padding:16px;min-height:300px;font-size:14px;line-height:1.6;white-space:pre-wrap;margin-bottom:12px;color:#e0e0e0}
.sel{width:100%;padding:8px;border-radius:6px;border:1px solid #2d3561;background:#16213e;color:#e0e0e0;margin-bottom:10px}
textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #2d3561;background:#16213e;color:#e0e0e0;font-size:14px;min-height:80px;resize:vertical;margin-bottom:10px;font-family:inherit}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-p{background:#4361ee;color:#fff}.btn-p:hover{opacity:.9}
.btn-g{background:#10b981;color:#fff}.btn-g:hover{opacity:.9}
.btn-r{background:#ef4444;color:#fff}.btn-r:hover{opacity:.9}
.btn-o{background:transparent;color:#e0e0e0;border:1px solid #2d3561}
.btn-row{display:flex;gap:8px;margin-top:8px}
.comment{background:#16213e;border-radius:8px;padding:12px;margin-bottom:8px;font-size:13px;border-left:3px solid #4361ee}
.comment .meta{color:#8892b0;font-size:11px;margin-top:4px}
.status{display:none;padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px}
.status.ok{display:block;background:rgba(16,185,129,.1);border:1px solid #10b981;color:#10b981}
.status.err{display:block;background:rgba(239,68,68,.1);border:1px solid #ef4444;color:#ef4444}
</style></head>
<body>
<a class="back" href="/">← 返回首页</a>
<h1>📝 审阅工作流</h1>
<p class="sub">AI 生成 → 你划线评论 → AI 按意见修改</p>

<div class="review-area">
  <div class="panel">
    <h3>📄 待审阅内容</h3>
    <select class="sel" id="docSelect"><option value="">请先生成内容...</option></select>
    <div class="content-area" id="contentDisplay">点击"生成示例"创建一份待审阅内容</div>
    <div class="btn-row">
      <button class="btn btn-p" onclick="generateDoc()">🔄 生成示例</button>
      <button class="btn btn-o" onclick="refreshList()">刷新列表</button>
    </div>
  </div>
  <div class="panel">
    <h3>✏️ 你的审阅意见</h3>
    <textarea id="commentInput" placeholder="划线评论：指出问题或改进建议..."></textarea>
    <div class="btn-row">
      <button class="btn btn-g" onclick="submitReview()">📨 提交审阅</button>
      <button class="btn btn-o" onclick="clearComments()">清空记录</button>
    </div>
    <div id="commentsList"><p style="color:#636e8a;font-size:13px">暂无审阅记录</p></div>
  </div>
</div>
<div class="status" id="status"></div>

<script>
var _docs=[]
function showStatus(msg,ok){
  var s=document.getElementById('status');s.textContent=msg;s.className='status '+(ok?'ok':'err');s.style.display='block'
  setTimeout(function(){s.style.display='none'},4000)}

async function refreshList(){
  try{
    var r=await fetch('/api/v1/apps/list');var d=await r.json()
    if(!d.success)return
    _docs=d.apps||[]
    var sel=document.getElementById('docSelect')
    sel.innerHTML='<option value="">选择内容...</option>'
    if(d.total===0)sel.innerHTML='<option value="">暂无生成内容，先生成一个</option>'
    d.apps.forEach(function(a,i){sel.innerHTML+='<option value="'+i+'">'+a.name+' ('+a.size+')</option>'})
    if(d.total>0)sel.value=0;selectDoc()
  }catch(e){showStatus('刷新失败: '+e.message,false)}
}

function selectDoc(){
  var sel=document.getElementById('docSelect');var idx=parseInt(sel.value)
  if(isNaN(idx)||!_docs[idx]){document.getElementById('contentDisplay').textContent='选择内容后显示...';return}
  fetch('/output/apps/'+_docs[idx].name).then(function(r){return r.text()}).then(function(t){
    document.getElementById('contentDisplay').textContent=t.slice(0,2000)+'\n\n...（已截断，共'+t.length+'字符）'
  })
}

async function generateDoc(){
  var r=await fetch('/api/v1/smart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'帮我生成一份产品介绍HTML，要包含标题、功能列表、定价、联系方式和公司简介，风格现代简洁'})})
  var d=await r.json()
  showStatus(d.success?'✅ 已生成！请到列表查看':'生成失败',d.success)
  if(d.success)setTimeout(refreshList,2000)
}

var _comments=JSON.parse(localStorage.getItem('evo_review_comments')||'[]')
function renderComments(){
  var el=document.getElementById('commentsList')
  if(_comments.length===0){el.innerHTML='<p style="color:#636e8a;font-size:13px">暂无审阅记录</p>';return}
  el.innerHTML=_comments.slice().reverse().map(function(c){
    return '<div class="comment"><div>💬 '+c.text.slice(0,200)+'</div><div class="meta">📄 '+c.file+' · '+c.time+'</div></div>'
  }).join('')
}

function submitReview(){
  var text=document.getElementById('commentInput').value.trim();if(!text){showStatus('请先写审阅意见',false);return}
  var sel=document.getElementById('docSelect');var idx=parseInt(sel.value)
  var fname=_docs[idx]?._docs[idx].name||'未知文件'
  _comments.push({text:text,file:fname,time:new Date().toLocaleString()})
  localStorage.setItem('evo_review_comments',JSON.stringify(_comments))
  document.getElementById('commentInput').value=''
  renderComments();showStatus('✅ 审阅意见已提交',true)
}
function clearComments(){_comments=[];localStorage.removeItem('evo_review_comments');renderComments();showStatus('已清空',true)}
refreshList();renderComments()
</script>
</body></html>
