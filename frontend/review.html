<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>审阅协作 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
body{padding:20px;min-height:100vh}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab{padding:8px 18px;cursor:pointer;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-content{display:none}.tab-content.active{display:block}
.iframe-tab{height:80vh}.iframe-tab iframe{width:100%;height:100%;border:none;border-radius:8px}
h1{font-size:24px;margin-bottom:6px}.sub{color:var(--text2);font-size:14px;margin-bottom:24px}
.back{display:inline-block;margin-bottom:20px;color:var(--accent);text-decoration:none;font-size:14px}.back:hover{text-decoration:underline}
.review-area{display:flex;gap:20px;max-width:1200px;flex-wrap:wrap}
.panel{flex:1;min-width:300px;background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border)}
.panel h3{font-size:15px;margin-bottom:12px;color:var(--accent)}
.content-area{background:var(--bg);border-radius:8px;padding:16px;min-height:300px;font-size:14px;line-height:1.6;white-space:pre-wrap;margin-bottom:12px;color:var(--text)}
.sel{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);margin-bottom:10px}
textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;min-height:80px;resize:vertical;margin-bottom:10px;font-family:inherit}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}
.btn-g{background:#10b981;color:#fff}.btn-g:hover{opacity:.9}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border)}
.status{display:none;padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px}
.status.ok{display:block;background:rgba(16,185,129,.1);border:1px solid #10b981;color:#10b981}
.status.err{display:block;background:rgba(239,68,68,.1);border:1px solid #ef4444;color:#ef4444}
</style></head>
<body>
<div class="tabs">
  <div class="tab active" onclick="switchTab(this,'w_review')">📝 工作流审阅</div>
  <div class="tab" onclick="switchTab(this,'w_human')">👤 人工审批</div>
</div>
<a href="/" class="back-btn">← 返回</a>
<h1>👤 审阅协作</h1>

<!-- Tab 1: 工作流审阅 -->
<div id="w_review" class="tab-content active">
<p class="sub">AI 生成 → 你划线评论 → AI 按意见修改</p>
<div class="status" id="status"></div>
<div class="review-area">
  <div class="panel">
    <h3>📄 待审阅内容</h3>
    <select class="sel" id="docSelect"><option value="">请先生成内容...</option></select>
    <div class="content-area" id="contentDisplay">点击"生成示例"创建一份待审阅内容</div>
    <div class="btn-row" style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-p" onclick="generateDoc()">🔄 生成示例</button>
      <button class="btn btn-o" onclick="refreshList()">刷新列表</button>
    </div>
  </div>
  <div class="panel">
    <h3>✏️ 你的审阅意见</h3>
    <textarea id="commentInput" placeholder="划线评论：指出问题或改进建议..."></textarea>
    <div class="btn-row" style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-g" onclick="submitReview()">📨 提交审阅</button>
      <button class="btn btn-o" onclick="clearComments()">清空记录</button>
    </div>
    <div id="commentsList"><p style="color:var(--text3);font-size:13px">暂无审阅记录</p></div>
  </div>
</div>
</div>

<!-- Tab 2: 人工审批 -->
<div id="w_human" class="tab-content iframe-tab"><iframe src="/human?embed=1"></iframe></div>

<script>
function switchTab(el,id){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')})
  el.classList.add('active')
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')})
  document.getElementById(id).classList.add('active')
}
var _docs=[]
function showStatus(msg,ok){
  var s=document.getElementById('status');s.textContent=msg;s.className='status '+(ok?'ok':'err');s.style.display='block'
  setTimeout(function(){s.style.display='none'},4000)}
async function refreshList(){
  try{
    var r=await fetch('/api/v1/apps/list');var d=await r.json()
    if(!d.success)return;_docs=d.apps||[]
    var sel=document.getElementById('docSelect')
    if(!d.apps||d.apps.length===0){sel.innerHTML='<option value="">暂无生成内容</option>';return}
    sel.innerHTML='<option value="">选择内容...</option>'+d.apps.map(function(a,i){return '<option value="'+i+'">'+a.name+' ('+a.size+')</option>'}).join('')
    sel.value=0;selectDoc()
  }catch(e){}}
function selectDoc(){
  var sel=document.getElementById('docSelect');var idx=parseInt(sel.value)
  if(isNaN(idx)||!_docs[idx]){document.getElementById('contentDisplay').textContent='选择内容后显示...';return}
  fetch('/output/apps/'+_docs[idx].name).then(function(r){return r.text()}).then(function(t){
    document.getElementById('contentDisplay').textContent=t.slice(0,2000)+'\n\n...（已截断，共'+t.length+'字符）'})}
async function generateDoc(){
  var r=await fetch('/api/v1/smart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'帮我生成一份产品介绍HTML，包含标题、功能列表、定价、联系方式和公司简介，风格现代简洁'})})
  var d=await r.json();showStatus(d.success?'✅ 已生成':'(空)',d.success)
  if(d.success)setTimeout(refreshList,2000)}
var _comments=JSON.parse(localStorage.getItem('evo_review_comments')||'[]')
function renderComments(){
  var el=document.getElementById('commentsList')
  if(_comments.length===0){el.innerHTML='<p style="color:#636e8a;font-size:13px">暂无审阅记录</p>';return}
  el.innerHTML=_comments.slice().reverse().map(function(c){return '<div class="comment" style="background:#16213e;border-radius:8px;padding:12px;margin-bottom:8px;font-size:13px;border-left:3px solid #4361ee"><div>💬 '+c.text.slice(0,200)+'</div><div class="meta" style="color:#8892b0;font-size:11px;margin-top:4px">📄 '+c.file+' · '+c.time+'</div></div>'}).join('')}
function submitReview(){
  var text=document.getElementById('commentInput').value.trim();if(!text){showStatus('请先写审阅意见',false);return}
  var sel=document.getElementById('docSelect');var idx=parseInt(sel.value)
  var fname=_docs[idx]?_docs[idx].name:'未知'
  _comments.push({text:text,file:fname,time:new Date().toLocaleString()})
  localStorage.setItem('evo_review_comments',JSON.stringify(_comments))
  document.getElementById('commentInput').value='';renderComments();showStatus('✅ 已提交',true)}
function clearComments(){_comments=[];localStorage.removeItem('evo_review_comments');renderComments();showStatus('已清空',true)}
refreshList();renderComments()
</script>
</body></html>
