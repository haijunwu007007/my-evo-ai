<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>在线文档 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--border:#e8eaed;--danger:#e74c3c}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:0;height:100vh;display:flex;flex-direction:column}
.toolbar{display:flex;align-items:center;gap:4px;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.toolbar button{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text2)}
.toolbar button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.toolbar .sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.toolbar .title-input{border:none;font-size:14px;font-weight:600;padding:4px 8px;background:transparent;color:var(--text);outline:none;flex:1;min-width:100px}
.editor-wrap{flex:1;display:flex;overflow:hidden}
.editor-textarea{flex:1;padding:16px;border:none;outline:none;font-size:14px;line-height:1.8;resize:none;font-family:monospace;background:var(--card);color:var(--text)}
.preview{flex:1;padding:16px;overflow-y:auto;background:var(--bg);border-left:1px solid var(--border);font-size:14px;line-height:1.8}
.preview h1{font-size:22px;margin:12px 0 8px}
.preview h2{font-size:18px;margin:10px 0 6px}
.preview p{margin:4px 0}
.preview table{border-collapse:collapse;width:100%;margin:8px 0}
.preview td,th{border:1px solid var(--border);padding:6px 10px;font-size:12px}
.preview code{background:#f0f0f4;padding:1px 4px;border-radius:3px;font-size:12px}
.preview pre{background:#1a1a2e;color:#e2e8f0;padding:12px;border-radius:6px;overflow-x:auto;font-size:12px}
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;background:var(--card);border-top:1px solid var(--border);font-size:11px;color:var(--text3);flex-shrink:0}
.status-bar .save-btn{padding:3px 12px;border-radius:4px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:11px}
.status-bar .save-btn:hover{opacity:.9}
.doc-list{width:220px;border-right:1px solid var(--border);background:var(--card);overflow-y:auto;flex-shrink:0;padding:8px}
.doc-list h3{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase}
.doc-item{padding:6px 8px;border-radius:4px;font-size:12px;cursor:pointer;color:var(--text2);margin-bottom:2px}
.doc-item:hover{background:var(--bg);color:var(--text)}
.doc-item.active{background:var(--accent);color:#fff}
.doc-item .del{float:right;color:var(--text3);cursor:pointer;display:none}
.doc-item:hover .del{display:inline}
@media(max-width:768px){
  .doc-list{width:100%;max-height:120px;border-right:none;border-bottom:1px solid var(--border)}
  .editor-wrap{flex-direction:column}
  .preview{max-height:40vh}
}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<div class="toolbar">
  <button onclick="execCmd('bold')"><b>B</b></button>
  <button onclick="execCmd('italic')"><i>I</i></button>
  <button onclick="execCmd('underline')"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="insertTable()">📊 表格</button>
  <button onclick="insertCode()">💻 代码</button>
  <button onclick="insertList()">📋 列表</button>
  <button onclick="insertH1()">H1</button>
  <button onclick="insertH2()">H2</button>
  <div class="sep"></div>
  <button onclick="downloadDoc()">⬇ 下载</button>
</div>
<div style="display:flex;flex:1;overflow:hidden">
  <div class="doc-list" id="docList">
    <h3>📄 文档列表</h3>
    <div id="docItems"></div>
    <button onclick="newDoc()" style="width:100%;margin-top:6px;padding:4px;border-radius:4px;border:1px dashed var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:11px">+ 新建文档</button>
  </div>
  <div class="editor-wrap">
    <textarea class="editor-textarea" id="editor" placeholder="在此输入 Markdown 内容..." oninput="updatePreview()"></textarea>
    <div class="preview" id="preview"></div>
  </div>
</div>
<div class="status-bar">
  <span id="wordCount">0 字</span>
  <span id="saveStatus">已保存</span>
  <button class="save-btn" onclick="saveDoc()">💾 保存</button>
</div>
<script>
var _docs=JSON.parse(localStorage.getItem('evo_docs')||'[]');
var _current=-1;
var _md=document.getElementById('editor');
var _pv=document.getElementById('preview');

function renderList(){
  var h='';
  for(var i=0;i<_docs.length;i++){
    var d=_docs[i];
    h+='<div class="doc-item'+(i===_current?' active':'')+'" onclick="openDoc('+i+')">';
    h+='<span class="del" onclick="event.stopPropagation();delDoc('+i+')">✕</span>';
    h+=d.title||'无标题'+'</div>';
  }
  document.getElementById('docItems').innerHTML=h;
}

function openDoc(i){
  _current=i;
  _md.value=_docs[i].content||'';
  updatePreview();
  renderList();
  document.getElementById('saveStatus').textContent='已打开';
}

function saveDoc(){
  if(_current<0)return;
  _docs[_current].content=_md.value;
  _docs[_current].updated=new Date().toISOString();
  localStorage.setItem('evo_docs',JSON.stringify(_docs));
  document.getElementById('saveStatus').textContent='已保存 '+new Date().toLocaleTimeString();
}

function newDoc(){
  _docs.push({title:'文档 '+( _docs.length+1),content:'# 新文档\n\n在此开始编写...',created:new Date().toISOString(),updated:new Date().toISOString()});
  _current=_docs.length-1;
  openDoc(_current);
  saveDoc();
}

function delDoc(i){
  if(!confirm('删除此文档？'))return;
  _docs.splice(i,1);
  if(_current>=_docs.length)_current=_docs.length-1;
  if(_current>=0)openDoc(_current);else{_md.value='';_pv.innerHTML='';_current=-1}
  localStorage.setItem('evo_docs',JSON.stringify(_docs));
  renderList();
}

function updatePreview(){
  var t=_md.value;
  document.getElementById('wordCount').textContent=t.length+' 字';
  var h=t;
  // 简单 Markdown 渲染
  h=h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  h=h.replace(/\*(.+?)\*/g,'<i>$1</i>');
  h=h.replace(/`(.+?)`/g,'<code>$1</code>');
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>');
  h=h.replace(/^\\|(.+)\\|$/gm,function(m){var cells=m.slice(1,-1).split('|');return '<tr><td>'+cells.join('</td><td>')+'</td></tr>'});
  h=h.replace(/\n\n/g,'</p><p>');
  h='<p>'+h+'</p>';
  h=h.replace(/<p><\/p>/g,'');
  _pv.innerHTML=h;
}

function execCmd(c){
  var start=_md.selectionStart,end=_md.selectionEnd,t=_md.value;
  var sel=t.slice(start,end);
  var wrap={bold:'**'+sel+'**',italic:'*'+sel+'*',underline:'<u>'+sel+'</u>'};
  if(wrap[c]){_md.value=t.slice(0,start)+wrap[c]+t.slice(end);_md.selectionStart=start;_md.selectionEnd=start+wrap[c].length}
  _md.focus();updatePreview();
}

function insertTable(){insertAtCursor('| 列1 | 列2 | 列3 |\n| --- | --- | --- |\n| 数据 | 数据 | 数据 |')}
function insertCode(){insertAtCursor('\\n```\\n代码块\\n```')}
function insertList(){insertAtCursor('- 项目1\\n- 项目2\\n- 项目3')}
function insertH1(){insertAtCursor('# 标题\\n\\n')}
function insertH2(){insertAtCursor('## 子标题\\n\\n')}

function insertAtCursor(t){
  var start=_md.selectionStart,end=_md.selectionEnd;
  _md.value=_md.value.slice(0,start)+t+_md.value.slice(end);
  _md.selectionStart=start;_md.selectionEnd=start+t.length;
  _md.focus();updatePreview();
}

function downloadDoc(){
  if(_current<0)return;
  var blob=new Blob([_md.value],{type:'text/markdown'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(_docs[_current].title||'文档')+'.md';
  a.click();
}

// 自动保存
(function(){var _iv_ed=setInterval(function(){if(_current>=0)saveDoc()},30000);window.addEventListener("beforeunload",function(){clearInterval(_iv_ed)})})();

// 初始化
if(_docs.length>0){_current=0;openDoc(0)}else{newDoc()}
</script></body></html>
