<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>系统配置 - AUTO-EVO-AI</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:800px;margin:0 auto}
h1{font-size:18px;margin-bottom:16px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.section{margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#fff}
.section-hd{padding:10px 14px;font-size:13px;font-weight:600;background:#f8f9ff;border-bottom:1px solid var(--border)}
.section-hd .cnt{font-weight:400;color:#6b7280;font-size:11px}
.section-body{padding:0 14px}
.item{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid #f0f0f4;font-size:12px}
.item:last-child{border:0}
.item input{flex:1;max-width:280px;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;outline:none}
.item input:focus{border-color:#4361ee}
.item .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px}
.item .tag.green{background:#dcfce7;color:#166534}
.item .tag.gray{background:#f3f4f6;color:#6b7280}
.item .tag.orange{background:#fef3c7;color:#92400e}
.item .tag.blue{background:#dbeafe;color:#1e40af}
.item button{padding:4px 10px;border:0;border-radius:5px;font-size:11px;cursor:pointer;background:#4361ee;color:#fff;white-space:nowrap}
.search-bar{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;margin-bottom:12px;background:#fff;outline:none}
.search-bar:focus{border-color:#4361ee}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#4361ee;color:#fff;padding:8px 20px;border-radius:8px;font-size:12px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:all .3s;opacity:0;pointer-events:none}
.toast.show{opacity:1}
</style>  <link rel="stylesheet" href="/frontend/share.css">
</head><body>

<!-- 系统顶栏 -->
<div class="topbar" style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)">
  <div style="display:flex;align-items:center;gap:8px">
    <span class="back-btn" onclick="window.location.href='/'">←</span>
    <h1 class="grad-title" style="font-size:15px;margin:0">⚙️ 系统设置</h1>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    
  </div>
</div>

<h1>🔑 密钥配置</h1>

<div class="section">
  <div class="section-hd">✅ 系统自带功能 <span class="cnt">（无需配置，直接可用）</span></div>
  <div class="section-body" style="padding:10px 14px;font-size:12px;color:#6b7280;line-height:1.8">
    文本生成 · 文档生成 · 电子表格 · 演示文稿 · 代码生成 · 网页搜索 · 网页爬虫 ·
    翻译 · 数学计算 · 图片生成 · GitHub Trending · 记忆 · 待办 · 语音合成 ·
    截图 · 项目脚手架 · Docker · 应用启动 · 语音输入(Vosk) · LLM对话(GLM-4-Flash)
  </div>
</div>

<div class="section">
  <div class="section-hd">🔌 外部服务 <span class="cnt" id="stats">加载中...</span></div>
  <input class="search-bar" id="search" placeholder="🔍 搜索服务..." oninput="render()">
  <div class="section-body" id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var items = [];

function load(){
  Promise.all([
    // SMTP 邮箱配置
    var smtpCard = document.createElement('div');
    smtpCard.className = 'card';
    smtpCard.innerHTML = '<h3>📧 邮箱配置 (SMTP)</h3><p style="font-size:12px;color:#6b7280;margin-bottom:8px">用于发送团队邀请、通知等</p>' +
      '<div class="field"><label>SMTP 服务器</label><input id="smtp_host" placeholder="smtp.qq.com"></div>' +
      '<div class="field"><label>端口</label><input id="smtp_port" placeholder="587"></div>' +
      '<div class="field"><label>邮箱账号</label><input id="smtp_user" placeholder="your@email.com"></div>' +
      '<div class="field"><label>密码/授权码</label><input id="smtp_pass" type="password" placeholder="SMTP 授权码"></div>' +
      '<div class="field"><label>发件地址（可选）</label><input id="smtp_from" placeholder="留空则用邮箱账号"></div>' +
      '<div class="field" style="display:flex;gap:6px;align-items:end">' +
      '<input id="smtp_test_to" placeholder="输入测试邮箱" style="flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--border);font-size:12px">' +
      '<button class="btn2" onclick="testSmtp()">📨 测试</button></div>' +
      '<div style="display:flex;gap:6px;margin-top:8px"><button class="btn" onclick="saveSmtp()">💾 保存配置</button></div>';
    document.getElementById('main').insertBefore(smtpCard, document.getElementById('main').firstChild);

    fetch('/api/v1/skills').then(function(r){return r.json()}),
    fetch('/api/v1/settings').then(function(r){return r.json()})
  ]).then(function(res){
    var skills = res[0].skills || [];
    var envData = res[1];
    var env = {};
    if(envData.categories){
      for(var ck in envData.categories){
        envData.categories[ck].forEach(function(it){env[it.key] = it.value || ''})
      }
    }
    var seen = {};
    skills.forEach(function(sk){
      var name = sk.description || sk.name || '';
      var is_gateway = sk.name.indexOf('gateway:')===0;
      var is_conn = sk.name.indexOf('conn:')===0;
      var is_mcp = sk.name.indexOf('mcp:')===0;
      var is_mcpize = sk.name.indexOf('mcpize:')===0;
      if(!is_gateway && !is_conn) return;
      var key = '';
      var skn = sk.name.toLowerCase();
      if(skn.indexOf('github')>=0) key = 'GITHUB_TOKEN';
      else if(skn.indexOf('slack')>=0) key = 'SLACK_TOKEN';
      else if(skn.indexOf('dingtalk')>=0 || skn.indexOf('钉钉')>=0) key = 'DINGTALK_WEBHOOK';
      else if(skn.indexOf('aws')>=0) key = 'AWS_ACCESS_KEY_ID';
      else if(skn.indexOf('aliyun')>=0 || skn.indexOf('oss')>=0) key = 'OSS_ACCESS_KEY';
      else if(skn.indexOf('stripe')>=0) key = 'STRIPE_API_KEY';
      else if(skn.indexOf('sendgrid')>=0) key = 'SENDGRID_API_KEY';
      else if(skn.indexOf('jira')>=0) key = 'JIRA_TOKEN';
      else if(skn.indexOf('linear')>=0) key = 'LINEAR_API_KEY';
      else if(skn.indexOf('notion')>=0) key = 'NOTION_TOKEN';
      else if(skn.indexOf('mysql')>=0) key = 'MYSQL_HOST';
      else if(skn.indexOf('postgres')>=0) key = 'POSTGRES_HOST';
      else if(skn.indexOf('openai')>=0) key = 'OPENAI_API_KEY';
      else if(skn.indexOf('telegram')>=0) key = 'TELEGRAM_BOT_TOKEN';
      else if(skn.indexOf('discord')>=0) key = 'DISCORD_TOKEN';
      else if(skn.indexOf('google')>=0 || skn.indexOf('gmail')>=0) key = 'GOOGLE_API_KEY';
      else key = name.toUpperCase().replace(/[^A-Z0-9]/g,'_').slice(0,30) + '_KEY';
      if(!seen[key]){seen[key]=1;items.push({name:name,key:key,val:env[key]||'',configured:!!env[key]})}
    });
    document.getElementById('stats').textContent = items.length+'项';
    render();
  })
}

function render(){
  var q = document.getElementById('search').value.toLowerCase();
  var html = '', n=0;
  items.forEach(function(i){
    if(q && i.name.toLowerCase().indexOf(q)<0 && i.key.toLowerCase().indexOf(q)<0) return;
    n++;
    html += '<div class="item"><span><b>'+i.key+'</b> <span class="tag '+(i.configured?'green':'orange')+'">'+(i.configured?'已配':'待配')+'</span><br><small>'+i.name.slice(0,50)+'</small></span>';
    html += '<input type="password" placeholder="输入密钥..." value="'+i.val+'">';
    html += '<button onclick="save(\''+i.key+'\',this)">保存</button></div>';
  });
  document.getElementById('list').innerHTML = html || '<div style="padding:12px;color:#6b7280;font-size:12px">没有匹配的服务</div>';
  document.getElementById('stats').textContent = items.length+'项';
}

function save(key,btn){
  var val = btn.parentElement.querySelector('input').value;
  btn.disabled = true; btn.textContent = '保存中...';
  fetch('/api/v1/settings/set', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key:key,value:val})})
  .then(function(r){return r.json()})
  .then(function(d){
    btn.disabled = false; btn.textContent = '保存';
    if(d.success){
      showToast('✅ '+key+' 已保存');
      items.forEach(function(i){if(i.key===key)i.configured=!!val})
    } else {
      showToast('❌ 保存失败: '+(d.detail||'未知错误'))
    }
  }).catch(function(e){btn.disabled = false; btn.textContent = '保存'; showToast('❌ 网络错误')})
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(function(){t.classList.remove('show')},3000)
}

// SMTP config
function loadSmtp(){
  fetch('/api/v1/email/config').then(function(r){return r.json()}).then(function(j){
    if(j.host){
      document.getElementById('smtp_host').value=j.host||'';
      document.getElementById('smtp_port').value=j.port||'587';
      document.getElementById('smtp_user').value=j.user||'';
      document.getElementById('smtp_from').value=j.from_addr||'';
    }
  }).catch(function(){})
}
function saveSmtp(){
  var data={host:document.getElementById('smtp_host').value,port:parseInt(document.getElementById('smtp_port').value)||587,user:document.getElementById('smtp_user').value,password:document.getElementById('smtp_pass').value,from_addr:document.getElementById('smtp_from').value};
  fetch('/api/v1/email/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(function(r){return r.json()}).then(function(j){
    alert(j.success?'SMTP 配置已保存':'保存失败: '+j.error);
  }).catch(function(){alert('保存失败')});
}
function testSmtp(){
  var to=document.getElementById('smtp_test_to').value;
  if(!to){alert('请输入测试邮箱');return}
  fetch('/api/v1/email/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:to})}).then(function(r){return r.json()}).then(function(j){
    alert(j.success?'测试邮件已发送！请检查 '+to:'发送失败: '+j.error);
  }).catch(function(){alert('发送失败')});
}
loadSmtp();
</script>
</body></html>
