<!DOCTYPE html><html lang="zh-CN"><head>
<meta name="description" content="多 Agent 协作与团队管理，Agent 编排与通信">
<meta property="og:title" content="AUTO-EVO-AI">
<meta property="og:description" content="多 Agent 协作与团队管理，Agent 编排与通信">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>多智能体 - AUTO-EVO-AI V0.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0b0b16,#12122a);color:#e8e8ef;font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh}
.hdr{background:rgba(20,20,35,.92);border-bottom:1px solid rgba(45,53,97,.4);padding:0 16px;height:46px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(12px)}
.hdr .l{font-size:15px;font-weight:800;background:linear-gradient(135deg,#4361ee,#a855f7,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .n{display:flex;gap:2px}.hdr .n a{padding:4px 10px;border-radius:6px;font-size:12px;color:#8892b0;text-decoration:none;transition:all .2s}
.hdr .n a:hover,.hdr .n a.a{color:#e8e8ef;background:rgba(67,97,238,.15)}
.c{max-width:960px;margin:0 auto;padding:20px 16px}
h2{font-size:18px;margin-bottom:12px;background:linear-gradient(135deg,#e8e8ef,#a0a8b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ft{text-align:center;padding:10px;font-size:10px;color:#636e70;margin-top:20px}
</style>  <link rel="stylesheet" href="/frontend/share.css">
</head><body>
<div class="hdr"><div class="l">AUTO-EVO-AI</div><div class="n"><a href="/">对话</a><a href="/multi_agent" class="a">🤖 多Agent</a></div></div>
<div class="c">
<h2>🤖 多Agent协作</h2>
<p style="color:#636e70;font-size:13px">6个角色团队协作：Planner→Coder→Reviewer→Operator→Analyst→Researcher</p>
<div id="agentGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:15px"><p style="color:#636e70">⏳ 加载Agent状态...</p></div>
</div>
<div class="ft">AUTO-EVO-AI V0.1 · 多Agent协作引擎</div>
<script>
fetch('/api/v1/agents/list').then(function(r){return r.json()}).then(function(d){
  var agents=d.agents||[];
  var h='';
  agents.slice(0,6).forEach(function(a){
    h+='<div style="background:rgba(26,26,46,.5);border:1px solid rgba(45,53,97,.3);border-radius:12px;padding:16px"><h3>'+(a.name||a.id)+'</h3><p style="font-size:12px;color:#8892b0">'+(a.desc||'')+'</p><span style="font-size:11px;padding:2px 8px;border-radius:4px;background:'+(a.status==='running'?'rgba(67,238,100,.2);color:#43ee64':a.status==='idle'?'rgba(255,180,0,.2);color:#ffb400':'rgba(99,110,112,.2);color:#636e70')+'">'+(a.status||'idle')+'</span></div>';
  });
  document.getElementById('agentGrid').innerHTML=h||'<p style="color:#636e70">暂无Agent数据</p>';
}).catch(function(){document.getElementById('agentGrid').innerHTML='<p style="color:#636e70">❌ 无法加载</p>'});
</script>
</body></html>
