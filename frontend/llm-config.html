<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LLM 配置 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#e0e0e0;padding:20px;min-height:100vh}
h1{font-size:24px;margin-bottom:24px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:var(--bg);border-radius:12px;padding:24px;margin-bottom:16px;max-width:600px;border:1px solid var(--border)}
.card h3{font-size:16px;margin-bottom:8px;color:#4361ee}
.card p{font-size:13px;color:#8892b0;margin-bottom:12px;line-height:1.5}
label{font-size:14px;color:#c0c0d0;display:block;margin-bottom:4px}
select,input[type=text],input[type=password]{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:#e0e0e0;font-size:14px;margin-bottom:12px}
select option{background:var(--bg)}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-primary{background:#4361ee;color:#fff}.btn-primary:hover{opacity:.9}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{opacity:.9}
.btn-danger{background:#ef4444;color:#fff;padding:6px 14px;font-size:12px;margin-left:8px}
.status{padding:12px;border-radius:8px;margin-bottom:16px;display:none;font-size:14px}
.status.ok{display:block;background:rgba(16,185,129,.1);border:1px solid #10b981;color:#10b981}
.status.err{display:block;background:rgba(239,68,68,.1);border:1px solid #ef4444;color:#ef4444}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{text-align:left;padding:8px;border-bottom:1px solid var(--border);font-size:13px}
th{color:#8892b0;font-weight:600}
td{color:#e0e0e0}
td .active{color:#10b981;font-weight:600}
td .inactive{color:#ef4444}
.env-hint{font-size:12px;color:#636e8a;margin-top:-8px;margin-bottom:12px}
.back-link{display:inline-block;margin-bottom:20px;color:#4361ee;text-decoration:none;font-size:14px}
.back-link:hover{text-decoration:underline}
</style></head>
<body>
<span class="back-btn" onclick="window.location.href='/'">←</span>
<h1>🔧 LLM 模型配置</h1>
<div class="status" id="status"></div>

<div class="card">
  <h3>🧠 默认模型</h3>
  <p>主模型：聊天、搜索、生成等核心功能使用</p>
  <label>Provider</label>
  <select id="defaultProvider"><option value="zhipu">智谱 GLM-4-Flash</option><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option></select>
  <label>模型名称</label>
  <input type="text" id="defaultModel" placeholder="如 glm-4-flash / deepseek-chat / gpt-4o">
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="输入 API Key">
  <label>API 地址（可选，默认为官方地址）</label>
  <input type="text" id="apiBase" placeholder="如 https://api.deepseek.com/v1">
  <button class="btn btn-primary" onclick="saveDefault()">保存配置</button>
</div>

<div class="card">
  <h3>🔄 备用模型（LLM 降级兜底）</h3>
  <p>主模型不可用时自动切换，支持多个，用逗号分隔</p>
  <label>备用模型列表</label>
  <input type="text" id="fallbackModels" placeholder="如 zhipu|glm-4-flash, deepseek|deepseek-chat">
  <p class="env-hint">格式：provider|model，多个用逗号分隔</p>
  <button class="btn btn-success" onclick="saveFallback()">保存备用配置</button>
</div>

<div class="card">
  <h3>📊 当前配置状态</h3>
  <table><thead><tr><th>Provider</th><th>模型</th><th>状态</th><th>操作</th></tr></thead>
  <tbody id="providerList"><tr><td colspan="4" style="text-align:center;color:#8892b0">加载中...</td></tr></tbody></table>
</div>

<script>
async function _api(path, method='GET', body=null){
  var opt={method,headers:{'Content-Type':'application/json'}}
  if(body) opt.body=JSON.stringify(body)
  var r=await fetch(path,opt)
  return r.json()
}
function showStatus(msg, ok){
  var s=document.getElementById('status');s.textContent=msg;s.className='status '+(ok?'ok':'err');s.style.display='block'
  setTimeout(function(){s.style.display='none'},5000)
}
async function saveDefault(){
  var data={
    provider: document.getElementById('defaultProvider').value,
    model: document.getElementById('defaultModel').value.trim(),
    api_key: document.getElementById('apiKey').value.trim(),
    api_base: document.getElementById('apiBase').value.trim(),
  }
  if(!data.api_key){showStatus('请填写 API Key', false);return}
  var r=await _api('/api/v1/config/llm/save','POST',data)
  showStatus(r.message||'配置已保存', r.success)
}
async function saveFallback(){
  var fb=document.getElementById('fallbackModels').value.trim()
  var r=await _api('/api/v1/config/llm/fallback','POST',{fallback_models:fb})
  showStatus(r.message||'备用配置已保存', r.success)
}
async function testProvider(name){
  var btn=event.target;btn.disabled=true;btn.textContent='测试中...'
  var r=await _api('/api/v1/config/llm/test','POST',{provider:name})
  btn.disabled=false;btn.textContent='测试'
  showStatus(r.message||(r.success?'连接成功':'连接失败'), r.success)
}
async function loadProviders(){
  try{
    var r=await fetch('/api/v1/llm/status');var d=await r.json()
    var html=''
    if(d.provider){
      html+='<tr><td><b>'+(d.provider||'?')+'</b></td><td>'+(d.model||'?')+'</td>'
      html+='<td><span class="active">● 活跃</span></td>'
      html+='<td><button class="btn btn-danger" onclick="testProvider(\''+d.provider+'\')">测试</button></td></tr>'
    }
    if(d.models&&d.models.length){
      d.models.forEach(function(m){
        if(m.name!==d.provider){
          html+='<tr><td>'+m.name+'</td><td>'+(m.model||'')+'</td>'
          html+='<td><span class="inactive">○ 备用</span></td>'
          html+='<td><button class="btn btn-danger" onclick="testProvider(\''+m.name+'\')">测试</button></td></tr>'
        }
      })
    }
    if(!html) html='<tr><td colspan="4" style="text-align:center;color:#8892b0">暂无配置</td></tr>'
    document.getElementById('providerList').innerHTML=html
  }catch(e){
    document.getElementById('providerList').innerHTML='<tr><td colspan="4" style="text-align:center;color:#ef4444">加载失败: '+e.message+'</td></tr>'
  }
}
loadProviders()
</script>
</body></html>
