<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>工作流引擎 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
.content{flex:1;overflow-y:auto;padding:16px 20px;max-width:1100px;margin:0 auto;width:100%}
.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.wf-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.wf-stat{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center;background:var(--card)}
.wf-stat .num{font-size:22px;font-weight:700;color:var(--accent)}
.wf-stat .label{font-size:10px;color:var(--text3);margin-top:2px}
.wf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:16px}
.wf-card{padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);transition:all .2s;position:relative}
.wf-card:hover{border-color:var(--accent);box-shadow:0 2px 12px var(--shadow);transform:translateY(-1px)}
.wf-card .wf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.wf-card .wf-name{font-size:14px;font-weight:600;color:var(--text)}
.wf-card .wf-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.wf-card .wf-badge.active{background:#d1fae5;color:#065f46}
.wf-card .wf-badge.paused{background:#fef3c7;color:#92400e}
.wf-card .wf-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.wf-card .wf-meta{display:flex;gap:8px;font-size:10px;color:var(--text3);flex-wrap:wrap}
.wf-card .wf-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.wf-card .wf-actions button{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:10px;cursor:pointer;transition:all .12s}
.wf-card .wf-actions .run:hover{border-color:var(--accent);color:var(--accent);background:rgba(67,97,238,.05)}
.wf-card .wf-actions .pause:hover{border-color:#f59e0b;color:#f59e0b}
.wf-card .wf-actions .del:hover{border-color:#ef4444;color:#ef4444}
.create-bar{display:flex;gap:8px;margin-bottom:16px}
.create-bar input{flex:1;padding:9px 14px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;background:var(--bg);color:var(--text)}
.create-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.create-bar button{padding:9px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.create-bar button:hover{background:var(--accent-hover);transform:translateY(-1px)}
.template-strip{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding:4px 0}
.tpl-chip{padding:6px 14px;border-radius:16px;font-size:12px;cursor:pointer;background:var(--glass);border:1px solid var(--border);color:var(--text2);white-space:nowrap;transition:all .15s}
.tpl-chip:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
@media(max-width:768px){.content{padding:12px 10px}.wf-grid{grid-template-columns:1fr}.create-bar{flex-direction:column}}
</style>
</head>
<body>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span onclick="window.location.href='/'" style="cursor:pointer;font-size:15px;color:var(--text2);padding:4px">←</span>
      <h1>📝 工作流引擎</h1>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
  <div class="content">
    <div class="wf-stats" id="stats">
      <div class="wf-stat"><div class="num" id="totalWf">0</div><div class="label">工作流</div></div>
      <div class="wf-stat"><div class="num" id="activeWf">0</div><div class="label">运行中</div></div>
      <div class="wf-stat"><div class="num" id="completedWf">0</div><div class="label">已完成</div></div>
    </div>
    <div class="section-title">⚡ 快速创建</div>
    <div class="create-bar">
      <input id="wfName" placeholder="输入工作流名称..." onkeydown="if(event.key==='Enter')createWorkflow()">
      <button onclick="createWorkflow()">+ 创建</button>
    </div>
    <div class="template-strip" id="templateStrip">
      <span class="tpl-chip" onclick="useTemplate('数据采集')">📊 数据采集</span>
      <span class="tpl-chip" onclick="useTemplate('日报生成')">📋 日报生成</span>
      <span class="tpl-chip" onclick="useTemplate('代码审查')">🔍 代码审查</span>
      <span class="tpl-chip" onclick="useTemplate('内容发布')">📤 内容发布</span>
      <span class="tpl-chip" onclick="useTemplate('监控告警')">🔔 监控告警</span>
    </div>
    <div class="section-title">📋 工作流列表</div>
    <div class="wf-grid" id="wfGrid"><div style="padding:40px;text-align:center;color:var(--text3)">暂无工作流，创建第一个</div></div>
  </div>
</div>
<script>
var _workflows=[];
var WK='evo_workflows';
function loadWfs(){
  try{_workflows=JSON.parse(localStorage.getItem(WK)||'[]');if(!Array.isArray(_workflows))_workflows=[]}catch(e){_workflows=[]}
  renderWfs();
}
function saveWfs(){try{localStorage.setItem(WK,JSON.stringify(_workflows))}catch(e){}}
function renderWfs(){
  document.getElementById('totalWf').textContent=_workflows.length;
  document.getElementById('activeWf').textContent=_workflows.filter(function(w){return w.status==='active'}).length;
  document.getElementById('completedWf').textContent=_workflows.filter(function(w){return w.status==='completed'}).length;
  var grid=document.getElementById('wfGrid');
  if(!_workflows.length){grid.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3)">暂无工作流，创建第一个</div>';return}
  var html='';_workflows.forEach(function(w,i){
    var sc=w.status||'paused',sl={active:'运行中',paused:'已暂停',completed:'已完成'}[sc]||sc;
    html+='<div class="wf-card"><div class="wf-header"><span class="wf-name">'+(w.name||'未命名')+'</span><span class="wf-badge '+sc+'">'+sl+'</span></div>';
    html+='<div class="wf-desc">'+(w.desc||'无描述')+'</div>';
    html+='<div class="wf-meta"><span>⏱ '+(w.created||'')+'</span><span>🔗 '+(w.steps||w.nodes||0)+'步骤</span></div>';
    html+='<div class="wf-actions">';
    html+='<button class="run" onclick="toggleWf('+i+')">'+(w.status==='active'?'⏸ 暂停':'▶ 运行')+'</button>';
    html+='<button class="del" onclick="deleteWf('+i+')">🗑 删除</button></div></div>'
  });
  grid.innerHTML=html;
}
function createWorkflow(){
  var name=document.getElementById('wfName').value.trim();if(!name)return;
  _workflows.push({name:name,desc:'手动创建',status:'paused',steps:0,created:new Date().toLocaleString('zh-CN')});
  saveWfs();renderWfs();document.getElementById('wfName').value='';
}
function useTemplate(t){document.getElementById('wfName').value=t+' 工作流';document.getElementById('wfName').focus()}
function toggleWf(i){_workflows[i].status=_workflows[i].status==='active'?'paused':'active';saveWfs();renderWfs()}
function deleteWf(i){if(!confirm('确定删除？'))return;_workflows.splice(i,1);saveWfs();renderWfs()}
function toggleTheme(){var t=document.documentElement.getAttribute('data-theme')||localStorage.getItem('evo_theme')||'dark';t=t==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('evo_theme',t)}catch(e){}}
(function(){try{var t=localStorage.getItem('evo_theme');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){};loadWfs()})();
</script>
</body>
</html>
