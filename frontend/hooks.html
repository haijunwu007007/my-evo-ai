<!DOCTYPE html><html lang="zh-CN"><head>
<meta name="description" content="AUTO-EVO-AI 智能进化平台 - 一键部署、智能Agent、自动化工作流">
<meta property="og:title" content="AUTO-EVO-AI">
<meta property="og:description" content="一键部署任意项目，自动完成所有工作">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hooks拦截器 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}
.nav{display:flex;align-items:center;padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--border);gap:8px}
.nav a{color:#8892b0;text-decoration:none;font-size:13px;padding:4px 10px;border-radius:6px}
.nav a:hover,.nav a.active{background:#4361ee;color:#fff}
.content{flex:1;padding:20px;max-width:1200px;margin:0 auto;width:100%}
h2{font-size:18px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px}
.card h3{font-size:14px;margin-bottom:8px;color:#8892b0}
.card .val{font-size:28px;font-weight:700}
.card .val.green{color:#22c55e}.card .val.yellow{color:#eab308}.card .val.red{color:#ef4444}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:#8892b0;font-weight:600;font-size:11px;text-transform:uppercase}
td .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge.block{background:#ef4444;color:#fff}.badge.warn{background:#eab308;color:#000}.badge.audit{background:#4361ee;color:#fff}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;margin-right:4px}
.btn.primary{background:#4361ee;color:#fff}.btn.danger{background:#ef4444;color:#fff}.btn.green{background:#22c55e;color:#fff}
input,select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;width:100%;margin-bottom:8px}
textarea{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;width:100%;height:60px;margin-bottom:8px}
.form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.form-row input{flex:1;margin-bottom:0}
</style>
  <link rel="stylesheet" href="/frontend/share.css">
</head><body>
<div class="nav"><h2 style="font-size:16px;margin-right:16px">🪝 Hooks拦截器</h2><a href="/admin">←</a></div>
<div class="content">
  <div class="grid">
    <div class="card"><h3>规则总数</h3><div class="val" id="ruleCount">-</div></div>
    <div class="card"><h3>审计日志条数</h3><div class="val" id="logCount">-</div></div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <h3>测试命令</h3>
    <div class="form-row">
      <input id="testCmd" placeholder="输入命令测试... 如: rm -rf /">
      <button class="btn primary" onclick="testHook()">测试</button>
    </div>
    <div id="testResult" style="margin-top:8px;font-size:13px"></div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <h3>添加规则</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:end">
      <div><label style="font-size:11px;color:#8892b0">名称</label><input id="ruleName" placeholder="规则名称"></div>
      <div><label style="font-size:11px;color:#8892b0">正则匹配</label><input id="rulePattern" placeholder="rm\s+-rf\s+/"></div>
      <div style="display:flex;gap:4px;align-items:end">
        <select id="ruleAction" style="flex:1"><option value="block">拦截</option><option value="warn">警告</option><option value="audit">审计</option></select>
        <button class="btn green" onclick="addRule()">添加</button>
      </div>
    </div>
  </div>
  <div style="margin-top:20px">
    <h3>规则列表</h3>
    <table id="rulesTable"><thead><tr><th>名称</th><th>类型</th><th>操作</th><th>状态</th><th>操作</th></tr></thead><tbody></tbody></table>
  </div>
  <div style="margin-top:20px">
    <h3>审计日志 (最近50条)</h3>
    <table id="logsTable"><thead><tr><th>时间</th><th>规则</th><th>命令</th><th>操作</th></tr></thead><tbody></tbody></table>
  </div>
</div>
<script>
async function api(m,p,b){try{var r=await fetch('/api/v1/hooks/'+m,{method:p||'GET',headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null});return await r.json()}catch(e){return{success:false}}}

async function loadStatus(){
  var d=await api('status');
  if(d&&d.success){
    document.getElementById('ruleCount').textContent=d.rules_count||'-';
    document.getElementById('logCount').textContent=d.logs_count||'-';
  }
}
async function loadRules(){
  var d=await api('rules');
  var tbody=document.querySelector('#rulesTable tbody');
  if(!d||!d.rules){tbody.innerHTML='<tr><td colspan="5">暂无规则</td></tr>';return}
  tbody.innerHTML=d.rules.map(r=>`<tr>
    <td>${r.name}<br><span style="font-size:11px;color:#8892b0">${r.description||r.pattern}</span></td>
    <td>${r.type}</td>
    <td><span class="badge ${r.action}">${r.action}</span></td>
    <td>${r.enabled?'✅':'❌'}</td>
    <td><button class="btn danger" onclick="deleteRule('${r.id}')">删除</button></td>
  </tr>`).join('')
}
async function loadLogs(){
  var d=await api('logs?limit=50');
  var tbody=document.querySelector('#logsTable tbody');
  if(!d||!d.logs||!d.logs.length){tbody.innerHTML='<tr><td colspan="4">暂无日志</td></tr>';return}
  tbody.innerHTML=d.logs.slice().reverse().map(l=>`<tr>
    <td style="font-size:11px;color:#8892b0">${new Date(l.timestamp*1000).toLocaleTimeString()}</td>
    <td>${l.rule_name||'-'}</td>
    <td style="font-size:11px;font-family:monospace">${(l.command||'').slice(0,40)}</td>
    <td><span class="badge ${l.action_taken}">${l.action_taken}</span></td>
  </tr>`).join('')
}
async function testHook(){
  var cmd=document.getElementById('testCmd').value;if(!cmd)return
  var d=await api('check','POST',{command:cmd});
  var el=document.getElementById('testResult');
  if(d&&d.allowed){
    if(d.warn)el.innerHTML='<span style="color:#eab308">⚠️ 允许但警告: '+d.reason+'</span>'
    else el.innerHTML='<span style="color:#22c55e">✅ 允许执行</span>'
  }else{
    el.innerHTML='<span style="color:#ef4444">🚫 被拦截: '+(d?.reason||d?.error||'未知')+'</span>'
  }
}
async function addRule(){
  var name=document.getElementById('ruleName').value;
  var pattern=document.getElementById('rulePattern').value;
  var action=document.getElementById('ruleAction').value;
  if(!name||!pattern)return alert('请填写名称和正则');
  var d=await api('rules','POST',{name,pattern,action,rule_type:'pre_exec',description:''});
  if(d&&d.success){document.getElementById('ruleName').value='';document.getElementById('rulePattern').value='';loadRules();loadStatus()}
  else alert('添加失败')
}
async function deleteRule(id){
  if(!confirm('确定删除该规则？'))return
  var d=await api('rules/'+id,'DELETE');
  if(d&&d.deleted){loadRules();loadLogs();loadStatus()}
}
loadStatus();loadRules();loadLogs()
</script></body></html>
