<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AUTO-EVO-AI 管理后台</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
:root{--bg:#0f0f1a;--card:#1a1a2e;--border:#2d3561;--text:#e0e0e0;--text2:#8892b0;--accent:#4361ee}
body{background:var(--bg);color:var(--text);padding:20px}
.header{text-align:center;padding:20px 0}
.header h1{font-size:24px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1200px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:transform .2s}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card h3{font-size:15px;margin-bottom:8px}
.card p{font-size:12px;color:var(--text2);line-height:1.6}
.card .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;margin-top:8px;margin-right:4px}
.tag-ready{background:#00b89420;color:#00b894;border:1px solid #00b89440}
.tag-pending{background:#fdcb6e20;color:#fdcb6e;border:1px solid #fdcb6e40}
.tag-pro{background:#4361ee20;color:#4361ee;border:1px solid #4361ee40}
.card .actions{margin-top:12px;display:flex;gap:8px}
.card .actions button{padding:6px 14px;border:none;border-radius:6px;font-size:12px;cursor:pointer;background:var(--accent);color:#fff}
.card .actions button:hover{opacity:.9}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;max-width:1200px;margin:20px auto}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:var(--accent)}
.stat .label{font-size:12px;color:var(--text2);margin-top:4px}
</style></head><body>
<div class="header"><h1>⚡ AUTO-EVO-AI 商业版管理后台</h1><p style="color:var(--text2);font-size:13px;margin-top:4px">生产力级 AI 自动化编排系统 V0.1</p></div>

<div class="stats" id="stats"></div>
<div class="grid" id="moduleGrid"></div>

<script>
const API='/api/v1'
async function loadStats(){
  try{
    const r=await fetch(API+'/status');const d=await r.json()
    document.getElementById('stats').innerHTML=`
      <div class="stat"><div class="num">${d.modules_total||0}</div><div class="label">模块总数</div></div>
      <div class="stat"><div class="num">${d.modules_loaded||0}</div><div class="label">已加载</div></div>
      <div class="stat"><div class="num">9</div><div class="label">支持语言</div></div>
      <div class="stat"><div class="num">100</div><div class="label">行业方案</div></div>
      <div class="stat"><div class="num">57</div><div class="label">外部工具</div></div>
    `
  }catch(e){}
}

const modules=[
  {name:'📝 智能写作',desc:'合同/方案/报告/通知/翻译/总结/创意写作',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'💻 代码助手',desc:'生成/解释/优化/调试/正则/API/测试/SQL',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'📊 文档生成',desc:'Word/PPT/Excel 自动生成',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'🎨 AI绘图',desc:'Stable Diffusion / DALL-E / 文心一格',tag:'待配置',tagClass:'tag-pending',action:'/','actionLabel':'配置'},
  {name:'🎬 视频制作',desc:'Pixelle 集成 / 脚本 / 剪辑建议',tag:'待配置',tagClass:'tag-pending',action:'/','actionLabel':'配置'},
  {name:'👤 数字人',desc:'TTS语音 / 数字人面板 / 虚拟形象',tag:'待配置',tagClass:'tag-pending',action:'/','actionLabel':'配置'},
  {name:'🔍 智能搜索',desc:'DuckDuckGo / GitHub / 网页爬虫',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'📧 邮件服务',desc:'SMTP 发送 / 模板 / 批量',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'📋 待办看板',desc:'任务管理 / 提醒 / 完成跟踪',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'🖥️ 桌面控制',desc:'截图 / 打开应用 / RPA',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'⏰ 定时任务',desc:'备份 / 报表 / 通知 / 扫描',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'🌍 多语言',desc:'9种语言 / i18n / 翻译',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'🧠 持久记忆',desc:'SQLite 存储 / 回忆 / 知识库',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'🔌 API网关',desc:'调用外部API / 代理 / Webhook',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'🐳 Docker',desc:'一键部署 / 100行业 / 容器管理',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'💰 支付集成',desc:'支付宝 / 微信 / Stripe',tag:'商业版',tagClass:'tag-pro',action:'#payment','actionLabel':'配置'},
  {name:'🔐 用户系统',desc:'注册/登录 / JWT / 权限',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'📦 插件商店',desc:'第三方扩展 / 生态',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
  {name:'📊 BI看板',desc:'Metabase / Grafana / 图表',tag:'待配置',tagClass:'tag-pending',action:'/','actionLabel':'配置'},
  {name:'📱 PWA支持',desc:'移动端 / 离线 / 桌面图标',tag:'运行中',tagClass:'tag-ready',action:'/','actionLabel':'打开'},
];

function renderModules(){
  const g=document.getElementById('moduleGrid')
  g.innerHTML=modules.map(m=>`
    <div class="card">
      <h3>${m.name}</h3>
      <p>${m.desc}</p>
      <span class="tag ${m.tagClass}">${m.tag}</span>
      <div class="actions"><button onclick="window.location.href='${m.action}'">${m.actionLabel}</button></div>
    </div>
  `).join('')
}

loadStats();renderModules()
</script></body></html>
