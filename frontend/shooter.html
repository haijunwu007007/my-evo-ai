<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🛩️ 打飞机</title>
<style>*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;overflow:hidden}
#w{text-align:center;max-width:500px;width:100%}
#t{display:flex;justify-content:space-between;align-items:center;padding:8px;color:#e0e0e0}
#s{font-size:20px;color:#f59e0b;font-weight:700}
#r{padding:6px 16px;border-radius:8px;border:1px solid #4361ee;background:transparent;color:#4361ee;cursor:pointer;font-size:14px}
canvas{display:block;margin:0 auto;background:#0a0a1a;border-radius:16px;border:2px solid #2d3561;width:100%;max-width:400px;aspect-ratio:3/4;touch-action:none}
#i{color:#8892b0;font-size:13px;margin-top:8px}
a{color:#4361ee;text-decoration:none;font-size:13px}
</style>
</head>
<body>
<div id="w">
<div id="t"><span>🛩️ 打飞机</span><span id="s">0</span><button id="r">🔄</button></div>
<canvas id="c"></canvas>
<div id="i">👆 点击/触摸射击 | <a href="/">←返回</a></div>
</div>
<script>
var cv=document.getElementById('c'),cx=cv.getContext('2d')
var W=400,H=533,pw=50,ph=40,px=175,py=460,bullets=[],enemies=[],stars=[]
var score=0,dead=false,bSpeed=8,eSpeed=1.5,spawnTimer=0,firing=false

function init(){
  px=175;py=460;bullets=[];enemies=[];score=0;dead=false;stars=[]
  for(var i=0;i<50;i++){stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5})}
  document.getElementById('s').textContent='0';document.getElementById('i').textContent='👆 点击/触摸射击'
}

// 触摸/鼠标控制飞机移动
var tx=175
cv.addEventListener('touchstart',function(e){e.preventDefault();firing=true;tx=e.touches[0].clientX-cv.getBoundingClientRect().left},{passive:false})
cv.addEventListener('touchmove',function(e){e.preventDefault();tx=e.touches[0].clientX-cv.getBoundingClientRect().left},{passive:false})
cv.addEventListener('touchend',function(e){e.preventDefault();firing=false},{passive:false})
cv.addEventListener('mousemove',function(e){var r=cv.getBoundingClientRect();tx=e.clientX-r.left})
cv.addEventListener('mousedown',function(){firing=true})
cv.addEventListener('mouseup',function(){firing=false})

function spawnEnemy(){
  var x=Math.random()*(W-30)+15,t=Math.random()
  var type=t<0.3?'small':t<0.6?'medium':'large'
  var speed=type==='small'?2.5:type==='medium'?1.8:1.2
  var hp=type==='small'?1:type==='medium'?2:3
  enemies.push({x:x,y:-20,w:type==='small'?24:type==='medium'?32:40,h:type==='small'?18:type==='medium'?24:30,speed:speed,hp:hp,maxHp:hp,type:type})
}

function update(){
  if(dead)return
  // 移动飞机
  px=Math.max(0,Math.min(W-pw,tx-25))
  // 射击
  if(firing&&bullets.length<5){bullets.push({x:px+pw/2-2,y:py-10})}
  // 子弹移动
  for(var i=bullets.length-1;i>=0;i--){bullets[i].y-=bSpeed;if(bullets[i].y<-10)bullets.splice(i,1)}
  // 生成敌人
  spawnTimer++;if(spawnTimer>25-score/50){spawnEnemy();spawnTimer=0}
  // 敌人移动
  for(var i=enemies.length-1;i>=0;i--){
    enemies[i].y+=enemies[i].speed
    // 碰撞检测-子弹
    for(var j=bullets.length-1;j>=0;j--){
      if(bullets[j].x<enemies[i].x+enemies[i].w&&bullets[j].x+4>enemies[i].x&&bullets[j].y<enemies[i].y+enemies[i].h&&bullets[j].y+8>enemies[i].y){
        enemies[i].hp--;bullets.splice(j,1);
        if(enemies[i].hp<=0){score+=enemies[i].type==='small'?10:enemies[i].type==='medium'?20:30;document.getElementById('s').textContent=score;enemies.splice(i,1)}
        break
      }
    }
    if(i>=enemies.length)continue
    // 碰撞检测-玩家
    if(enemies[i].x+enemies[i].w>px&&enemies[i].x<px+pw&&enemies[i].y+enemies[i].h>py&&enemies[i].y<py+ph){
      dead=true;document.getElementById('i').textContent='💥 被击落了！得分:'+score
    }
    if(enemies[i].y>H)enemies.splice(i,1)
  }
}

function draw(){
  cx.fillStyle='#0a0a1a';cx.fillRect(0,0,W,H)
  // 星星
  for(var i=0;i<stars.length;i++){cx.fillStyle='#fff';cx.globalAlpha=stars[i].s/3;cx.beginPath();cx.arc(stars[i].x,stars[i].y,stars[i].s,0,Math.PI*2);cx.fill()}
  cx.globalAlpha=1
  // 子弹
  cx.fillStyle='#fbbf24';for(var i=0;i<bullets.length;i++){cx.fillRect(bullets[i].x,bullets[i].y,4,10)}
  // 敌人
  for(var i=0;i<enemies.length;i++){
    cx.fillStyle=enemies[i].type==='small'?'#ef4444':enemies[i].type==='medium'?'#f59e0b':'#8b5cf6'
    cx.beginPath()
    cx.moveTo(enemies[i].x+enemies[i].w/2,enemies[i].y)
    cx.lineTo(enemies[i].x+enemies[i].w,enemies[i].y+enemies[i].h*0.6)
    cx.lineTo(enemies[i].x+enemies[i].w*0.8,enemies[i].y+enemies[i].h)
    cx.lineTo(enemies[i].x+enemies[i].w*0.2,enemies[i].y+enemies[i].h)
    cx.lineTo(enemies[i].x,enemies[i].y+enemies[i].h*0.6)
    cx.closePath();cx.fill()
  }
  // 玩家飞机
  cx.fillStyle='#4361ee'
  cx.beginPath()
  cx.moveTo(px+pw/2,py)
  cx.lineTo(px+pw*0.9,py+ph*0.5)
  cx.lineTo(px+pw*0.6,py+ph*0.7)
  cx.lineTo(px+pw*0.6,py+ph)
  cx.lineTo(px+pw*0.4,py+ph)
  cx.lineTo(px+pw*0.4,py+ph*0.7)
  cx.lineTo(px+pw*0.1,py+ph*0.5)
  cx.closePath();cx.fill()
  // 火焰
  cx.fillStyle='#f59e0b';cx.beginPath();cx.moveTo(px+pw/2-6,py+ph);cx.lineTo(px+pw/2,py+ph+12);cx.lineTo(px+pw/2+6,py+ph);cx.closePath();cx.fill()
  if(dead){cx.fillStyle='rgba(239,68,68,0.4)';cx.fillRect(0,0,W,H);cx.fillStyle='#ef4444';cx.font='bold 24px sans-serif';cx.textAlign='center';cx.fillText('💥 坠毁',W/2,H/2-20);cx.font='18px sans-serif';cx.fillText('得分: '+score,W/2,H/2+12)}
  cx.fillStyle='#fff';cx.font='12px sans-serif';cx.textAlign='left';cx.fillText('🛩️ '+score,8,18)
}

function loop(){update();draw();requestAnimationFrame(loop)}
document.getElementById('r').addEventListener('click',init)
init();requestAnimationFrame(loop)
</script>
</body>
</html>
