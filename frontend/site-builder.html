<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>一键建站 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--card)}
.topbar h1{font-size:18px;font-weight:700}
.topbar .back{color:var(--accent);text-decoration:none;font-size:14px}
.container{max-width:800px;margin:0 auto;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px}
.card h3{font-size:15px;margin-bottom:10px}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:10px;font-family:inherit}
textarea{min-height:80px;resize:vertical}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}
.btn-g{background:#10b981;color:#fff}.btn-g:hover{opacity:.9}
.preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;min-height:200px;margin-top:10px;font-size:14px;line-height:1.6}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
</style></head><body>
<div class="topbar"><a href="/" class="back">← 返回</a><h1>🌐 一键建站</h1></div>
<div class="container">
  <div class="card">
    <h3>📝 描述你的网站</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:10px">用一句话描述你想建的网站，AI会自动生成HTML页面</p>
    <div class="row">
      <input id="desc" placeholder="例如：一个介绍我的AI咨询服务的落地页" style="flex:1;margin:0">
      <select id="template" style="width:auto;flex-shrink:0;margin:0">
        <option value="landing">落地页</option><option value="blog">博客</option><option value="business">企业站</option><option value="portfolio">作品集</option>
      </select>
      <button class="btn btn-p" onclick="generate()">🚀 生成</button>
    </div>
  </div>

  <div class="card" id="result" style="display:none">
    <h3>✅ 网站已生成</h3>
    <div class="preview" id="preview"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-g" onclick="copyCode()">📋 复制代码</button>
      <button class="btn btn-o" onclick="openSite()" id="openBtn" style="display:none">🔗 在线查看</button>
    </div>
  </div>

  <div class="card" style="text-align:center;padding:30px">
    <div style="font-size:36px;margin-bottom:8px">⚡</div>
    <p style="font-size:13px;color:var(--text2)">输入描述 → AI生成 → 一键上线</p>
  </div>
</div>

<script>
function generate(){
  var desc=document.getElementById('desc').value.trim();
  if(!desc){alert('请描述你想建的网站');return}
  var tpl=document.getElementById('template').value;
  document.getElementById('result').style.display='block';
  document.getElementById('preview').innerHTML='<div style="color:var(--text3)">🤖 AI正在生成网站...</div>';
  fetch('/api/v1/site-builder/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({description:desc,template:tpl})})
  .then(function(r){return r.json()}).then(function(d){
    if(d.success){
      document.getElementById('preview').innerHTML=d.html||'生成完成';
      document.getElementById('openBtn').style.display=d.url?'inline-block':'none';
      document.getElementById('openBtn').onclick=function(){window.open(d.url)};
    }else{
      document.getElementById('preview').innerHTML='<div style="color:#ef4444">生成失败: '+(d.error||'未知错误')+'</div>'
    }
  }).catch(function(e){
    document.getElementById('preview').innerHTML='<div style="color:#ef4444">请求失败: '+e.message+'</div>'
  });
}
function copyCode(){
  var html=document.getElementById('preview').innerHTML;
  navigator.clipboard.writeText(html).then(function(){alert('代码已复制')}).catch(function(){alert('复制失败')});
}
</script></body></html>
