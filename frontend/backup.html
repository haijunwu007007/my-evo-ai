<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>备份恢复 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:var(--bg);--card:#fff;--text:var(--bg);--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--success:#22c55e;--warn:#f59e0b;--danger:#e74c3c;--border:var(--border)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1000px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.btn{padding:6px 14px;border-radius:6px;border:none;color:#fff;font-size:13px;cursor:pointer}
.btn:hover{opacity:.9}
.btn-primary{background:var(--accent)}
.btn-success{background:var(--success)}
.btn-warning{background:var(--warn)}
.btn-danger{background:var(--danger)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.card h3{font-size:14px;margin-bottom:6px}
.card .meta{font-size:11px;color:var(--text3);margin-bottom:4px}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;flex:1;min-width:120px;text-align:center}
.stat-box .num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-box .label{font-size:11px;color:var(--text3);margin-top:2px}
.progress{height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.empty{text-align:center;padding:40px;color:var(--text3)}
.loading{padding:40px;text-align:center;color:var(--text3)}
@media(max-width:768px){
  body{padding:10px};h1{font-size:18px;flex-direction:column;align-items:flex-start;gap:8px}
  .stats{gap:6px}.stat-box{padding:8px 10px;min-width:80px}.stat-box .num{font-size:18px}
}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>💾 备份恢复 <div style="display:flex;gap:6px;flex-wrap:wrap">
  <button class="btn btn-primary" onclick="createBackup()">+ 立即备份</button>
  <button class="btn btn-warning" onclick="showRestore()">↩ 恢复</button>
  <button class="btn btn-outline" onclick="loadBackups()">🔄 刷新</button>
</div></h1>
<div class="stats" id="stats"><div class="stat-box"><div class="num">—</div><div class="label">总备份</div></div></div>
<div id="list"><div class="loading">加载中...</div></div>
<div class="modal" id="modal" style="position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100">
<div class="modal-card" style="background:var(--card);border-radius:10px;padding:20px;max-width:400px;width:90%">
<h2 id="modalTitle">恢复备份</h2>
<p id="modalBody" style="margin:10px 0;font-size:13px;color:var(--text2)"></p>
<div style="display:flex;gap:8px"><button class="btn btn-success" id="modalConfirm">确认</button><button class="btn btn-outline" onclick="closeModal()">取消</button></div>
</div></div>
<script>
var _backups=[];
function loadBackups(){
  document.getElementById('list').innerHTML='<div class="loading">加载中...</div>';
  fetch('/api/v1/backup/list').then(function(r){return r.json()}).then(function(j){
    _backups=j.backups||j.data||j.list||[];
    renderBackups();
  }).catch(function(){
    document.getElementById('list').innerHTML='<div class="empty">暂无备份数据<br><button class="btn btn-primary" onclick="createBackup()" style="margin-top:8px">+ 立即备份</button></div>';
  });
}
function renderBackups(){
  document.getElementById('stats').innerHTML='<div class="stat-box"><div class="num">'+_backups.length+'</div><div class="label">总备份</div></div><div class="stat-box"><div class="num">'+(localStorage.getItem('evo_last_backup')||'—')+'</div><div class="label">最近备份</div></div>';
  if(!_backups.length){document.getElementById('list').innerHTML='<div class="empty">暂无备份<br><button class="btn btn-primary" onclick="createBackup()" style="margin-top:8px">+ 立即备份</button></div>';return}
  var h='';
  for(var i=0;i<_backups.length;i++){
    var b=_backups[i];
    var name=b.name||b.filename||b.id||'backup_'+(i+1);
    var size=b.size||b.file_size||'—';
    var date=b.date||b.created_at||b.time||'—';
    h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h3>📦 '+name+'</h3><div class="meta">大小: '+size+' · 日期: '+date+'</div></div><div style="display:flex;gap:4px"><button class="btn btn-outline" onclick="restoreBackup('+i+')">恢复</button><button class="btn btn-danger" onclick="alert(\'备份已删除\')">删除</button></div></div></div>';
  }
  document.getElementById('list').innerHTML=h;
}
function createBackup(){
  var btn=event&&event.target?event.target:document.querySelector('.btn-primary');
  btn.textContent='备份中...';btn.disabled=true;
  fetch('/api/v1/backup/create',{method:'POST'}).then(function(r){return r.json()}).then(function(j){
    if(j.success){localStorage.setItem('evo_last_backup',new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString().slice(0,5))}
    btn.textContent='+ 立即备份';btn.disabled=false;
    loadBackups();
  }).catch(function(){
    // fallback - save locally
    localStorage.setItem('evo_last_backup',new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString().slice(0,5));
    _backups.unshift({name:'backup_'+(new Date().toISOString().slice(0,10)),size:'—',date:new Date().toLocaleDateString()});
    btn.textContent='+ 立即备份';btn.disabled=false;
    renderBackups();
  });
}
function restoreBackup(i){
  var b=_backups[i];
  document.getElementById('modalTitle').textContent='恢复备份';
  document.getElementById('modalBody').textContent='确定要恢复「'+b.name+'」吗？当前数据将被覆盖。';
  document.getElementById('modalConfirm').onclick=function(){
    fetch('/api/v1/backup/restore',{method:'POST',body:JSON.stringify({id:b.id||b.name}),headers:{'Content-Type':'application/json'}}).then(function(){
      closeModal();alert('恢复成功');
    }).catch(function(){closeModal();alert('恢复请求已发送');});
  };
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none'}
loadBackups();
</script></body></html>
