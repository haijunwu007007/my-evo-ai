<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>团队工作台 - AUTO-EVO-AI</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:var(--bg);--card:#fff;--text:var(--bg);--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--success:#22c55e;--border:var(--border)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:900px;margin:0 auto}
h1{font-size:22px;margin:0 0 16px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.btn{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer}
.btn:hover{opacity:.9}
.stats{display:flex;gap:12px;margin-bottom:16px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 20px;text-align:center;flex:1}
.stat-box .num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-box .label{font-size:11px;color:var(--text2)}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.card .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7209b7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;flex-shrink:0}
.card .info{flex:1}
.card .info .name{font-size:14px;font-weight:600}
.card .info .meta{font-size:11px;color:var(--text3)}
.badge{padding:2px 8px;border-radius:4px;font-size:10px}
.badge.admin{background:#fee2e2;color:#991b1b}
.badge.editor{background:#fef9c3;color:#854d0e}
.badge.viewer{background:#dcfce7;color:#166534}
.empty{text-align:center;padding:60px;color:var(--text3)}
.loading{padding:40px;text-align:center;color:var(--text3)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal-card{background:var(--card);border-radius:10px;padding:20px;max-width:400px;width:90%}
.modal-card h2{font-size:16px;margin-bottom:10px}
.modal-card input,.modal-card select{padding:8px 10px;border-radius:6px;border:1px solid var(--border);font-size:13px;width:100%;margin-bottom:8px}
@media(max-width:768px){body{padding:10px}.stats{flex-wrap:wrap}}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>团队工作台 <button class="btn" onclick="showInvite()">+ 邀请成员</button></h1>
<div class="stats" id="stats"><div class="stat-box"><div class="num">-</div><div class="label">成员</div></div></div>
<div id="list"><div class="loading">加载中...</div></div>
<div class="modal" id="modal">
  <div class="modal-card">
    <h2>邀请成员</h2>
    <input id="inviteEmail" type="email" placeholder="输入邮箱地址">
    <select id="inviteRole"><option value="viewer">查看者</option><option value="editor">编辑者</option><option value="admin">管理员</option></select>
    <button class="btn" onclick="inviteMember()">发送邀请</button>
    <button class="btn" style="background:transparent;color:var(--text2);border:1px solid var(--border)" onclick="closeModal()">取消</button>
  </div>
</div>
<script>
var _token=localStorage.getItem('evo_token')||'';

function authFetch(url,opt){
  opt=opt||{};opt.headers=opt.headers||{};
  opt.headers['Authorization']='Bearer '+_token;
  return fetch(url,opt);
}

function loadTeam(){
  document.getElementById('list').innerHTML='<div class="loading">加载中...</div>';
  authFetch('/api/v1/users').then(function(r){return r.json()}).then(function(j){
    var users=j.users||j.data||[];
    // Try to get my info
    authFetch('/api/v1/users/me').then(function(r2){return r2.json()}).then(function(me){
      var myRole=me.role||'user';
      renderTeam(users,myRole);
    }).catch(function(){renderTeam(users,'user')});
  }).catch(function(){
    document.getElementById('list').innerHTML='<div class="empty">加载失败，请确认已登录</div>';
  });
}

function renderTeam(users,myRole){
  document.getElementById('stats').innerHTML='<div class="stat-box"><div class="num">'+users.length+'</div><div class="label">成员</div></div>';
  if(!users.length){
    document.getElementById('list').innerHTML='<div class="empty">暂无团队成员<br><button class="btn" onclick="showInvite()" style="margin-top:10px">+ 邀请</button></div>';
    return;
  }
  var h='';
  for(var i=0;i<users.length;i++){
    var u=users[i];
    var initial=(u.username||u.email||'?')[0].toUpperCase();
    var role=u.role||'viewer';
    var cls=role==='admin'?'admin':role==='editor'?'editor':'viewer';
    h+='<div class="card"><div class="avatar">'+initial+'</div>';
    h+='<div class="info"><div class="name">'+(u.username||u.email||'未知')+'</div>';
    h+='<div class="meta">'+(u.email||'-')+'</div></div>';
    h+='<span class="badge '+cls+'">'+role+'</span></div>';
  }
  document.getElementById('list').innerHTML=h;
}

function showInvite(){document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}

function inviteMember(){
  var email=document.getElementById('inviteEmail').value;
  var role=document.getElementById('inviteRole').value;
  if(!email)return;
  authFetch('/api/v1/teams/invite',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,role:role})}).then(function(r){return r.json()}).then(function(j){
    closeModal();loadTeam();
    if(j.success)alert('邀请已发送到 '+email);
  }).catch(function(){alert('邀请失败');closeModal()});
}

loadTeam();
</script></body></html>
