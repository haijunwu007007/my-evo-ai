<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>已生成APP - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;max-width:900px;margin:0 auto}
h1{font-size:22px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.list{display:flex;flex-direction:column;gap:8px}
.item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.item:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(67,97,238,.1)}
.item .name{font-size:14px;font-weight:600}
.item .name a{color:var(--accent);text-decoration:none}
.item .name a:hover{text-decoration:underline}
.item .meta{font-size:11px;color:var(--text3)}
.loading{padding:60px;text-align:center;color:var(--text3)}
.empty{text-align:center;padding:60px;color:var(--text3)}
</style>
<link rel="stylesheet" href="/frontend/share.css">
</head><body>
<div class="topbar" style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)">
  <div style="display:flex;align-items:center;gap:8px">
    <a href="/" style="font-size:13px;color:var(--accent);text-decoration:none">←</a>
    <h1 style="font-size:15px;margin:0">📱 已生成 APP</h1>
  </div>
</div>
<h1>📱 应用列表 <span style="font-size:14px;color:var(--text3)" id="totalCount">加载中...</span></h1>
<div class="sub">AI 自动生成的 Web 应用程序</div>
<div class="list" id="appList"><div class="loading">正在加载应用列表...</div></div>
<script>
function loadApps(){
  fetch('/api/v1/apps/list').then(function(r){return r.json().catch(function(){return {apps:[]}})}).then(function(d){
    var apps = d.apps || d.data || d.files || [];
    if(!apps.length){
      // Fallback: fetch directory listing HTML from /output/apps/
      fetch('/output/apps/').then(function(r){return r.text()}).then(function(html){
        var links = html.match(/href="([^"]+)"/g)||[];
        apps = links.map(function(l){return l.replace('href="','').replace('"','')}).filter(function(f){return f.match(/^app_/)});
        renderApps(apps);
      }).catch(function(){
        document.getElementById('appList').innerHTML='<div class="empty">暂无生成的APP</div>';
      });
      return;
    }
    renderApps(apps);
  }).catch(function(){
    document.getElementById('appList').innerHTML='<div class="empty">暂无生成的APP</div>';
  });
}
function renderApps(apps){
  document.getElementById('totalCount').textContent = apps.length + ' 个应用';
  if(!apps.length){document.getElementById('appList').innerHTML='<div class="empty">暂无生成的APP</div>';return}
  var h = '';
  apps.forEach(function(a){
    var name = typeof a === 'string' ? a : (a.name||a.file||'unknown');
    var size = typeof a === 'object' ? (a.size||'') : '';
    var time = typeof a === 'object' ? (a.mtime||a.modified||'') : '';
    var url = '/output/apps/' + name;
    var display = name.replace(/^app_/,'').replace(/\.html$/,'').slice(0,20);
    h += '<div class="item"><div class="name"><a href="'+url+'" target="_blank">📄 '+display+'</a></div><div class="meta">'+size+(time?' · '+time:'')+'</div></div>';
  });
  document.getElementById('appList').innerHTML = h;
}
loadApps();
</script>
</body></html>
