<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/manifest.json">

<title>AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::root{--bg:#f5f5f8;--card:#fff;--sidebar:#f0f0f4;--sidebar-hover:#e4e6ed;--sidebar-active:#eef0f8;--sidebar-text:#1a1a2e;--sidebar-text2:#6b7280;--sidebar-accent:#4361ee;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--input-bg:#fff;--accent:#4361ee;--accent2:#7209b7;--user-msg:#4361ee;--ai-msg:#f0f2f8;--border:#e8eaed;--glass:rgba(255,255,255,.7);--glow:rgba(67,97,238,.15)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;height:100vh;overflow:hidden}
/* 左侧边栏 */
.sidebar{width:120px;background:var(--sidebar);display:flex;flex-direction:column;padding:4px 0;overflow-y:auto;flex-shrink:0;z-index:10;scrollbar-width:none;border-right:1px solid var(--border)}
.sidebar::-webkit-scrollbar{display:none}
.sidebar .logo{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#4361ee,#7209b7);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;margin:0 auto 4px;flex-shrink:0}
.sidebar .sbtn{display:flex;align-items:center;gap:6px;width:100%;padding:5px 10px;border:none;background:transparent;color:var(--sidebar-text2);font-size:11px;cursor:pointer;transition:all .15s;text-align:left;white-space:nowrap}
.sidebar .sbtn .sicon{font-size:13px;width:20px;text-align:center;flex-shrink:0}
.sidebar .sbtn:hover{background:var(--sidebar-hover);color:var(--sidebar-text)}
.sidebar .sbtn.active{background:var(--sidebar-active);color:var(--sidebar-accent);font-weight:600}
.sidebar .sbtn.active .sicon{filter:none}
.sidebar .spacer{flex:0 0 4px}
.sidebar .divider{height:1px;background:var(--border);margin:4px 10px}
/* 折叠分组 */
.sidebar .sgroup{display:flex;flex-direction:column;width:100%}
.sidebar .sgroup-header{display:flex;align-items:center;gap:4px;width:100%;padding:5px 8px 5px 10px;border:none;background:transparent;color:var(--sidebar-text2);font-size:10px;cursor:pointer;transition:all .15s;text-align:left;text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.sidebar .sgroup-header:hover{color:var(--sidebar-text);background:var(--sidebar-hover)}
.sidebar .sgroup-header .arrow{font-size:8px;margin-left:auto;transition:transform .2s}
.sidebar .sgroup-header .arrow.open{transform:rotate(90deg)}
.sidebar .sgroup-body{display:flex;flex-direction:column;overflow:hidden;max-height:300px;transition:max-height .25s ease}
.sidebar .sgroup-body.collapsed{max-height:0}
.sidebar .sgroup-body .sbtn{padding-left:24px;font-size:10px}
/* 主区域 */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
/* 顶栏 */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card);height:44px}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-left h1{font-size:14px;font-weight:700;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.model-badge{background:var(--accent);color:#fff;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer}
.topbar-right{display:flex;align-items:center;gap:4px}
.topbar-right span{font-size:11px;color:var(--text2);cursor:pointer;padding:3px 8px;border-radius:6px;transition:all .2s}
.topbar-right span:hover{background:var(--glass);color:var(--accent)}
/* 内容区 */
.content-flex{flex:1;display:flex;overflow:hidden}
.left-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* 对话区 */
.messages{flex:1;overflow-y:auto;padding:8px 16px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin}
.msg{display:flex;flex-direction:column;animation:fadeIn .35s ease-out}
.msg.user{align-items:flex-end}
.msg.bot{align-items:flex-start}
.msg-bubble{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:var(--user-msg);color:#fff;border-bottom-right-radius:4px}
.msg.bot .msg-bubble{background:var(--ai-msg);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-label{font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:500}
/* 底部输入区 */
.input-area{flex-shrink:0;padding:8px 0 12px}
.input-row{display:flex;gap:6px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:2px 2px 2px 12px;transition:all .2s}
@media(min-width:768px){.input-row input{font-size:15px;padding:10px 0}}
@media(max-width:767px){.input-area{padding:6px 6px 10px}}
.input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.input-row input{flex:1;border:none;outline:none;padding:8px 0;font-size:14px;background:transparent;color:var(--text)}
.input-row input::placeholder{color:var(--text3)}
.input-row button{width:32px;height:32px;border-radius:7px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.input-row button:hover{opacity:.9}
.input-row input{flex:1}.kbd-btn{width:28px;height:28px;border:none;border-radius:6px;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;transition:all .1s;margin-left:2px}.kbd-btn:hover{color:var(--accent);background:var(--glass)}.input-row button.mic{font-size:0;padding:0;background:#f0f2f8;color:var(--text);border:1px solid var(--border);border-radius:8px;height:32px;width:32px;transition:all .2s;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.input-row button.mic:hover{border-color:var(--accent);background:#e4e6ed}.input-row button.mic{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
/* 语音条 */
.voice-bar{display:flex;align-items:center;justify-content:center;height:42px;border-radius:8px;background:var(--bg);border:1px solid var(--border);cursor:pointer;user-select:none;position:relative;transition:all .15s;touch-action:manipulation}.voice-bar.hidden{display:none}.voice-bar:active{background:#e74c3c;transform:scale(0.99)}.voice-bar.recording{background:#e74c3c;border-color:#e74c3c;animation:vPulse .8s infinite}@keyframes vPulse{0%{box-shadow:0 0 6px rgba(231,76,60,.4)}50%{box-shadow:0 0 14px rgba(231,76,60,.7)}100%{box-shadow:0 0 6px rgba(231,76,60,.4)}}.voice-bar .vb-label{font-size:14px;font-weight:500;color:var(--text2);pointer-events:none}.voice-bar.recording .vb-label{color:#fff}.voice-bar .vb-cancel{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;border:none;background:rgba(0,0,0,.08);color:var(--text3);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto}.voice-bar .vb-cancel:hover{background:rgba(0,0,0,.15);color:var(--text)}
/* 右侧面板 */
.right-panel{width:260px;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;flex-shrink:0;position:relative;transition:width .25s ease}.right-panel.hidden{width:0;min-width:0;border-left:none;overflow:visible}.right-panel.hidden .right-header,.right-panel.hidden .right-content{display:none}
.right-toggle-btn{position:absolute;top:50%;transform:translateY(-50%);width:24px;height:48px;border-radius:0 8px 8px 0;border:1px solid var(--border);border-left:none;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);z-index:5;transition:all .2s;box-shadow:2px 0 8px rgba(0,0,0,.08);right:auto;left:-24px}.right-toggle-btn:hover{color:var(--accent);background:var(--glass)}.right-panel.hidden .right-toggle-btn{left:-24px;border-radius:0 8px 8px 0}.right-toggle-btn::before{content:'▶'}div.right-panel:not(.hidden) .right-toggle-btn::before{content:'◀'}
.right-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.right-header h3{font-size:12px;font-weight:600;color:var(--text2)}
.right-header span{cursor:pointer;font-size:14px;color:var(--text3)}
.attach-bar{display:flex;gap:4px;padding:2px 0;flex-wrap:wrap}.attach-bar:empty{display:none}
.attach-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:5px;font-size:10px;background:var(--glass);border:1px solid var(--border);color:var(--text2)}.attach-chip .del{color:var(--text3);cursor:pointer;margin-left:2px;font-size:11px}.attach-chip .del:hover{color:#e74c3c}
.attach-btn{font-size:16px;padding:0 6px;background:none;border:none;cursor:pointer;opacity:.6;flex-shrink:0}.attach-btn:hover{opacity:1}
.right-content{flex:1;overflow-y:auto;padding:8px}
/* 搜索框 */
.search-card{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 8px;margin-bottom:8px}
.search-card input{flex:1;border:none;outline:none;padding:4px 0;font-size:12px;background:transparent;color:var(--text)}
.search-card input::placeholder{color:var(--text3)}
.search-card .srch-btn{width:24px;height:24px;border-radius:5px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.search-card .srch-count{font-size:10px;color:var(--text3);white-space:nowrap}

/* 右侧面板内容 */
.rsec{margin-bottom:12px}
.rsec h4{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.rsec .ritem{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .2s}
.rsec .ritem:hover{background:var(--glass);color:var(--accent)}
/* 登录 */
.auth-wrap{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:100}
.auth-wrap.active{display:flex}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:340px;width:90%;text-align:center}
.auth-card .logo-big{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#4361ee,#7209b7);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin:0 auto 10px}
.auth-card h2{font-size:18px;font-weight:700;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.auth-card p{font-size:11px;color:var(--text3);margin-bottom:16px}
.auth-card .field{margin-bottom:10px;text-align:left}
.auth-card .field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.auth-card .field input{width:100%;padding:9px 12px;border-radius:7px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;outline:none}
.auth-card .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.auth-card .btn{width:100%;padding:10px;border:none;border-radius:7px;background:var(--accent);color:#fff;font-size:13px;cursor:pointer;font-weight:600}
.auth-card .btn:hover{opacity:.9}
.lang-select select{padding:3px 8px;border-radius:5px;font-size:11px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);cursor:pointer}
/* 问候 */
.greeting{font-size:12px;color:var(--text3);padding:2px 16px;text-align:center;flex-shrink:0}
/* 提示 */
.tip-bar{display:flex;gap:6px;padding:4px 0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tip-bar span{flex-shrink:0;padding:3px 10px;border-radius:12px;font-size:11px;background:var(--glass);border:1px solid var(--border);color:var(--text3);cursor:pointer}
.tip-bar span:hover{color:var(--accent);border-color:var(--accent)}
/* 微交互 */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.loading-dots{display:inline-flex;gap:4px;padding:6px 0}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite ease-in-out both}
.loading-dots span:nth-child(1){animation-delay:-.32s}
.loading-dots span:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.tip-bar{touch-action:pan-x}
.tip-bar:hover{cursor:grab}
/* 移动端 */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .25s;width:180px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.3);display:none}
  .sidebar-overlay.show{display:block}
  .right-panel{position:fixed;right:0;top:0;height:100vh;z-index:80;width:260px;box-shadow:-4px 0 20px rgba(0,0,0,.12)}
  .topbar{padding:6px 10px;height:40px}
  .topbar-left h1{font-size:13px}
  .hamburger{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:16px;cursor:pointer;flex-shrink:0}
  .hamburger:hover{background:var(--glass)}
  .main{flex:1}
  .messages{padding:6px 10px}
  .greeting{margin:0 0 8px}
  .greeting p{font-size:13px}
  .input-area{padding:6px 10px 10px}
  .input-row input{font-size:14px;padding:8px 0}
  .input-row button{width:34px;height:34px}
  .attach-bar{padding:2px 10px}
  .msg-bubble{max-width:92%;font-size:13px}
  .auth-card{padding:20px;max-width:100%}
  .right-toggle-btn{display:flex;z-index:81}
}
@media(min-width:769px){
  .hamburger{display:none}
  .sidebar-overlay{display:none!important}
}
/* 首次引导 */
.onboard-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.onboard-overlay.show{display:flex}
.onboard-card{background:var(--card);border-radius:16px;padding:32px;max-width:440px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.onboard-card h2{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.onboard-card .sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:20px}
.onboard-card .step{font-size:11px;color:var(--text3);text-align:center;margin-bottom:16px}
.onboard-card .q{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}
.onboard-card .opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.onboard-card .opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .2s;font-size:13px;color:var(--text2)}
.onboard-card .opt:hover{border-color:var(--accent);background:rgba(67,97,238,.04)}
.onboard-card .opt.selected{border-color:var(--accent);background:rgba(67,97,238,.08);color:var(--accent);font-weight:600}
.onboard-card .opt .oicon{font-size:18px}
.onboard-card .nav{display:flex;gap:8px;justify-content:center;margin-top:4px}
.onboard-card .nav button{padding:8px 20px;border-radius:8px;border:none;font-size:13px;cursor:pointer;font-weight:600;transition:all .2s}
.onboard-card .nav .skip{background:transparent;color:var(--text3)}
.onboard-card .nav .skip:hover{color:var(--text2)}
.onboard-card .nav .next{background:var(--accent);color:#fff}
.onboard-card .nav .next:hover{opacity:.9}
.onboard-card .nav .next:disabled{opacity:.4;cursor:default}
/* 快捷入口 */
.quick-start{display:flex;gap:6px;padding:6px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.quick-start::-webkit-scrollbar{display:none}
.quick-start .qcard{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;text-align:center;min-width:80px}
.quick-start .qcard:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 2px 8px var(--glow)}
.quick-start .qcard .qi{font-size:18px}
.quick-start .qcard .ql{font-size:10px;color:var(--text2);margin-top:2px}
</style>

</head>
<body>

<!-- 登录 -->
<div class="auth-wrap" id="authWrap">
  <div class="auth-card">
    <div class="logo-big">⚡</div>
    <h2>AUTO-EVO-AI</h2>
    <p>生产力级 AI 自动化编排系统</p>
    <div class="lang-select" style="margin-bottom:12px"><select id="langSelAuth" onchange="setLocale(this.value)">
<option value="zh-CN">🇨🇳 中文</option>
<option value="en">🇬🇧 English</option>
<option value="ja">🇯🇵 日本語</option>
<option value="ko">🇰🇷 한국어</option>
</select></div>
    <div class="field"><label>用户名</label><input id="regUser" placeholder="你的名字" value="admin"></div>
    <div class="field"><label>密码（可选）</label><input id="regPass" type="password" placeholder="留空即可"></div>
    <div class="field"><label>API Key（可选）</label><input id="regKey" placeholder="OpenAI / 其他 LLM Key"></div>
    <button class="btn" id="regBtn" onclick="doRegister()">进入系统</button>
    <div style="margin-top:8px;font-size:11px;color:var(--text3);display:flex;gap:12px;justify-content:center"><span onclick="alert('请重置密码功能待实现')" style="cursor:pointer">忘记密码？</span><span id="demoBtn" onclick="demoMode()" style="cursor:pointer;color:var(--accent)">演示模式</span></div>
  </div>
</div>

<!-- 首次引导 -->
<div class="onboard-overlay" id="onboardOverlay">
  <div class="onboard-card" id="onboardCard">
    <h2>👋 欢迎使用 AUTO-EVO-AI</h2>
    <p class="sub">先了解你一下，帮你配好最佳体验</p>
    <p class="step" id="onboardStep">第 1 步 — 共 3 步</p>
    <div id="onboardBody"></div>
    <div class="nav">
      <button class="skip" onclick="skipOnboard()">跳过 → 直接开始</button>
      <button class="next" id="onboardNext" onclick="nextOnboard()" disabled>下一步</button>
    </div>
  </div>
</div>

<script>
// ── 首次引导系统 ──
var _onboardStep = 0;
var _onboardData = {};

var _onboardQuestions = [
  {
    q: '你主要做什么？',
    opts: [
      { icon: '💼', label: '创业者 / 小生意', val: 'entrepreneur' },
      { icon: '✍️', label: '内容创作 / 自媒体', val: 'creator' },
      { icon: '🛒', label: '电商 / 零售', val: 'ecommerce' },
      { icon: '💻', label: '技术 / 编程', val: 'tech' },
      { icon: '🏢', label: '小微企业 / 团队管理', val: 'team' },
    ]
  },
  {
    q: '你最想用 AI 做什么？',
    opts: [
      { icon: '📄', label: '写文档 / 合同 / 报告', val: 'writing' },
      { icon: '📊', label: '分析数据 / 做报表', val: 'data' },
      { icon: '🤖', label: '自动回复客户 / 客服', val: 'customer' },
      { icon: '🔄', label: '自动化重复工作', val: 'automation' },
      { icon: '🎨', label: '生成图片 / 视频 / 设计', val: 'creative' },
    ]
  },
  {
    q: '选择通知方式（可多选）',
    multi: true,
    desc: '系统会在关键事件时通过这些方式通知你',
    opts: [
      { icon: '💬', label: '微信（WeChat）', val: 'wechat' },
      { icon: '✈️', label: '钉钉 / 飞书', val: 'dingtalk' },
      { icon: '📧', label: '邮件', val: 'email' },
      { icon: '🔔', label: 'Telegram', val: 'telegram' },
      { icon: '📱', label: '短信', val: 'sms' },
    ]
  }
];

function showOnboard() {
  _onboardStep = 0;
  _onboardData = {};
  document.getElementById('onboardOverlay').classList.add('show');
  renderOnboard();
}

function renderOnboard() {
  var q = _onboardQuestions[_onboardStep];
  var total = _onboardQuestions.length;
  document.getElementById('onboardStep').textContent = '第 ' + (_onboardStep+1) + ' 步 — 共 ' + total + ' 步';
  var body = document.getElementById('onboardBody');
  var html = '<div class="q">' + q.q + '</div>';
  if (q.desc) html += '<div class="desc" style="font-size:11px;color:#888;margin-bottom:10px">' + q.desc + '</div>';
  html += '<div class="opts">';
  for (var i = 0; i < q.opts.length; i++) {
    var o = q.opts[i];
    var sel = '';
    if (q.multi) {
      // 多选：检查数组
      var arr = _onboardData[_onboardStep] || [];
      sel = (arr.indexOf(o.val) >= 0) ? ' selected' : '';
    } else {
      sel = (_onboardData[_onboardStep] === o.val) ? ' selected' : '';
    }
    html += '<div class="opt' + sel + '" onclick="selectOnboard(' + _onboardStep + ',' + i + ')"><span class="oicon">' + o.icon + '</span>' + o.label + '</div>';
  }
  html += '</div>';
  body.innerHTML = html;
  if (q.multi) {
    document.getElementById('onboardNext').disabled = false; // 多选允许跳过
  } else {
    document.getElementById('onboardNext').disabled = !_onboardData[_onboardStep];
  }
}

function selectOnboard(step, idx) {
  var q = _onboardQuestions[step];
  var val = q.opts[idx].val;
  if (q.multi) {
    // 多选：切换选中状态
    var arr = _onboardData[step] || [];
    var pos = arr.indexOf(val);
    if (pos >= 0) { arr.splice(pos, 1); } else { arr.push(val); }
    _onboardData[step] = arr;
    // 刷新UI中的选中状态
    var opts = document.querySelectorAll('.onboard-card .opt');
    for (var i = 0; i < opts.length; i++) {
      opts[i].classList.toggle('selected', arr.indexOf(q.opts[i].val) >= 0);
    }
  } else {
    _onboardData[step] = val;
    document.querySelectorAll('.onboard-card .opt').forEach(function(el, i) {
      el.classList.toggle('selected', i === idx);
    });
    document.getElementById('onboardNext').disabled = false;
  }
}

function nextOnboard() {
  if (!_onboardData[_onboardStep]) return;
  _onboardStep++;
  if (_onboardStep >= _onboardQuestions.length) {
    finishOnboard();
    return;
  }
  renderOnboard();
}

function skipOnboard() {
  _onboardData = { skipped: true };
  finishOnboard();
}

function finishOnboard() {
  document.getElementById('onboardOverlay').classList.remove('show');
  try { localStorage.setItem('evo_onboard', JSON.stringify(_onboardData)); } catch(ex) {}
  applyOnboardPresets(_onboardData);
}

function applyOnboardPresets(data) {
  var msg = '';
  var starter = '';
  var cat = 'cat_other';
  var input = document.getElementById('input');

  if (data.skipped) {
    msg = '试试说"帮我做点什么"开始探索！';
    starter = '帮我做点什么';
  } else {
    // 获取用户选择的用途
    var purpose = data[1] || '';
    var tool = data[2] || '';
    var role = data[0] || '';

    // 找到中文标签
    function findLabel(idx) {
      if (!data[idx]) return '';
      for (var j = 0; j < _onboardQuestions[idx].opts.length; j++) {
        if (_onboardQuestions[idx].opts[j].val === data[idx])
          return _onboardQuestions[idx].opts[j].label;
      }
      return '';
    }

    var roleLabel = findLabel(0);
    var purposeLabel = findLabel(1);
    var toolLabel = findLabel(2);

    msg = roleLabel + ' · ' + purposeLabel + ' · ' + toolLabel;

    // 根据用途预设启动场景
    switch (purpose) {
      case 'writing':
        starter = '帮我写一份商业计划书';
        cat = 'cat_doc';
        break;
      case 'data':
        starter = '帮我分析一下这份数据';
        cat = 'cat_data';
        break;
      case 'customer':
        starter = '帮我设置一个自动回复客服流程';
        cat = 'cat_comm';
        break;
      case 'automation':
        starter = '帮我创建一个自动化工作流';
        cat = 'cat_biz';
        break;
      case 'creative':
        starter = '帮我生成一张产品宣传图';
        cat = 'cat_life';
        break;
      default:
        starter = '你好！我可以做什么？';
    }

    // 根据通知选择（支持多选）
    var notifLabels = '';
    var notifData = data[2];
    if (notifData && typeof notifData === 'object') {
      var names = [];
      for (var ni = 0; ni < notifData.length; ni++) {
        for (var nj = 0; nj < _onboardQuestions[2].opts.length; nj++) {
          if (_onboardQuestions[2].opts[nj].val === notifData[ni]) {
            names.push(_onboardQuestions[2].opts[nj].icon + ' ' + _onboardQuestions[2].opts[nj].label);
          }
        }
      }
      if (names.length) notifLabels = names.join(', ');
    } else if (typeof notifData === 'string') {
      notifLabels = notifData;
    }
    if (notifLabels) msg += ' 通知: ' + notifLabels;

    // 根据角色记录到localStorage（供后续使用）
    var cfg = { role: data[0], purpose: purpose, tool: tool, completed: true };
    try { localStorage.setItem('evo_config', JSON.stringify(cfg)); } catch(ex) {}
  }

  // 更新问候语
  var g = document.getElementById('greeting');
  if (g) g.textContent = '👋 你好！' + msg;

  // 自动填充输入框
  if (starter && input) {
    input.value = starter;
    input.focus();
    input.setSelectionRange(starter.length, starter.length);
  }

  // 自动打开对应分类
  if (cat) {
    var bodies = document.querySelectorAll('.cat-body');
    for (var i = 0; i < bodies.length; i++) bodies[i].style.display = 'none';
    var target = document.getElementById(cat);
    if (target) target.style.display = 'flex';
    // 高亮分类标签
    var tabs = document.querySelectorAll('.cat-tab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    var activeTab = document.querySelector('.cat-tab[onclick*="' + cat + '"]');
    if (activeTab) activeTab.classList.add('active');
  }
}

// 检查是否首次登录
function checkOnboard() {
  try {
    var d = JSON.parse(localStorage.getItem('evo_onboard'));
    if (d) return;
  } catch(ex) {}
  // 首次登录，延迟显示引导
  setTimeout(showOnboard, 500);
}
</script>

<script>
// ── 语音输入 ──
var _vStream=null,_vCtx=null,_vNode=null,_vSamples=[];

function switchToVoice(){
  document.getElementById('textInputRow').style.display='none';
  document.getElementById('voiceBar').classList.remove('hidden');
  document.getElementById('vbLabel').textContent='按住 说话';
}
function switchToText(){
  document.getElementById('voiceBar').classList.add('hidden');
  document.getElementById('voiceBar').classList.remove('recording');
  document.getElementById('textInputRow').style.display='flex';
  _cleanVoice();
}

function _resample(src,srcRate){
  if(srcRate==16000)return src;
  var ratio=srcRate/16000,len=Math.round(src.length/ratio),out=new Float32Array(len);
  for(var i=0;i<len;i++){
    var idx=i*ratio,fi=Math.floor(idx),frac=idx-fi;
    out[i]=src[fi]*(1-frac)+(src[fi+1]||0)*frac;
  }
  return out;
}

function _wavBlob(samples,sr){
  samples=_resample(samples,sr);sr=16000;
  var l=samples.length,buf=new ArrayBuffer(44+l*2),v=new DataView(buf);
  function wS(p,s){for(var i=0;i<s.length;i++)v.setUint8(p+i,s.charCodeAt(i))}
  wS(0,'RIFF');v.setUint32(4,36+l*2,true);wS(8,'WAVE');
  wS(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);
  v.setUint16(32,2,true);v.setUint16(34,16,true);
  wS(36,'data');v.setUint32(40,l*2,true);
  for(var i=0;i<l;i++){var s=Math.max(-1,Math.min(1,samples[i]));v.setInt16(44+i*2,s<0?s*0x8000:s*0x7FFF,true)}
  return new Blob([buf],{type:'audio/wav'})
}

function voiceStart(e){
  e.preventDefault();
  var vb=document.getElementById('voiceBar');
  vb.classList.add('recording');
  document.getElementById('vbLabel').textContent='松开 结束';
  _vSamples=[];
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){_voiceFail();return}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
    _vStream=s;
    _vCtx=new(window.AudioContext||window.webkitAudioContext)();
    var src=_vCtx.createMediaStreamSource(s);
    _vNode=_vCtx.createScriptProcessor(4096,1,1);
    _vNode.onaudioprocess=function(ev){var d=ev.inputBuffer.getChannelData(0);for(var i=0;i<d.length;i++)_vSamples.push(d[i])};
    src.connect(_vNode);_vNode.connect(_vCtx.destination);
  }).catch(function(){_voiceFail()});
}

function voiceStop(e){
  var vb=document.getElementById('voiceBar');
  vb.classList.remove('recording');
  if(!_vStream||!_vCtx){switchToText();return}
  if(_vNode){_vNode.disconnect();_vNode=null}
  var actualRate=_vCtx.sampleRate;
  _vCtx.close();_vCtx=null;
  if(_vStream){_vStream.getTracks().forEach(function(t){t.stop()});_vStream=null}
  if(_vSamples.length<1600){switchToText();return}
  document.getElementById('vbLabel').textContent='识别中...';
  var blob=_wavBlob(_vSamples,actualRate),fd=new FormData();
  fd.append('file',blob,'v.wav');
  var ctrl=new AbortController();
  setTimeout(function(){ctrl.abort()},25000);
  fetch('/api/v1/speech/recognize',{method:'POST',body:fd,signal:ctrl.signal}).then(function(r){return r.json()}).then(function(j){
    switchToText();
    if(j.success&&j.text){document.getElementById('input').value=j.text;send()}
  }).catch(function(){switchToText()});
}

function voiceCancel(e){switchToText()}
function _cleanVoice(){
  _vSamples=[];
  if(_vNode){try{_vNode.disconnect()}catch(ex){}_vNode=null}
  if(_vCtx){try{_vCtx.close()}catch(ex){}_vCtx=null}
  if(_vStream){_vStream.getTracks().forEach(function(t){t.stop()});_vStream=null}
}
function _voiceFail(){switchToText();alert('请在浏览器设置中允许麦克风权限');}


function demoMode(){
  localStorage.setItem('evo_demo','true');
  localStorage.setItem('evo_onboard_done','true');
  document.getElementById('regUser').value='demo';
  document.getElementById('regPass').value='demo123';
  doRegister();
}

</script>
