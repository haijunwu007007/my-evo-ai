<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTO-EVO-AI</title>
<script src="/i18n.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--card:#16213e;--text:#e0e0e0;--text2:#8892b0;--input-bg:#0f3460;--accent:#4361ee;--user-msg:#4361ee;--ai-msg:#16213e;--border:#2d3561}
@media(prefers-color-scheme:light){:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text2:#6c757d;--input-bg:#fff;--accent:#4361ee;--user-msg:#4361ee;--ai-msg:#f8f9fa;--border:#dee2e6}}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:720px;margin:0 auto;padding:20px 16px;min-height:100vh;display:flex;flex-direction:column}
.header{text-align:center;padding:16px 0 8px;flex-shrink:0}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:13px;color:var(--text2);margin:4px 0 8px}
/* ── 注册/登录表单 ── */
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:400px;margin:20px auto;width:100%;flex-shrink:0}
.auth-card h2{text-align:center;font-size:18px;margin-bottom:16px}
.auth-card .field{margin-bottom:12px}
.auth-card .field label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px}
.auth-card .field input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;outline:none}
.auth-card .field input:focus{border-color:var(--accent)}
.auth-card .btn{width:100%;padding:10px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.auth-card .btn:hover{opacity:.9}
.auth-card .tip{text-align:center;font-size:12px;color:var(--text2);margin-top:10px;cursor:pointer}
.auth-card .tip:hover{color:var(--accent)}
.auth-card .error{color:#f44336;font-size:12px;text-align:center;margin-top:8px;display:none}
/* ── 导航按钮 ── */
.nav-tabs{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;flex-shrink:0}
.nav-tabs .tab{padding:6px 12px;border-radius:8px;font-size:12px;color:var(--text2);text-decoration:none;background:var(--ai-msg);border:1px solid var(--border);cursor:pointer}
.nav-tabs .tab:hover{color:var(--accent);border-color:var(--accent)}
.nav-tabs .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* ── 已登录后 ── */
.main-content{display:none;flex:1;flex-direction:column}
.show{display:flex}
.messages{flex:1;overflow-y:auto;padding:12px 0;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{margin-bottom:12px;display:flex;flex-direction:column}
.msg.user{align-items:flex-end}
.msg.bot{align-items:flex-start}
.msg-bubble{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:var(--user-msg);color:#fff;border-bottom-right-radius:4px}
.msg.bot .msg-bubble{background:var(--ai-msg);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.input-area{flex-shrink:0;padding:12px 0;border-top:1px solid var(--border)}
.input-row{display:flex;gap:8px;align-items:center;background:var(--input-bg);border-radius:12px;padding:4px;border:1px solid var(--border)}
.input-row:focus-within{border-color:var(--accent)}
.input-row input{flex:1;border:none;outline:none;padding:10px 12px;font-size:15px;background:transparent;color:var(--text)}
.input-row input::placeholder{color:var(--text2)}
.input-row button{width:40px;height:40px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.input-row button:disabled{opacity:.4;cursor:not-allowed}
.input-row button.mic{background:transparent;color:var(--text2)}
.input-row button.mic.listening{color:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading-dots{display:inline-flex;gap:4px;padding:4px 0}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--text2);animation:bounce 1.4s infinite ease-in-out both}
.loading-dots span:nth-child(1){animation-delay:-.32s}
.loading-dots span:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.lang-switcher{display:flex;gap:4px;justify-content:center;margin-top:10px}
.lang-switcher span{padding:3px 8px;border-radius:6px;font-size:11px;cursor:pointer;color:var(--text2);border:1px solid transparent}
.lang-switcher span:hover{border-color:var(--accent);color:var(--accent)}
.lang-switcher span.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<div class="container">

  <!-- 注册/登录卡片（未登录时显示） -->
  <div class="auth-card" id="authCard">
    <div class="header" style="padding:0 0 12px"><h1>⚡ AUTO-EVO-AI</h1><p>生产力级 AI 自动化编排系统</p></div>
    <div class="field"><label>用户名</label><input id="regUser" placeholder="给你的名字" value="admin"></div>
    <div class="field"><label>密码（可选）</label><input id="regPass" type="password" placeholder="留空即可"></div>
    <div class="field"><label>API Key（可选）</label><input id="regKey" placeholder="OpenAI / 其他 LLM Key"></div>
    <button class="btn" id="regBtn" onclick="doRegister()">🚀 进入系统</button>
    <div class="error" id="authError"></div>
    <div class="lang-switcher" id="langSwitcher"></div>
  </div>

  <!-- 已登录后的聊天界面 -->
  <div class="main-content" id="mainContent">
    <div class="header">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h1>🤖 AUTO-EVO-AI</h1>
        <span id="logoutBtn" style="font-size:12px;color:var(--text2);cursor:pointer" onclick="logout()">退出</span>
      </div>
      <p id="greeting"></p>
      <div class="lang-switcher" id="langSwitcher2" style="margin-bottom:8px"></div>
      <div class="nav-tabs">
        <span id="tabChat" class="tab active">💬 对话</span>
        <a id="tabDashboard" href="/app/dashboard" class="tab">📊 仪表盘</a>
        <a id="tabBusiness" href="/dashboard" class="tab">🏢 企业管理</a>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <button class="mic" id="micBtn" onclick="toggleMic()" title="语音输入">🎤</button>
        <input id="input" placeholder="输入你想做的事..." onkeydown="if(event.key==='Enter')send()">
        <button id="sendBtn" onclick="send()" disabled>➤</button>
      </div>
    </div>
  </div>

</div>

<script>
const API = '/api/v1'
let listening = false, recognition = null
let history = JSON.parse(localStorage.getItem('evo_chat_history') || '[]')
let context = []

function doRegister() {
  const user = document.getElementById('regUser').value.trim() || 'admin'
  const pass = document.getElementById('regPass').value
  const key = document.getElementById('regKey').value.trim()
  localStorage.setItem('evo_user', user)
  if (key) localStorage.setItem('evo_api_key', key)
  localStorage.setItem('evo_logged_in', '1')
  document.getElementById('authCard').style.display = 'none'
  document.getElementById('mainContent').classList.add('show')
  document.getElementById('greeting').textContent = '你好，' + user + '！输入你想做的事'
  restoreHistory()
}
function logout() {
  localStorage.removeItem('evo_logged_in')
  document.getElementById('authCard').style.display = 'block'
  document.getElementById('mainContent').classList.remove('show')
}

// 检查是否已登录
if (localStorage.getItem('evo_logged_in')) {
  document.getElementById('authCard').style.display = 'none'
  document.getElementById('mainContent').classList.add('show')
  document.getElementById('greeting').textContent = '你好，' + (localStorage.getItem('evo_user') || '') + '！输入你想做的事'
  restoreHistory()
}

function addMsg(text, role) {
  const m = document.getElementById('messages')
  const d = document.createElement('div')
  d.className = 'msg ' + role
  const label = document.createElement('div')
  label.className = 'msg-label'
  label.textContent = role === 'user' ? '你' : 'AUTO-EVO-AI'
  const b = document.createElement('div')
  b.className = 'msg-bubble'
  b.textContent = text
  d.appendChild(label); d.appendChild(b); m.appendChild(d)
  m.scrollTop = m.scrollHeight
  history.push({role, text, time: new Date().toISOString()})
  if (history.length > 100) history = history.slice(-100)
  localStorage.setItem('evo_chat_history', JSON.stringify(history))
}

function restoreHistory() {
  const m = document.getElementById('messages'); m.innerHTML = ''
  for (const h of history) {
    const d = document.createElement('div')
    d.className = 'msg ' + h.role
    const label = document.createElement('div')
    label.className = 'msg-label'
    label.textContent = h.role === 'user' ? '你' : 'AUTO-EVO-AI'
    const b = document.createElement('div')
    b.className = 'msg-bubble'; b.textContent = h.text
    d.appendChild(label); d.appendChild(b); m.appendChild(d)
  }
  m.scrollTop = m.scrollHeight
}

function showLoading() {
  const m = document.getElementById('messages')
  const d = document.createElement('div'); d.className = 'msg bot'; d.id = 'loading'
  const b = document.createElement('div'); b.className = 'msg-bubble'
  b.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>'
  d.appendChild(b); m.appendChild(d); m.scrollTop = m.scrollHeight
}

function hideLoading() { document.getElementById('loading')?.remove() }

function clearHistory() {
  if (!confirm('清除所有对话历史？')) return
  history = []; context = []
  localStorage.removeItem('evo_chat_history')
  document.getElementById('messages').innerHTML = ''
}

async function send() {
  const input = document.getElementById('input')
  const text = input.value.trim()
  if (!text) return
  input.value = ''; document.getElementById('sendBtn').disabled = true
  addMsg(text, 'user')
  context.push({role:'user', content:text})
  if (context.length > 10) context = context.slice(-10)
  showLoading()

  try {
    // 团队协作关键词 → 创建智能体房间
    const lower = text.toLowerCase()
    if (lower.includes('团队') || lower.includes('讨论') || (lower.includes('协作'))) {
      const cr = await fetch(API + '/agents/rooms', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({task: text})
      })
      const room = await cr.json()
      if (room.success) {
        const sr = await fetch(API + '/agents/rooms/' + room.room_id + '/start', {method:'POST'})
        const disc = await sr.json()
        hideLoading()
        if (disc.success) {
          const rr = await fetch(API + '/agents/rooms/' + room.room_id)
          const rd = await rr.json()
          if (rd.success) {
            for (const msg of rd.room.messages) {
              addMsg('[' + msg.emoji + ' ' + msg.name + '] ' + msg.content, 'bot')
            }
          }
          context.push({role:'assistant', content:'[团队讨论完成]'})
          return
        }
      }
    }

    // 普通聊天
    const r = await fetch(API + '/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: text, context: context.slice(-6)})
    })
    const data = await r.json()
    hideLoading()
    let result = ''
    if (typeof data === 'string') result = data
    else if (data.result) result = typeof data.result === 'string' ? data.result : JSON.stringify(data.result, null, 2)
    else result = JSON.stringify(data, null, 2)
    addMsg(result, 'bot')
    context.push({role:'assistant', content:result})
  } catch(e) {
    hideLoading()
    addMsg('处理失败: ' + (e.message || e), 'bot')
  }
  document.getElementById('sendBtn').disabled = false
  document.getElementById('input').focus()
}

function toggleMic() {
  const btn = document.getElementById('micBtn')
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  if (!SR) { alert('请使用 Chrome/Edge 浏览器'); return }
  if (listening) { recognition?.stop(); listening = false; btn.classList.remove('listening'); btn.textContent = '🎤'; return }
  const r = new SR(); r.lang = 'zh-CN'; r.continuous = false; r.interimResults = false
  r.onresult = function(e) { document.getElementById('input').value = e.results[0][0].transcript; send() }
  r.onerror = r.onend = function() { listening = false; btn.classList.remove('listening'); btn.textContent = '🎤' }
  try { r.start(); listening = true; recognition = r; btn.classList.add('listening'); btn.textContent = '🔴' }
  catch(e) { alert('启动失败') }
}

document.getElementById('input')?.addEventListener('input', function() {
  document.getElementById('sendBtn').disabled = !this.value.trim()
})

// ── i18n 多语言 ──
// 完整翻译界面函数
function translateUI() {
  const lang = getLocale()
  // 注册卡片
  const authH = document.getElementById('authCard')?.querySelector('h2')
  if (authH) authH.textContent = __('auth_heading')
  const ru = document.getElementById('regUser')
  if (ru) ru.placeholder = __('auth_user_placeholder')
  const rp = document.getElementById('regPass')
  if (rp) rp.placeholder = __('auth_pass_placeholder')
  const rk = document.getElementById('regKey')
  if (rk) rk.placeholder = __('auth_key_placeholder')
  const rb = document.getElementById('regBtn')
  if (rb) rb.textContent = __('auth_btn')
  // 聊天标题
  document.querySelectorAll('.header h1').forEach(el => el.textContent = __('title'))
  document.querySelectorAll('.header p').forEach(el => {
    if (!el.id || el.id !== 'greeting') el.textContent = __('subtitle')
  })
  // 登录后的问候
  const g = document.getElementById('greeting')
  if (g) {
    const user = localStorage.getItem('evo_user') || ''
    g.textContent = __('greeting', user)
  }
  // 输入框
  const inp = document.getElementById('input')
  if (inp) inp.placeholder = __('input_placeholder')
  // 导航按钮
  const tc = document.getElementById('tabChat')
  const td = document.getElementById('tabDashboard')
  const tb = document.getElementById('tabBusiness')
  if (tc) tc.textContent = __('tab_chat')
  if (td) { td.textContent = __('tab_dashboard'); td.href = '/app/dashboard?lang=' + getLocale() }
  if (tb) { tb.textContent = __('tab_business'); tb.href = '/dashboard?lang=' + getLocale() }
  // 退出按钮
  const lb = document.getElementById('logoutBtn')
  if (lb) lb.textContent = '🔓 ' + __('logout')
  // 语言切换器刷新
  renderLangSwitcher()
}

function renderLangSwitcher() {
  const cur = getLocale()
  const langs = getLanguages()
  const opts = langs.map(l => `<option value="${l.code}" ${l.code===cur?'selected':''}>${l.emoji||''} ${l.name}</option>`).join('')
  const sel = `<select onchange="setLocale(this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:12px;cursor:pointer;outline:none">${opts}</select>`
  ;['langSwitcher','langSwitcher2'].forEach(id => {
    const c = document.getElementById(id)
    if (c) c.innerHTML = sel
  })
}

// 初始化语言切换器

// 初始化语言切换器
translateUI()
renderLangSwitcher()
</script>
</body>
</html>
