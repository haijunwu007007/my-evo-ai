<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--card:#16213e;--text:#e0e0e0;--text2:#8892b0;--input-bg:#0f3460;--accent:#4361ee;--user-msg:#4361ee;--ai-msg:#16213e;--border:#2d3561}
@media(prefers-color-scheme:light){:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text2:#6c757d;--input-bg:#fff;--accent:#4361ee;--user-msg:#4361ee;--ai-msg:#f8f9fa;--border:#dee2e6}}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:720px;margin:0 auto;padding:20px 16px;height:100vh;display:flex;flex-direction:column}
.header{text-align:center;padding:24px 0 8px;flex-shrink:0}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:13px;color:var(--text2);margin-top:4px}
.messages{flex:1;overflow-y:auto;padding:12px 0;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{margin-bottom:12px;display:flex;flex-direction:column}
.msg.user{align-items:flex-end}
.msg.bot{align-items:flex-start}
.msg-bubble{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:var(--user-msg);color:#fff;border-bottom-right-radius:4px}
.msg.bot .msg-bubble{background:var(--ai-msg);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.input-area{flex-shrink:0;padding:12px 0;border-top:1px solid var(--border);margin-top:auto}
.input-row{display:flex;gap:8px;align-items:center;background:var(--input-bg);border-radius:12px;padding:4px;border:1px solid var(--border)}
.input-row:focus-within{border-color:var(--accent)}
.input-row input{flex:1;border:none;outline:none;padding:10px 12px;font-size:15px;background:transparent;color:var(--text)}
.input-row input::placeholder{color:var(--text2)}
.input-row button{width:40px;height:40px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:18px;transition:opacity .2s;display:flex;align-items:center;justify-content:center}
.input-row button:disabled{opacity:.4;cursor:not-allowed}
.input-row button.mic{background:transparent;color:var(--text2)}
.input-row button.mic.listening{color:#f44336;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading-dots{display:inline-flex;gap:4px;padding:4px 0}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--text2);animation:bounce 1.4s infinite ease-in-out both}
.loading-dots span:nth-child(1){animation-delay:-.32s}
.loading-dots span:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.welcome{text-align:center;padding:60px 20px;color:var(--text2)}
.welcome-icon{font-size:48px;margin-bottom:12px}
.welcome h2{font-size:18px;color:var(--text);margin-bottom:8px}
.welcome p{font-size:13px;line-height:1.6;max-width:400px;margin:0 auto}
.examples{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.example-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.example-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🤖 AUTO-EVO-AI</h1>
    <p>输入你想做的事，我来执行</p>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🧠</div>
      <h2>我该做什么？</h2>
      <p>告诉我你的需求，我会调用系统能力来帮你完成</p>
      <div class="examples">
        <button class="example-btn" onclick="ask('检查系统运行状态')">📊 检查系统状态</button>
        <button class="example-btn" onclick="ask('帮我截图')">📷 帮我截图</button>
        <button class="example-btn" onclick="ask('打开记事本')">📝 打开记事本</button>
        <button class="example-btn" onclick="ask('每天下午5点备份')">⏰ 每天下午5点备份</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <button class="mic" id="micBtn" onclick="toggleMic()" title="语音输入">🎤</button>
      <input id="input" placeholder="输入你想做的事..." onkeydown="if(event.key==='Enter')send()">
      <button id="sendBtn" onclick="send()" disabled>➤</button>
    </div>
  </div>
</div>

<script>
const api = '/api/v1'
let listening = false, recognition = null

function addMsg(text, role, isHtml=false) {
  document.getElementById('welcome')?.remove()
  const m = document.getElementById('messages')
  const d = document.createElement('div')
  d.className = 'msg ' + role
  const label = document.createElement('div')
  label.className = 'msg-label'
  label.textContent = role === 'user' ? '你' : 'AUTO-EVO-AI'
  const b = document.createElement('div')
  b.className = 'msg-bubble'
  if (isHtml) b.innerHTML = text
  else b.textContent = text
  d.appendChild(label)
  d.appendChild(b)
  m.appendChild(d)
  m.scrollTop = m.scrollHeight
}

function showLoading() {
  const m = document.getElementById('messages')
  const d = document.createElement('div')
  d.className = 'msg bot'
  d.id = 'loading'
  const b = document.createElement('div')
  b.className = 'msg-bubble'
  b.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>'
  d.appendChild(b)
  m.appendChild(d)
  m.scrollTop = m.scrollHeight
}

function hideLoading() {
  document.getElementById('loading')?.remove()
}

function ask(text) {
  document.getElementById('input').value = text
  send()
}

async function send() {
  const input = document.getElementById('input')
  const text = input.value.trim()
  if (!text) return
  input.value = ''
  document.getElementById('sendBtn').disabled = true
  addMsg(text, 'user')
  showLoading()
  try {
    const r = await fetch(api + '/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text})
    })
    const data = await r.json()
    hideLoading()

    // 尝试将结果格式化成可读的文本
    let result = ''
    if (typeof data === 'string') result = data
    else if (data.result) result = typeof data.result === 'string' ? data.result : JSON.stringify(data.result, null, 2)
    else if (data.output) result = typeof data.output === 'string' ? data.output : JSON.stringify(data.output, null, 2)
    else if (data.answer) result = data.answer
    else if (data.message) result = data.message
    else if (data.text) result = data.text
    else result = JSON.stringify(data, null, 2)

    addMsg(result, 'bot')
  } catch(e) {
    hideLoading()
    addMsg('处理失败: ' + e.message + '\n\n提示：如果是"检查系统状态"之类的请求，可以直接试试点上面的示例按钮', 'bot')
  }
  document.getElementById('sendBtn').disabled = false
  document.getElementById('input').focus()
}

function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  const btn = document.getElementById('micBtn')
  if (!SR) { alert('浏览器不支持语音输入'); return }
  if (listening) {
    if (recognition) { recognition.stop(); recognition = null }
    listening = false
    btn.classList.remove('listening')
    btn.textContent = '🎤'
    return
  }
  const r = new SR()
  r.lang = 'zh-CN'
  r.continuous = false
  r.interimResults = false
  r.onresult = function(e) {
    document.getElementById('input').value = e.results[0][0].transcript
    send()
  }
  r.onerror = function() { listening = false; btn.classList.remove('listening'); btn.textContent = '🎤' }
  r.onend = function() { listening = false; btn.classList.remove('listening'); btn.textContent = '🎤' }
  try { r.start(); listening = true; recognition = r; btn.classList.add('listening'); btn.textContent = '🔴' }
  catch(e) { alert('启动失败: ' + e.message) }
}

// 输入框非空时启用发送按钮
document.getElementById('input').addEventListener('input', function() {
  document.getElementById('sendBtn').disabled = !this.value.trim()
})
</script>
</body>
</html>
