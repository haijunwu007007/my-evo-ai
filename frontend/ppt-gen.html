<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>一键PPT生成 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
body{padding:24px;max-width:900px;margin:0 auto;min-height:100vh}
h1{font-size:26px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.sub{color:var(--text2);font-size:14px;margin-bottom:24px}
.templates{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:20px}
.temp{cursor:pointer;padding:14px;border-radius:10px;background:var(--card);border:1px solid var(--border);text-align:center;transition:all .2s}
.temp:hover{border-color:var(--accent);transform:translateY(-2px)}
.temp .ico{font-size:28px;margin-bottom:6px}
.temp .nm{font-size:13px;font-weight:600}
.temp .de{font-size:11px;color:var(--text2);margin-top:4px}
.input-area{display:flex;gap:8px;margin-bottom:16px}
.input-area input{flex:1;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px}
.input-area input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.2)}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:#10b981;color:#fff}.btn-s:hover{opacity:.9}
.steps{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;display:none}
.steps.active{display:block}
.steps h3{font-size:15px;margin-bottom:12px;color:var(--accent)}
.step{margin:6px 0;padding:10px 14px;border-radius:8px;background:var(--bg);font-size:13px;display:flex;align-items:center;gap:8px}
.step .st{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.step.done .st{background:#10b981;border-color:#10b981;color:#fff}
.step.active .st{background:var(--accent);border-color:var(--accent);color:#fff}
.step.err .st{background:#ef4444;border-color:#ef4444;color:#fff}
.outline{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;display:none}
.outline.active{display:block}
.outline h3{font-size:15px;margin-bottom:12px;color:var(--accent)}
.slide{padding:10px 14px;margin:6px 0;border-radius:8px;background:var(--bg);font-size:13px;border-left:3px solid var(--accent)}
.slide .stitle{font-weight:600}
.slide .sdesc{color:var(--text2);font-size:12px;margin-top:2px}
.result{background:var(--card);border:1px solid #10b981;border-radius:12px;padding:20px;display:none;text-align:center}
.result.active{display:block}
.result .ico{font-size:48px;margin-bottom:8px}
.result .nm{font-size:18px;font-weight:700;margin-bottom:4px}
.result .de{color:var(--text2);font-size:13px;margin-bottom:16px}
</style></head><body>
<h1>📊 一键生成PPT</h1>
<p class="sub">输入主题 → AI自动搜索资料、生成大纲、写内容、配图 → 下载PPTX</p>

<div class="templates" id="templates"></div>

<div class="input-area">
  <input id="topicInput" placeholder="输入PPT主题，比如：2026年AI Agent行业趋势分析" onkeydown="if(event.key==='Enter')generate()">
  <button class="btn btn-p" id="genBtn" onclick="generate()">🚀 生成PPT</button>
</div>

<div class="steps" id="steps">
  <h3>⏳ 处理进度</h3>
  <div id="stepList"></div>
</div>

<div class="outline" id="outline">
  <h3>📋 生成大纲</h3>
  <div id="outlineList"></div>
</div>

<div class="result" id="result">
  <div class="ico">✅</div>
  <div class="nm" id="resultName">PPT 已生成</div>
  <div class="de" id="resultInfo">共 0 页 | 0 字</div>
  <button class="btn btn-s" onclick="downloadPPT()">📥 下载 PPTX</button>
  <button class="btn btn-p" style="margin-left:8px" onclick="generate()">🔄 重新生成</button>
</div>

<script>
var _downloadUrl = '';
var _templates = [
  {ico:'📈',nm:'行业分析',de:'市场趋势/竞争格局/机会',prompt:'2026年{行业}行业现状、市场规模、竞争格局与未来趋势分析'},
  {ico:'🚀',nm:'商业计划',de:'BP/融资/商业模式',prompt:'{项目}商业计划书：市场机会、产品方案、商业模式、团队、财务预测'},
  {ico:'🏢',nm:'公司介绍',de:'企业宣传/路演',prompt:'{公司}公司介绍：发展历程、核心业务、团队、愿景'},
  {ico:'📚',nm:'研究报告',de:'调研/学术/白皮书',prompt:'{主题}深度研究报告：背景、方法、发现、结论、建议'},
  {ico:'📖',nm:'项目汇报',de:'周报/月报/QBR',prompt:'{项目}项目进度汇报：目标、进展、里程碑、问题、下一步'},
  {ico:'🏫',nm:'教学课件',de:'培训/讲师/公开课',prompt:'{课程}培训课件：课程目标、核心概念、案例分析、实践练习'},
]

function init(){
  var h = '';
  _templates.forEach(function(t){
    h += '<div class="temp" onclick="useTemplate(\''+t.prompt+'\')"><div class="ico">'+t.ico+'</div><div class="nm">'+t.nm+'</div><div class="de">'+t.de+'</div></div>';
  });
  document.getElementById('templates').innerHTML = h;
}
init();

function useTemplate(p){
  document.getElementById('topicInput').value = p.replace('{行业}','').replace('{项目}','').replace('{公司}','').replace('{主题}','').replace('{课程}','').trim() + ' ';
  document.getElementById('topicInput').focus();
}

function generate(){
  var topic = document.getElementById('topicInput').value.trim();
  if(!topic){alert('请输入PPT主题');return}
  
  document.getElementById('genBtn').disabled = true;
  document.getElementById('genBtn').textContent = '🔄 生成中...';
  document.getElementById('steps').classList.add('active');
  document.getElementById('outline').classList.remove('active');
  document.getElementById('result').classList.remove('active');
  _downloadUrl = '';
  
  showStep(0, '🔍', 'AI 搜索资料', 'active');
  showStep(1, '📝', 'LLM 规划大纲', 'pending');
  showStep(2, '✍️', 'AI 撰写内容', 'pending');
  showStep(3, '🎨', 'AI 生成配图', 'pending');
  showStep(4, '📦', '生成 PPTX 文件', 'pending');
  
  fetch('/api/v1/ppt-auto/generate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({topic:topic})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success){
      showStep(0,'🔍','AI 搜索资料','done');
      showStep(1,'📝','LLM 规划大纲','done');
      showStep(2,'✍️','AI 撰写内容','done');
      showStep(3,'🎨','AI 生成配图','done');
      showStep(4,'📦','生成 PPTX 文件','done');
      document.getElementById('outline').classList.add('active');
      var oh = '';
      (d.outline||[]).forEach(function(s,i){
        oh += '<div class="slide"><div class="stitle">'+(i+1)+'. '+s.title+'</div><div class="sdesc">'+s.desc+'</div></div>';
      });
      document.getElementById('outlineList').innerHTML = oh;
      document.getElementById('result').classList.add('active');
      document.getElementById('resultName').textContent = d.filename || 'PPT 已生成';
      document.getElementById('resultInfo').textContent = '共 '+(d.outline||[]).length+' 页 | '+(d.word_count||0)+' 字';
      _downloadUrl = d.download_url || '';
    }else{
      showStep(0,'🔍','AI 搜索资料','err');
      document.getElementById('stepList').innerHTML += '<div class="step err"><div class="st">✕</div>生成失败: '+(d.error||'未知错误')+'</div>';
    }
  }).catch(function(e){
    showStep(0,'🔍','AI 搜索资料','err');
    document.getElementById('stepList').innerHTML += '<div class="step err"><div class="st">✕</div>请求失败: '+e.message+'</div>';
  }).finally(function(){
    document.getElementById('genBtn').disabled = false;
    document.getElementById('genBtn').textContent = '🚀 生成PPT';
  });
}

function showStep(idx, icon, text, status){
  var el = document.getElementById('stepList');
  var items = el.querySelectorAll('.step');
  if(items.length <= idx){
    el.innerHTML += '<div class="step '+status+'"><div class="st">'+(status==='done'?'✓':status==='active'?'⋯':status==='err'?'✕':'⋯')+'</div>'+icon+' '+text+'</div>';
  }else{
    items[idx].className = 'step '+status;
    items[idx].querySelector('.st').textContent = status==='done'?'✓':status==='active'?'⋯':'✕';
  }
}

function downloadPPT(){
  if(_downloadUrl){
    window.open(_downloadUrl, '_blank');
  }else{
    alert('PPT文件尚未就绪');
  }
}
</script>
</body></html>
