<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>本地代理 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-family:-apple-system,sans-serif}
.main{flex:1;overflow-y:auto;padding:24px 20px;max-width:800px;margin:0 auto;width:100%}
.status-card{padding:24px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);margin-bottom:16px;text-align:center}
.status-card .logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#7209b7);display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin:0 auto 14px}
.status-card h2{font-size:18px;margin-bottom:4px;color:var(--text)}
.status-card .sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;font-size:14px;font-weight:600;margin-bottom:12px}
.status-badge.connecting{background:#fef3c7;color:#92400e}
.status-badge.connected{background:#dcfce7;color:#166534}
.status-badge.disconnected{background:#fee2e2;color:#991b1b}
.info-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--text2);margin-bottom:14px;word-break:break-all;min-height:40px}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:9px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-success{background:#22c55e;color:#fff}
.btn-success:hover{opacity:.9}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.footer{text-align:center;padding:16px;font-size:11px;color:var(--text3)}
.footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){.main{padding:16px 12px}.status-card{padding:16px}.logo{width:44px;height:44px;font-size:20px}}
</style></head>
<body>
<div class="topbar" style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)">
  <div style="display:flex;align-items:center;gap:8px">
    <span class="back-btn" onclick="window.location.href='/'">←</span>
    <h1 style="font-size:15px;margin:0;background:linear-gradient(135deg,var(--accent),#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🔌 本地代理</h1>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    
  </div>
</div>
<div class="main">
  <div class="status-card">
    <div class="logo">⚡</div>
    <h2>🔌 本地代理</h2>
    <p class="sub">保持此页面打开，你的浏览器就变成 AUTO-EVO-AI 的手脚</p>
    <div class="status-badge connecting" id="agtStatus">⏳ 正在连接...</div>
    <div class="info-box" id="agtInfo">等待命令...</div>
    <div class="actions">
      <button class="btn btn-primary" id="agtStart" onclick="initAgent()">🔄 连接服务器</button>
      <button class="btn btn-success" onclick="window.location.href='/'">🏠 返回首页</button>
    </div>
  </div>
  <div class="footer">代理命令会直接在你的浏览器中执行 · 安全沙箱限制可能影响部分功能<br><a href="/">autoevoai.com</a></div>
</div>
<script src="/frontend/agent_page.js"></script>
<script>
function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('evo_theme',document.body.classList.contains('dark')?'dark':'light')}
(function(){var t=localStorage.getItem('evo_theme');if(t==='dark')document.body.classList.add('dark')})()
function open_home(){window.location.href='/'}
document.getElementById('agtStart').textContent='⏳ 正在连接...'
initAgent()
window.connectAgent=connectAgent;window.loadAgents=loadAgents;window.disconnectAgent=disconnectAgent;window.getAgentStatus=getAgentStatus;window.sendCommand=sendCommand;
</script>
</body></html>
