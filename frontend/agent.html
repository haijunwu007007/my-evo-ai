<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>本地代理 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:#f5f5f8;color:#1a1a2e;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:30px;max-width:420px;width:100%;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,.08);border:1px solid #e8eaed}
.logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#4361ee,#7209b7);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;margin:0 auto 16px}
h1{font-size:18px;margin-bottom:6px}
p{font-size:13px;color:#6b7280;margin-bottom:20px;line-height:1.6}
.status{padding:12px;border-radius:10px;font-size:14px;margin-bottom:16px;transition:all .3s}
.status.connecting{background:#fef3c7;color:#92400e}
.status.connected{background:#dcfce7;color:#166534}
.status.disconnected{background:#fee2e2;color:#991b1b}
.info{font-size:12px;color:#9ca3af;padding:8px;background:#f9fafb;border-radius:8px;margin-bottom:16px;word-break:break-all}
.btn{display:inline-block;padding:8px 24px;border:0;border-radius:8px;font-size:13px;cursor:pointer;background:#4361ee;color:#fff;text-decoration:none;margin-top:4px}
.btn:hover{background:#3651d4}
.footer{font-size:11px;color:#9ca3af;margin-top:16px}
.footer a{color:#4361ee;text-decoration:none}
@media(max-width:480px){
  body{padding:8px}
  .card{padding:16px;border-radius:12px}
  h1{font-size:15px}
  p{font-size:12px;margin-bottom:14px}
  .status{padding:8px;font-size:13px}
  .info{font-size:11px;padding:6px}
  .btn{padding:6px 18px;font-size:13px;min-height:36px}
  .logo{width:40px;height:40px;font-size:18px;border-radius:10px;margin-bottom:12px}
}
</style>  <link rel="stylesheet" href="/frontend/share.css">
</head><body>

<!-- 系统顶栏 -->
<div class="topbar" style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)">
  <div style="display:flex;align-items:center;gap:8px">
    <a href="/" class="back-btn" onclick="event.preventDefault();window.location.href=document.referrer||'/'">←</a>
    <h1 class="grad-title" style="font-size:15px;margin:0">🔌 本地代理</h1>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <span style="font-size:12px;color:var(--text3);cursor:pointer" onclick="toggleTheme()">🌓</span>
  </div>
</div>

<div class="card">
  <div class="logo">⚡</div>
  <h1>🔌 本地代理</h1>
  <p>保持此页面打开，你的浏览器就变成<br>AUTO-EVO-AI 的手脚</p>
  <div class="status connecting" id="agtStatus">⏳ 正在连接...</div>
  <div class="info" id="agtInfo">等待命令...</div>
  <button class="btn" id="agtStart" onclick="initAgent()">🔄 连接服务器</button>
  <br><br>
  <button class="btn" style="background:#22c55e" onclick="open_home()">🏠 返回首页</button>
  <div class="footer">
    代理命令会直接在你的浏览器中执行 · 安全沙箱限制可能影响部分功能<br>
    <a href="/">autoevoai.com</a>
  </div>
</div>
<script src="/frontend/agent_page.js"></script>
<script>
function open_home(){window.location.href='/'}
document.getElementById('agtStart').textContent = '⏳ 正在连接...'
initAgent()


// === AUTO-EVO-AI window exports ===
window.connectAgent = connectAgent;
window.loadAgents = loadAgents;
window.disconnectAgent = disconnectAgent;
window.getAgentStatus = getAgentStatus;
window.sendCommand = sendCommand;

</script>
</body></html>
