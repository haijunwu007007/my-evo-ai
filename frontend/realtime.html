<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>实时协作 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1000px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px}
.status{padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:12px}
.status.online{background:#dcfce7;color:#166534}
.status.offline{background:#fee2e2;color:#991b1b}
.status.connecting{background:#fef9c3;color:#854d0e}
.chat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;height:300px;overflow-y:auto;padding:10px;margin-bottom:10px}
.msg{margin-bottom:8px;font-size:13px;padding:6px 10px;border-radius:6px}
.msg.system{background:#f0f2f8;color:var(--text2);text-align:center;font-size:11px}
.msg.user{background:var(--accent);color:#fff;margin-left:20%}
.msg.remote{background:var(--card);border:1px solid var(--border);margin-right:20%}
.msg .author{font-size:10px;opacity:.7;margin-bottom:2px}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px}
.input-row button{padding:8px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer}
.user-list{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.user-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;background:var(--card);border:1px solid var(--border);font-size:11px}
.user-badge .dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
@media(max-width:768px){body{padding:10px}}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>👥 实时协作</h1>
<div id="statusBar" class="status connecting">⏳ 正在连接...</div>
<div id="userList" class="user-list"></div>
<div id="chatBox" class="chat-box">
  <div class="msg system">💡 发送消息后，所有在线用户都能实时看到</div>
</div>
<div class="input-row">
  <input id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
  <button onclick="sendMsg()">发送</button>
</div>
<script>
var _ws=null,_userName='用户_'+Math.random().toString(36).slice(2,6);
var _onlineUsers={};

function connectWS(){
  var proto=location.protocol==='https:'?'wss:':'ws:';
  var url=proto+'//'+location.host+'/ws/chat';
  _ws=new WebSocket(url);
  _ws.onopen=function(){
    document.getElementById('statusBar').className='status online';
    document.getElementById('statusBar').textContent='🟢 已连接 — 你的ID: '+_userName;
    _ws.send(JSON.stringify({type:'join',user:_userName}));
  };
  _ws.onmessage=function(ev){
    try{
      var msg=JSON.parse(ev.data);
      if(msg.type==='users'){
        _onlineUsers=msg.users||{};
        renderUsers();
      }else if(msg.type==='message'||msg.type==='chat'){
        addMsg(msg.user||'系统',msg.text||msg.message||'',msg.user===_userName?'user':'remote');
      }
    }catch(e){}
  };
  _ws.onclose=function(){
    document.getElementById('statusBar').className='status offline';
    document.getElementById('statusBar').textContent='🔴 已断开，5秒后重连...';
    setTimeout(connectWS,5000);
  };
  _ws.onerror=function(){_ws.close()};
}

function sendMsg(){
  var input=document.getElementById('msgInput');
  var text=input.value.trim();
  if(!text||!_ws)return;
  _ws.send(JSON.stringify({type:'message',user:_userName,text:text}));
  addMsg(_userName,text,'user');
  input.value='';
}

function addMsg(author,text,cls){
  var box=document.getElementById('chatBox');
  var d=document.createElement('div');
  d.className='msg '+cls;
  d.innerHTML='<div class="author">'+author+'</div>'+text;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}

function renderUsers(){
  var names=Object.keys(_onlineUsers);
  var h='<div class="user-badge"><span class="dot"></span> 在线: '+names.length+'人</div>';
  names.forEach(function(n){
    h+='<div class="user-badge"><span class="dot"></span>'+n+'</div>';
  });
  document.getElementById('userList').innerHTML=h;
}

connectWS();
</script></body></html>
