<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>远程执行 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#e0e0e0;padding:16px}
h1{font-size:20px;margin-bottom:4px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#8892b0;font-size:13px;margin-bottom:20px}
.input-row{display:flex;gap:8px;margin-bottom:12px}
input{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:#e0e0e0;font-size:16px}
.send-btn{padding:12px 20px;border:none;border-radius:10px;background: var(--bg);color:#fff;font-size:16px;font-weight:600;cursor:pointer;white-space:nowrap}
.send-btn:active{opacity:.7}
.result{background:var(--bg);border-radius:10px;padding:14px;font-size:14px;line-height:1.6;min-height:100px;border:1px solid var(--border);color:#e0e0e0;white-space:pre-wrap;word-break:break-word}
.quick{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.q-chip{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:transparent;color:#8892b0;font-size:13px;cursor:pointer}
.q-chip:active{background: var(--bg);color:#fff;border-color:#4361ee}
.loading{text-align:center;color:#636e8a;padding:20px;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:#4361ee;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
</style></head>
<body>
<h1>📱 远程执行</h1>
<p class="sub">发一条指令，服务器自动执行并返回结果</p>
<div class="quick">
  <span class="q-chip" onclick="q('系统怎么样')">📊 系统状态</span>
  <span class="q-chip" onclick="q('版本信息')">📌 版本</span>
  <span class="q-chip" onclick="q('模块列表')">📦 模块</span>
  <span class="q-chip" onclick="q('技能列表')">🔧 技能</span>
</div>
<div class="input-row">
  <input id="cmdInput" placeholder="输入指令..." onkeydown="if(event.key==='Enter')sendCmd()">
  <button class="send-btn" id="sendBtn" onclick="sendCmd()">➤</button>
</div>
<div class="result" id="result">在这里显示执行结果</div>
<script>
var _token=new URLSearchParams(window.location.search).get('token')||localStorage.getItem('evo_remote_token')||''
if(_token)localStorage.setItem('evo_remote_token',_token)

function q(t){document.getElementById('cmdInput').value=t;sendCmd()}
async function sendCmd(){
  var i=document.getElementById('cmdInput');var t=i.value.trim();if(!t)return
  var r=document.getElementById('result');var b=document.getElementById('sendBtn')
  r.innerHTML='<div class="loading"><span class="spinner"></span>正在执行...</div>';b.disabled=true
  try{
    var sr=await fetch('/api/v1/smart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})})
    var d=await sr.json()
    r.textContent=d.result||d.detail||'(空)'
  }catch(e){r.textContent='❌ 执行失败: '+e.message}
  b.disabled=false;i.value='';i.focus()
}
document.getElementById('cmdInput').focus()
</script>
</body></html>
