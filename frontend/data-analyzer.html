<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>数据分析 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
body{padding:24px;max-width:800px;margin:0 auto;min-height:100vh}
h1{font-size:24px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.sub{color:var(--text2);font-size:14px;margin-bottom:24px}
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px}
.upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:rgba(67,97,238,.05)}
.upload-area .ico{font-size:48px;margin-bottom:8px}
.upload-area .txt{font-size:15px;color:var(--text)}
.upload-area .subtxt{font-size:12px;color:var(--text2);margin-top:4px}
.input-row{display:flex;gap:8px;margin-bottom:16px}
.input-row input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.9}.btn-p:disabled{opacity:.5}
.progress{display:none;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
.progress.active{display:block}.progress .bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress .bar-fill{height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .5s}
.result{display:none;margin-top:16px}
.result.active{display:block}
.result iframe{width:100%;height:600px;border:none;border-radius:10px;background:var(--card)}
</style></head><body>
<h1>📊 智能数据分析</h1>
<p class="sub">上传Excel/CSV → AI自动分析趋势 → 生成可视化报告</p>

<div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="event.preventDefault();this.classList.remove('dragover');handleFile(event.dataTransfer.files[0])">
  <div class="ico">📂</div>
  <div class="txt" id="uploadText">点击或拖拽上传 Excel / CSV 文件</div>
  <div class="subtxt">支持 .xlsx .xls .csv 格式</div>
</div>
<input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this.files[0])">

<div class="input-row">
  <input id="questionInput" placeholder="可选：输入你想分析的问题，比如「哪个月份销售额最高？」" onkeydown="if(event.key==='Enter')doAnalyze()">
  <button class="btn btn-p" id="analyzeBtn" onclick="doAnalyze()" disabled>🚀 开始分析</button>
</div>

<div class="progress" id="progress">
  <span id="progressText">正在读取文件...</span>
  <div class="bar"><div class="bar-fill" id="progressFill"></div></div>
</div>

<div class="result" id="result">
  <h3 style="margin-bottom:10px;display:flex;gap:10px;align-items:center">
    <span>📋 分析报告</span>
    <span style="font-size:12px;color:var(--text2)" id="resultMeta"></span>
  </h3>
  <iframe id="reportFrame"></iframe>
</div>

<script>
var _currentFile = null;

function handleFile(f){
  if(!f) return;
  var ext = f.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls','csv'].includes(ext)){
    alert('仅支持 Excel (.xlsx/.xls) 和 CSV 文件');
    return;
  }
  _currentFile = f;
  document.getElementById('uploadText').textContent = '📄 ' + f.name + ' (' + (f.size/1024).toFixed(1) + 'KB)';
  document.getElementById('analyzeBtn').disabled = false;
}

function doAnalyze(){
  if(!_currentFile) return;
  
  var btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = '⏳ 分析中...';
  
  var progress = document.getElementById('progress');
  progress.classList.add('active');
  document.getElementById('progressText').textContent = '正在读取文件...';
  document.getElementById('progressFill').style.width = '20%';
  
  var fd = new FormData();
  fd.append('file', _currentFile);
  fd.append('question', document.getElementById('questionInput').value.trim());
  
  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/v1/data-analyzer/analyze', true);
  
  xhr.upload.onprogress = function(e){
    if(e.lengthComputable){
      var pct = Math.round(e.loaded / e.total * 40);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = '上传中 ' + pct + '%';
    }
  };
  
  xhr.onload = function(){
    if(xhr.status === 200){
      var d = JSON.parse(xhr.responseText);
      if(d.success){
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('progressText').textContent = '✅ 分析完成！';
        
        setTimeout(function(){
          progress.classList.remove('active');
          document.getElementById('result').classList.add('active');
          document.getElementById('resultMeta').textContent = d.rows + '行 × ' + d.cols + '列 | ' + d.filename;
          if(d.report_url){
            document.getElementById('reportFrame').src = d.report_url;
          }else{
            document.getElementById('reportFrame').srcdoc = d.report || '暂无报告';
          }
        }, 500);
      } else {
        document.getElementById('progressText').textContent = '❌ 分析失败: ' + (d.error||'');
      }
    } else {
      document.getElementById('progressText').textContent = '❌ 请求失败: ' + xhr.status;
    }
    btn.disabled = false; btn.textContent = '🚀 开始分析';
  };
  
  xhr.onerror = function(){
    document.getElementById('progressText').textContent = '❌ 网络错误';
    btn.disabled = false; btn.textContent = '🚀 开始分析';
  };
  
  document.getElementById('progressFill').style.width = '5%';
  document.getElementById('progressText').textContent = '正在分析数据...';
  xhr.send(fd);
}
</script>
</body></html>
