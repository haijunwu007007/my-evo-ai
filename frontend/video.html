<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎬 视频生成 — AUTO-EVO-AI</title><link rel="stylesheet" href="/js/app.css">
<style>
.c{max-width:800px;margin:0 auto;padding:20px 16px}
h2{font-size:18px;margin-bottom:12px;background:linear-gradient(135deg,#e8e8ef,#a0a8b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(26,26,46,.5);border:1px solid rgba(45,53,97,.3);border-radius:12px;padding:16px;margin-bottom:12px}
.inp{display:flex;gap:8px;margin-bottom:12px}
.inp input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid rgba(45,53,97,.4);background:rgba(22,33,62,.6);color:#e8e8ef;font-size:14px;outline:none}
.inp input:focus{border-color:#4361ee;box-shadow:0 0 0 3px rgba(67,97,238,.3)}
.inp button{padding:8px 20px;border:none;border-radius:8px;background:linear-gradient(135deg,#4361ee,#a855f7);color:#fff;font-size:13px;cursor:pointer;font-weight:700}
.inp button:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(67,97,238,.3)}
.sel{padding:8px 12px;border-radius:8px;border:1px solid rgba(45,53,97,.4);background:rgba(22,33,62,.6);color:#e8e8ef;font-size:13px}
.e-card{display:flex;gap:12px;flex-wrap:wrap}
.e{flex:1;min-width:120px;padding:12px;border-radius:8px;background:rgba(22,33,62,.4);border:1px solid rgba(45,53,97,.3);text-align:center}
.e .nm{font-size:13px;font-weight:600;margin-bottom:4px}
.e .st{font-size:11px;padding:2px 8px;border-radius:4px}
.e .st.ok{background:rgba(16,185,129,.15);color:#10b981}
.e .st.no{background:rgba(239,68,68,.15);color:#ef4444}
.e .st.wa{background:rgba(245,158,11,.15);color:#f59e0b}
@media(max-width:600px){.inp{flex-direction:column}}
</style></head><body>
<div class="hdr" style="background:rgba(20,20,35,.92);border-bottom:1px solid rgba(45,53,97,.4);padding:0 16px;height:46px;display:flex;align-items:center;gap:12px">
  <div class="l" style="font-size:15px;font-weight:800;background:linear-gradient(135deg,#4361ee,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">AUTO-EVO-AI</div>
  <div class="n" style="display:flex;gap:2px"><a href="/" style="padding:4px 10px;border-radius:6px;font-size:12px;color:#8892b0;text-decoration:none">对话</a><a href="/capture" style="padding:4px 10px;border-radius:6px;font-size:12px;color:#8892b0;text-decoration:none">能力中心</a><a href="/video" class="a" style="padding:4px 10px;border-radius:6px;font-size:12px;color:#e8e8ef;background:rgba(67,97,238,.15);text-decoration:none">视频生成</a></div>
</div>
<div class="c">
  <h2>🎬 AI 视频生成引擎</h2>
  <div class="e-card" id="engineStatus"><div style="width:100%;text-align:center;color:#636e70;font-size:12px">加载引擎状态...</div></div>
  <div class="card">
    <h3 style="font-size:14px;margin-bottom:8px">🎥 生成视频</h3>
    <div class="inp">
      <input id="topic" placeholder="输入视频主题，如：AI 人工智能的发展历程" onkeydown="if(event.key==='Enter')generate()">
      <select class="sel" id="engine"><option value="pixelle">Pixelle 全自动</option><option value="wan">Wan2.2 数字人</option></select>
      <button onclick="generate()">生成</button>
    </div>
    <div id="result" style="font-size:12px;color:#8892b0"></div>
  </div>
  <div class="card">
    <h3 style="font-size:14px;margin-bottom:8px">📂 已生成视频</h3>
    <div id="vlist" style="font-size:12px;color:#636e70">暂无视频</div>
  </div>
</div>
<script>
async function loadStatus(){
  try{
    var r=await fetch('/api/v1/video/status');var d=await r.json()
    var e=d.engines||{},h=''
    for(var k in e){h+='<div class="e"><div class="nm">'+k.replace('_url','')+'</div><div class="st '+(e[k].available?'ok':'no')+'">'+(e[k].available?'已就绪':'未配置')+'</div></div>'}
    document.getElementById('engineStatus').innerHTML=h||'<div style="width:100%;text-align:center;color:#636e70">无引擎</div>'
  }catch(e){document.getElementById('engineStatus').innerHTML='<div style="text-align:center;color:#ef4444">加载失败</div>'}
}
async function generate(){
  var t=document.getElementById('topic').value.trim()
  if(!t){document.getElementById('result').textContent='请输入主题';return}
  document.getElementById('result').textContent='⏳ 正在生成视频...'
  try{
    var r=await fetch('/api/v1/video/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:t,engine:document.getElementById('engine').value})})
    var d=await r.json()
    document.getElementById('result').innerHTML=d.success?'✅ '+d.message:'❌ 失败'
    loadVideos()
  }catch(e){document.getElementById('result').textContent='❌ 错误: '+e.message}
}
async function loadVideos(){
  try{
    var r=await fetch('/api/v1/video/list');var d=await r.json()
    var v=d.videos||[]
    if(v.length===0){document.getElementById('vlist').innerHTML='<div style="color:#636e70">暂无视频</div>';return}
    document.getElementById('vlist').innerHTML=v.map(function(f){return'<div>🎬 '+f.name+' ('+(f.size/1024).toFixed(1)+'KB)</div>'}).join('')
  }catch(e){}
}
loadStatus();loadVideos()
</script></body></html>
