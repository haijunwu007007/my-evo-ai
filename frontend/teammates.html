<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 同事 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
body{padding:20px;min-height:100vh}body.embed{background:transparent;padding:10px}
h1{font-size:24px;margin-bottom:6px}
.sub{color:var(--text2);font-size:14px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1000px}
.card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);cursor:pointer;transition:all .25s}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px var(--glow)}
.card .h{font-size:18px;font-weight:700;margin-bottom:6px}
.card .d{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:12px}
.card .tags{display:flex;flex-wrap:wrap;gap:6px}
.card .tag{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.goals{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.goal{font-size:12px;color:var(--text2);padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
.schedule{font-size:12px;color:var(--text3);margin-top:8px}
.back{display:inline-block;margin-bottom:20px;color:#4361ee;text-decoration:none;font-size:14px}
.back:hover{text-decoration:underline}
.status{display:none;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;max-width:600px}
.status.ok{display:block;background:rgba(16,185,129,.1);border:1px solid #10b981;color:#10b981}
.status.err{display:block;background:rgba(239,68,68,.1);border:1px solid #ef4444;color:#ef4444}
</style><style>body{background:var(--bg);color:var(--text)}</style>
</head>
<body>
<span class="back-btn" onclick="window.location.href='/'">←</span>
<h1>🤖 AI 同事</h1>
<p class="sub">预置 AI 角色模板，一键激活即可获得专业 AI 队友。点击卡片激活，即可在聊天中 @召唤。</p>
<div class="status" id="status"></div>
<div class="grid" id="grid"></div>

<script>
async function load(){try{
  var r=await fetch('/api/v1/teammates/list');var d=await r.json()
  if(!d.success||!d.teammates){document.getElementById('grid').innerHTML='<p style="color:#ef4444">加载失败</p>';return}
  var html=''
  d.teammates.forEach(function(t){
    var goals=t.goals.map(function(g){return '<span class="goal">'+g+'</span>'}).join('')
    var tags=t.goals.slice(0,3).map(function(g){return '<span class="tag" style="background:'+t.color+'22;color:'+t.color+'">'+g.slice(0,6)+'</span>'}).join('')
    html+='<div class="card" style="border-color:'+t.color+'44" onclick="activate(\''+t.id+'\',\''+t.name+'\',\''+t.color+'\')">'
    html+='<div class="h" style="color:'+t.color+'">'+t.name+'</div>'
    html+='<div class="d">'+t.description+'</div>'
    html+='<div class="goals">'+goals+'</div>'
    html+='<div class="schedule">⏰ '+t.schedule+'</div></div>'
  })
  document.getElementById('grid').innerHTML=html
}catch(e){document.getElementById('grid').innerHTML='<p style="color:#ef4444">加载失败: '+e.message+'</p>'}}

function showStatus(msg,ok){
  var s=document.getElementById('status');s.textContent=msg;s.className='status '+(ok?'ok':'err');s.style.display='block'
  setTimeout(function(){s.style.display='none'},3000)}

async function activate(id,name){
  try{
    var r=await fetch('/api/v1/teammates/'+id+'/activate',{method:'POST'});var d=await r.json()
    if(!d.success){showStatus('激活失败',false);return}
    var tm={name:d.activation.name,prompt:d.activation.system_prompt.slice(0,200),color:t.color}
    // 保存到已激活列表（用于@召唤）
    var existing=JSON.parse(localStorage.getItem('evo_teammates')||'[]')
    if(!existing.find(function(e){return e.name===tm.name}))existing.push(tm)
    localStorage.setItem('evo_teammates',JSON.stringify(existing))
    localStorage.setItem('evo_active_expert',JSON.stringify({name:tm.name,dept:'AI同事',system:d.activation.system_prompt}))
    showStatus('✅ 已激活「'+name+'」！正在跳转到首页...',true)
    setTimeout(function(){window.location.href='/'},800)
  }catch(e){showStatus('激活失败: '+e.message,false)}
}
load()
</script>
</body></html>
