<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>API Key管理 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:900px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.btn{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer}
.btn:hover{opacity:.9}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.danger{background:#e74c3c}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.card h3{font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card .key{font-size:12px;color:var(--accent);word-break:break-all;font-family:monospace;margin:4px 0}
.card .meta{font-size:11px;color:var(--text3);margin-bottom:6px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal-card{background:var(--card);border-radius:10px;padding:20px;max-width:420px;width:90%}
.modal-card h2{font-size:16px;margin-bottom:10px}
.modal-card input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);font-size:13px;margin-bottom:8px}
.empty{padding:60px;text-align:center;color:var(--text3)}
.loading{padding:40px;text-align:center;color:var(--text3)}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px}
.tag.active{background:#dcfce7;color:#166534}
.tag.revoked{background:#fee2e2;color:#991b1b}
@media(max-width:768px){body{padding:10px}h1{font-size:18px}}
</style></head><body>
<h1>🔑 API Key 管理 <button class="btn" onclick="showCreate()">+ 创建</button></h1>
<div id="list"><div class="loading">加载中...</div></div>
<div class="modal" id="modal">
  <div class="modal-card">
    <h2 id="modalTitle">创建 API Key</h2>
    <input id="keyName" placeholder="名称（如：我的应用）">
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="createKey()">创建</button>
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>
<script>
var _keys = [];

function loadKeys(){
  document.getElementById('list').innerHTML='<div class="loading">加载中...</div>';
  var saved = localStorage.getItem('evo_api_keys');
  if(saved) _keys = JSON.parse(saved);
  renderKeys();
}

function renderKeys(){
  if(!_keys.length){
    document.getElementById('list').innerHTML='<div class="empty">暂无 API Key<br><button class="btn" onclick="showCreate()" style="margin-top:10px">+ 创建</button></div>';
    return;
  }
  var h='';
  for(var i=0;i<_keys.length;i++){
    var k=_keys[i];
    var s=k.status||'active';
    h+='<div class="card"><h3>'+k.name+' <span class="tag '+(s==='active'?'active':'revoked')+'">'+s+'</span></h3>';
    h+='<div class="key">'+k.key+'</div>';
    h+='<div class="meta">创建: '+(k.created||'-')+'</div>';
    h+='<div style="display:flex;gap:6px">';
    h+='<button class="btn btn-outline" onclick="copyKey('+i+')">复制</button>';
    if(s==='active') h+='<button class="btn danger" onclick="revokeKey('+i+')">撤销</button>';
    h+='</div></div>';
  }
  document.getElementById('list').innerHTML=h;
}

function showCreate(){
  document.getElementById('modal').classList.add('show');
  document.getElementById('keyName').value='';
}

function closeModal(){document.getElementById('modal').classList.remove('show')}

function createKey(){
  var name=document.getElementById('keyName').value||'Key-' + (_keys.length+1);
  var key='evo_' + Math.random().toString(36).substring(2,15) + Math.random().toString(36).substring(2,15);
  _keys.push({name:name,key:key,status:'active',created:new Date().toISOString().slice(0,10)});
  localStorage.setItem('evo_api_keys',JSON.stringify(_keys));
  renderKeys();
  closeModal();
  alert('Key 已创建:\n'+key+'\n\n请立即复制，关闭后不再显示');
}

function copyKey(i){
  navigator.clipboard.writeText(_keys[i].key).then(function(){alert('已复制到剪贴板')});
}

function revokeKey(i){
  if(!confirm('确定撤销此 Key？'))return;
  _keys[i].status='revoked';
  localStorage.setItem('evo_api_keys',JSON.stringify(_keys));
  renderKeys();
}

loadKeys();
</script></body></html>
