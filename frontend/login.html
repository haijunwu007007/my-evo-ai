<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 — AUTO-EVO-AI</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0b0b16,#12122a);color:#e8e8ef;font-family:sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:rgba(26,26,46,.6);border:1px solid rgba(45,53,97,.3);border-radius:16px;padding:32px;width:360px;backdrop-filter:blur(12px)}
h2{text-align:center;margin-bottom:20px;font-size:18px;background:linear-gradient(135deg,#4361ee,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.inp{width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(45,53,97,.4);background:rgba(22,33,62,.6);color:#e8e8ef;font-size:14px;outline:none;margin-bottom:12px}
.inp:focus{border-color:#4361ee}
.btn{width:100%;padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,#4361ee,#a855f7);color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.btn:hover{transform:translateY(-1px)}
.f{text-align:center;font-size:12px;color:#636e70;margin-top:12px}
.f a{color:#4361ee;text-decoration:none}
</style></head><body>
<div class="card">
<h2>🔐 登录 AUTO-EVO-AI</h2>
<input class="inp" id="user" placeholder="用户名" autofocus>
<input class="inp" id="pass" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')login()">
<button class="btn" onclick="login()">🚀 进入系统</button>
<div class="f">还没有账号？<a href="/register">立即注册</a></div>
</div>
<script>
function login(){
  var u=document.getElementById('user').value.trim()
  var p=document.getElementById('pass').value.trim()
  if(!u||!p){alert('请输入用户名和密码');return}
  localStorage.setItem('evo_user',u)
  localStorage.setItem('evo_pass',p)
  window.location.href='/'
}
</script></body></html>
