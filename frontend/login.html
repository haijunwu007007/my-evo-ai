<!DOCTYPE html><html lang="zh-CN"><head>
<meta name="description" content="AUTO-EVO-AI 智能进化平台 - 一键部署、智能Agent、自动化工作流">
<meta property="og:title" content="AUTO-EVO-AI">
<meta property="og:description" content="一键部署任意项目，自动完成所有工作">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 — AUTO-EVO-AI</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0b0b16,#12122a);color:#e8e8ef;font-family:sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:rgba(26,26,46,.6);border:1px solid rgba(45,53,97,.3);border-radius:16px;padding:32px;width:360px;backdrop-filter:blur(12px)}
h2{text-align:center;margin-bottom:20px;font-size:18px;background:linear-gradient(135deg,#4361ee,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.inp{width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(45,53,97,.4);background:rgba(22,33,62,.6);color:#e8e8ef;font-size:14px;outline:none;margin-bottom:12px}
.inp:focus{border-color:#4361ee}
.btn{width:100%;padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,#4361ee,#a855f7);color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.btn:hover{transform:translateY(-1px)}
.f{text-align:center;font-size:12px;color:#636e70;margin-top:12px}
.f a{color:#4361ee;text-decoration:none}
</style><style>
/* ===== AUTO-EVO-AI 共享样式 ===== */
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg,#0b0b16);color:var(--text,#e8e8ef);min-height:100vh}
body.light{--bg:#eef0f6;--bg2:#f8f9fc;--card:#fff;--text:#1a1a2e;--text2:#6c757d;--border:#d0d5e0}
:root{--bg:#0b0b16;--bg2:#12122a;--card:#1a1a2e;--text:#e8e8ef;--text2:#8892b0;--border:#2d3561}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.hdr .l{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:600;color:var(--text)}
.hdr .n a{padding:6px 12px;border-radius:6px;text-decoration:none;color:var(--text2);font-size:13px;transition:.2s}
.hdr .n a:hover{color:var(--text);background:rgba(255,255,255,.05)}
.btn-prime{background:#4f46e5;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}
.btn-prime:hover{opacity:.9}
</style>
</head><body>
<div class="card">
<h2>🔐 登录 AUTO-EVO-AI</h2>
<input class="inp" id="user" placeholder="用户名" autofocus>
<input class="inp" id="pass" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')login()">
<button class="btn" onclick="login()">🚀 进入系统</button>
<div class="f">还没有账号？<a href="/register">立即注册</a></div>
</div>
<script>
function login(){
  var u=document.getElementById('user').value.trim()
  var p=document.getElementById('pass').value.trim()
  if(!u||!p){alert('请输入用户名和密码');return}
  localStorage.setItem('evo_user',u)
  // 已移除明文密码存储
  window.location.href='/'
}
</script></body></html>
