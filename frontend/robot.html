<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🤖 AI 机器人</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:-apple-system,sans-serif;padding:16px}
.robot-card{width:100%;max-width:380px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border-radius:24px;padding:24px;border:1px solid rgba(255,255,255,0.1);text-align:center}
.robot-head{font-size:80px;margin-bottom:12px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.robot-name{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px}
.robot-status{font-size:14px;color:#10b981;margin-bottom:16px}
.robot-status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 1.5s infinite;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chat-box{background:rgba(0,0,0,0.3);border-radius:16px;padding:16px;margin-bottom:12px;min-height:160px;max-height:240px;overflow-y:auto;text-align:left}
.chat-box .msg{color:#e2e8f0;font-size:14px;margin-bottom:8px;padding:8px 12px;border-radius:8px;max-width:85%}
.chat-box .msg.bot{background:rgba(99,102,241,0.2);align-self:flex-start}
.chat-box .msg.user{background:rgba(16,185,129,0.2);margin-left:auto}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:15px;outline:none}
.input-row input::placeholder{color:rgba(255,255,255,0.3)}
.input-row input:focus{border-color:#6366f1}
.input-row button{width:48px;height:48px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:18px;cursor:pointer;transition:all .15s}
.input-row button:active{transform:scale(.92)}
.feelings{margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.feelings button{padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-size:12px;cursor:pointer;transition:all .15s}
.feelings button:active{background:rgba(99,102,241,0.3);color:#fff}
.back-link{display:inline-block;margin-top:16px;color:rgba(255,255,255,0.3);font-size:12px;text-decoration:none}
</style>
</head>
<body>
<div class="robot-card">
<div class="robot-head">🤖</div>
<div class="robot-name">小智</div>
<div class="robot-status"><span class="dot"></span>在线 · 随时待命</div>
<div class="chat-box" id="chatBox">
<div class="msg bot" style="background:rgba(99,102,241,0.2)">你好！我是小智 🤖，你的AI助手！有什么需要帮忙的吗？</div>
</div>
<div class="input-row">
<input id="input" placeholder="说点什么..." onkeydown="if(event.key==='Enter')sendMsg()">
<button onclick="sendMsg()">➤</button>
</div>
<div class="feelings">
<button onclick="sendQuick('😊')">😊 开心</button>
<button onclick="sendQuick('😢')">😢 难过</button>
<button onclick="sendQuick('😴')">😴 累了</button>
<button onclick="sendQuick('💪')">💪 加油</button>
<button onclick="sendQuick('🕐')">🕐 几点了</button>
</div>
<a href="/" class="back-link">← 返回聊天</a>
</div>
<script>
var chatBox=document.getElementById('chatBox');
var responses={default:function(m){return["好的呢！","收到啦！","嗯嗯，然后呢？","有意思，继续说~","明白了！"][Math.floor(Math.random()*5)]+" ("+m+")"},"开心":function(){return"😊 开心就好！有什么开心事分享一下？"},"难过":function(){return"😢 别难过，我陪着你。"},"累":function(){return"😴 辛苦了！早点休息哦。"},"加油":function(){return"💪 你一定可以的！加油！"},"几点了":function(){var d=new Date();return"🕐 现在是 "+d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")},"名字":function(){return"我叫小智 🤖，是你的AI机器人助手！"},"再见":function(){return"👋 再见！随时找我聊天~"}};
var keys=Object.keys(responses);
function sendMsg(){
var inp=document.getElementById('input'),m=inp.value.trim();if(!m)return;inp.value='';
addMsg('user',m);
var reply='';for(var i=0;i<keys.length;i++){if(m.indexOf(keys[i])>=0){reply=responses[keys[i]](m);break}}if(!reply)reply=responses['default'](m);
setTimeout(function(){addMsg('bot',reply)},300+Math.random()*500)}
function addMsg(role,text){var d=document.createElement('div');d.className='msg '+role;d.textContent=text;chatBox.appendChild(d);chatBox.scrollTop=chatBox.scrollHeight}
function sendQuick(m){var inp=document.getElementById('input');inp.value=m;sendMsg()}
</script>
</body>
</html>
