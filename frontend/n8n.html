<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>N8N工作流 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:0}
.topbar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--border);background:var(--card)}
.content{max-width:1200px;margin:0 auto;padding:20px}
h1{font-size:22px;margin-bottom:4px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stats .s{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;flex:1;min-width:80px}
.stats .s .n{font-size:22px;font-weight:700;color:var(--accent)}
.stats .s .l{font-size:11px;color:var(--text2)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input{flex:1;padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;min-width:200px}
.filter-bar select{padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .2s}
.card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(67,97,238,.1)}
.card h3{font-size:13px;margin-bottom:4px}
.card .meta{font-size:10px;color:var(--text3);margin-bottom:4px}
.card .desc{font-size:11px;color:var(--text2);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{background:#eef0f8;padding:1px 5px;border-radius:3px;font-size:9px;margin-right:4px}
.actions button{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);font-size:11px;cursor:pointer;margin-right:4px}
.actions button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.pagination{display:flex;gap:8px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.pagination button{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer}
.pagination button:hover{background:var(--accent);color:#fff}
.pagination .page-info{padding:6px 0;font-size:12px;color:var(--text3)}
.loading{padding:60px;text-align:center;color:var(--text3)}
.empty{text-align:center;padding:60px;color:var(--text3)}
.category-list{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.category-list span{padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;background:var(--sidebar);border:1px solid var(--border);color:var(--text2)}
.category-list span:hover,.category-list span.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style></head><body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px">
    <span class="back-btn" onclick="window.location.href='/'">← 返回</span>
    <h1 style="font-size:15px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">N8N 工作流库</h1>
  </div>
</div>
<div class="content">
<h1>🔄 N8N 工作流库 <span style="font-size:14px;color:var(--text3)" id="totalCount">加载中...</span></h1>
<div class="sub">2077+ 个预制工作流模板，覆盖 1653+ 集成</div>
<div class="stats" id="stats"></div>
<div class="filter-bar">
  <input id="search" placeholder="搜索工作流名称..." oninput="searchWorkflows()">
  <select id="catFilter" onchange="searchWorkflows()"><option value="">全部分类</option></select>
  <button onclick="searchWorkflows()" style="padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:var(--accent);color:#fff;cursor:pointer">🔍 搜索</button>
</div>
<div class="category-list" id="categoryList"></div>
<div class="grid" id="grid"><div class="loading">正在加载工作流列表...</div></div>
<div class="pagination" id="pagination"></div>
</div>
<script>
var _page=1,_total=0,_query='',_cat='';
function loadStatus(){
  fetch('/api/v1/n8n/status').then(function(r){return r.json()}).then(function(d){
    var h='<div class="s"><div class="n">'+d.total+'</div><div class="l">工作流总数</div></div>';
    h+='<div class="s"><div class="n">'+d.unique_integrations+'</div><div class="l">集成数</div></div>';
    h+='<div class="s"><div class="n">'+(d.total_nodes/1000).toFixed(1)+'K</div><div class="l">节点总数</div></div>';
    document.getElementById('stats').innerHTML=h;
    document.getElementById('totalCount').textContent=d.total+' 个工作流';
  });
  fetch('/api/v1/n8n/categories').then(function(r){return r.json()}).then(function(d){
    var cats=d.categories||[];
    var html='<span class="active" onclick="filterCat(\'\')">全部</span>';
    cats.slice(0,40).forEach(function(c){html+='<span onclick="filterCat(\''+c+'\')">'+c+'</span>'});
    document.getElementById('categoryList').innerHTML=html;
    var sel=document.getElementById('catFilter');
    cats.forEach(function(c){sel.innerHTML+='<option value="'+c+'">'+c+'</option>'});
  });
}
function filterCat(cat){_cat=cat;_page=1;document.querySelectorAll('#categoryList span').forEach(function(s){s.classList.remove('active')});event.target.classList.add('active');searchWorkflows()}
function searchWorkflows(){
  _query=document.getElementById('search').value;
  _page=1;fetchWorkflows();
}
function fetchWorkflows(){
  document.getElementById('grid').innerHTML='<div class="loading">正在搜索...</div>';
  var url='/api/v1/n8n/search?q='+encodeURIComponent(_query)+'&page='+_page+'&limit=24';
  if(_cat)url+='&cat='+encodeURIComponent(_cat);
  fetch(url).then(function(r){return r.json()}).then(function(d){
    _total=d.total||0;
    var items=d.results||[];
    if(!items.length){document.getElementById('grid').innerHTML='<div class="empty">无匹配工作流</div>';renderPage();return}
    var h='';
    items.forEach(function(w){
      var n=w.name||w.filename||'unknown';
      h+='<div class="card"><h3>'+n.slice(0,80)+'</h3>';
      h+='<div class="meta">'+w.filename.split('/').slice(0,2).join(' > ')+'</div>';
      h+='<div class="actions"><button onclick="viewWorkflow('+w.id+')">🔍 查看</button>';
      h+='<button onclick="useWorkflow(\''+n.replace(/'/g,'')+'\')">⚡ 使用</button></div></div>';
    });
    document.getElementById('grid').innerHTML=h;
    renderPage();
  }).catch(function(){document.getElementById('grid').innerHTML='<div class="empty">加载失败</div>'});
}
function renderPage(){
  var pages=Math.ceil(_total/24);
  var h='<span class="page-info">共 '+_total+' 个，第 '+_page+'/'+pages+' 页</span>';
  if(_page>1)h+='<button onclick="gotoPage('+(_page-1)+')">← 上一页</button>';
  if(_page<pages)h+='<button onclick="gotoPage('+(_page+1)+')">下一页 →</button>';
  document.getElementById('pagination').innerHTML=h;
}
function gotoPage(p){_page=p;fetchWorkflows()}
function useWorkflow(name){
  try{localStorage.setItem('evo_n8n_workflow',JSON.stringify({name:name}))}catch(e){}
  window.location.href='/?'+Date.now();
}
function viewWorkflow(id){
  fetch('/api/v1/n8n/search?limit=1&page=1&q='+id).then(function(r){return r.json()}).then(function(d){
    var w=d.results&&d.results[0];
    if(w)alert('📋 '+w.name+'\n文件: '+w.filename);
    else alert('未找到');
  });
}
loadStatus();fetchWorkflows();
</script></body></html>
