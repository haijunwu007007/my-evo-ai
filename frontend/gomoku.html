<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>五子棋</title><style>*{margin:0;padding:0;box-sizing:border-box;user-select:none}body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,sans-serif;padding:10px}.wrap{width:100%;max-width:450px;background:#16213e;border-radius:20px;padding:16px;box-shadow:0 8px 40px rgba(0,0,0,0.4)}.hd{text-align:center;color:#e2e8f0;font-size:20px;font-weight:700}.sd{text-align:center;color:#8892b0;font-size:12px;margin:4px 0 8px}.row{display:flex;justify-content:space-between;color:#e2e8f0;font-size:13px;margin-bottom:6px}.brd{width:100%;aspect-ratio:1;background:#d4a76a;border-radius:8px;touch-action:none;cursor:pointer}.brd canvas{width:100%;height:100%;border-radius:8px;touch-action:none}.st{text-align:center;color:#f59e0b;font-size:14px;margin-top:6px;min-height:20px}.btns{display:flex;gap:8px;margin-top:8px}.btn{flex:1;text-align:center;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#4361ee;color:#fff}.b2{background:#ef4444}a{color:#4361ee;text-decoration:none;font-size:12px;display:block;text-align:center;margin-top:6px}</style></head><body><div class="wrap"><div class="hd">⚫ 五子棋</div><div class="sd">黑白轮流落子·五子连珠获胜</div><div class="row"><span id="t">⚫ 黑方走</span><span id="sc">黑:0 白:0</span></div><div class="brd"><canvas id="c"></canvas></div><div class="st" id="st">黑方落子</div><div class="btns"><div class="btn" onclick="re()">🔄 重开</div><div class="btn b2" onclick="window.location.href='/'">← 返回</div></div></div><script>var C=document.getElementById('c'),ctx=C.getContext('2d'),W=450,H=450;ctx.canvas.width=W;ctx.canvas.height=H;var S=15,CELL=W/(S+1),R=CELL*0.4;var board=[],turn=1,over=false,bW=0,bB=0;function init(){board=[];for(var i=0;i<S;i++){board[i]=[];for(var j=0;j<S;j++)board[i][j]=0}turn=1;over=false;document.getElementById('t').textContent='⚫ 黑方走';document.getElementById('st').textContent='黑方落子';draw()}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#d4a76a';ctx.fillRect(0,0,W,H);ctx.strokeStyle='#8b6914';ctx.lineWidth=1;for(var i=0;i<S;i++){ctx.beginPath();ctx.moveTo(CELL,i*CELL+CELL);ctx.lineTo(W-CELL,i*CELL+CELL);ctx.stroke();ctx.beginPath();ctx.moveTo(i*CELL+CELL,CELL);ctx.lineTo(i*CELL+CELL,H-CELL);ctx.stroke()}for(var i=0;i<S;i++){for(var j=0;j<S;j++){var px=i*CELL+CELL,py=j*CELL+CELL;if(board[i][j]===1){ctx.fillStyle='#000';ctx.beginPath();ctx.arc(px,py,R,0,Math.PI*2);ctx.fill()}else if(board[i][j]===2){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py,R,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.stroke()}}}// Center star ctx.fillStyle='#8b6914';ctx.beginPath();ctx.arc(CELL*7+CELL,CELL*7+CELL,3,0,Math.PI*2);ctx.fill()}function checkWin(x,y,p){var dir=[[1,0],[0,1],[1,1],[1,-1]];for(var d=0;d<4;d++){var cnt=1;for(var s=-1;s<=1;s+=2){var nx=x+dir[d][0]*s,ny=y+dir[d][1]*s;while(nx>=0&&nx<S&&ny>=0&&ny<S&&board[nx][ny]===p){cnt++;nx+=dir[d][0]*s;ny+=dir[d][1]*s}}if(cnt>=5)return true}return false}function click(e){if(over)return;var rect=C.getBoundingClientRect();var mx=(e.clientX||(e.touches?e.touches[0].clientX:0))-rect.left;var my=(e.clientY||(e.touches?e.touches[0].clientY:0))-rect.top;if(mx<0||my<0)return;var scale=W/rect.width;mx*=scale;my*=scale;var xi=Math.round(mx/CELL-1),yi=Math.round(my/CELL-1);if(xi<0||xi>=S||yi<0||yi>=S||board[xi][yi]!==0)return;board[xi][yi]=turn;draw();if(checkWin(xi,yi,turn)){over=true;var wn=turn===1?'⚫ 黑方':'(cid:1036) 白方';if(turn===1)bB++;else bW++;document.getElementById('sc').textContent='黑:'+bB+' 白:'+bW;document.getElementById('st').textContent='🎉 '+wn+'胜！';document.getElementById('t').textContent='🏁 结束';return}turn=turn===1?2:1;document.getElementById('t').textContent=turn===1?'⚫ 黑方走':'⚪ 白方走';document.getElementById('st').textContent=turn===1?'黑方落子':'白方落子'}C.addEventListener('click',click);C.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];click({clientX:t.clientX,clientY:t.clientY})},{passive:false});function re(){init();document.getElementById('sc').textContent='黑:'+bB+' 白:'+bW}init()</script></body></html>
