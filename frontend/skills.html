<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>技能中心 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
body{height:100vh;display:flex;flex-direction:column;margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg,#0f0f1a);color:var(--text,#e0e0e0)}
.main{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.content{flex:1;overflow-y:auto;padding:16px 20px;max-width:1100px;margin:0 auto;width:100%}
.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center;background:var(--card)}
.stat-card .num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:10px;color:var(--text3);margin-top:2px}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar input{flex:1;padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;min-width:200px;background:var(--bg);color:var(--text);outline:none}
.filter-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.filter-bar select{padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;background:var(--bg);color:var(--text)}
.filter-bar button{padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.filter-bar button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .2s}
.card:hover{border-color:var(--accent);box-shadow:0 2px 12px var(--glow)}
.card h3{font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card .desc{font-size:11px;color:var(--text2);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:10px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tag{background:#eef0f8;padding:1px 5px;border-radius:3px;font-size:9px}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.actions button{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);font-size:11px;cursor:pointer;transition:all .1s}
.actions button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-card{background:var(--card);border-radius:10px;padding:20px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.modal-card h2{font-size:16px;margin-bottom:10px}
.modal-card pre{background:var(--bg);padding:10px;border-radius:6px;font-size:12px;overflow-x:auto;white-space:pre-wrap;margin-top:8px}
.modal-card .import-area{margin-top:10px}
.modal-card .import-area textarea{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);font-size:11px;font-family:monospace;background:var(--bg);color:var(--text);min-height:100px}
.modal-card .import-area button{margin-top:6px;padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer}
@media(max-width:768px){.content{padding:10px 12px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="main">
  <div class="tabs" style="display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)">
    <div class="tab" style="padding:6px 16px;cursor:pointer;font-size:13px;color:var(--accent);border-bottom:2px solid var(--accent);font-weight:600;transition:all .15s" onclick="switchSTab(this,'s_skills')">🛠️ 技能管理</div>
    <div class="tab" style="padding:6px 16px;cursor:pointer;font-size:13px;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s" onclick="switchSTab(this,'s_capabilities')">🧠 能力中心</div>
  </div>
  <div id="s_skills" class="tab-content" style="display:flex;flex-direction:column;flex:1;min-height:0"><div class="topbar"><div class="topbar-left"><span onclick="window.location.href='/'" style="cursor:pointer;font-size:15px;color:var(--text2);padding:4px">←</span><h1>🛠️ 技能 & 扩展</h1></div><div class="topbar-right"><button class="topbar-btn" onclick="toggleTheme()">🌙</button></div></div><div class="content">
    <div class="stats" id="stats"></div>
    <div class="filter-bar">
      <input id="search" placeholder="搜索技能名称..." oninput="filterSkills()">
      <select id="sourceFilter" onchange="filterSkills()"><option value="">全部来源</option><option value="local">本地</option><option value="platform">平台</option><option value="distilled">蒸馏</option></select>
      <button onclick="window.location.href='/create-skill.html'">💬 对话创建技能</button>
      <button onclick="discoverSkills()">🌐 发现新技能</button>
      <button onclick="showImportModal()">📥 导入技能</button>
      <button onclick="window.location.href='/distill.html'">🧪 蒸馏一切为技能</button>
    </div>
    <div class="grid" id="grid"><div class="loading">正在加载技能列表...</div></div>
  </div>
</div>
<div class="modal" id="modal"><div class="modal-card" id="modalContent"></div></div>
<script>
var _skills=[];
function fetchWithTimeout(url,ms){return Promise.race([fetch(url).then(function(r){return r.json().catch(function(){return{}})}),new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'))},ms)})]).catch(function(){return{}})}
function loadSkills(){
  Promise.all([fetchWithTimeout('/api/v1/skills',5000),fetchWithTimeout('/api/v1/skills-platform/list',5000),fetchWithTimeout('/api/v1/cognee/skills',5000),fetchWithTimeout('/api/v1/distill/list',5000)])
  .then(function(results){
    var all=[];results.forEach(function(r){var list=r.skills||r.data||r.results||[];if(Array.isArray(list))all=all.concat(list);else if(typeof list==='object')Object.keys(list).forEach(function(k){all.push({name:k,description:list[k]})})});
    if(all.length>0){_skills=all;renderSkills();return}
    var fallback=['pdf_toolkit','docx_processor','excel_pro','ppt_generator','code_review','paddleocr_image','nostr_notify','browser_act','mermaid_chart','homeassistant_control','lida_visualize','superset_create_chart','frappe_hr_employee','dataease_create_dashboard','chatwoot_create_ticket'];
    fallback.forEach(function(f){_skills.push({name:f,description:f.replace(/_/g,' ')+' tool',source:'local'})});
    renderSkills();
  }).catch(function(){document.getElementById('grid').innerHTML='<div class="empty">Failed to load skills</div>'});
}
function renderSkills(){
  document.getElementById('stats').innerHTML='<div class="stat-card"><div class="num">'+_skills.length+'</div><div class="label">技能总数</div></div><div class="stat-card"><div class="num">'+_skills.filter(function(s){return(s.source||'local')==='local'}).length+'</div><div class="label">本地</div></div><div class="stat-card"><div class="num">'+_skills.filter(function(s){return(s.source||'local')!=='local'}).length+'</div><div class="label">平台</div></div>';
  filterSkills();
}
function filterSkills(){
  var q=document.getElementById('search').value.toLowerCase();var src=document.getElementById('sourceFilter').value;var f=_skills;
  if(q)f=f.filter(function(s){return(s.name||'').toLowerCase().indexOf(q)>=0||(s.description||'').toLowerCase().indexOf(q)>=0});
  if(src)f=f.filter(function(s){return(s.source||'local')===src});
  if(!f.length){document.getElementById('grid').innerHTML='<div class="empty">无匹配技能</div>';return}
  var h='';f.forEach(function(s){var n=s.name||s.id||'unknown',d=s.description||s.summary||'',src=s.source||'local',v=s.version||'';
    h+='<div class="card"><h3>'+n.slice(0,40)+' <span class="tag">'+src+'</span></h3><div class="desc">'+(d.slice(0,100)||'无描述')+'</div><div class="meta">'+(v?'<span class="tag">v'+v+'</span>':'')+'</div><div class="actions"><button onclick="execSkill(\''+n+'\')">▶ 执行</button><button onclick="skillDetail(\''+n+'\')">📄 详情</button></div></div>'});
  document.getElementById('grid').innerHTML=h;
}
function execSkill(name){localStorage.setItem('evo_skill_name',name);window.location.href='/'}
function skillDetail(name){
  fetch('/api/v1/skills/'+name).then(function(r){return r.json()}).then(function(j){showModal('<h2>📄 '+name+' 详情</h2><pre>'+JSON.stringify(j,null,2).slice(0,500)+'</pre><button onclick="closeModal()" style="margin-top:8px;padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text2)">关闭</button>')}).catch(function(){showModal('<h2>📄 '+name+'</h2><p style="color:var(--text2);font-size:13px">无额外详情</p><button onclick="closeModal()" style="margin-top:8px;padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text2)">关闭</button>')});
}
function discoverSkills(){
  document.getElementById('grid').innerHTML='<div class="loading">正在发现新技能...</div>';
  fetch('/api/v1/skills-platform/discover').then(function(r){return r.json()}).then(function(j){var list=j.skills||j.data||[];if(list.length){_skills=_skills.concat(list);renderSkills()}else alert('没有发现新技能')}).catch(function(){alert('发现失败')});
}
function showImportModal(){showModal('<h2>📥 导入技能</h2><p style="font-size:12px;color:var(--text2);margin-bottom:8px">粘贴SKILL.md内容或GitHub仓库URL</p><div class="import-area"><textarea id="importContent" placeholder="粘贴SKILL.md内容或GitHub URL..."></textarea><br><button onclick="doImportSkill()">导入</button></div><button onclick="closeModal()" style="margin-top:8px;padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text2)">关闭</button>')}
function doImportSkill(){
  var content=document.getElementById('importContent').value.trim();if(!content)return;
  fetch('/api/v1/skills/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:content})}).then(function(r){return r.json()}).then(function(d){if(d.success){alert('导入成功: '+d.name);closeModal();loadSkills()}else alert('导入失败: '+(d.error||'未知错误'))}).catch(function(){alert('导入失败: 网络错误')});
}
function showModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').onclick=function(e){if(e.target===this)closeModal()};
function toggleTheme(){document.body.classList.toggle('dark');try{localStorage.setItem('evo_theme',document.body.classList.contains('dark')?'dark':'light')}catch(e){}}
(function(){try{if(localStorage.getItem('evo_theme')==='dark')document.body.classList.add('dark')}catch(e){};loadSkills()})();
</script>
<div id="s_capabilities" class="tab-content" style="display:none;flex:1;min-height:0"><iframe src="/capabilities" style="width:100%;height:100%;border:none"></iframe></div>
<script>
function switchSTab(el,id){
  el.parentElement.querySelectorAll('.tab').forEach(function(t){t.style.color='var(--text3)';t.style.borderBottomColor='transparent';t.style.fontWeight='400'})
  el.style.color='var(--accent)';el.style.borderBottomColor='var(--accent)';el.style.fontWeight='600'
  el.parentElement.parentElement.querySelectorAll('.tab-content').forEach(function(c){c.style.display='none'})
  document.getElementById(id).style.display='flex'}
</script>
</div>
</body></html>
