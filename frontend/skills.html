<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>技能中心 - AUTO-EVO-AI</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,Microsoft YaHei,sans-serif;background:#f5f5f8;margin:0;padding:20px;color:#1a1a2e}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header h1{margin:0;font-size:20px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h3{margin:0 0 10px;font-size:14px;color:#6b7280}
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.skill{border:1px solid #e5e7eb;border-radius:8px;padding:10px;background:#f9fafb;transition:all .2s}
.skill-icon{font-size:20px}
.skill-name{font-size:12px;font-weight:600;margin-top:4px}
.skill-desc{font-size:10px;color:#6b7280;margin-top:2px}
.search-box{width:100%;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;box-sizing:border-box;margin-bottom:10px}
.btn{padding:8px 16px;border-radius:8px;border:none;background:#4361ee;color:#fff;font-size:13px;cursor:pointer}
a{color:#4361ee;text-decoration:none;font-size:12px}
</style><link rel="stylesheet" href="/share.css">
</head><body>
<div class="header"><span style="font-size:24px">🧩</span><h1>技能中心</h1><a href="/">← 返回首页</a></div>
<div class="card"><input class="search-box" id="skillSearch" placeholder="🔍 搜索技能..." oninput="filterSkills(this.value)">
<div class="skill-grid" id="skillGrid">
<div class="skill"><div class="skill-icon">📄</div><div class="skill-name">文档生成</div><div class="skill-desc">docx_processor</div></div>
<div class="skill"><div class="skill-icon">📊</div><div class="skill-name">电子表格</div><div class="skill-desc">excel_pro</div></div>
<div class="skill"><div class="skill-icon">📽️</div><div class="skill-name">演示文稿</div><div class="skill-desc">ppt_generator</div></div>
<div class="skill"><div class="skill-icon">📃</div><div class="skill-name">PDF处理</div><div class="skill-desc">pdf_toolkit</div></div>
<div class="skill"><div class="skill-icon">🔍</div><div class="skill-name">代码审查</div><div class="skill-desc">code_review</div></div>
<div class="skill"><div class="skill-icon">🌐</div><div class="skill-name">全网搜索</div><div class="skill-desc">reach_search</div></div>
<div class="skill"><div class="skill-icon">🗺️</div><div class="skill-name">流程图</div><div class="skill-desc">mermaid_chart</div></div>
<div class="skill"><div class="skill-icon">🎤</div><div class="skill-name">音频转录</div><div class="skill-desc">scriberr_transcribe</div></div>
</div></div>
<div class="card"><h3>📊 技能统计</h3><p style="font-size:13px;color:#6b7280;margin:0">系统内置 <strong id="skillCount">94</strong> 个可用技能，覆盖文档、代码、数据、搜索等领域。</p></div>
<script>
function filterSkills(q){q=q.toLowerCase();var els=document.querySelectorAll('.skill');for(var i=0;i<els.length;i++){var n=els[i].textContent.toLowerCase();els[i].style.display=n.indexOf(q)>=0?'':'none'}}
</script></body></html>
