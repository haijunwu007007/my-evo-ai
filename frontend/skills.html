<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>技能中心 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--success:#22c55e;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1200px;margin:0 auto}
h1{font-size:22px;margin-bottom:6px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stats .s{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;flex:1;min-width:80px}
.stats .s .n{font-size:22px;font-weight:700;color:var(--accent)}.stats .s .l{font-size:11px;color:var(--text2)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input{flex:1;padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;min-width:200px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .2s}
.card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(67,97,238,.1)}
.card h3{font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card .desc{font-size:11px;color:var(--text2);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:10px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tag{background:#eef0f8;padding:1px 5px;border-radius:3px;font-size:9px}
.actions button{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);font-size:11px;cursor:pointer;margin-right:4px}
.actions button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.loading{padding:60px;text-align:center;color:var(--text3)}
.empty{text-align:center;padding:60px;color:var(--text3)}
@media(max-width:768px){body{padding:10px;}.grid{grid-template-columns:1fr}}
</style></head><body>
<h1>🧩 技能 & 扩展 <span style="font-size:14px;color:var(--text3)" id="totalCount">加载中...</span></h1>
<div class="sub">安装、管理、执行各类技能和工具扩展</div>
<div class="stats" id="stats"></div>
<div class="filter-bar">
  <input id="search" placeholder="搜索技能名称..." oninput="filterSkills()">
  <select id="sourceFilter" onchange="filterSkills()"><option value="">全部来源</option><option value="local">本地</option><option value="platform">平台</option></select>
  <button onclick="discoverSkills()" style="padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer">🌐 发现新技能</button>
</div>
<div class="grid" id="grid"><div class="loading">正在加载技能列表...</div></div>
<script>
var _skills = [];

function loadSkills(){
  Promise.all([
    fetch('/api/v1/skills').then(function(r){return r.json().catch(function(){return {}})}),
    fetch('/api/v1/skills-platform/list').then(function(r){return r.json().catch(function(){return {}})}),
    fetch('/api/v1/cognee/skills').then(function(r){return r.json().catch(function(){return {}})}),
    fetch('/api/v1/mercury/skills').then(function(r){return r.json().catch(function(){return {}})})
  ]).then(function(results){
    var all = [];
    results.forEach(function(r){
      var list = r.skills || r.data || r.results || [];
      if(Array.isArray(list)) all = all.concat(list);
      else if(typeof list === 'object') Object.keys(list).forEach(function(k){all.push({name:k,description:list[k]})});
    });
    if(all.length > 0) { _skills = all; renderSkills(); return; }
    
    // Fallback: known tool chips
    var fallback = ['pdf_toolkit','docx_processor','excel_pro','ppt_generator','code_review','paddleocr_image','nostr_notify','gitea_git','browser_act','airbyte_etl','mermaid_chart','lida_visualize','homeassistant_control'];
    fallback.forEach(function(f){_skills.push({name:f,description:f.replace(/_/g,' ')+' tool',source:'local'})});
    renderSkills();
  }).catch(function(){
    document.getElementById('grid').innerHTML='<div class="empty">Failed to load skills</div>';
  });
}

function renderSkills(){
  var sHtml = '<div class="s"><div class="n">'+_skills.length+'</div><div class="l">技能总数</div></div>';
  sHtml += '<div class="s"><div class="n">'+_skills.filter(function(s){return (s.source||'local')==='local'}).length+'</div><div class="l">本地</div></div>';
  sHtml += '<div class="s"><div class="n">'+_skills.filter(function(s){return (s.source||'local')!=='local'}).length+'</div><div class="l">平台</div></div>';
  document.getElementById('stats').innerHTML = sHtml;
  document.getElementById('totalCount').textContent = _skills.length + ' 个技能';
  filterSkills();
}

function filterSkills(){
  var q = document.getElementById('search').value.toLowerCase();
  var src = document.getElementById('sourceFilter').value;
  var f = _skills;
  if(q) f = f.filter(function(s){return(s.name||'').toLowerCase().indexOf(q)>=0||(s.description||'').toLowerCase().indexOf(q)>=0});
  if(src) f = f.filter(function(s){return(s.source||'local')===src});
  if(!f.length){document.getElementById('grid').innerHTML='<div class="empty">无匹配技能</div>';return}
  var h = '';
  f.forEach(function(s){
    var n = s.name||s.id||'unknown';
    var d = s.description||s.summary||'';
    var src = s.source||'local';
    h += '<div class="card"><h3>'+n.slice(0,40)+' <span class="tag">'+src+'</span></h3>';
    h += '<div class="desc">'+d.slice(0,100)+'</div>';
    h += '<div class="actions"><button onclick="execSkill(\''+n+'\')">▶ 执行</button>';
    h += '<button onclick="skillDetail(\''+n+'\')">📄 详情</button></div></div>';
  });
  document.getElementById('grid').innerHTML = h;
}

function execSkill(name){
  fetch('/api/v1/skills/'+name+'/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})
    .then(function(r){return r.json()}).then(function(j){alert(JSON.stringify(j).slice(0,100))})
    .catch(function(){alert('执行失败: '+name)});
}

function skillDetail(name){
  fetch('/api/v1/skills/'+name).then(function(r){return r.json()}).then(function(j){
    alert(JSON.stringify(j,null,2).slice(0,300));
  }).catch(function(){alert('无详情: '+name)});
}

function discoverSkills(){
  document.getElementById('grid').innerHTML='<div class="loading">正在发现新技能...</div>';
  fetch('/api/v1/skills-platform/discover').then(function(r){return r.json()}).then(function(j){
    var list = j.skills||j.data||[];
    if(list.length){_skills=_skills.concat(list);renderSkills()}
    else alert('没有发现新技能');
  }).catch(function(){alert('发现失败')});
}

loadSkills();
</script></body></html>
