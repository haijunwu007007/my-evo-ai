<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🏭 软件工厂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,sans-serif;padding:16px;min-height:100vh}
.container{max-width:720px;margin:0 auto}
h1{font-size:24px;margin-bottom:4px}
.sub{color:#8892b0;font-size:13px;margin-bottom:20px}
.card{background:#16213e;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #2d3561}
.card h3{font-size:16px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #2d3561;background:#0f3460;color:#e0e0e0;font-size:14px;min-height:100px;font-family:inherit;resize:vertical}
.card textarea:focus{outline:none;border-color:#4361ee}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.btn-primary{background:#4361ee;color:#fff}
.btn-primary:hover{background:#3651d4}
.btn-secondary{background:#2d3561;color:#e0e0e0}
.btn-secondary:hover{background:#3d4571}
select{padding:8px 12px;border-radius:8px;border:1px solid #2d3561;background:#0f3460;color:#e0e0e0;font-size:14px}
.result-box{background:#0f3460;border-radius:8px;padding:12px;margin-top:10px;font-size:13px;white-space:pre-wrap;min-height:50px;max-height:400px;overflow:auto}
.back{color:#4361ee;text-decoration:none;font-size:13px;display:inline-block;margin-top:12px}
.template-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.template-btn{padding:8px;border-radius:6px;background:rgba(67,97,238,0.1);border:1px solid #2d3561;cursor:pointer;text-align:center;font-size:13px;transition:.2s}
.template-btn:hover{background:rgba(67,97,238,0.2);border-color:#4361ee}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:#4361ee;color:#fff;margin:2px}
#loading{display:none;text-align:center;padding:20px;color:#8892b0}
#loading.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:24px;height:24px;border:3px solid #2d3561;border-top-color:#4361ee;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
</style>
</head>
<body>
<div class="container">
<h1>🏭 软件工厂</h1>
<p class="sub">描述你要做什么，AI 帮你生成完整代码</p>

<div class="card">
<h3>📝 描述你的软件</h3>
<textarea id="description" placeholder="例如：一个待办事项管理网页，支持增删改查，本地存储，美观的卡片式界面..."></textarea>

<div style="margin:8px 0">
<select id="lang"><option value="html">HTML+CSS+JS (网页)</option><option value="python">Python</option><option value="javascript">JavaScript</option><option value="react">React</option></select>
<select id="mode" style="margin-left:8px"><option value="full">完整项目</option><option value="component">仅组件</option><option value="api">API 接口</option></select>
</div>

<div class="template-grid">
<div class="template-btn" onclick="useTemplate('一个美观的登录注册页面，深色主题，表单验证')">🔐 登录页</div>
<div class="template-btn" onclick="useTemplate('数据图表看板，显示折线图和柱状图，暗色主题')">📊 数据看板</div>
<div class="template-btn" onclick="useTemplate('聊天界面，消息列表+输入框，WebSocket风格')">💬 聊天界面</div>
<div class="template-btn" onclick="useTemplate('RESTful API 增删改查，Flask/FastAPI风格')">🔧 API CRUD</div>
</div>

<div class="row">
<button class="btn btn-primary" onclick="generate()">🚀 生成代码</button>
<button class="btn btn-secondary" onclick="previewCode()">👁️ 预览</button>
</div>
</div>

<div class="card" id="resultCard" style="display:none">
<h3>📄 生成结果</h3>
<div class="result-box" id="result"></div>
<button class="btn btn-secondary" style="margin-top:8px" onclick="copyCode()">📋 复制代码</button>
</div>

<div id="loading"><div class="spinner"></div><span>正在生成...</span></div>

<a href="/" class="back">← 返回聊天</a>
</div>
<script>
function useTemplate(t){document.getElementById('description').value=t}
async function generate(){
  var desc=document.getElementById('description').value.trim()
  if(!desc){alert('请描述你要做的软件');return}
  document.getElementById('loading').classList.add('show')
  document.getElementById('resultCard').style.display='none'
  try{
    var r=await fetch('/api/v1/smart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      message:'生成代码: '+desc,
      lang:'zh-CN',
      api_key:localStorage.getItem('evo_api_key')||'',
      provider:'glm'
    })})
    var d=await r.json()
    document.getElementById('loading').classList.remove('show')
    if(d&&d.success){
      document.getElementById('result').textContent=d.result||'生成完成'
      document.getElementById('resultCard').style.display='block'
    }else{
      document.getElementById('result').textContent='错误: '+(d&&d.detail||'生成失败')
      document.getElementById('resultCard').style.display='block'
    }
  }catch(e){
    document.getElementById('loading').classList.remove('show')
    document.getElementById('result').textContent='请求失败: '+e.message
    document.getElementById('resultCard').style.display='block'
  }
}
function previewCode(){var d=document.getElementById('description').value.trim();if(d)document.getElementById('result').textContent='预览模式: '+d.slice(0,200)+'\n\n点击「生成代码」获取完整实现';document.getElementById('resultCard').style.display='block'}
function copyCode(){var t=document.getElementById('result').textContent;navigator.clipboard&&navigator.clipboard.writeText(t).then(function(){alert('已复制')})}
</script>
</body>
</html>
