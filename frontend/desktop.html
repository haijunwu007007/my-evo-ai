<div class="status" id="pwaStatus">⏳ 检测浏览器 PWA 支持...</div>

<button class="btn" id="installBtn" style="display:none" onclick="installPWA()">📥 安装到桌面</button>

<script>
var deferredPrompt=null
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').style.display='inline-block';document.getElementById('pwaStatus').innerHTML='📥 可以安装到桌面，点击上方按钮'})
window.addEventListener('appinstalled',function(){document.getElementById('pwaStatus').innerHTML='✅ 已安装到桌面';document.getElementById('installBtn').style.display='none'})
if(window.matchMedia('(display-mode: standalone)').matches){document.getElementById('pwaStatus').innerHTML='✅ 已在桌面应用模式运行'}
else if(!('beforeinstallprompt'in window)){document.getElementById('pwaStatus').innerHTML='ℹ️ 当前浏览器支持 PWA，但可能需要 HTTPS'}
async function installPWA(){if(!deferredPrompt)return;deferredPrompt.prompt();var r=await deferredPrompt.userChoice;document.getElementById('pwaStatus').innerHTML=r.outcome==='accepted'?'✅ 安装成功':'❌ 已取消';deferredPrompt=null;document.getElementById('installBtn').style.display='none'}
// 尝试注册 SW
if(navigator.serviceWorker){navigator.serviceWorker.register('/static/sw.js').catch(function(){})}
