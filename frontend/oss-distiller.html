<!DOCTYPE html><html lang="zh-CN"><head>
<meta name="description" content="AUTO-EVO-AI 智能进化平台 - 一键部署、智能Agent、自动化工作流">
<meta property="og:title" content="AUTO-EVO-AI">
<meta property="og:description" content="一键部署任意项目，自动完成所有工作">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🪐 OSS Distiller — AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0b0b16,#12122a);color:#e8e8ef;font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh}
.hdr{background:rgba(20,20,35,.92);border-bottom:1px solid rgba(45,53,97,.4);padding:0 16px;height:46px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(12px)}
.hdr .l{font-size:15px;font-weight:800;background:linear-gradient(135deg,#4361ee,#a855f7,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .n{display:flex;gap:2px}.hdr .n a{padding:4px 10px;border-radius:6px;font-size:12px;color:#8892b0;text-decoration:none;transition:all .2s}
.hdr .n a:hover,.hdr .n a.a{color:#e8e8ef;background:rgba(67,97,238,.15)}
.c{max-width:960px;margin:0 auto;padding:20px 16px}
h2{font-size:18px;margin-bottom:12px;background:linear-gradient(135deg,#e8e8ef,#a0a8b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.card{flex:1;min-width:160px;background:rgba(26,26,46,.5);border:1px solid rgba(45,53,97,.3);border-radius:12px;padding:16px;transition:all .3s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.card .num{font-size:28px;font-weight:800;background:linear-gradient(135deg,#4361ee,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card .lb{font-size:11px;color:#636e70;margin-top:2px}
.card .sub{font-size:11px;color:#10b981;margin-top:4px}
.btn{padding:8px 20px;border:none;border-radius:8px;background:linear-gradient(135deg,#4361ee,#a855f7);color:#fff;font-size:13px;cursor:pointer;font-weight:600;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(67,97,238,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.console{margin:14px 0;background:rgba(10,10,20,.8);border:1px solid rgba(45,53,97,.4);border-radius:12px;overflow:hidden;display:none}
.console .bar{padding:8px 14px;background:rgba(20,20,35,.6);font-size:12px;color:#8892b0;border-bottom:1px solid rgba(45,53,97,.2)}
.console .lg{padding:14px;font-size:12px;font-family:monospace;color:#a0a8b8;line-height:1.7;max-height:300px;overflow:auto;white-space:pre-wrap}
.tb{background:rgba(26,26,46,.5);border:1px solid rgba(45,53,97,.3);border-radius:12px;overflow:hidden}
.tb table{width:100%;border-collapse:collapse;font-size:12px}
.tb th{padding:8px 12px;text-align:left;font-size:10px;color:#636e70;background:rgba(20,20,35,.5)}
.tb td{padding:8px 12px;color:#a0a8b8;border-bottom:1px solid rgba(45,53,97,.1)}
.tb .ok{color:#10b981}.tb .wa{color:#f59e0b}
.next-scan{text-align:center;font-size:11px;color:#636e70;margin:8px 0}
@media(max-width:600px){.row{flex-direction:column}}
</style>  <link rel="stylesheet" href="/frontend/share.css">
<style>body{background:var(--bg);color:var(--text)}</style>
</head><body>
<div class="hdr">
  <div class="l"></div>
  <div class="n"><a href="/">对话</a><a href="/dashboard">仪表盘</a><a href="/automations">自动化</a><a href="/oss-distiller" class="a">开源蒸馏</a><a href="/capabilities">能力中心</a></div>
  <span id="modelBadge" style="margin-left:auto;font-size:11px;color:#636e70;padding:4px 8px;border-radius:6px;background:rgba(45,53,97,.2)">🧠 Qwen3.6</span>
</div>
<div class="c">
  <h2>🪐 开源项目蒸馏器</h2>
  <p style="font-size:12px;color:#636e70;margin:-8px 0 14px">每日 08:00 / 20:00 自动扫描 → 评估 → 集成</p>
  <div class="row">
    <div class="card"><div class="num" id="totalDistilled">0</div><div class="lb">已蒸馏</div><div class="sub">累计项目</div></div>
    <div class="card"><div class="num" id="integrated">0</div><div class="lb">已集成</div><div class="sub">自动注册到系统</div></div>
    <div class="card"><div class="num" id="successRate">0%</div><div class="lb">成功率</div><div class="sub">可集成项目占比</div></div>
    <div class="card"><div class="num" id="nextScan">--:--</div><div class="lb">下次扫描</div><div class="sub">UTC+8</div></div>
  </div>
  <button class="btn" onclick="scanNow()" id="scanBtn">🔄 立即扫描</button>
  <div class="console" id="console"><div class="bar" id="logTitle">日志</div><div class="lg" id="logContent"></div></div>
  <h2 style="margin-top:20px">📜 蒸馏记录</h2>
  <div class="tb"><table><thead><tr><th>项目</th><th>评分</th><th>状态</th><th>时间</th></tr></thead><tbody id="list"><tr><td colspan="4" style="text-align:center;padding:20px;color:#636e70">暂无记录</td></tr></tbody></table></div>
</div>
<script>
async function scanNow(){
  document.getElementById('scanBtn').disabled=true;document.getElementById('scanBtn').textContent='⏳ 扫描中'
  document.getElementById('console').style.display='block'
  document.getElementById('logContent').textContent='🔄 开始扫描开源社区...\n'
  try{
    var r=await fetch('/api/v1/oss-distiller/scan',{method:'POST',signal:AbortSignal.timeout(120000)})
    var d=await r.json()
    document.getElementById('logContent').textContent+=JSON.stringify(d,null,2)
  }catch(e){document.getElementById('logContent').textContent+='\n❌ 错误: '+e.message}
  document.getElementById('scanBtn').disabled=false;document.getElementById('scanBtn').textContent='🔄 立即扫描'
  loadStats()
}
async function loadStats(){
  try{
    var r=await fetch('/api/v1/oss-distiller/status');var d=await r.json()
    document.getElementById('totalDistilled').textContent=d.total||0
    document.getElementById('integrated').textContent=d.integrated||0
    var rate=d.total>0?Math.round(d.integrated/d.total*100)+'%':'0%'
    document.getElementById('successRate').textContent=rate
    if(d.next_scan){document.getElementById('nextScan').textContent=d.next_scan}
    if(d.records){
      var h=''
      for(var rec of d.records.slice(0,20)){
        var st=rec.score>=70?'<span class="ok">✅ 已集成</span>':'<span class="wa">⏳ 待评估</span>'
        h+='<tr><td style="font-weight:500">'+(rec.name||'?')+'</td><td>'+rec.score+'</td><td>'+st+'</td><td>'+(rec.time||'')+'</td></tr>'
      }
      if(!h)h='<tr><td colspan="4" style="text-align:center;padding:20px;color:#636e70">暂无记录</td></tr>'
      document.getElementById('list').innerHTML=h
    }
  }catch(e){}
}
loadStats()
</script></body></html>
