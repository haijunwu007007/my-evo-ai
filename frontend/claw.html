<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Claw - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,Microsoft YaHei,sans-serif}
body{background:#f5f5f8;color:#1a1a2e;display:flex;min-height:100vh}
.sidebar{width:120px;background:#f0f0f4;display:flex;flex-direction:column;padding:8px 0;border-right:1px solid #e8eaed;flex-shrink:0}
.sbtn{display:flex;align-items:center;gap:6px;width:100%;padding:5px 10px;border:none;background:transparent;color:#6b7280;font-size:11px;cursor:pointer}
.sbtn:hover{background:#e4e6ed;color:#1a1a2e}
.sbtn .sicon{font-size:13px;width:20px;text-align:center}
.sbtn.active{background:#eef0f8;color:#4361ee;font-weight:600}
.spacer{flex:1}
.divider{height:1px;background:#e8eaed;margin:4px 10px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:1px solid #e8eaed;background:#fff;height:44px}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-left h1{font-size:14px;font-weight:700}
.back-btn{font-size:11px;color:#6b7280;cursor:pointer;padding:3px 8px;border-radius:6px}
.back-btn:hover{background:#f0f2f8;color:#4361ee}
.content{flex:1;padding:20px 24px;overflow-y:auto;max-width:900px}
.card{background:#fff;border-radius:12px;border:1px solid #e8eaed;padding:16px;margin-bottom:12px}
.card h2{font-size:15px;margin-bottom:8px;color:#1a1a2e}
.card p{font-size:12px;color:#6b7280;line-height:1.6;margin-bottom:12px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-dot.online{background:#22c55e}
.status-dot.offline{background:#ef4444}
.status-row{display:flex;align-items:center;gap:8px;font-size:12px;color:#6b7280;padding:4px 0}
.input-area{display:flex;gap:8px;margin-top:12px}
.input-area input{flex:1;padding:8px 12px;border-radius:10px;border:1px solid #e8eaed;font-size:13px;outline:none;background:#f9fafb}
.input-area input:focus{border-color:#4361ee}
.input-area button{padding:8px 16px;border-radius:10px;border:none;background:#4361ee;color:#fff;font-size:12px;cursor:pointer}
.input-area button:hover{background:#3651d4}
.output-box{background:#f9fafb;border-radius:10px;padding:12px;font-size:12px;color:#374151;margin-top:8px;min-height:40px;white-space:pre-wrap;display:none}
.platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.platform-card{padding:10px;border-radius:8px;border:1px solid #e8eaed;text-align:center;font-size:11px;cursor:pointer;transition:all .2s}
.platform-card:hover{border-color:#4361ee;background:#f0f2f8}
.platform-card .picon{font-size:20px;margin-bottom:4px}
</style>
  <link rel="stylesheet" href="/frontend/share.css">
</head><body>

<div class="sidebar">
  <div class="sbtn" onclick="window.location.href='/'"><span class="sicon">&#x1F4AC;</span> 对话</div>
  <div class="divider"></div>
  <div class="sbtn active"><span class="sicon">&#x1F579;</span> Claw</div>
  <div class="sbtn" onclick="window.location.href='/hermes'"><span class="sicon">&#x1F3DB;</span> Hermes</div>
  <div class="sbtn" onclick="window.location.href='/human'"><span class="sicon">&#x1F64B;</span> Human</div>
  <div class="sbtn" onclick="window.location.href='/experts'"><span class="sicon">&#x1F465;</span> 专家</div>
  <div class="sbtn" onclick="window.location.href='/skills'"><span class="sicon">&#x1F9E9;</span> 技能</div>
  <div class="sbtn" onclick="window.location.href='/plugins'"><span class="sicon">&#x1F50C;</span> 插件</div>
  <div class="spacer"></div>
  <div class="divider"></div>
  <div class="sbtn" onclick="window.location.href='/'">&#x1F313; 浅色</div>
  <div class="sbtn" onclick="doLogout()">&#x1F513; 退出</div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Claw 远程联动</h1></div>
    <div class="back-btn" onclick="window.location.href='/'">&#x2190; 返回主页</div>
  </div>

  <div class="content">
    <div class="card">
      <h2>&#x1F310; 平台连接</h2>
      <div class="platform-grid">
        <div class="platform-card" onclick="connectPlatform('github')"><div class="picon">&#x1F4BB;</div>GitHub</div>
        <div class="platform-card" onclick="connectPlatform('slack')"><div class="picon">&#x1F4AC;</div>Slack</div>
        <div class="platform-card" onclick="connectPlatform('discord')"><div class="picon">&#x1F3AE;</div>Discord</div>
        <div class="platform-card" onclick="connectPlatform('telegram')"><div class="picon">&#x2709;</div>Telegram</div>
        <div class="platform-card" onclick="connectPlatform('wechat')"><div class="picon">&#x1F4F1;</div>微信</div>
        <div class="platform-card" onclick="connectPlatform('dingtalk')"><div class="picon">&#x1F514;</div>钉钉</div>
        <div class="platform-card" onclick="connectPlatform('feishu')"><div class="picon">&#x1F4C4;</div>飞书</div>
        <div class="platform-card" onclick="connectPlatform('whatsapp')"><div class="picon">&#x1F4F2;</div>WhatsApp</div>
      </div>
    </div>

    <div class="card">
      <h2>&#x1F916; Claw 智能体</h2>
      <p>向 Claw 发送指令，它将联动各平台执行任务。支持自然语言、远程部署、自动化流程。</p>
      <div class="status-row" id="clawStatus"><span class="status-dot offline"></span>检测连接中...</div>
      <div class="input-area">
        <input id="clawInput" placeholder="输入指令，例如: 推送代码到GitHub仓库" onkeydown="if(event.key==='Enter')sendToClaw()">
        <button onclick="sendToClaw()">&#x27A4; 发送</button>
      </div>
      <div class="output-box" id="clawOutput"></div>
    </div>
  </div>
</div>

<script>
async function sendToClaw(){
  var input=document.getElementById('clawInput'),text=input.value.trim();
  if(!text)return;
  var out=document.getElementById('clawOutput');out.style.display='block';out.textContent='Claw 处理中...\n\n指令: '+text;
  input.value='';
  try{
    var r=await fetch('/api/v1/smart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,lang:'zh-CN',api_key:'',provider:'',context:[{role:'system',content:'你是Claw远程联动智能体。你负责联动多个平台(GitHub/Slack/Discord/Telegram/微信/钉钉/飞书/WhatsApp)执行用户指令。请根据用户需求，调用系统工具完成任务。'}],task_id:'claw_'+Date.now()})});
    var d=await r.json();
    if(d&&d.success){out.textContent='Claw 响应:\n\n'+d.result;}
    else{out.textContent='Claw 返回错误: '+(d&&d.detail||r.status);}
  }catch(e){out.textContent='Claw 执行失败: '+e.message;}
}
function connectPlatform(name){
  var out=document.getElementById('clawOutput');out.style.display='block';
  out.textContent='正在连接 '+name+' ...';
  sendToClawWith('连接 '+name+' 平台，测试连通性');
}
function sendToClawWith(msg){
  var input=document.getElementById('clawInput');input.value=msg;sendToClaw();
}
// 状态检测
(async function(){
  try{
    var r=await fetch('/api/v1/status',{signal:AbortSignal.timeout(3000)});
    document.getElementById('clawStatus').innerHTML='<span class="status-dot online"></span>系统在线 | API 正常';
  }catch(e){
    document.getElementById('clawStatus').innerHTML='<span class="status-dot offline"></span>无法连接 API';
  }
})();
function doLogout(){localStorage.removeItem('evo_logged_in');window.location.href='/'}
</script>
</body></html>
