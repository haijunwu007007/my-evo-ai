<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:var(--bg);color:var(--text);display:flex;height:100vh}
.sidebar{width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar h2{padding:12px 14px;font-size:15px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar .section{padding:6px 12px 2px;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;display:flex;justify-content:space-between}
.sidebar .section .count{color:var(--accent)}
.node-list{overflow-y:auto;padding:4px;flex:1}
.node-item{display:flex;align-items:center;gap:6px;padding:5px 8px;margin:2px 6px;border-radius:6px;cursor:grab;font-size:12px;background:var(--bg);border:1px solid var(--border);transition:all .15s}
.node-item:hover{border-color:var(--accent);transform:translateX(3px);background:#f0f4ff}
.node-item .icon{font-size:14px;width:20px;text-align:center}
.node-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-item .desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.toolbar{display:flex;gap:6px;align-items:center;padding:6px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap}
.toolbar select,.toolbar input{border:1px solid var(--border);border-radius:6px;padding:5px 8px;background:var(--bg);color:var(--text);font-size:12px}
.toolbar input{width:140px}
.toolbar button{padding:5px 12px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
.toolbar button:hover{opacity:.85}
.toolbar button.green{background:var(--accent-success)}
.toolbar button.red{background:var(--accent-danger)}
.toolbar button.orange{background:var(--accent-warning)}
.toolbar .sep{border-left:1px solid #d0d0d0;height:20px;margin:0 4px}
.canvas{flex:1;position:relative;overflow:hidden;background:#fafbfc;background-image:radial-gradient(circle,#d0d0d0 1px,transparent 1px);background-size:24px 24px}
.canvas .hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text3);font-size:15px;text-align:center;pointer-events:none;line-height:1.8}
.node-el{position:absolute;min-width:160px;background:var(--bg);border:1.5px solid #e0e0e0;border-radius:10px;padding:10px;cursor:move;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.1);transition:box-shadow .2s,opacity .15s}
.node-el:hover{border-color:var(--accent);z-index:20;box-shadow:0 4px 20px rgba(67,97,238,.15)}
.node-el .hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.node-el .hdr .icon{font-size:13px;width:18px;text-align:center}
.node-el .hdr .nm{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-el .hdr .del{font-size:11px;cursor:pointer;color:#e74c3c;opacity:.5;padding:0 2px}
.node-el .hdr .del:hover{opacity:1}
.node-el .sub{font-size:10px;color:var(--text2);margin:2px 0;display:flex;gap:4px}
.node-el .sub .tag{padding:1px 5px;border-radius:4px;background:#eef2ff;color:var(--accent);font-size:9px}
.port{position:absolute;width:12px;height:12px;border-radius:50%;cursor:crosshair;z-index:5;transition:transform .15s,box-shadow .15s}
.port:hover{transform:scale(1.4);box-shadow:0 0 8px rgba(67,97,238,.5)}
.port-out{right:-7px;top:50%;transform:translateY(-50%);background:var(--accent)}
.port-out:hover{transform:translateY(-50%) scale(1.3)}
.port-in{left:-7px;top:50%;transform:translateY(-50%);background:#00b894}
.port-in:hover{transform:translateY(-50%) scale(1.3)}
.port-true{right:-7px;top:30%;background:var(--accent-success)}
.port-false{right:-7px;top:70%;background:var(--accent-danger)}
.cond-true{border-left:3px solid #22c55e;background:#f0fdf4}
.cond-false{border-left:3px solid #e74c3c;background:#fef2f2}
.subflow-node{border-color:#f59e0b;background:#fffcf0}
.subflow-node:hover{border-color:#f59e0b}
.nlp-node{border-color:#a855f7;background:#faf5ff}
.nlp-node:hover{border-color:#a855f7}
.prop-panel{position:absolute;right:12px;top:12px;width:240px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;display:none;z-index:30;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.prop-panel h3{font-size:13px;margin-bottom:6px;color:var(--accent)}
.prop-panel label{font-size:11px;color:var(--text2);display:block;margin:5px 0 2px}
.prop-panel input,.prop-panel select,.prop-panel textarea{width:100%;padding:5px 7px;border-radius:4px;border:1px solid var(--border);background:#fafbfc;color:var(--text);font-size:11px}
.prop-panel textarea{resize:vertical;min-height:36px;font-family:monospace}
.prop-panel button{padding:5px 10px;border:none;border-radius:4px;cursor:pointer;font-size:11px;margin:3px 2px}
.nlp-input{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;background:var(--bg);border:1.5px solid #a855f7;border-radius:12px;padding:8px 14px;display:flex;gap:8px;align-items:center;box-shadow:0 4px 24px rgba(168,85,247,.12);min-width:360px;max-width:560px}
.nlp-input textarea{border:none;background:transparent;color:var(--text);font-size:12px;resize:none;flex:1;min-height:20px;max-height:60px;outline:none;font-family:inherit}
.nlp-input textarea::placeholder{color:#aaa}
.nlp-input button{padding:5px 12px;border:none;border-radius:8px;background:linear-gradient(135deg,#a855f7,#4361ee);color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
.nlp-input button:hover{opacity:.9}
.loading-spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(168,85,247,.3);border-top-color:#a855f7;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
body{flex-direction:column}
.sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:100;width:240px;height:100vh;max-height:none;overflow-y:auto;transition:left .25s;box-shadow:4px 0 16px rgba(0,0,0,.12)}
.sidebar.open{left:0}
.sidebar-toggle{display:flex!important}
.main{width:100%}
.canvas{min-height:350px}
.nlp-input{min-width:92%;max-width:96%;bottom:8px}
.toolbar{gap:4px}
.toolbar button{font-size:11px;padding:4px 8px}
.node-el{min-width:140px}
.prop-panel{right:4px;top:4px;width:200px}
}
@media(max-width:480px){
.sidebar h2{font-size:13px;padding:8px 10px}
.node-item{font-size:11px;padding:4px 6px}
.toolbar{padding:4px 6px}
.toolbar select,.toolbar input{font-size:11px;padding:4px 6px}
.toolbar button{font-size:10px;padding:3px 6px}
.toolbar input{width:100px}
.canvas{min-height:280px}
.prop-panel{width:180px;right:2px;top:2px}
.canvas .hint{font-size:12px}
.nlp-input{bottom:4px;padding:6px 10px;min-width:96%}
.nlp-input textarea{font-size:11px}
.nlp-input button{font-size:11px;padding:4px 10px}
.node-el{min-width:120px;padding:8px;font-size:11px}
.prop-panel{right:2px;top:2px;width:180px;max-width:90vw}
}
</style>

<script>

<div class="sidebar" id="sidebar">
  <div class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" style="display:none;position:absolute;right:-36px;top:10px;width:32px;height:32px;background:var(--bg);border:1px solid var(--border);border-radius:0 6px 6px 0;cursor:pointer;align-items:center;justify-content:center;font-size:16px;z-index:101;box-shadow:2px 0 8px rgba(0,0,0,.08)">☰</div>
  <h2>🎨 编排画布 <span style="font-size:11px;-webkit-text-fill-color:var(--text2)">增强版</span></h2>

</div>
<div class="main">
  <div class="toolbar">
    <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()" style="display:none;padding:5px 10px;font-size:14px">☰</button>
    <select id="comboSelect" onchange="loadCombo(this.value)"><option value="">+ 新建组合</option></select>
    <input id="comboName" placeholder="组合名称">
    <button onclick="saveCombo()">💾 保存</button>

    <div class="sep"></div>
    <button onclick="zoomOut()">🔍−</button>
    <button onclick="zoomReset()">1:1</button>
    <button onclick="zoomIn()">🔍+</button>
    <div class="sep"></div>

    <span class="sep"></span>
    <button onclick="toggleTheme()" style="background:var(--accent);color:#fff;padding:5px 10px;border:none;border-radius:6px;cursor:pointer;font-size:12px">🌙</button>
    <span style="color:var(--text3);font-size:11px;margin-left:auto">🟢 画布底部可自然语言输入</span>
  </div>

      <button onclick="nlpGenerate()" id="nlpBtn">✨ 生成</button>

<script>
function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('evo_theme',document.body.classList.contains('dark')?'dark':'light')}
(function(){var t=localStorage.getItem('evo_theme');if(t==='dark')document.body.classList.add('dark')})()
var NODES={}, EDGES=[], NODE_COUNTER=0, canv=document.getElementById('canvas'), COMBO_ITEMS={}
// 撤销/重做
var UNDO_STACK=[], REDO_STACK=[], UNDO_MAX=50
function snapshot(){UNDO_STACK.push({nodes:JSON.parse(JSON.stringify(Object.keys(NODES).reduce(function(o,k){o[k]={name:NODES[k].name,source:NODES[k].source,x:NODES[k].x,y:NODES[k].y,type:NODES[k].type,meta:NODES[k].meta};return o},{})),edges:JSON.parse(JSON.stringify(EDGES))});if(UNDO_STACK.length>UNDO_MAX)UNDO_STACK.shift();REDO_STACK=[]}
function undo(){if(!UNDO_STACK.length)return;REDO_STACK.push({nodes:JSON.parse(JSON.stringify(Object.keys(NODES).reduce(function(o,k){o[k]={name:NODES[k].name,source:NODES[k].source,x:NODES[k].x,y:NODES[k].y,type:NODES[k].type,meta:NODES[k].meta};return o},{})),edges:JSON.parse(JSON.stringify(EDGES))});restoreState(UNDO_STACK.pop())}
function redo(){if(!REDO_STACK.length)return;UNDO_STACK.push({nodes:JSON.parse(JSON.stringify(Object.keys(NODES).reduce(function(o,k){o[k]={name:NODES[k].name,source:NODES[k].source,x:NODES[k].x,y:NODES[k].y,type:NODES[k].type,meta:NODES[k].meta};return o},{})),edges:JSON.parse(JSON.stringify(EDGES))});restoreState(REDO_STACK.pop())}
function restoreState(s){if(!s)return;clearCanvas(false);Object.keys(s.nodes).forEach(function(k){var n=s.nodes[k];NODE_COUNTER++;createNodeEl(k,n.name,n.source||'github','📦',n.x,n.y,n.type||'module',n.meta)});EDGES=(s.edges||[]).map(function(e,i){return{id:'e'+i,from:e.from,to:e.to,port:e.port||'out'}});renderAll();updateCounts();saveComboId=null}
// 缩放/平移
var ZOOM=1, PAN={x:0,y:0}
function zoomIn(){ZOOM=Math.min(ZOOM*1.2,3);applyZoom()}
function zoomOut(){ZOOM=Math.max(ZOOM/1.2,0.3);applyZoom()}
function zoomReset(){ZOOM=1;PAN={x:0,y:0};applyZoom()}
function applyZoom(){canv.style.transform='scale('+ZOOM+') translate('+PAN.x+'px,'+PAN.y+'px)';canv.style.transformOrigin='0 0'}
canv.addEventListener('wheel',function(e){if(e.ctrlKey||e.metaKey){e.preventDefault();if(e.deltaY<0)zoomIn();else zoomOut()}},{passive:false})
var PAN_DRAG=null;canv.addEventListener('mousedown',function(e){if(e.target===canv||e.target===document.getElementById('hint')){PAN_DRAG={x:e.clientX-PAN.x,y:e.clientY-PAN.y};canv.style.cursor='grabbing'}})
document.addEventListener('mousemove',function(e){if(PAN_DRAG){PAN.x=e.clientX-PAN_DRAG.x;PAN.y=e.clientY-PAN_DRAG.y;applyZoom()}})
document.addEventListener('mouseup',function(){if(PAN_DRAG){PAN_DRAG=null;canv.style.cursor='default'}})
async function api(m,p,d){try{var r=await fetch('/api/v1/hub/'+m,{method:p||'GET',headers:{'Content-Type':'application/json'},body:d?JSON.stringify(d):null});return await r.json()}catch(e){return{success:false}}}

// ===== 添加节点（特殊类型支持）=====
function addNode(type, icon, opt){
  NODE_COUNTER++; var id='n'+NODE_COUNTER; var name,source='system',cls='';
  if(type=='condition'){name='条件分支';cls='nodetype-condition'}
  else if(type=='subflow'){name='子流程 '+(opt||'');cls='nodetype-subflow'}
  else if(type=='input'){name='输入节点';cls='nodetype-input'}
  else if(type=='output'){name='输出节点';cls='nodetype-output'}
  else if(type=='nlp'){name='AI处理';cls='nodetype-nlp'}
  else{name=type;cls='nodetype-module'}
  document.getElementById('hint').style.display='none';
  snapshot();
  var x=80+Math.random()*(canv.clientWidth-260),y=60+Math.random()*(canv.clientHeight-160);
  createNodeEl(id,name,source,icon||'📦',x,y,type)
}
function createNodeEl(id,name,source,icon,x,y,ntype,meta){
  var el=document.createElement('div');el.className='node-el';el.id=id;
  el.style.left=Math.max(10,Math.min(x||100,canv.clientWidth-200))+'px';
  el.style.top=Math.max(10,Math.min(y||100,canv.clientHeight-150))+'px';
  ntype=ntype||'module';
  // Node visual
  var iconMap={'condition':'🔀','subflow':'📦','input':'🔌','output':'📤','nlp':'🧠'};
  var dispIcon=iconMap[ntype]||icon||'📦';
  var extra='',cls='';
  if(ntype=='condition'){cls=' cond-true';extra='<div class="sub"><span class="tag" style="background:rgba(34,197,94,.2);color:#86efac">✅ true</span><span class="tag" style="background:rgba(231,76,60,.2);color:#fca5a5">❌ false</span></div>'}
  else if(ntype=='subflow'){cls=' subflow-node';extra='<div class="sub"><span class="tag" style="background:rgba(245,158,11,.15);color:#fbbf24">📁 '+(meta?.items||0)+'项</span></div>'}
  else if(ntype=='nlp'){cls=' nlp-node'}
  el.innerHTML='<div class="hdr"><span class="icon">'+dispIcon+'</span><span class="nm">'+name+'</span><span class="del" onclick="delNode(\''+id+'\')">✕</span></div>'+extra+'<div class="ins"></div>';
  if(ntype=='condition'){
    // true output port (top right)
    var pt=document.createElement('div');pt.className='port port-true';pt.title='✅ true';
    pt.addEventListener('mousedown',function(e){e.stopPropagation();startConnect(id,'true')});
    el.appendChild(pt);
    // false output port (bottom right)
    var pf=document.createElement('div');pf.className='port port-false';pf.title='❌ false';
    pf.addEventListener('mousedown',function(e){e.stopPropagation();startConnect(id,'false')});
    el.appendChild(pf);
    el.classList.add(cls);
  }else{
    var po=document.createElement('div');po.className='port port-out';
    po.addEventListener('mousedown',function(e){e.stopPropagation();startConnect(id,'out')});
    el.appendChild(po);
    if(ntype=='subflow')el.classList.add(cls);
    if(ntype=='nlp')el.classList.add(cls);
  }
  var pi=document.createElement('div');pi.className='port port-in';
  pi.addEventListener('mousedown',function(e){e.stopPropagation();startConnect(id,'in')});
  el.appendChild(pi);
  el.addEventListener('mousedown',function(e){if(e.target.closest('.port')||e.target.closest('.del'))return;startDrag(e,this)});
  el.addEventListener('dblclick',function(){showProps(id)});
  canv.appendChild(el);
  NODES[id]={el:el,name:name,source:source,x:parseInt(el.style.left),y:parseInt(el.style.top),type:ntype,meta:meta||{}}
}

// ===== 连线系统 =====
var CONNECTING=null
function startConnect(id,port){
  CONNECTING={from:id,port:port,fromX:parseInt(NODES[id].el.style.left)+170,fromY:parseInt(NODES[id].el.style.top)+25};
  document.addEventListener('mousemove',onConnecting);
  document.addEventListener('mouseup',endConnect);
  renderAll()
}
function onConnecting(e){
  if(!CONNECTING)return;renderAll();
  var svg=canv.querySelector('.temp-line')||document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','temp-line');svg.style.position='absolute';svg.style.top='0';svg.style.left='0';svg.style.width='100%';svg.style.height='100%';svg.style.pointerEvents='none';svg.style.zIndex=4;
  svg.innerHTML='';var rect=canv.getBoundingClientRect();
  var line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',CONNECTING.fromX+6);line.setAttribute('y1',CONNECTING.fromY);
  line.setAttribute('x2',e.clientX-rect.left);line.setAttribute('y2',e.clientY-rect.top);
  line.setAttribute('stroke','#a855f7');line.setAttribute('stroke-width','2');line.setAttribute('stroke-dasharray','4,3');
  svg.appendChild(line);canv.appendChild(svg)
}
function endConnect(e){
  if(!CONNECTING)return;
  document.removeEventListener('mousemove',onConnecting);document.removeEventListener('mouseup',endConnect);
  canv.querySelector('.temp-line')?.remove();
  // find nearest node
  var rect=canv.getBoundingClientRect();var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  var best=null,bestDist=100;
  for(var k in NODES){
    if(k==CONNECTING.from)continue;
    var n=NODES[k],nx=n.x+85,ny=n.y+20,d=Math.hypot(mx-nx,my-ny);
    if(d<bestDist){bestDist=d;best=k}
  }
  if(best){
    EDGES.push({id:'e'+EDGES.length,from:CONNECTING.from,to:best,port:CONNECTING.port});
    renderAll()
  }
  CONNECTING=null
}

// ===== 拖拽 =====
var DRAG={}
function startDrag(e,el){
  DRAG={el:el,ox:e.clientX-parseInt(el.style.left),oy:e.clientY-parseInt(el.style.top)};
  el.style.zIndex=100;
  document.addEventListener('mousemove',onDrag);document.addEventListener('mouseup',endDrag)
}
function onDrag(e){
  if(!DRAG.el)return;
  DRAG.el.style.left=Math.max(0,e.clientX-DRAG.ox)+'px';DRAG.el.style.top=Math.max(0,e.clientY-DRAG.oy)+'px';
  var id=DRAG.el.id;if(NODES[id]){NODES[id].x=parseInt(DRAG.el.style.left);NODES[id].y=parseInt(DRAG.el.style.top)}
  renderAll()
}
function endDrag(e){if(DRAG.el){DRAG.el.style.zIndex=10}DRAG={};document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',endDrag);renderAll()}

// ===== 渲染 =====
function renderAll(){
  // Remove old SVGs
  canv.querySelectorAll('.edge-svg').forEach(function(e){e.remove()});
  EDGES.forEach(function(e){
    var f=NODES[e.from],t=NODES[e.to];if(!f||!t)return;
    var fx=f.x+170,fy=f.y+25;
    if(e.port=='true'){fy=f.y+13}
    else if(e.port=='false'){fy=f.y+37}
    var tx=t.x+10,ty=t.y+25;
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','edge-svg');svg.style.position='absolute';svg.style.top='0';svg.style.left='0';svg.style.width='100%';svg.style.height='100%';svg.style.pointerEvents='none';svg.style.zIndex=4;
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    var mx=(fx+tx)/2;
    var color=e.port=='true'?'#22c55e':e.port=='false'?'#e74c3c':'#4361ee';
    path.setAttribute('d','M'+fx+','+fy+' C'+mx+','+fy+' '+mx+','+ty+' '+tx+','+ty);
    path.setAttribute('stroke',color);path.setAttribute('stroke-width','2');path.setAttribute('fill','none');
    if(e.port&&e.port!='out')path.setAttribute('stroke-dasharray','5,3');
    svg.appendChild(path);canv.appendChild(svg)
  })
}

}

// ===== 自然语言生成流程 =====
async function nlpGenerate(){
  var text=document.getElementById('nlpText').value.trim();if(!text)return
  var btn=document.getElementById('nlpBtn');btn.disabled=true;btn.innerHTML='<span class="loading-spinner"></span>';
  document.getElementById('hint').style.display='none';
  // Simple NLP parser - extract nodes from description
  var detected=[];
  var lower=text.toLowerCase();
  var keywords={
    '条件分支|判断|如果|当|若|role|admin|user|权限|角色':'condition',
    '登录|认证|验证|auth|login':'nlp',
    '子流程|子任务|分组|组合':'subflow',
    'AI|LLM|智能|分析|总结|生成|建议':'nlp',
    '输出|导出|展示|显示|报表|结果':'output',
    '输入|导入|获取|读取|采集':'input'
  };
  for(var k in keywords){
    var re=new RegExp(k,'i');
    if(re.test(text))detected.push(keywords[k])
  }
  // If nothing detected, default to a sequence
  if(detected.length<2){
    detected=['input','nlp','output'];
    if(lower.includes('判断')||lower.includes('条件')||lower.includes('如果')||lower.includes('角色'))
      detected=['input','condition','output']
  }
  // Create nodes
  var count=0;var startX=80,startY=80,gapX=200;
  detected.forEach(function(t,i){
    // Check if word-based branching
    var names={'input':'获取数据','output':'输出结果','nlp':'AI处理','condition':'条件判断','subflow':'子流程'};
    var icons={'input':'🔌','output':'📤','nlp':'🧠','condition':'🔀','subflow':'📦'};
    var name=names[t]||t;
    if(t=='condition'&&text.includes('admin'))name='判断管理员';
    if(t=='nlp'){
      var match=text.match(/(?:总结|分析|生成|建议)(.+?)(?:[，,。]|$)/);
      if(match)name='AI: '+match[1].slice(0,10)
    }
    NODE_COUNTER++;var id='n'+NODE_COUNTER;
    createNodeEl(id,name,'nlp',icons[t]||'📦',startX+i*gapX+Math.random()*40,startY+Math.random()*60,t)
  })
  // Auto-connect in sequence
  EDGES=[];
  var ids=[];for(var k in NODES)ids.push(k);
  ids.sort(function(a,b){return NODES[a].x-NODES[b].x});
  for(var i=0;i<ids.length-1;i++){
    EDGES.push({id:'e'+i,from:ids[i],to:ids[i+1],port:'out'})
  }
  renderAll();updateCounts();
  btn.disabled=false;btn.innerHTML='✨ 生成';
  document.getElementById('nlpText').value=''
}

}

// ===== 保存/部署/加载 =====
var saveComboId=null;
async function saveCombo(){
  var name=document.getElementById('comboName').value||'未命名组合';
  var nlist=[];Object.keys(NODES).forEach(function(k){var n=NODES[k];nlist.push({id:k,name:n.name,source:n.source,x:n.x,y:n.y,type:n.type,meta:n.meta})});
  var edlist=EDGES.map(function(e,i){return{from:e.from,to:e.to,port:e.port}});
  var data={name:name,nodes:nlist,edges:edlist};
  if(saveComboId){data.id=saveComboId;var r=await api('composes/'+saveComboId,'PUT',data)}else{var r=await api('composes','POST',data)}
  if(r&&r.success){saveComboId=r.id;await loadComboList();document.getElementById('comboSelect').value=r.id;alert('✅ 已保存')}else{alert('❌ 保存失败')}

async function deployCombo(){
  if(!saveComboId){alert('请先保存组合');return}
  var r=await api('composes/'+saveComboId+'/deploy','POST',{nodes:Object.keys(NODES)});
  alert((r&&r.success)?'🚀 部署已启动':'❌ 部署失败: '+(r&&r.error||'未知'))
}
async function loadCombo(id){
  if(!id||!COMBO_ITEMS[id]){clearCanvas();return}
  var c=COMBO_ITEMS[id];
  document.getElementById('comboName').value=c.name;
  clearCanvas();
  try{
    var nds=typeof c.nodes=='string'?JSON.parse(c.nodes):(c.nodes||[]);
    var edgs=typeof c.edges=='string'?JSON.parse(c.edges):(c.edges||[]);
    nds.forEach(function(n){NODE_COUNTER++;var id='n'+NODE_COUNTER;createNodeEl(id,n.name||n.id||'node',n.source||'github','📦',n.x||100+n.x*20,n.y||100+n.y*20,n.type||'module',n.meta)});
    EDGES=edgs.map(function(e,i){return{id:'e'+i,from:e.from,to:e.to,port:e.port||'out'}})
  }catch(e){/*ignore*/}
  saveComboId=id;renderAll();updateCounts()
}

// ===== 辅助函数 =====
function autoLayout(){
  var ids=Object.keys(NODES);if(!ids.length)return;
  ids.sort();var cols=Math.min(ids.length,5),spacingX=200,spacingY=100,mar=40;
  ids.forEach(function(id,i){
    var col=i%cols,row=Math.floor(i/cols);
    var el=NODES[id].el;el.style.left=(mar+col*spacingX)+'px';el.style.top=(mar+row*spacingY)+'px';
    NODES[id].x=parseInt(el.style.left);NODES[id].y=parseInt(el.style.top)
  });
  renderAll()
}
function clearCanvas(snap){if(snap!==false)snapshot();
  document.querySelectorAll('.node-el').forEach(function(e){e.remove()});
  canv.querySelectorAll('.edge-svg').forEach(function(e){e.remove()});
  NODES={};EDGES=[];NODE_COUNTER=0;saveComboId=null;
  document.getElementById('hint').style.display='block';
  document.getElementById('propPanel').style.display='none'
}
function updateCounts(){
  var special=0;for(var k in NODES){var t=NODES[k].type;if(t&&t!='module')special++}
  document.getElementById('specialCount').textContent=special
}
async function loadProjects(){

    '<span class="icon">'+(p.source=='gitee'?'🇨🇳':p.source=='huggingface'?'🤗':'🐙')+'</span>'+
    '<span class="nm">'+p.name+'</span><span class="desc">'+(p.description||p.source||'').slice(0,20)+'</span></div>'}).join('')
}

  var d=await api('composes');var sel=document.getElementById('comboSelect');
  if(!d||!d.composes)return;

// ===== 手机端触控支持 =====
function initTouchSupport(){
  if(!('ontouchstart' in window))return;
  // 节点拖拽
  document.addEventListener('touchstart',function(e){
    var el=e.target.closest('.node-el');if(!el||e.target.closest('.port')||e.target.closest('.del'))return;
    var t=e.changedTouches[0];
    el._touchDrag={ox:t.clientX-parseInt(el.style.left),oy:t.clientY-parseInt(el.style.top),el:el};
    el.style.zIndex=100
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    var el=document.querySelector('.node-el[style*="z-index: 100"]');
    if(!el||!el._touchDrag)return;
    var t=e.changedTouches[0];
    el.style.left=Math.max(0,t.clientX-el._touchDrag.ox)+'px';
    el.style.top=Math.max(0,t.clientY-el._touchDrag.oy)+'px';
    var id=el.id;if(NODES[id]){NODES[id].x=parseInt(el.style.left);NODES[id].y=parseInt(el.style.top)}
    renderAll()
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var el=document.querySelector('.node-el[style*="z-index: 100"]');
    if(el){el.style.zIndex=10;el._touchDrag=null}
  });
  // 端口连线
  document.querySelectorAll('.port').forEach(function(p){
    p.addEventListener('touchstart',function(e){
      e.stopPropagation();
      var el=e.target.closest('.node-el');
      if(!el)return;
      var portClass=this.className.match(/port-(\w+)/);
      if(portClass)startConnect(el.id,portClass[1])
    },{passive:true})
  })
}
initTouchSupport();
