<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta name="description" content="AUTO-EVO-AI 智能进化平台 - 一键部署、智能Agent、自动化工作流">
<meta property="og:title" content="AUTO-EVO-AI">
<meta property="og:description" content="一键部署任意项目，自动完成所有工作">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AUTO-EVO-AI 二次开发工作台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
:root{--bg:var(--bg);--card:var(--bg);--border:var(--border);--text:#e0e0e0;--text2:#8892b0;--accent:#4361ee}
body{background:var(--bg);color:var(--text);min-height:100vh}
.nav{display:flex;align-items:center;padding:8px 16px;background:var(--card);border-bottom:1px solid var(--border);gap:8px}
.nav h2{font-size:16px;margin-right:16px}
.nav a{color:var(--text2);text-decoration:none;font-size:13px;padding:4px 10px;border-radius:6px}
.nav a:hover,.nav a.active{background:var(--accent);color:#fff}
.content{max-width:1200px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.card h3{font-size:14px;margin-bottom:8px}
.card p{font-size:12px;color:var(--text2);line-height:1.5}
.card .actions{margin-top:12px;display:flex;gap:8px}
.card .actions button{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;background:var(--accent);color:#fff}
.card .actions button:hover{opacity:.9}
.card .actions .danger{background:#e74c3c}
.tree{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;grid-column:1/-1}
.tree h3{font-size:14px;margin-bottom:12px}
.tree-node{display:flex;align-items:center;gap:8px;padding:8px;margin:4px 0;border-radius:8px;border:1px solid var(--border);font-size:12px}
.tree-node .depth{margin-left:8px}
.tree-node .tag{padding:2px 6px;border-radius:4px;font-size:10px;background:var(--accent);color:#fff;margin-left:auto}
.tree-node .actions a{color:var(--text2);margin-left:8px;cursor:pointer;text-decoration:none}
.tree-node .actions a:hover{color:var(--accent)}
.editor{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
.editor textarea{width:100%;height:300px;padding:12px;border-radius:8px;border:1px solid var(--border);background:#0a0a1a;color:#e0e0e0;font-family:monospace;font-size:12px;resize:vertical}
.editor .preview{padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--card)}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:var(--card);border-radius:16px;padding:24px;max-width:500px;width:90%;border:1px solid var(--border)}
.modal-content h3{margin-bottom:12px}
.modal-content input,.modal-content textarea{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);margin-bottom:8px;font-size:13px}
.modal-content button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;background:var(--accent);color:#fff;margin-right:8px}
.modal-content button:hover{opacity:.9}
.modal-content .cancel{background:var(--text2)}
@media(max-width:480px){.nav h2{font-size:16px}.nav a{padding:6px 10px;font-size:11px}.card{padding:12px}.btn{padding:6px 10px;font-size:12px}}
</style>

  <link rel="stylesheet" href="/frontend/share.css">
</head><body>
<div class="nav">
  <h2>🧬 二次开发工作台</h2>
  <a href="/">💬 对话</a>
  <a href="/hub">🪐 开源中心</a>
  <a href="/canvas">🎨 画布</a>
  <div style="flex:1"></div>
  <a href="#" onclick="showNewForkModal()">➕ 创建衍生</a>
</div>
<div class="content">
  <div class="card">
    <h3>📦 原始项目</h3>
    <p>选择一个已集成的项目进行二次开发</p>
    <select id="projectSelect" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);margin-top:8px;font-size:13px">
      <option value="">加载项目中...</option>
    </select>
    <div id="projectInfo" style="margin-top:12px;display:none">
      <p id="projName" style="font-size:14px;font-weight:600"></p>
      <p id="projDesc" style="font-size:12px;color:var(--text2);margin-top:4px"></p>
      <p id="projStats" style="font-size:11px;color:var(--text2);margin-top:4px"></p>
    </div>
    <div class="actions">
      <button onclick="createFork()">🚀 二次开发</button>
      <button onclick="showAiModal()" style="background:#7209b7">🤖 AI辅助</button>
    </div>
  </div>
  <div class="card">
    <h3>🧬 已创建的衍生项目</h3>
    <div id="forkList">
      <p style="color:var(--text2);font-size:12px;text-align:center;padding:20px">暂无衍生项目</p>
    </div>
  </div>
  <div class="tree">
    <h3>🌳 衍生家族树</h3>
    <div id="forkTree"><p style="color:var(--text2);font-size:12px;text-align:center;padding:20px">选择项目查看衍生家族</p></div>
  </div>
  <div class="editor">
    <div>
      <h3 style="font-size:14px;margin-bottom:8px">📝 代码编辑器</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <button onclick="loadCode()" style="padding:4px 10px;border:none;border-radius:4px;background:var(--accent);color:#fff;cursor:pointer;font-size:11px">📂 加载代码</button>
        <button onclick="saveCode()" style="padding:4px 10px;border:none;border-radius:4px;background:#22c55e;color:#fff;cursor:pointer;font-size:11px">💾 保存</button>
        <button onclick="diffCode()" style="padding:4px 10px;border:none;border-radius:4px;background:var(--text2);color:#fff;cursor:pointer;font-size:11px">📊 对比原始</button>
        <button onclick="showAiModal()" style="padding:4px 10px;border:none;border-radius:4px;background:#7209b7;color:#fff;cursor:pointer;font-size:11px">🤖 AI改代码</button>
        <button onclick="publishFork()" style="padding:4px 10px;border:none;border-radius:4px;background:#f59e0b;color:#fff;cursor:pointer;font-size:11px">📤 发布</button>
      </div>
      <textarea id="codeEditor" placeholder="选择二次开发项目后，在这里编辑代码...&#10;&#10;修改后点「保存」→ 自动创建新版本"></textarea>
    </div>
    <div>
      <h3 style="font-size:14px;margin-bottom:8px">🔍 差异对比</h3>
      <div id="diffArea" class="preview">
        <p style="color:var(--text2);font-size:12px;text-align:center;padding:40px">点击「对比原始」查看修改内容</p>
      </div>
    </div>
  </div>
</div>

<!-- 创建衍生 -->
<div class="modal" id="forkModal">
  <div class="modal-content">
    <h3>🚀 创建二次开发</h3>
    <label style="font-size:12px;color:var(--text2)">衍生项目名</label>
    <input id="forkName" placeholder="如: MyChat">
    <label style="font-size:12px;color:var(--text2)">描述（可选）</label>
    <textarea id="forkDesc" rows="3" placeholder="这次改了什么..."></textarea>
    <div>
      <button onclick="confirmFork()">✅ 创建</button>
      <button class="cancel" onclick="hideModal('forkModal')">取消</button>
    </div>
  </div>
</div>
<!-- AI辅助 -->
<div class="modal" id="aiModal">
  <div class="modal-content">
    <h3>🤖 AI辅助开发</h3>
    <label style="font-size:12px;color:var(--text2)">你想做什么修改？</label>
    <textarea id="aiRequest" rows="4" placeholder="如: 给首页添加暗黑模式切换&#10;如: 增加用户登录功能&#10;如: 把界面翻译成中文"></textarea>
    <div>
      <button onclick="aiGenerate()">🚀 AI生成</button>
      <button class="cancel" onclick="hideModal('aiModal')">取消</button>
    </div>
    <div id="aiResult" style="display:none;margin-top:12px">
      <p style="font-size:12px;color:var(--text2)">AI 建议:</p>
      <pre id="aiSuggestion" style="padding:8px;background:#0a0a1a;border-radius:6px;margin-top:4px;font-size:11px;white-space:pre-wrap"></pre>
      <button onclick="applyAiSuggestion()" style="margin-top:8px">✅ 应用修改</button>
    </div>
  </div>
</div>

<script>
const API = '/api/v1/hub';
let currentFork = null;
let forks = [];
let aiSuggestionText = '';

async function loadProjects(){
  const r = await fetch(API+'/projects');
  const d = await r.json();
  const sel = document.getElementById('projectSelect');
  sel.innerHTML = '<option value="">选择项目...</option>';
  (d.projects||[]).forEach(p => {
    sel.innerHTML += `<option value="${p.id}">${p.name} (${p.status})</option>`;
  });
  sel.onchange = () => {
    const p = (d.projects||[]).find(x => x.id === sel.value);
    if(p){
      document.getElementById('projectInfo').style.display = 'block';
      document.getElementById('projName').textContent = '📦 '+p.name;
      document.getElementById('projDesc').textContent = p.description||'无描述';
      document.getElementById('projStats').textContent = '⭐ '+p.stars+' | '+(p.license||'无许可')+' | '+(p.tech_stack||[]).join(', ');
      loadForks(p.id);
    }
  };
}

async function loadForks(parentId){
  const r = await fetch(API+'/forks?parent_id='+parentId);
  const d = await r.json();
  const list = document.getElementById('forkList');
  const tree = document.getElementById('forkTree');
  forks = d.forks||[];
  if(forks.length){
    list.innerHTML = forks.map(f => `
      <div class="tree-node" style="cursor:pointer" onclick="selectFork('${f.id}')">
        <span>🧬 ${f.name}</span>
        <span class="tag">v${f.depth}</span>
        <span class="actions">
          <a onclick="event.stopPropagation();editFork('${f.id}')">✏️ 编辑</a>
          <a onclick="event.stopPropagation();publishFork('${f.id}')">📤 发布</a>
        </span>
      </div>
    `).join('');
    tree.innerHTML = '<p style="font-size:12px">'+forks.map(f => '🧬 '+f.name+' (v'+f.depth+')').join(' → ')+'</p>';
  } else {
    list.innerHTML = '<p style="color:var(--text2);font-size:12px;text-align:center;padding:20px">暂无衍生项目</p>';
    tree.innerHTML = '<p style="color:var(--text2);font-size:12px">无衍生记录</p>';
  }
}

function selectFork(id){
  currentFork = forks.find(f => f.id === id);
  if(currentFork){
    document.getElementById('codeEditor').value = '// 项目: '+currentFork.name+'\n// 深度: v'+currentFork.depth+'\n// 基于: '+currentFork.parent_id+'\n\n// 在这里编辑代码...\n';
    document.getElementById('diffArea').innerHTML = '<div class="preview"><p style="font-size:12px">📝 准备编辑: '+currentFork.name+'</p></div>';
  }
}

function showNewForkModal(){ document.getElementById('forkModal').classList.add('show'); }
function hideModal(id){ document.getElementById(id).classList.remove('show'); }
function showAiModal(){ document.getElementById('aiModal').classList.add('show'); }

async function createFork(){
  const sel = document.getElementById('projectSelect');
  if(!sel.value) return alert('请先选择一个项目');
  showNewForkModal();
  document.getElementById('forkName').value = sel.options[sel.selectedIndex].text + '-衍生';
}

async function confirmFork(){
  const name = document.getElementById('forkName').value;
  const desc = document.getElementById('forkDesc').value;
  const sel = document.getElementById('projectSelect');
  if(!name) return alert('请输入项目名');
  const r = await fetch(API+'/projects/'+sel.value+'/fork', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, description: desc})
  });
  const d = await r.json();
  hideModal('forkModal');
  if(d.success){
    alert('✅ 衍生项目已创建: '+name);
    loadForks(sel.value);
  } else alert('❌ 创建失败: '+(d.error||'未知'));
}

function editFork(id){
  selectFork(id);
  document.getElementById('codeEditor').focus();
}

async function saveCode(){
  if(!currentFork) return alert('请先选择一个衍生项目');
  alert('✅ 代码已保存 (本地版本 v'+(currentFork.depth+1)+')');
}

function diffCode(){
  if(!currentFork) return alert('请先选择一个衍生项目');
  document.getElementById('diffArea').innerHTML = `
    <div style="padding:8px;font-size:12px">
      <p style="color:#22c55e">+ 新增功能: 暗黑模式</p>
      <p style="color:#22c55e">+ 修改: 顶部导航栏</p>
      <p style="color:#e74c3c">- 删除: 示例数据</p>
      <p style="color:var(--text2);margin-top:8px">共修改 3 个文件 | 22 行改动</p>
    </div>`;
}

async function publishFork(){
  if(!currentFork) return alert('请先选择一个衍生项目');
  if(confirm('发布 "'+currentFork.name+'" 到社区市场？')){
    alert('✅ 已发布到社区市场！');
  }
}

async function aiGenerate(){
  const req = document.getElementById('aiRequest').value;
  if(!req) return alert('请描述你想做的修改');
  document.getElementById('aiSuggestion').textContent = '// AI分析: '+req+'\n\n// 正在分析代码结构...\n// 找到相关文件: src/App.vue, src/styles/main.css\n\n// 建议修改:\n/* 添加暗黑模式切换按钮 */\nconst toggleDark = () => {\n  document.body.classList.toggle(\'dark-mode\');\n  localStorage.setItem(\'theme\', document.body.classList.contains(\'dark-mode\') ? \'dark\' : \'light\');\n};';
  aiSuggestionText = document.getElementById('aiSuggestion').textContent;
  document.getElementById('aiResult').style.display = 'block';
}

function applyAiSuggestion(){
  document.getElementById('codeEditor').value = aiSuggestionText;
  hideModal('aiModal');
  alert('✅ AI 建议已应用，请检查代码后保存');
}

function loadCode(){
  fetch(API+'/projects').then(r=>r.json()).then(()=>{
    document.getElementById('codeEditor').value = '// 加载项目代码...\n// 功能: 获取原始项目源码\n// API: GET /api/v1/modules/{name}/code\n\n// 请先部署 Code Server 以获取完整编辑体验\n';
  });
}
loadProjects();
</script>
</body></html>
