<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Webhook管理 - AUTO-EVO-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:var(--bg);--card:#fff;--text:var(--bg);--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--border:var(--border);--glass:rgba(255,255,255,.7)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1000px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.btn{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer}
.btn:hover{opacity:.9}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.danger{background:#e74c3c}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.card h3{font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card .meta{font-size:11px;color:var(--text3);margin-bottom:6px}
.card .url{font-size:12px;color:var(--accent);word-break:break-all}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px}
.tag.active{background:#dcfce7;color:#166534}
.tag.paused{background:#fef9c3;color:#854d0e}
form{display:flex;flex-direction:column;gap:8px;margin-top:10px}
form label{font-size:12px;color:var(--text2)}
form input,form select{padding:7px 10px;border-radius:6px;border:1px solid var(--border);font-size:13px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal-card{background:var(--card);border-radius:10px;padding:20px;max-width:450px;width:90%}
.modal-card h2{font-size:16px;margin-bottom:10px}
.empty{text-align:center;padding:60px;color:var(--text3)}
.loading{padding:40px;text-align:center;color:var(--text3)}
@media(max-width:768px){
  body{padding:10px};h1{font-size:18px}
}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>🪝 Webhook 管理 <button class="btn" onclick="showAdd()">+ 新建</button></h1>
<div id="list"><div class="loading">加载中...</div></div>
<div class="modal" id="modal">
  <div class="modal-card">
    <h2 id="modalTitle">新建 Webhook</h2>
    <form onsubmit="saveHook(event)">
      <input id="hookId" type="hidden">
      <label>名称</label><input id="hookName" required placeholder="如：GitHub Push通知">
      <label>目标 URL</label><input id="hookUrl" required placeholder="https://hooks.example.com/webhook">
      <label>事件类型</label>
      <select id="hookEvent"><option value="*">全部事件</option><option value="chat.message">对话消息</option><option value="task.completed">任务完成</option><option value="module.install">模块安装</option><option value="system.alert">系统告警</option><option value="user.login">用户登录</option></select>
      <label>状态</label>
      <select id="hookStatus"><option value="active">启用</option><option value="paused">暂停</option></select>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button type="submit" class="btn">保存</button>
        <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
      </div>
    </form>
  </div>
</div>
<script>
var _hooks=[];

function loadHooks(){
  document.getElementById('list').innerHTML='<div class="loading">加载中...</div>';
  fetch('/api/v1/webhooks').then(function(r){return r.json()}).then(function(j){
    _hooks=j.webhooks||j.data||j.hooks||[];
    renderHooks();
  }).catch(function(){
    document.getElementById('list').innerHTML='<div class="empty">暂无 Webhook<br><button class="btn" onclick="showAdd()" style="margin-top:10px">+ 新建</button></div>';
  });
}

function renderHooks(){
  if(!_hooks.length){
    document.getElementById('list').innerHTML='<div class="empty">暂无 Webhook<br><button class="btn" onclick="showAdd()" style="margin-top:10px">+ 新建</button></div>';
    return;
  }
  var h='';
  for(var i=0;i<_hooks.length;i++){
    var w=_hooks[i];
    var s=w.status||'active';
    h+='<div class="card"><h3>'+w.name+' <span class="tag '+(s==='active'?'active':'paused')+'">'+s+'</span></h3>';
    h+='<div class="url">'+w.url+'</div>';
    h+='<div class="meta">事件: '+w.event+' · 创建: '+(w.created_at||'-')+'</div>';
    h+='<div style="display:flex;gap:6px">';
    h+='<button class="btn btn-outline" onclick="toggleHook('+i+')">'+(s==='active'?'暂停':'启用')+'</button>';
    h+='<button class="btn btn-outline" onclick="editHook('+i+')">编辑</button>';
    h+='<button class="btn danger" onclick="delHook('+i+')">删除</button>';
    h+='</div></div>';
  }
  document.getElementById('list').innerHTML=h;
}

function showAdd(){
  document.getElementById('modalTitle').textContent='新建 Webhook';
  document.getElementById('hookId').value='';
  document.getElementById('hookName').value='';
  document.getElementById('hookUrl').value='';
  document.getElementById('hookEvent').value='*';
  document.getElementById('hookStatus').value='active';
  document.getElementById('modal').classList.add('show');
}

function editHook(i){
  var w=_hooks[i];
  document.getElementById('modalTitle').textContent='编辑 Webhook';
  document.getElementById('hookId').value=i;
  document.getElementById('hookName').value=w.name;
  document.getElementById('hookUrl').value=w.url;
  document.getElementById('hookEvent').value=w.event||'*';
  document.getElementById('hookStatus').value=w.status||'active';
  document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show')}

function saveHook(e){
  e.preventDefault();
  var id=document.getElementById('hookId').value;
  var data={name:document.getElementById('hookName').value,url:document.getElementById('hookUrl').value,event:document.getElementById('hookEvent').value,status:document.getElementById('hookStatus').value};
  if(id!==''&&id!==null){
    _hooks[parseInt(id)]=data;
  }else{
    data.created_at=new Date().toISOString().slice(0,10);
    _hooks.push(data);
  }
  renderHooks();
  closeModal();
}

function toggleHook(i){
  _hooks[i].status=_hooks[i].status==='active'?'paused':'active';
  renderHooks();
}

function delHook(i){
  if(!confirm('确定删除此 Webhook？'))return;
  _hooks.splice(i,1);
  renderHooks();
}

loadHooks();

function testWebhook(i){
  var w=_hooks[i];
  var resultDiv=document.getElementById('testResult');
  if(!resultDiv){
    resultDiv=document.createElement('div');
    resultDiv.id='testResult';
    resultDiv.style.cssText='position:fixed;bottom:20px;right:20px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;z-index:200;max-width:350px;box-shadow:0 4px 20px rgba(0,0,0,.12)';
    resultDiv.innerHTML='<div style="font-size:12px;font-weight:600;margin-bottom:6px">Webhook 测试结果</div><div id="testBody" style="font-size:11px;color:#6b7280">发送中...</div><button onclick="this.parentElement.remove()" style="margin-top:6px;font-size:10px;border:none;background:transparent;color:#9ca3af;cursor:pointer">关闭</button>';
    document.body.appendChild(resultDiv);
  }
  document.getElementById('testBody').textContent='发送 POST '+w.url+' ...';
  fetch('/api/v1/webhooks/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:w.name,url:w.url,event:w.event||'*'})}).then(function(r){return r.json()}).then(function(j){
    document.getElementById('testBody').textContent='状态: '+(j.status||j.success?'成功':'失败')+' | '+(j.message||JSON.stringify(j).slice(0,80));
  }).catch(function(){
    document.getElementById('testBody').textContent='网络错误（可能Webhook API未实现）';
  });
}

</script></body></html>
