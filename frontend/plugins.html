<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>插件市场 - AUTO-EVO-AI</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,Microsoft YaHei,sans-serif;background:#f5f5f8;margin:0;padding:20px;color:#1a1a2e}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header h1{margin:0;font-size:20px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h3{margin:0 0 10px;font-size:14px;color:#6b7280}
.plugin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.plugin{border:1px solid #e5e7eb;border-radius:8px;padding:12px;background:#f9fafb}
.plugin-icon{font-size:24px}
.plugin-name{font-size:13px;font-weight:600;margin-top:4px}
.plugin-desc{font-size:11px;color:#6b7280;margin-top:2px}
.tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-top:4px}
.tag.integrated{background:#d1fae5;color:#065f46}
.tag.external{background:#fef3c7;color:#92400e}
.tag.system{background:#e0e7ff;color:#4338ca}
.search-box{width:100%;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;box-sizing:border-box;margin-bottom:10px}
a{color:#4361ee;text-decoration:none;font-size:12px}
</style>  <link rel="stylesheet" href="/frontend/share.css">
</head><body>
<div class="header"><span style="font-size:24px">🔌</span><h1>插件市场</h1><a href="/">←</a></div>
<div class="card"><input class="search-box" id="pluginSearch" placeholder="🔍 搜索插件..." oninput="filterPlugins(this.value)">
<div class="plugin-grid" id="pluginGrid">
<div class="plugin"><div class="plugin-icon">📦</div><div class="plugin-name">Gitea</div><div class="plugin-desc">代码仓库托管</div><span class="tag integrated">已集成</span></div>
<div class="plugin"><div class="plugin-icon">📚</div><div class="plugin-name">Wiki.js</div><div class="plugin-desc">知识库管理</div><span class="tag integrated">已集成</span></div>
<div class="plugin"><div class="plugin-icon">📊</div><div class="plugin-name">NocoDB</div><div class="plugin-desc">低代码表格</div><span class="tag integrated">已集成</span></div>
<div class="plugin"><div class="plugin-icon">🤖</div><div class="plugin-name">Dify</div><div class="plugin-desc">AI应用开发</div><span class="tag external">外部</span></div>
<div class="plugin"><div class="plugin-icon">🔄</div><div class="plugin-name">n8n</div><div class="plugin-desc">工作流自动化</div><span class="tag external">外部</span></div>
<div class="plugin"><div class="plugin-icon">🗄️</div><div class="plugin-name">MinIO</div><div class="plugin-desc">对象存储</div><span class="tag integrated">已集成</span></div>
<div class="plugin"><div class="plugin-icon">🔍</div><div class="plugin-name">Meilisearch</div><div class="plugin-desc">全文搜索</div><span class="tag integrated">已集成</span></div>
<div class="plugin"><div class="plugin-icon">📢</div><div class="plugin-name">Novu</div><div class="plugin-desc">通知推送</div><span class="tag external">外部</span></div>
</div></div>
<div class="card"><h3>🔗 连接器</h3><p style="font-size:13px;color:#6b7280;margin:0">支持通过 MCP 网关、Gateway 集成、A2A 协议连接外部系统。</p></div>
<script>
function filterPlugins(q){q=q.toLowerCase();var els=document.querySelectorAll('.plugin');for(var i=0;i<els.length;i++){var n=els[i].textContent.toLowerCase();els[i].style.display=n.indexOf(q)>=0?'':'none'}}
</script></body></html>
