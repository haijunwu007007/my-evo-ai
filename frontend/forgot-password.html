<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>找回密码 - AUTO-EVO-AI</title>
<link rel="stylesheet" href="/frontend/share.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{background:var(--card);border-radius:16px;padding:40px;border:1px solid var(--border);max-width:400px;width:100%;box-shadow:0 4px 24px var(--shadow)}
.auth-card h1{font-size:22px;margin-bottom:4px;text-align:center}
.auth-card .sub{text-align:center;color:var(--text2);font-size:14px;margin-bottom:24px}
.auth-card label{display:block;font-size:14px;color:var(--text2);margin-bottom:4px}
.auth-card input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:16px}
.auth-card input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.auth-card .btn{width:100%;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;background:var(--accent);color:#fff;transition:opacity .2s}
.auth-card .btn:hover{opacity:.9}
.auth-card .link{text-align:center;margin-top:16px;font-size:14px;color:var(--text2)}
.auth-card .link a{color:var(--accent);text-decoration:none}
.auth-card .link a:hover{text-decoration:underline}
.status{display:none;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px;text-align:center}
.status.ok{display:block;background:rgba(16,185,129,.1);border:1px solid #10b981;color:#10b981}
.status.err{display:block;background:rgba(239,68,68,.1);border:1px solid #ef4444;color:#ef4444}
</style></head>
<body>
<div class="auth-card">
<h1>🔑 找回密码</h1>
<p class="sub">输入注册邮箱，发送重置链接</p>
<div class="status" id="status"></div>
<label>邮箱</label><input id="email" type="email" placeholder="请输入注册邮箱">
<button class="btn" onclick="doReset()">发送重置链接</button>
<div class="link"><a href="/login">返回登录</a></div>
</div>
<script>
async function doReset(){
  var e=document.getElementById('email').value.trim();var s=document.getElementById('status');s.className='status'
  if(!e){s.className='status err';s.textContent='请输入邮箱';return}
  try{
    var r=await fetch('/api/v1/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e})})
    var d=await r.json()
    if(d.success){s.className='status ok';s.textContent='重置链接已发送，请检查邮箱'}
    else{s.className='status err';s.textContent=d.error||'发送失败'}
  }catch(ex){s.className='status err';s.textContent='网络错误: '+ex.message}
}
</script>
</body></html>
