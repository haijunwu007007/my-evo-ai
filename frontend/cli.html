<!DOCTYPE html><html lang="zh-CN"><head>
<meta name="description" content="命令行工具集成，支持 AIChat、Docker、FFmpeg、FZF 等终端工具">
<meta property="og:title" content="AUTO-EVO-AI">
<meta property="og:description" content="命令行工具集成，支持 AIChat、Docker、FFmpeg、FZF 等终端工具">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CLI终端 - AUTO-EVO-AI V0.1</title>
<style>
body{background:var(--bg);color:var(--text);min-height:100vh}
*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#0b0b16,#12122a);color:#e8e8ef;font-family:monospace;min-height:100vh}.hdr{background:rgba(20,20,35,.92);border-bottom:1px solid rgba(45,53,97,.4);padding:0 16px;height:46px;display:flex;align-items:center;gap:12px}.hdr .l{font-size:15px;font-weight:800;background:linear-gradient(135deg,#4361ee,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hdr .n a{padding:4px 10px;border-radius:6px;font-size:12px;color:#8892b0;text-decoration:none}.c{max-width:900px;margin:0 auto;padding:20px}.card{background:rgba(26,26,46,.5);border:1px solid rgba(45,53,97,.3);border-radius:12px;padding:16px;margin-bottom:14px}.tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}.tool{background:rgba(22,33,62,.5);border:1px solid rgba(67,97,238,.2);border-radius:8px;padding:12px;text-align:center;font-size:12px}.tool .st{font-size:10px;padding:1px 8px;border-radius:8px}.term{background: var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;min-height:120px;white-space:pre-wrap;overflow:auto;color:#06d6a0}.inp{display:flex;gap:8px;margin:10px 0}.inp input{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(45,53,97,.4);background:rgba(22,33,62,.6);color:#e8e8ef;font-family:monospace;font-size:13px;outline:none}.inp button{padding:10px 20px;border:none;border-radius:8px;background:linear-gradient(135deg,#4361ee,#a855f7);color:#fff;cursor:pointer}
</style>


  <link rel="stylesheet" href="/frontend/share.css">

<script>
// _EVO_LT 加载超时保护 20260713
(function(){var t=setTimeout(function(){var e=document.querySelectorAll('[id*=loading],[class*=loading],.spinner,.loader');e.forEach(function(el){var txt=el.textContent||el.innerText||'';if(txt.indexOf('加载中')>=0){el.textContent=txt.replace('加载中','超时');el.style.color='#ef4444'}})},8000);window.__evolt=t})();
/* 加载超时保护 */
(function(){var T=setTimeout(function(){
var els=document.querySelectorAll('p,div,span');
var found=false;
els.forEach(function(el){
if(el.textContent.trim()==='加载中...'||el.textContent.trim()==='加载中'||/^加载中/.test(el.textContent.trim())){
el.textContent='加载超时，请刷新重试';
el.style.color='var(--text2,#999)';
el.style.fontSize='13px';
found=true;
}
});
if(found)console.warn('[EVO] 加载超时保护触发');
clearInterval(I);
},8000);var I=setInterval(function(){
var done=document.querySelectorAll('p,div,span');
var allLoaded=true;
done.forEach(function(el){
if(el.textContent.trim()==='加载中...'||el.textContent.trim()==='加载中')allLoaded=false;
});
if(allLoaded){clearTimeout(T);clearInterval(I);}
},500);})();
</script>
</head><body>
<div class="hdr"><div class="l"></div><div class="n"><a href="/">对话</a><a href="/cli">CLI</a></div></div>
<div class="c">
  <h2 style="font-size:18px;margin-bottom:12px;background:linear-gradient(135deg,#e8e8ef,#a0a8b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🔧 CLI 能力网关</h2>

  <div class="card">
    <div style="font-size:14px;margin-bottom:8px">CLI 工具状态</div>
    <div class="tools" id="toolList"><div style="color:#636e70">加载中...</div></div>
  </div>

  <div class="card">
    <div style="font-size:14px;margin-bottom:8px">💬 终端对话 (AIChat)</div>
    <div class="inp"><input id="aiMsg" placeholder="输入消息..." onkeydown="if(event.key=='Enter')cliAIChat()"><button onclick="cliAIChat()">发送</button></div>
    <div class="term" id="aiOut"></div>
  </div>

  <div class="card">
    <div style="font-size:14px;margin-bottom:8px">🐳 Docker 容器</div>
    <button onclick="dockerPS()" style="padding:6px 14px;border:none;border-radius:6px;background:rgba(67,97,238,.15);color:#4361ee;cursor:pointer;font-size:12px">刷新</button>
    <div class="term" id="dockerOut" style="margin-top:8px"></div>
  </div>
</div>
<script>
async function loadTools(){try{var r=await fetch('/api/v1/cli/tools');var d=await r.json();var h='';for(var k in d.tools){var t=d.tools[k];h+='<div class=tool><div>'+t.name+'</div><div style=font-size:10px;color:#636e70>'+t.desc+'</div><div class=st style=background:'+(t.installed?'rgba(16,185,129,.15);color:#10b981':'rgba(239,68,68,.15);color:#ef4444')+'>'+(t.installed?'✅已装':'❌未装')+'</div></div>'}document.getElementById('toolList').innerHTML=h||'<div style=color:#636e70>无工具</div>'}catch(e){/*ignore*/}}
async function cliAIChat(){var m=document.getElementById('aiMsg').value.trim();if(!m)return;document.getElementById('aiOut').textContent='⏳ 思考中...';try{var r=await fetch('/api/v1/cli/aichat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m})});var d=await r.json();document.getElementById('aiOut').textContent=d.result||d.error||'无响应'}catch(e){document.getElementById('aiOut').textContent='失败: '+e.message}}
async function dockerPS(){document.getElementById('dockerOut').textContent='⏳ 加载中...';try{var r=await fetch('/api/v1/cli/docker/ps');var d=await r.json();if(!d.containers||d.containers.length==0){document.getElementById('dockerOut').textContent='无运行容器';return}var h='';for(var c of d.containers){h+=c.id.slice(0,12)+'  '+c.name+'  '+c.status+'\n'}document.getElementById('dockerOut').textContent=h}catch(e){document.getElementById('dockerOut').textContent='失败: '+e.message}}
loadTools();dockerPS();
</script>
<script>(function(){var t=localStorage.getItem("evo_theme");if(t==="light"){document.body.classList.add("light")}})()</script>
</body></html>
