<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🐍 贪吃蛇</title>
<style>*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;overflow:hidden}
#w{text-align:center;max-width:500px;width:100%}
#t{display:flex;justify-content:space-between;align-items:center;padding:8px;color:#e0e0e0}
#s{font-size:20px;color:#f59e0b;font-weight:700}
#r{padding:6px 16px;border-radius:8px;border:1px solid #4361ee;background:transparent;color:#4361ee;cursor:pointer;font-size:14px}
canvas{display:block;margin:0 auto;background:#16213e;border-radius:16px;border:2px solid #2d3561;width:100%;max-width:400px;aspect-ratio:1;touch-action:none}
#i{color:#8892b0;font-size:13px;margin-top:8px}
a{color:#4361ee;text-decoration:none;font-size:13px}
</style>
</head>
<body>
<div id="w">
<div id="t"><span>🐍 贪吃蛇</span><span id="s">0</span><button id="r">🔄</button></div>
<canvas id="c"></canvas>
<div id="i">👆 滑动/方向键控制 | <a href="/">←返回</a></div>
</div>
<script>
var cv=document.getElementById('c'),cx=cv.getContext('2d')
var W=400,H=400,G=20,CO=W/G,RO=H/G
var snake=[{x:8,y:8}],food=null,dir='right',nextDir='right'
var score=0,dead=false,win=false,speed=120
var tsx=0,tsy=0,swiped=false

function spawnFood(){
  for(var t=0;t<500;t++){
    var f={x:Math.floor(Math.random()*CO),y:Math.floor(Math.random()*RO)}
    var hit=false;for(var i=0;i<snake.length;i++){if(snake[i].x===f.x&&snake[i].y===f.y){hit=true;break}}
    if(!hit){food=f;return}
  }
}
function reset(){
  snake=[{x:8,y:8}];dir='right';nextDir='right';score=0;dead=false;win=false
  document.getElementById('s').textContent='0'
  document.getElementById('i').textContent='👆 滑动/方向键控制'
  spawnFood()
}

document.addEventListener('keydown',function(e){
  if(dead||win)return
  switch(e.key){case'ArrowUp':if(dir!='down')nextDir='up';break;case'ArrowDown':if(dir!='up')nextDir='down';break;case'ArrowLeft':if(dir!='right')nextDir='left';break;case'ArrowRight':if(dir!='left')nextDir='right';break}
})

cv.addEventListener('touchstart',function(e){e.preventDefault();swiped=false;tsx=e.touches[0].clientX;tsy=e.touches[0].clientY},{passive:false})
cv.addEventListener('touchmove',function(e){
  e.preventDefault();if(swiped||dead||win)return
  var dx=e.touches[0].clientX-tsx,dy=e.touches[0].clientY-tsy
  if(Math.abs(dx)<15&&Math.abs(dy)<15)return;swiped=true
  if(Math.abs(dx)>Math.abs(dy)){var nd=dx>0?'right':'left';if((dir=='up'||dir=='down')||(dir=='left'&&nd!='right')||(dir=='right'&&nd!='left'))nextDir=nd}
  else{var nd=dy>0?'down':'up';if((dir=='left'||dir=='right')||(dir=='up'&&nd!='down')||(dir=='down'&&nd!='up'))nextDir=nd}
},{passive:false})
var md=false;cv.addEventListener('mousedown',function(e){md=true;tsx=e.clientX;tsy=e.clientY})
cv.addEventListener('mousemove',function(e){
  if(!md||swiped||dead||win)return;var dx=e.clientX-tsx,dy=e.clientY-tsy
  if(Math.abs(dx)<15&&Math.abs(dy)<15)return;swiped=true;md=false
  if(Math.abs(dx)>Math.abs(dy)){var nd=dx>0?'right':'left';if((dir=='up'||dir=='down')||(dir=='left'&&nd!='right')||(dir=='right'&&nd!='left'))nextDir=nd}
  else{var nd=dy>0?'down':'up';if((dir=='left'||dir=='right')||(dir=='up'&&nd!='down')||(dir=='down'&&nd!='up'))nextDir=nd}
})
cv.addEventListener('mouseup',function(){md=false})

function update(){
  if(dead||win)return
  dir=nextDir;var head={x:snake[0].x,y:snake[0].y}
  switch(dir){case'up':head.y--;break;case'down':head.y++;break;case'left':head.x--;break;case'right':head.x++}
  if(head.x<0||head.x>=CO||head.y<0||head.y>=RO){dead=true;document.getElementById('i').textContent='💀 撞墙了';return}
  for(var i=0;i<snake.length;i++){if(head.x===snake[i].x&&head.y===snake[i].y){dead=true;document.getElementById('i').textContent='💀 咬到自己了';return}}
  snake.unshift(head)
  if(food&&head.x===food.x&&head.y===food.y){score+=10;document.getElementById('s').textContent=score;spawnFood();if(snake.length>=CO*RO){win=true;document.getElementById('i').textContent='🎉 你赢了！'}}
  else{snake.pop()}
}

function draw(){
  cx.fillStyle='#16213e';cx.fillRect(0,0,W,H)
  for(var i=0;i<=CO;i++){cx.strokeStyle='#1e2a4a';cx.lineWidth=0.5;cx.beginPath();cx.moveTo(i*G,0);cx.lineTo(i*G,H);cx.stroke()}
  for(var i=0;i<=RO;i++){cx.strokeStyle='#1e2a4a';cx.lineWidth=0.5;cx.beginPath();cx.moveTo(0,i*G);cx.lineTo(W,i*G);cx.stroke()}
  if(food){cx.fillStyle='#ef4444';cx.beginPath();cx.arc(food.x*G+G/2,food.y*G+G/2,G/2-2,0,Math.PI*2);cx.fill()}
  for(var i=0;i<snake.length;i++){
    var g=i===0?'#10b981':'#34d399',a=i===0?1:0.7
    cx.fillStyle=g;cx.globalAlpha=a;cx.beginPath();cx.roundRect(snake[i].x*G+1,snake[i].y*G+1,G-2,G-2,i===0?6:3);cx.fill()
  }
  cx.globalAlpha=1
  if(dead){cx.fillStyle='rgba(239,68,68,0.3)';cx.fillRect(0,0,W,H);cx.fillStyle='#ef4444';cx.font='bold 28px sans-serif';cx.textAlign='center';cx.fillText('💀',W/2,H/2)}
  if(win){cx.fillStyle='rgba(16,185,129,0.3)';cx.fillRect(0,0,W,H);cx.fillStyle='#10b981';cx.font='bold 28px sans-serif';cx.textAlign='center';cx.fillText('🎉 过关！',W/2,H/2)}
}

var last=0
function loop(t){
  if(t-last>speed){update();last=t}
  draw();requestAnimationFrame(loop)
}
document.getElementById('r').addEventListener('click',reset)
reset();requestAnimationFrame(loop)
</script>
</body>
</html>
