<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>计算器</title><style>*{margin:0;padding:0;box-sizing:border-box;user-select:none}body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,sans-serif;padding:16px}.calc{width:100%;max-width:360px;background:#16213e;border-radius:20px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,0.4)}.display{background:#0f3460;border-radius:12px;padding:20px;margin-bottom:16px;text-align:right;min-height:100px}.expr{color:#8892b0;font-size:16px;min-height:24px;word-break:break-all}.result{color:#fff;font-size:36px;font-weight:700;margin-top:4px;word-break:break-all}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.btn{height:56px;border-radius:12px;border:none;font-size:20px;font-weight:600;cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center}.btn:active{transform:scale(.93)}.num{background:#1e2a4a;color:#e2e8f0}.op{background:#4361ee;color:#fff}.eq{background:#f59e0b;color:#fff}.clr{background:#ef4444;color:#fff}.fn{background:#2d3561;color:#8892b0;font-size:16px}@media(max-width:400px){.calc{padding:12px}.grid{gap:6px}.btn{height:48px;font-size:18px}}</style></head><body><div class=calc><div class=display><div class=expr id=expr></div><div class=result id=result>0</div></div><div class=grid><button class='btn clr' onclick=C()>C</button><button class='btn fn' onclick='P("(")'>(</button><button class='btn fn' onclick='P(")")'> )</button><button class='btn op' onclick='P("/")'>÷</button><button class='btn num' onclick='P("7")'>7</button><button class='btn num' onclick='P("8")'>8</button><button class='btn num' onclick='P("9")'>9</button><button class='btn op' onclick='P("*")'>×</button><button class='btn num' onclick='P("4")'>4</button><button class='btn num' onclick='P("5")'>5</button><button class='btn num' onclick='P("6")'>6</button><button class='btn op' onclick='P("-")'>−</button><button class='btn num' onclick='P("1")'>1</button><button class='btn num' onclick='P("2")'>2</button><button class='btn num' onclick='P("3")'>3</button><button class='btn op' onclick='P("+")'>+</button><button class='btn fn' onclick='P(".")'>.</button><button class='btn num' onclick='P("0")'>0</button><button class='btn fn' onclick='P("**")'>^</button><button class='btn eq' onclick=E()>=</button></div></div><script>var E=document.getElementById('expr'),R=document.getElementById('result'),e='';function P(v){e+=v;E.textContent=e;C()}function C(){e='';E.textContent='';R.textContent='0'}function c(){try{var r=Function('return ('+e+')')();R.textContent=r===undefined?'0':r}catch(r){R.textContent='0'}}function E(){try{var r=Function('return ('+e+')')();R.textContent=r;e=String(r);E.textContent=r+' ='}catch(r){R.textContent='\u9519\u8bef'}}</script></body></html>
