<style>:root{--bg:var(--bg);--card:var(--bg);--border:var(--border);--text:#e0e0e0;--text2:#8892b0;--accent:#4361ee;--success:#00b894;--warn:#fdcb6e;--danger:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,system-ui,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#4361ee20,#7209b720);border-bottom:1px solid var(--border);padding:20px;text-align:center}
.header h1{font-size:24px;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text2);font-size:13px;margin-top:4px}
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 16px}
.nav a{display:block;padding:12px 20px;color:var(--text2);text-decoration:none;font-size:14px;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
.nav a:hover{color:var(--text)}
.nav a.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent)10}
.main{flex:1;padding:20px;max-width:1200px;margin:0 auto;width:100%}
.section{display:none}
.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card textarea,.card input[type=text],.card input[type=file]{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:8px}
.card textarea{min-height:80px;resize:vertical;font-family:monospace}
.card textarea:focus,.card input:focus{outline:none;border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.flex{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warn{background:var(--warn);color:var(--bg)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
th,td{padding:10px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text2);font-size:11px;text-transform:uppercase}
.result-box{background:#0d0d1a;border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px;max-height:300px;overflow:auto;font-size:13px;white-space:pre-wrap;font-family:monospace}
.empty{text-align:center;padding:40px;color:var(--text2)}
.toolbar{margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px}
.badge-blue{background:var(--accent)20;color:var(--accent);border:1px solid var(--accent)40}
.badge-green{background:var(--success)20;color:var(--success);border:1px solid var(--success)40}
.badge-red{background:var(--danger)20;color:var(--danger);border:1px solid var(--danger)40}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;max-width:400px}
.toast.show{opacity:1}
.toast-success{background:var(--success);color:#fff}
.toast-error{background:var(--danger);color:#fff}
select{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;margin-bottom:8px}
.flex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
@media(max-width:768px){.nav a{padding:10px 14px;font-size:13px}.main{padding:12px}.grid{grid-template-columns:1fr}}
</style>

<div id="s-docx" class="section active">

      <label>样式</label>

        <select id="dstyle"><option value="">默认</option><option value="bold">加粗标题</option><option value="color">彩色标题</option><option value="table">含表格</option></select>
      </div>

    </div>
    <div class="card"><h3>🔍 读取文档</h3>

      <div class="flex"><button class="btn btn-ghost" onclick="readDocx()">📖 读取</button></div>

    </div>
  </div>
  <div class="grid">
    <div class="card"><h3>🔧 查找替换</h3>

      <label>查找 → 替换 (JSON格式)</label><textarea id="drepMap" rows="3">{"{{name}}": "张三", "{{date}}": "2026-06-19"}</textarea>
      <div class="flex"><button class="btn btn-warn" onclick="replaceDocx()">🔄 替换并下载</button></div>
      <div id="drepResult" class="result-box" style="display:none"></div>
    </div>
    <div class="card"><h3>🔗 合并文档</h3>

<div id="s-ppt" class="section">

      <label>标题</label><input id="pptTitle" placeholder="演示文稿标题" value="项目汇报">

  {"type":"title","title":"项目汇报","subtitle":"2026年度"},

<!-- ═══════════════════ EXCEL ─═══════════════════ -->

    <button class="btn btn-primary" onclick="loadGeneratedFiles()">🔄 刷新列表</button>
  </div>

<div id="toast" class="toast"></div>

<script>
// _EVO_LT 加载超时保护 20260713
(function(){var t=setTimeout(function(){var e=document.querySelectorAll('[id*=loading],[class*=loading],.spinner,.loader');e.forEach(function(el){var txt=el.textContent||el.innerText||'';if(txt.indexOf('加载中')>=0){el.textContent=txt.replace('加载中','超时');el.style.color='#ef4444'}})},8000);window.__evolt=t})();
// ===== 全局配置 =====
const API = '/api/v1/docs'
const API2 = '/api/v1'

// ===== Toast 提示 =====
function toast(msg, type='success'){
  var el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'toast toast-' + type + ' show'
  setTimeout(function(){ el.classList.remove('show') }, 3000)
}

// ===== Tab切换 =====
function switchTab(name){
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active') })
  document.querySelectorAll('.nav a').forEach(function(a){ a.classList.remove('active') })
  document.getElementById('s-' + name).classList.add('active')
  document.querySelector('.nav a[onclick*="' + name + '"]').classList.add('active')
  if(name == 'files') loadGeneratedFiles()
}

// ===== 文件下载 =====
function downloadFile(url, filename){
  var a = document.createElement('a')
  a.href = url
  a.download = filename || 'download'
  a.click()
}

// ===== 显示结果 =====
function showResult(elId, data, isFile){
  var el = document.getElementById(elId)
  el.style.display = 'block'
  if(isFile && data){
    el.innerHTML = '<a href="' + data.url + '" target="_blank" style="color:var(--accent)">📥 下载文件: ' + data.name + '</a> (' + data.size + ')'
  } else if(typeof data == 'string'){
    el.textContent = data
  } else {
    el.textContent = JSON.stringify(data, null, 2)
  }
}

// ===== 统一API调用 =====
async function apiCall(url, body){
  try{
    var r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})
    if(r.headers.get('content-type')?.includes('application/json')){
      return await r.json()
    }
    // 文件响应
    var blob = await r.blob()
    var filename = r.headers.get('content-disposition')?.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/)?.[1] || 'download'
    var url2 = URL.createObjectURL(blob)
    var a = document.createElement('a')
    a.href = url2
    a.download = decodeURIComponent(filename)
    a.click()
    URL.revokeObjectURL(url2)
    return {success: true, file: true, name: decodeURIComponent(filename)}
  }catch(e){
    toast('请求失败: ' + e.message, 'error')
    return {success: false, error: e.message}
  }
}

// ═══════════ DOCX ═══════════

async function createDocx(){
  var title = document.getElementById('dtitle').value || '新文档'
  var content = document.getElementById('dcontent').value
  var style = document.getElementById('dstyle').value
  var r = await apiCall(API + '/docx/create', {title: title, content: content, style: style})
  showResult('dresult', r, r.file && r.success)
  if(r.success && !r.file) toast('文档创建成功')
}

async function readDocx(){
  var files = document.getElementById('dreadFile').files
  if(files.length){
    var fd = new FormData()
    fd.append('file', files[0])
    // 上传到临时目录并获取路径
    var r2 = await fetch('/api/v1/upload', {method:'POST', body:fd})
    var d2 = await r2.json()
    if(d2.files && d2.files.length){
      await readDocxByPath(d2.files[0].path)
    }
    return
  }
  toast('请选择文件', 'error')
}

async function readDocxByPath(p){
  var r = await apiCall(API + '/docx/read', {path: p})
  showResult('dreadResult', r)
}

async function replaceDocx(){
  var path = document.getElementById('drepPath').value
  if(!path){ toast('请输入文件路径', 'error'); return }
  var repMap
  try{ repMap = JSON.parse(document.getElementById('drepMap').value) }catch(e){ toast('替换JSON格式错误', 'error'); return }
  var r = await apiCall(API + '/docx/edit', {path: path, replacements: repMap})
  showResult('drepResult', r, r.file && r.success)
  if(r.success && !r.file) toast('替换完成')
}

async function mergeDocx(){
  var val = document.getElementById('dmergePaths').value
  var paths = val.split(',').map(function(s){ return s.trim() }).filter(Boolean)
  if(paths.length < 2){ toast('请至少输入2个文件路径', 'error'); return }
  var r = await apiCall(API + '/docx/merge', {paths: paths, output: ''})
  showResult('dmergeResult', r, r.file && r.success)
  if(r.success && !r.file) toast('合并完成')
}

// ═══════════ PDF ═══════════

async function mergePdf(){
  var val = document.getElementById('pdfMergePaths').value
  var paths = val.split(',').map(function(s){ return s.trim() }).filter(Boolean)
  if(paths.length < 2){ toast('请至少输入2个文件路径', 'error'); return }
  var r = await apiCall(API + '/pdf/merge', {paths: paths, output: ''})
  showResult('pdfMergeResult', r, r.file && r.success)
  if(r.success && !r.file) toast('PDF合并完成')
}

async function splitPdf(){
  var path = document.getElementById('pdfSplitPath').value
  if(!path){ toast('请输入文件路径', 'error'); return }
  var pages = document.getElementById('pdfSplitPages').value
  var r = await apiCall(API + '/pdf/split', {path: path, pages: pages, output: ''})
  showResult('pdfSplitResult', r, r.file && r.success)
  if(r.success && !r.file) toast('PDF拆分完成')
}

async function extractPdfText(){

// ═══════════ 音频转录 ═══════════

var _lastAudioJobId = ''

async function transcribeAudio(){
  var fileInput = document.getElementById('audioFile')
  if(!fileInput.files || !fileInput.files[0]){ toast('请选择音频文件', 'error'); return }
  var lang = document.getElementById('audioLang').value
  document.getElementById('audioProgress').style.display = 'block'
  document.getElementById('audioResult').style.display = 'none'
  document.getElementById('audioSegments').style.display = 'none'
  document.getElementById('audioActions').style.display = 'none'
  var fd = new FormData()
  fd.append('file', fileInput.files[0])
  fd.append('language', lang)
  try{
    var r = await fetch(API2 + '/audio/transcribe', {method:'POST', body:fd})
    var d = await r.json()
    document.getElementById('audioProgress').style.display = 'none'
    if(d.success && d.result && d.result.success){
      _lastAudioJobId = d.job_id
      var resBox = document.getElementById('audioResult')
      resBox.style.display = 'block'
      var text = d.result.text || '[无识别结果]'
      resBox.textContent = text
      if(d.result.segments && d.result.segments.length > 0){
        var segBox = document.getElementById('audioSegments')
        segBox.style.display = 'block'
        var html = '<table><thead><tr><th>#</th><th>时间</th><th>内容</th></tr></thead><tbody>'
        d.result.segments.forEach(function(s){
          var t = s.start + 's - ' + s.end + 's'
          html += '<tr><td>' + s.id + '</td><td>' + t + '</td><td>' + (s.text || '') + '</td></tr>'
        })
        html += '</tbody></table>'
        segBox.innerHTML = html
      }
      document.getElementById('audioActions').style.display = 'flex'
      toast('转写完成，共 ' + (d.result.segment_count || 0) + ' 段')
      loadAudioHistory()
    }else{
      toast('转写失败: ' + ((d.result && d.result.error) || d.error || '未知错误'), 'error')
      document.getElementById('audioResult').style.display = 'block'
      document.getElementById('audioResult').textContent = JSON.stringify(d, null, 2)
    }
  }catch(e){
    document.getElementById('audioProgress').style.display = 'none'
    toast('请求失败: ' + e.message, 'error')
  }
}

function downloadAudioTxt(){
  if(!_lastAudioJobId){ toast('请先转写', 'error'); return }
  window.open(API2 + '/audio/download/' + _lastAudioJobId, '_blank')
}

function copyAudioResult(){
  var box = document.getElementById('audioResult')
  if(!box.textContent){ toast('没有内容可复制', 'error'); return }
  navigator.clipboard.writeText(box.textContent).then(function(){
    toast('已复制到剪贴板')
  }).catch(function(){
    toast('复制失败', 'error')
  })
}

async function loadAudioHistory(){
  try{
    var r = await fetch(API2 + '/audio/list?limit=20')
    var d = await r.json()
    var el = document.getElementById('audioHistory')
    if(d.success && d.records && d.records.length > 0){
      var html = '<table><thead><tr><th>文件</th><th>时长</th><th>语言</th><th>结果</th><th>时间</th></tr></thead><tbody>'
      d.records.forEach(function(rec){
        var status = rec.success ? '<span class="badge badge-green">成功</span>' : '<span class="badge badge-red">失败</span>'
        var dur = rec.duration ? rec.duration + 's' : '-'
        var time = new Date(rec.created_at * 1000).toLocaleString()
        html += '<tr><td>' + (rec.file_name || '-') + '</td><td>' + dur + '</td><td>' + (rec.language || '-') + '</td><td>' + status + '</td><td>' + time + '</td></tr>'
      })
      html += '</tbody></table>'
      el.innerHTML = html
    }else{
      el.innerHTML = '<div class="empty">还没有转录记录</div>'
    }
  }catch(e){
    document.getElementById('audioHistory').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>'
  }
}

// 页面加载时加载历史
setTimeout(loadAudioHistory, 500)

// ═══════════ 已生成文件 ═══════════

async function loadGeneratedFiles(){
  try{
    var r = await fetch(API + '/list')
    var d = await r.json()
    var files = d.files || []
    var el = document.getElementById('fileList')
    if(!files.length){
      el.innerHTML = '<div class="empty">还没有生成任何文档<br>试试用上面工具创建一份</div>'
      return
    }
    var html = '<table><thead><tr><th>文件名</th><th>大小</th><th>修改时间</th><th>操作</th></tr></thead><tbody>'
    files.forEach(function(f){
      html += '<tr><td>' + f.name + '</td><td>' + f.size + '</td><td>' + f.mtime + '</td>'
      html += '<td><button class="btn btn-ghost" onclick="downloadGenerated(\'' + f.path + '\',\'' + f.name + '\')">📥 下载</button></td></tr>'
    })
    html += '</tbody></table>'
    el.innerHTML = html
  }catch(e){
    document.getElementById('fileList').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>'
  }
}

function downloadGenerated(path, name){
  window.open('/' + path, '_blank')
}
