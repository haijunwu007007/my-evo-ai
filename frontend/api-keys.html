<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>API Key管理 - AUTO-EVO-AI</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--accent:#4361ee;--border:#e8eaed}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:900px;margin:0 auto}
h1{font-size:22px;margin:0 0 16px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.btn{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer}
.btn:hover{opacity:.9}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.card h3{font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card .key-text{font-size:12px;color:var(--accent);font-family:monospace;word-break:break-all;background:#f0f2f8;padding:4px 8px;border-radius:4px;margin:4px 0}
.card .meta{font-size:11px;color:var(--text3)}
.empty{text-align:center;padding:60px;color:var(--text3)}
.loading{padding:40px;text-align:center;color:var(--text3)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal-card{background:var(--card);border-radius:10px;padding:20px;max-width:400px;width:90%}
.modal-card h2{font-size:16px;margin-bottom:10px}
.modal-card input{padding:8px 10px;border-radius:6px;border:1px solid var(--border);font-size:13px;width:100%;margin-bottom:8px}
.new-key-box{background:#f0fdf4;border:1px solid #22c55e;border-radius:6px;padding:10px;font-size:12px;font-family:monospace;word-break:break-all;margin-bottom:8px}
@media(max-width:768px){body{padding:10px}}
</style><link rel="stylesheet" href="/frontend/share.css">
</head><body>
<h1>API Key 管理 <button class="btn" onclick="showCreate()">+ 创建</button></h1>
<div id="list"><div class="loading">加载中...</div></div>
<div class="modal" id="modal">
  <div class="modal-card">
    <h2>创建 API Key</h2>
    <p style="font-size:12px;color:var(--text3);margin-bottom:8px">命名你的 Key，用于 API 鉴权</p>
    <input id="keyName" placeholder="如：生产环境" required>
    <button class="btn" onclick="createKey()">创建</button>
    <button class="btn" style="background:transparent;color:var(--text2);border:1px solid var(--border)" onclick="closeModal()">取消</button>
  </div>
</div>
<script>
var _token=localStorage.getItem('evo_token')||'';

function authFetch(url,opt){
  opt=opt||{};
  opt.headers=opt.headers||{};
  opt.headers['Authorization']='Bearer '+_token;
  return fetch(url,opt);
}

function loadKeys(){
  document.getElementById('list').innerHTML='<div class="loading">加载中...</div>';
  authFetch('/api/v1/api-keys').then(function(r){return r.json()}).then(function(j){
    var keys=j.keys||j.data||[];
    if(!keys.length){
      document.getElementById('list').innerHTML='<div class="empty">暂无 API Key<br><button class="btn" onclick="showCreate()" style="margin-top:10px">+ 创建</button></div>';
      return;
    }
    var h='';
    for(var i=0;i<keys.length;i++){
      var k=keys[i];
      h+='<div class="card"><h3>'+k.name+'</h3>';
      if(k.key)h+='<div class="key-text">'+k.key+'</div>';
      h+='<div class="meta">创建: '+(k.created_at||k.created||'-')+'</div>';
      h+='<div style="margin-top:6px"><button class="btn" onclick="revokeKey(\''+k.id+'\')" style="background:#e74c3c">撤销</button></div></div>';
    }
    document.getElementById('list').innerHTML=h;
  }).catch(function(){
    document.getElementById('list').innerHTML='<div class="empty">加载失败，请确认已登录</div>';
  });
}

function showCreate(){document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}

function createKey(){
  var name=document.getElementById('keyName').value;
  if(!name)return;
  authFetch('/api/v1/api-keys',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name})}).then(function(r){return r.json()}).then(function(j){
    if(j.key){
      document.getElementById('modal').innerHTML='<div class="modal-card"><h2>Key 已创建</h2><div class="new-key-box">'+j.key+'</div><p style="font-size:12px;color:var(--text2)">请立即复制，关闭后不再显示</p><button class="btn" onclick="location.reload()">关闭</button></div>';
    }else{
      loadKeys();closeModal();
    }
  });
}

function revokeKey(id){
  if(!confirm('确定撤销此 API Key？'))return;
  authFetch('/api/v1/api-keys/'+id,{method:'DELETE'}).then(function(){loadKeys()});
}

loadKeys();
</script></body></html>
