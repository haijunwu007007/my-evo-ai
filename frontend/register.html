<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>注册 - AUTO-EVO-AI V0.1</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#0b0b16,#12122a);color:#e8e8ef;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}.box{background:rgba(26,26,46,.6);border:1px solid rgba(45,53,97,.3);border-radius:16px;padding:36px;width:360px;text-align:center}h1{font-size:20px;margin-bottom:20px;background:linear-gradient(135deg,#4361ee,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(45,53,97,.4);background:rgba(22,33,62,.6);color:#e8e8ef;font-size:14px;outline:none;margin-bottom:12px}button{width:100%;padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,#4361ee,#a855f7);color:#fff;font-size:14px;cursor:pointer;font-weight:700}.msg{font-size:12px;margin-top:12px;color:#8892b0}a{color:#4361ee;text-decoration:none}</style>
</head><body><div class="box"><h1>创建账户</h1><input id="user" placeholder="用户名"><input id="pass" type="password" placeholder="密码"><input id="pass2" type="password" placeholder="确认密码"><button onclick="reg()">注册</button><div id="msg" class="msg"></div><div class="msg" style="margin-top:8px">已有账户？<a href="/login">登录</a></div></div><script>async function reg(){var u=document.getElementById('user').value.trim(),p=document.getElementById('pass').value,p2=document.getElementById('pass2').value;if(p!=p2){document.getElementById('msg').textContent='密码不匹配';return}try{var r=await fetch('/api/v1/users/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});var d=await r.json();if(d.success){document.getElementById('msg').textContent='注册成功！正在跳转...';setTimeout(function(){window.location.href='/?u='+u},1000)}else{document.getElementById('msg').textContent=d.msg||'注册失败'}}catch(e){document.getElementById('msg').textContent='请求失败'}}</script></body></html>
