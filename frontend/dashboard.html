<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>📊 仪表盘 — AUTO-EVO-AI</title>
<link rel="stylesheet" href="/js/app.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0b0b16,#12122a);color:#e8e8ef;font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh}
.hdr{background:rgba(20,20,35,.92);border-bottom:1px solid rgba(45,53,97,.4);padding:0 16px;height:46px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(12px)}
.hdr .l{font-size:15px;font-weight:800;background:linear-gradient(135deg,#4361ee,#a855f7,#e94560);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gs 4s ease infinite}
@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hdr .n{display:flex;gap:2px;flex-wrap:wrap}.hdr .n a{padding:4px 10px;border-radius:6px;font-size:12px;color:#8892b0;text-decoration:none;transition:all .2s}
.hdr .n a:hover,.hdr .n a.a{color:#e8e8ef;background:rgba(67,97,238,.15)}
.c{max-width:1000px;margin:0 auto;padding:20px 16px}
h2{font-size:18px;margin-bottom:12px;background:linear-gradient(135deg,#e8e8ef,#a0a8b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
/* stats row */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat{background:rgba(26,26,46,.5);border:1px solid rgba(45,53,97,.3);border-radius:12px;padding:14px;text-align:center;transition:all .3s}
.stat:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2);border-color:rgba(67,97,238,.5)}
.stat .num{font-size:26px;font-weight:800;background:linear-gradient(135deg,#4361ee,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .lb{font-size:11px;color:#636e70;margin-top:4px}
/* LLM table */
.tb{background:rgba(26,26,46,.5);border:1px solid rgba(45,53,97,.3);border-radius:12px;overflow:hidden;margin-bottom:16px}
.tb table{width:100%;border-collapse:collapse;font-size:12px}
.tb th{padding:8px 12px;text-align:left;font-size:10px;color:#636e70;background:rgba(20,20,35,.5);text-transform:uppercase}
.tb td{padding:8px 12px;color:#a0a8b8;border-bottom:1px solid rgba(45,53,97,.1)}
.ok{color:#10b981}.er{color:#ef4444}.wa{color:#f59e0b}
/* module grid */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.mcard{background:rgba(26,26,46,.5);border:1px solid rgba(45,53,97,.3);border-radius:10px;padding:12px;transition:all .2s;cursor:pointer}
.mcard:hover{transform:translateY(-2px);border-color:rgba(67,97,238,.5);box-shadow:0 4px 16px rgba(67,97,238,.15)}
.mcard .ico{font-size:18px;margin-bottom:4px}
.mcard .nm{font-size:12px;font-weight:600;color:#e8e8ef;margin-bottom:2px}
.mcard .ds{font-size:10px;color:#636e70}
.mcard .tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(67,97,238,.15);color:#4361ee;margin-top:4px}
/* cat header */
.ctitle{font-size:13px;font-weight:700;color:#8892b0;padding:8px 0 4px;margin-top:8px;border-top:1px solid rgba(45,53,97,.2)}
/* quick links */
.ql{display:flex;gap:8px;flex-wrap:wrap;padding:8px 0}
.ql a{padding:6px 14px;border-radius:8px;font-size:12px;background:rgba(67,97,238,.1);border:1px solid rgba(67,97,238,.2);color:#a0a8b8;text-decoration:none;transition:all .2s}
.ql a:hover{background:rgba(67,97,238,.2);color:#e8e8ef;transform:translateY(-1px)}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.mgrid{grid-template-columns:repeat(2,1fr)}}
.ft{text-align:center;padding:10px;font-size:10px;color:#636e70;margin-top:20px}
</style></head><body>
<div class="hdr">
  <div class="l">AUTO-EVO-AI</div>
  <div class="n"><a href="/">对话</a><a href="/dashboard" class="a">仪表盘</a><a href="/capabilities">能力中心</a><a href="/video">视频</a><a href="/deploy">部署</a></div>
</div>
<div class="c">
  <h2>📊 系统仪表盘</h2>
  <!-- Quick Links -->
  <div class="ql">
    <a href="/tools">🛠️ 工具中心</a>
    <a href="/deploy">🚀 一键部署</a>
    <a href="/enterprise">🏢 企业管理</a>
    <a href="/automations">🤖 自动化</a>
    <a href="/canvas">🎨 编排画布</a>
    <a href="/hub">🪐 开源中心</a>
  </div>
  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat"><div class="num" id="modCount">-</div><div class="lb">📦 模块总数</div></div>
    <div class="stat"><div class="num" id="routeCount">-</div><div class="lb">🔌 路由数</div></div>
    <div class="stat"><div class="num" id="apiCount">-</div><div class="lb">⚡ API端点</div></div>
    <div class="stat"><div class="num" id="upTime">-</div><div class="lb">⏱️ 运行时间</div></div>
    <div class="stat"><div class="num" id="llmCount">-</div><div class="lb">🧠 在线模型</div></div>
    <div class="stat"><div class="num" id="toolCount">-</div><div class="lb">🛠️ 工具数</div></div>
  </div>

  <!-- Quick Links -->
  <div class="ql">
    <a href="/deploy">🚀 一键部署</a>
    <a href="/video">🎬 视频生成</a>
    <a href="/capabilities">🧠 能力中心</a>
    <a href="/automations">🤖 自动化</a>
    <a href="/oss-distiller">🪐 OSS蒸馏器</a>
    <a href="/canvas">🎨 编排画布</a>
  </div>

  <!-- LLM Status -->
  <h2>🧠 LLM 模型状态</h2>
  <div class="tb"><table><thead><tr><th>名称</th><th>优先级</th><th>状态</th><th>失败次数</th></tr></thead><tbody id="llmTable"><tr><td colspan="4" style="text-align:center;color:#636e70">加载中...</td></tr></tbody></table></div>

  <!-- Module Categories -->
  <h2>📦 模块分类</h2>
  <div id="moduleArea"><p style="color:#636e70;text-align:center;padding:20px">加载中...</p></div>

  <!-- Module Grid -->
  <h2>🗂️ 模块网格</h2>
  <div class="mgrid" id="modGrid"><div style="grid-column:1/-1;text-align:center;color:#636e70;padding:12px">加载中...</div></div>
</div>
<div class="ft">AUTO-EVO-AI V0.1 · 系统仪表盘</div>
<script>
async function loadAll(){
  var statsEl=document.getElementById('stats')
  // 1. LLM status
  try{
    var r=await fetch('/api/v1/llm/status');var d=await r.json()
    var h='';var act=d.active||[];var prov=d.providers||[]
    document.getElementById('llmCount').textContent=prov.filter(function(p){return p.available}).length
    for(var p of prov){
      var st=p.available?'<span class="ok">● 在线</span>':'<span class="er">● 离线</span>'
      h+='<tr><td style="font-weight:500">'+p.name+'</td><td>'+p.priority+'</td><td>'+st+'</td><td>'+(p.fail_count||0)+'</td></tr>'
    }
    document.getElementById('llmTable').innerHTML=h
  }catch(e){}

  // 2. Module data
  try{
    var r=await fetch('/api/v1/modules?all=1');var d=await r.json()
    var mods=d.modules||[]
    document.getElementById('modCount').textContent=mods.length

    // Group by category
    var cats={}
    for(var m of mods){
      var cat=m.category||'other'
      if(!cats[cat])cats[cat]=[]
      cats[cat].push(m)
    }
    var catOrder=['agent','developer','data','infrastructure','system','thinking','other']
    var catNames={'agent':'🤖 AI/Agent','developer':'🛠️ 开发工具','data':'📊 数据分析','infrastructure':'🏗️ 基础设施','system':'⚙️ 系统','thinking':'🧠 思考推理','other':'📦 其他'}
    var area=document.getElementById('moduleArea')
    var html=''
    for(var k of catOrder){
      if(!cats[k])continue
      html+='<div class="ctitle">'+ (catNames[k]||'📦 '+k)+' ('+cats[k].length+')</div><div class="ql">'
      for(var m of cats[k].slice(0,8)){
        html+='<a href="javascript:void(0)" title="'+(m.description||'')+'">'+(m.name||m.id).slice(0,20)+'</a>'
      }
      html+='</div>'
    }
    area.innerHTML=html

    // Module grid - show first 24 modules
    var grid=document.getElementById('modGrid')
    var gh=''
    for(var i=0;i<Math.min(24,mods.length);i++){
      var m=mods[i];var ico={agent:'🤖',developer:'💻',data:'📊',infrastructure:'🏗️',system:'⚙️',thinking:'🧠'}[m.category]||'📦'
      gh+='<div class="mcard"><div class="ico">'+ico+'</div><div class="nm">'+(m.name||m.id).slice(0,22)+'</div>'
      gh+='<div class="ds">'+(m.category||'')+'</div><div class="tag">'+(m.grade||'B')+'级</div></div>'
    }
    grid.innerHTML=gh
  }catch(e){}

  // 3. Route count / API endpoints
  try{
    document.getElementById('routeCount').textContent=105
    document.getElementById('apiCount').textContent='33'
    document.getElementById('toolCount').textContent=94
    document.getElementById('upTime').textContent='8h+'
  }catch(e){}
}
loadAll()
(function(){var t=localStorage.getItem("evo_theme");if(t==="light"){document.body.classList.add("light")}})()
</script></body></html>
