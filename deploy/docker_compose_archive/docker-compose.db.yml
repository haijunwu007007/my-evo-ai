version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: evo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: evo
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: evo_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
