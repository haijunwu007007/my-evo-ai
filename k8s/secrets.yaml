# AUTO-EVO-AI V0.1 — K8s Secrets 模板
# 实际部署前替换占位符并创建：
#   kubectl create secret generic evo-secrets -n auto-evo-ai \
#     --from-literal=api_key='YOUR_API_KEY' \
#     --from-literal=jwt_secret='YOUR_JWT_SECRET'
#
# 或使用加密后的 base64:
#   echo -n 'your-api-key' | base64
---
apiVersion: v1
kind: Secret
metadata:
  name: evo-secrets
  namespace: auto-evo-ai
type: Opaque
data:
  # 替换为您的实际 API Key (base64 编码)
  api_key: ""
  # 替换为您的实际 JWT Secret (base64 编码)
  jwt_secret: ""
